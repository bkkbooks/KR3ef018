body:
  text: 卷一辨太陽病脈證並治上太陽之為病脈浮頭項強痛而惡寒方太陽者六經之首主皮膚而統榮衛所以為受病之始也難經曰浮脈在肉上行也滑氏曰脈在肉上行主表也表即皮膚榮衛麗焉故脈見尺寸俱浮知為病在太陽之診也項頸後也強痛者皮膚榮衛一有感受經絡隨感而應邪正爭擾也惡寒者該風而言也風寒初襲表而鬱於表故不勝覆被風寒外忤而畏惡之及其過表而入里則不復惡仇讎之義也此揭太陽之總病乃三篇之大綱以下凡首稱太陽病者皆指此而言之也程凡云太陽病便知為皮膚受邪病在腠理榮衛之間而未涉乎腑臟也太陽之見證莫確於頭痛惡寒故首揭之使後人一遇卒病不問何氣之交而但兼此脈此證便可作太陽病處治亦必兼此脈此證方可作太陽病處治雖病已多日不問其過經已未而尚見此脈此證仍可作太陽病處治柯凡言太陽病者必據此條脈證如脈反沉頭不痛項不強不惡寒是太陽之變局矣仲景立六經總綱法與內經熱論不同太陽只重在表證表脈不重在經絡主病看諸總綱各立門戶其意可知案方云太陽者以太陽經所主之部屬皮膚言也皮膚為人一身之表表之為言外也風寒本天之二氣於人身為外物故其中傷於人必自外而內人之中傷之必皮膚先受起以病方在皮膚皮膚屬太陽故曰太陽病蓋舉大綱而言始以見周身之皮膚具病後人不察以經絡之一線而嚚訟豈不太謬此説出於痙書以其論太陽之大綱故附於此柯氏凡例云太陽病脈浮頭項強痛六字當作六句讀言脈氣來尺寸俱浮頭與項強而痛若脈浮兩字連讀頭項強痛而惡寒作一句讀疏略無味則字字讀斷大義先明矣太陽病發熱汗出惡風脈緩者名為中風玉函千金翼出下有而字脈緩者作其脈緩無名字方太陽病上條所揭云云者是也後皆仿此發熱風邪干於肌膚而鬱蒸也汗出腠理疏玄府開而不固也此以風邪郁衛故衛逆而主於惡風緩即下文陽浮而陰弱之謂中當也凡首稱太陽中風者則又皆指此而言也喻中字與傷字無別即謂傷風亦可汪脈緩當作浮緩看浮是太陽病脈緩是中風脈錢緩者緊之對稱非遲脈之謂也風為陽邪非徑急之性故其脈緩也案中風又稱傷風活人書傷風之候頭痛發熱脈緩汗出惡風三因方敘傷風論寒泣血無汗惡寒風散氣有汗惡風為不同本事方今傷風古謂之中風太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒逆成本作𠱘為作曰玉函脈上有其字無者名二字方或未定之詞寒為陰陰不熱以其著人而客於人之陽經鬱而與陽爭爭則蒸而為熱已發熱者時之所至郁爭而蒸也未發熱者始初之時鬱而未爭也必定然之詞言發熱早晚不一而惡寒則必定即見也錢體痛者寒傷營分也營者血中精專之氣也血在脈中隨營氣而流貫滋養夫一身者也此因寒邪入於血脈之分營氣澀而不快於流行故身體骨節皆痛也鑑胃中之氣被寒外束不能發越故嘔逆也寒性徑急故脈陰陽俱緊也此承首條言太陽病又兼此脈此證者名曰傷寒以為傷寒病之提綱後凡稱傷寒者皆指此脈證而言也喻仲景恐見惡寒體痛嘔逆又未發熱認為直中陰經之證蚤於辨證之先揭此一語慮何周耶一語乃或未發熱四字也柯陰陽指浮沉而言不專指尺寸也魏傷寒中風同一浮脈而彼為浮緩此為浮緊陽邪舒散故緩陰邪徑急故緊同為在表之浮而一緩一緊風寒迥異矣案驗之病者有其未發熱則脈沉緊而其已發熱則浮緊者診視之際宜仔細辨認也張介賓脈神草有説當考明理論云惡風則比之惡寒而輕也惡寒者嗇嗇然憎寒也雖不當風而自然寒矣惡風者謂常居密室之中幃帳之內則舒緩而無所畏也一或用扇一或當風淅淅然而惡者此為惡風者也案風寒二證譬如人之呵與吹呵之風屬陽吹之寒屬陰陽主泄陰主閉故人之感邪氣其表虛泄而汗出者名為中風其表實閉而無汗者名為傷寒其實受邪之風寒不知果何如只就其表虛表實無汗有汗而立其目以為處療之方耳故不曰此傷寒也此中風也而下名為二字其意可自知也傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也躁成本方本作燥玉函無下若字為傳也作乃為傳錢傷寒一日太陽受之者即內經熱論所謂一日巨陽受之二日陽明受之之義也因太陽主表總統營衛故先受邪也然寒傷營之證其脈陰陽俱緊或見浮緊之脈若一日之後脈安靜恬退則邪輕而自解不至傳入他經矣倘見證頗覺欲吐則傷寒嘔逆之證猶未除也況吐則邪入犯胃乃納入之機若口燥而煩熱脈數急者為邪氣已郁為熱其氣正盛勢未欲解故為傳經之候也方一日二日三四五六日者猶言第一第二第三四五六之次序也大要譬如計程如此立個前程的期式約模耳非計日以限病之謂案燥煩即躁煩之訛以為口燥煩熱者誤矣諸注並以煩躁為解錫云數急對靜而言柯云欲字若字是審其將然脈之數急是診其已然此因脈定證之法也傷寒二三日陽明少陽證不見者為不傳也鑑傷寒二日陽明受之三日少陽受之此其常也若二三日陽明證之不惡寒反惡熱身熱心煩口渴不眠等證與少陽證之寒熱往來胸脅滿喜嘔口苦耳聾等證不見者此為太陽邪輕熱微不傳陽明少陽也方不傳有二一則不傳而遂自愈一則不傳而猶或不解若陽明少陽雖不見太陽亦不解則始終太陽者有之余經同推要皆以脈證所見為準若只蒙龍拘拘數日以論經則去道遠矣太陽病發熱而渴不惡寒者為溫病玉函無者字鑑發熱不渴惡寒者太陽證也發熱而渴不惡寒者陽明證也今太陽病始得之不俟寒邪變熱轉屬陽明而即熱渴不惡寒者知非太陽傷寒乃太陽溫病也由於膏粱之人冬不藏精辛苦之人冬傷於寒內陰已虧外陽被郁周身經絡早成溫化所以至春一遇外邪即從內應感寒邪者則名曰溫病程太陽初得之一日即發熱而渴不惡寒者因邪氣早已內蓄其外感於太陽特其發端耳其內蓄之熱固非一朝一夕矣蓋自冬不藏精而傷於寒時腎陰已虧一交春陽發動即病未發而周身經絡已莫非陽盛陰虛之氣所布濩所云至春發為溫病者蓋從其胚胎受之也此證初治可用辛涼治標一經汗下後芩連梔膏只增其熱王冰云寒之不寒責其無水須大劑六味地黃湯重加生地麥冬救腎水為主若干嘔煩逆者加山楂貝母折其衝勢金水兩虧者宜二地二冬加人參為固本湯滋水之上源若見斑衄等證此為上竭宜四物湯倍生地赤芍加山楂丹皮復營分之虧以生陰氣煎法俱用童便或加金汁和服蓋病源得之冬不藏精故滋陰可以退火而涼血即能清熱余以此活人多矣因附識於此錢其見證之初以大青龍湯之涼解為治溫之首劑而作一大柱石也然無汗者宜之耳其有發熱而渴不惡寒而汗自出者不宜更汗則有桂枝二越婢一湯之法也其無表證但熱渴而不惡寒者為已入陽明又有白虎湯可用也案活人書溫病渴而不惡寒者主以竹葉石膏湯蓋其方清涼潤補相兼也又案錢氏主用石膏程氏專用地黃不知孰是嘗驗溫病亦未能無虛實之分虛者宜從程法實者當依錢法學者要須參諸脈證匆令誤也若發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期成本名上有曰字張卿子本無鼻字玉函被下者作下之無火者之者及色字瘈瘲作掣縱下有發作字若以火熏之作復以火熏之成傷寒發汗已則身涼若發汗已身灼熱者非傷寒為風溫也風傷於上而陽受風氣風與溫相合則傷衛脈陰陽俱浮自汗出者衛受邪也衛者氣也風則傷衛溫則傷氣身重多眠睡者衛受風溫而氣昏也鼻息必鼾語言難出者風溫外甚而氣擁不利也若被下者則傷臟氣太陽膀胱經也內經曰膀胱不利為癃不約為遺溺癃者小便不利也太陽之脈起自內眥內經曰瞳子高者太陽不足戴眼者太陽以絶小便不利直視失溲為下後竭津液損臟氣風溫外勝經曰欲絶也為難治若被火者則火助風溫成熱微者熱瘀而發黃劇者熱甚生風如驚癇而時瘈瘲也方灼熱謂熱轉加甚也風溫謂觸犯於溫而有風也程冬時傷腎則寒水被虧是溫病源頭誤治溫病而辛溫發散是風溫源頭風溫即溫病之壞病非溫病外又有風溫也一逆者若汗若下若火也再逆者汗而或下下而或火也溫乃陽盛陰虛之病一逆已令陰竭況再逆乎甚矣溫熱病不同於風寒治也錢陰陽脈俱浮則以寸口為陽尺中為陰即關前為陽關後為陰之法也陽脈浮則風邪傷衛毛孔不閉故汗自出陰脈浮則熱傷陰分溫邪熏灼鬱冒神昏故身重多眠而昏睡中之鼻息必齁鼾也其語言難出者非舌強失音喑啞之病乃神昏不語也溫病得火內外充斥浸淫於臟腑肌肉筋骨之間所以時時瘈瘲也瘈瘲者筋骨瞤動十指抽掣臂胻堅徑轉側而不自知也案諸家以溫病風溫為二證特程注以風溫為溫病之壞證今考宋版及玉函溫病風溫連接為一條且據若發汗已之若字則程注為得矣龐安時總病論云病人素傷於風又復傷於熱風熱相搏則發風溫四肢不收頭痛身熱常自汗出不解治在少陰厥陰不可發汗汗出則譫語內煩擾不得臥善驚目光無精治之復發其汗如此者醫殺之耳風溫之為病脈陰陽俱浮汗出體重其息必喘默默但欲眠下之則小便難發汗則譫語加溫針則耳聾難言但吐下之則遺尿宜葳蕤湯案諸家以風溫為別證昉出於斯汪云小便不利四字當在若被下者四字之上否則既云不利又曰失溲悖矣病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽七日愈發於陰六日愈以陽數七陰數六故也玉函千金翼病上有夫字熱下並有而字無熱作不熱六七上並有者字成本亦有成陽為熱也陰為寒也發熱而惡寒寒傷陽也無熱而惡寒寒傷陰也陽法火陰法水火成數七水成數六陽病七日愈者火數足也陰病六日愈者水數足也程經雖有六陰陽定之矣陰陽之理雖深寒熱見之矣在發熱惡寒者陽神被郁之病寒在表而里無寒是從三陽經為來路也在無熱惡寒者陰邪獨治之病寒入里而表無熱是從三陰臟為來路也同一證而所發之源自異七與六不過奇偶二字解特舉之為例以配定陰陽耳日子上宜活看重在陽數陰數之數字上張此條以有熱無熱證陽病陰病之大端言陽經受病則惡寒發熱陰經受病則無熱惡寒尚論以風傷衛氣為陽寒傷營血為陰亦屬偏見錢此一節提摯綱領統論陰陽當冠於六經之首自叔和無己諸家錯簡於太陽脈證之後致喻氏以未熱注無熱悖於立言之旨矣蓋仲景以外邪之感受本難知發則可辨因發知受有陰經陽經之不同故分發熱無熱之各異以定陽奇陰耦之愈期也發於陽者邪入陽經而發也發於陰者邪入陰經而發也即陰陽應象論所謂陽勝則身熱陰勝則身寒陰陽更勝之變也案玉函經及周氏錢氏張氏柯氏注本以此條冠太陽篇首又案以陰陽為營衛之説昉見方氏注後喻氏魏氏程氏及金鑑皆從其説周氏錢氏駁正細辨今不繁引外臺祕要云王叔和曰夫病發熱而惡寒者發於陽無熱而惡寒者發於陰發於陽者可攻其外發於陰者宜溫其內發表以桂枝溫里宜四逆龐安時總病論亦同葉文齡醫學統旨云愚謂發於陽而發熱者頭必疼發於陰而發熱者頭不疼黃炫活人大全云或問發熱惡寒發於陽無熱惡寒發於陰且如傷寒或發熱或未發熱必惡寒體痛二説皆曰惡寒如何辨之曰傷寒或發熱或未發熱必惡寒體痛嘔逆頭痛項強脈浮緊此在陽可發汗若陰證則無頭疼無項強但惡寒而倦脈沉細此在陰可溫里也太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈玉函千金翼無以行二字盡作竟方太陽頭痛首條已具言之此又獨言者舉大意也七日以上該六日而言也行亦傳也經盡謂傳遍也欲作再經謂病加進也針足陽明奪其傳路而遏之也傳與陽明篇轉互音義猶古之驛傳今之過所云也周七日而云以上自愈者明明邪留太陽至七日則正氣復而邪氣退也所謂經盡蓋六日之間營衛流行復至七日而行受邪之經耳豈誠一日太陽二日陽明六日間六經證見至七日乃又顯太陽經證也耶針足陽明者謂太陽將傳陽明故於趺陽脈穴針之以泄其邪則邪散而自愈矣柯舊説傷寒日傳一經六日至厥陰七日再傳太陽八日再傳陽明謂之再經自此説行而仲景之堂無門可入矣夫仲景未嘗有日傳一經之説亦未有傳至三陰而尚頭痛者曰頭痛者是未離太陽可知曰行則與傳不同曰其經是指本經而非他經矣發於陽者七日愈是七日乃太陽一經行盡之期不是六經傳變之日岐伯曰七日太陽病衰頭痛少愈有明證也故不曰傳足陽明而曰欲再作經是太陽過經不解復病陽明而為並病也針足陽明之交截其傳路使邪氣不得再入陽明之經則太陽之餘邪亦散非歸併陽明使不犯少陽之謂也案成氏喻氏程氏錢氏及金鑑並以六日傳六經之説為注解皆不可從太陽病欲解時從巳至未上玉函千金翼至作盡無上字成巳為正陽則陽氣得以復也始於太陽終於厥陰六經各以三時為解而太陽從巳至未陽明從申至戌少陽從寅至辰至於太陰從亥至醜少陰從子至寅厥陰從醜至卯者以陽行也速陰行也緩陽主於晝陰主於夜陽三經解時從寅至戌以陽道常饒也陰三經解時從亥至卯以陰道常乏也內經曰陽中之太陽通於夏氣則巳午未太陽乘王也風家表解而不了了者十二日愈方風家謂中風之病也表外證也解罷也了了猶惺惺也言中風之病外證俱罷大勢已除餘邪未盡猶未復初也十二日經盡之時也言至此時則餘邪當悉去而初當復也蓋曉人當靜養以待勿多事反擾之意柯七日表解後復過一候而五臟元氣始充故十二日精神慧爽而愈此雖舉風家傷寒概之矣鑑不了了者不清楚也吳經中凡勿藥而俟其自愈之條甚多今人凡有診視無不與藥致自愈之證反多不愈矣總病論方言曰南楚疾愈或謂之瘥或謂之了病人身大熱反欲得衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也成本得衣間有近字成皮膚言淺骨髓言深皮膚言外骨髓言內身熱欲得衣者表熱裡寒也身寒不欲衣者表寒裡熱也程病人身大熱反欲得近衣者沉陰內錮而陽外浮此曰表熱裡寒身大寒反不欲近衣者陽邪內菀而陰外凝此曰表寒裡熱寒熱之在皮膚者屬標屬假寒熱之在骨髓者屬本屬真本真不可得而見而標假易惑故直從欲不欲處斷之情則無假也不言表裡言皮膚骨髓者極其淺深分言之也汪或云此條非仲景論系叔和所增入者詳其文義與陽盛陰虛汗之則死云云又桂枝下咽陽盛則斃云云同構此危疑之辭以驚惑人耳例宜從刪案柯氏亦刪此條太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陰弱玉函脈經千金翼作陰濡弱千金嗇嗇作澀澀翕翕作吸吸方太陽中風乃掇上條所揭攢名以指稱之猶上條掇首條所揭而以太陽病為首稱同一意也陽浮而陰弱乃言脈狀以釋緩之義也難經曰中風之脈陽浮而滑陰濡而弱是也陽浮者熱自發陰弱者汗自出言外為陽衛亦陽也風邪中於衛則衛實實則太過太過則強然衛本行脈外又得陽邪而助之強於外則其氣愈外浮脈所以陽浮陽主氣氣鬱則蒸熱陽之性本熱風善行而數變所以變熱亦快捷不待閉郁而即自蒸熱故曰陽浮者熱自發也內為陰榮亦陰也榮無故則榮比之衛為不及不及則不足不足則弱然榮本行脈內又無所助而但自不足於內則其氣愈內弱脈所以陰弱陰主血汗者血之液陰弱不能內守陽強不為外固所以致汗亦直易不待覆蓋而即自出泄故曰陰弱者汗自出也嗇嗇惡寒淅淅惡風乃雙關之句嗇嗇言惡寒由於內氣餒不足以耽當其滲逼而惡之甚之意淅淅言惡風由於外體疏猶驚恨雨水卒然淅瀝其身而惡之切之意蓋風動則寒生寒生則膚粟惡則皆惡未有惡寒而不惡風惡風而不惡寒者所以經皆互文而互言之也翕翕發熱乃形容熱候之輕微翕火炙也翕為溫熱而不蒸蒸大熱也鼻鳴者氣息不利也乾嘔者氣逆不順也蓋陽主氣而上升氣通息於鼻陽熱壅甚故鼻窒塞而息鳴氣上逆而乾嘔也主主當也言以是為主當而損益則存乎人蓋脈證無有不相兼而見者所以經但活潑潑不欲人拘執之意也程陰陽以浮沉言非以尺寸言觀傷寒條只曰脈陰陽俱緊並不著浮字可見唯陽浮同於傷寒故發熱同於傷寒唯陰弱異於傷寒故汗自出異於傷寒虛實之辨在此熱自表發故浮以候之汗自里出故沉以候之得其同與異之源頭而歷歷諸證自可不爽柯兩自字便見風邪之迅發喻風寒互言後人相傳謂傷風惡風傷寒惡寒苟簡率易誤人多矣翕翕發熱乃氣蒸濕潤之熱比傷寒之乾熱不同方氏或問云嗇慳吝也惡寒者闢如慳吝嗇細懼事之人恁的常常怯怯然畏惡也淅淅米也孟子接淅而行是也惡風者闢如裸體之人被人卒然以水灑淅於身驀地驚恐恨恨然畏惡也然特迎風動扇則如此間靜坐臥則不惡此二者所以有大同小異之分也顧氏溯源集云翕翕者熱在表也如鳥翼之附外也方言翕炙也又曰翕熾也傷寒選録云張氏曰對病施治乃依方療疾也事理平正無曲折可否之責止對證而用藥即無疑難故曰主之假如此條理明而言筒曰主之者當然其他雖間有病證冗雜者而理終歸一途別無差失相反方內凡言主之理同一體也黃炫活人大全云或問經言用藥有言可與某湯或言不可與又有言宜某湯及某湯主之凡此數節旨意不同敢問曰傷寒論中一字不苟觀是書片言隻字之間當求古人之用意處輕重是非得其至理而後始可言醫矣所問有言可與某湯或言不可與者此設法御病也又言宜某湯者此臨證審決也言某湯主之者乃對病施藥也此三者即方法之條目也桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘玉函作劈上五味㕮咀三味以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流離病必不除若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物成本無三味二字離作漓小促下有役字不出下有者字金匱下利篇流離作淋漓全書遍身作通身小促上有當字玉函亦有當字周作晬無禁以下十五字若病重者以下千金翼作病重者一日一夜乃瘥當晬時觀之服一劑湯病證猶在當復作服之至有不汗出當服三劑乃解外臺作若病重者晝夜服特須避風若服一劑晬時不解病證不變者當更服之王云小促宋版作少從容案現行宋版未有如此者鑑名曰桂枝湯者君以桂枝也桂枝辛溫辛能發散溫通衛陽芍藥酸寒酸能收斂寒走陰營桂枝君芍藥是於發汗中寓斂汗之旨芍藥臣桂枝是於和營中有調衛之功生薑之辛佐桂枝以解表大棗之甘佐芍藥以和中甘草甘平有安內攘外之能用以和中氣即以調和表裡且以調和諸藥以桂芍之相須薑棗之相得借甘草之調和陽表陰里氣衛血營並行而不悖是剛柔相濟以相和也而精義在服後須臾啜稀粥以助藥力蓋穀氣內充不但易為釀汗更使已入之邪不能少留將來之邪不得復入也又妙在溫覆令一時許漐漐微似有汗是授人以微汗之法也不可令如水流漓病必不除是禁人以不可過汗之意也此方為仲景群方之冠乃解肌發汗調利營衛之第一方也凡中風傷寒脈浮弱汗自出而表不解者皆得而主之其他但見一二證即是不必悉具也此湯倍芍藥生薑加人參名桂枝新加湯用以治營表虛寒肢體疼痛倍芍藥加飴糖名小建中湯用以治裡虛心悸腹中急痛再加黃耆名黃耆建中湯用以治虛損虛熱自汗盜汗因知仲景之方可通治百病也若一服汗出病瘥謂病輕者初服一升病即解也停後服不必盡劑謂不可再服第二升恐其過也若不汗更服依前法謂初服不汗出未解再服一升依前法也又不汗後服謂病仍不解後服第三升也小促其間半日許令三服盡謂服此第三升當小促其服亦不可太緩以半日三時許為度令三服盡始適中其服之宜也若病重者初服一劑三升盡病不解再服一劑病猶不解乃更服三劑以一日一夜周十二時為度務期汗出病解而後已後凡有曰依服桂枝湯法者即此之謂也三太陽病汗出服桂枝只使之似有汗者邪已去矣似字當細玩不可認作發汗與麻黃湯混看方微火者取和緩不猛而無沸溢之患也滓澱垽也古人藥大劑釜鐺中煮綿絞漉湯澄濾取清故曰去滓啜大飲也漐漐和潤而欲汗之貌微似二字最為要緊有影無形之謂也不可禁止之詞也如水流漓言過當也病必不除決言不遵節制則不效驗也錫汗乃中焦水穀之津故啜粥以助藥力穀精足而津液通矣禁生冷等物者恐中氣虛生冷之物能傷胃氣也玉函方藥炮製云生薑皆薄切之大棗擘去核桂削去皮用里黑潤有味者為佳陶隱居云凡用桂心厚朴杜仲秦皮木蘭之輩皆削去上虛軟甲錯處取里有味者稱之總病論云桂刮去粗皮直格云削去皺皮官桂是也元戎云去浮皮案方氏云桂去皮而用枝張志聰謂用梢尖嫩枝內外如一而去皮骨錢潢金鑑刪去皮二字並失考耳陶氏本草序例云㕮咀者謂稱畢搗之如大豆又使吹去細末此於事殊不允當藥有易碎難碎多末少末稱兩則不復均平今皆細切之較略令如㕮咀者乃得無末而片粒調和也吳遵程方注云㕮咀謂碎之如大豆其顆粒可以咀嚼又吹去細末煎取清汁也後世製為飲片煎之濃厚而不清甚非法也五辛楞嚴經五種辛菜注五辛者謂大蒜茖蔥慈蔥蘭蔥興渠本草綱目大蒜小蒜韭胡荽蕓薹堵昌胤達生録蒜蔥薤韭薑柯琴傷寒附翼云此為仲景群方之魁乃滋陰和陽調和營衛解肌發汗之總方也凡頭痛發熱惡風惡寒其脈浮而弱汗自出者不拘何經不論中風傷寒雜病鹹得用此惟以脈弱自汗為主耳愚常以此湯治自汗盜汗虛瘧虛痢隨手而愈因知仲景方可通治百病與後人分門證類使無下手處者可同年而語耶總病論云凡桂枝湯證病者常自汗出小便不數手足溫和或手足指梢露之則微冷覆之則溫渾身熱微煩而又憎寒始可行之若病者身無汗小便數或手足逆冷不惡寒反惡熱或飲酒後慎不可行桂枝湯也太陽病頭痛發熱汗出惡風桂枝湯主之風下脈經有若惡寒三字成本有者字方此與前條文雖差互詳略而證治則一前條有脈無頭痛以揭病名此有頭痛無脈以言治互相詳略耳無異殊也柯此條是桂枝本證辨證為主合此證即用此湯不必問其為傷寒中風雜病也今人鑿分風寒不知辨證故仲景佳方置之疑窟四證中頭痛是太陽本證頭痛發熱惡風與麻黃證同本方重在汗出汗不出者便非桂枝證案金鑑以此條為重出衍文誤太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之𠘧𠘧程本作兀兀非也玉函云桂枝湯主之論云桂枝加葛根湯主之千金翼同論云作本論云成𠘧𠘧者伸頸之貌也動則伸頸搖身而行項背強者動則如之程項背強兀兀五字連讀上半身成硬直之象志此承上文頭痛而及於項背以見太陽循經自上而下之義也太陽經脈循於脊背之間今風邪涉於分部而經氣不舒故項背強而𠘧𠘧然也是當無汗反汗出者肌腠不密也肌腠虛故惡風用桂枝湯以解太陽肌中之邪加葛根宣通經脈之氣而治太陽經脈之邪本事方云或問曰何謂𠘧𠘧豫曰𠘧𠘧者如𠘧足疾屈而強也謝復古謂病人羸弱須憑几而起誤也明理論云𠘧音殊𠘧引頸之貌𠘧短羽鳥也短羽之鳥不能飛騰動則先伸引其頭爾項背強者動亦如之非若几案之𠘧而偃屈也金匱直解云案説文𠘧字無鉤挑有鉤挑者乃𠘧案之𠘧字也𠘧乃鳥之短羽象小鳥毛羽未盛之形飛𠘧𠘧也故鳧字從𠘧蓋形容其頸項強急之意桂枝加葛根湯方葛根四兩麻黃三兩去節成本玉函並無芍藥二兩可發汗篇作三兩生薑三兩切甘草二兩炙大棗十二枚擘桂枝二兩去皮玉函全書志錫作三兩上七味以水一斗先煮麻黃葛根減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌原注臣億等謹案仲景本論太陽中風自汗用桂枝傷寒無汗用麻黃今證云汗出也第三卷有葛根湯惡風而方中有麻黃恐非本意證云無汗惡風正與此方同是合用麻黃也此云桂枝加葛根湯恐是桂枝中但加葛根耳玉函無麻黃二字一斗作九升無將息及禁忌五字成本亦無五字方本不載本方但云於桂枝湯方內加葛根三兩余依桂枝湯法活人書云伊尹湯液論桂枝湯中加葛根今監本用麻黃誤矣案方氏以降以此方為太陽陽明合病之的方只張志聰張錫駒之解為太陽病項背強者之主劑其説似長矣蓋以葛根為陽明之藥者昉乎張潔古諸家未察耳仲景用葛根者取之於其解表生津痙病亦用葛根其意可見也本草經云葛根主治消渴身大熱名醫別録云療傷寒中風頭痛解肌發表出汗開腠理亦可以為佐證也聖濟總録桂心湯治四時傷寒初覺即本方太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不得與之玉函千金翼無後字及方用前法四字得作可成本亦作可成太陽病屬表而反下之則虛其里邪欲乘虛傳裡若氣上衝者里不受邪而氣逆上與邪爭也則邪仍在表故當復與桂枝湯解外其氣不上衝者裡虛不能與邪爭邪氣已傳裡也故不可更與桂枝湯攻表錢太陽中風外證未解之時而誤下之則胃氣虛損邪氣乘之當內陷而為痞為結下陷而成協熱下利矣以下後而其氣上衝則知外邪未陷胸未痞結當仍從外解可與桂枝湯不須加減悉照前方服法可也若其氣不上衝者恐下後邪或內入胃氣已傷將有逆變尚未可知桂枝湯不可與也姑待其變然後隨證治之可耳志金氏曰氣上衝者謂太陽之氣從下而上根氣盛不因下後內陷故上衝也可與桂枝湯以解肌中之邪若不上衝者太陽之氣下陷邪亦從之內入無庸桂枝以解肌故曰不得與之案上衝諸家未有明解蓋此謂太陽經氣上衝為頭項強痛等證必非謂氣上衝心也太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與之也觀其脈證知犯何逆隨證治之玉函千金翼仍作而不中與之作不復中與也成本無之字方壞言歷遍諸治而猶不愈則反覆雜誤之餘血氣已憊壞難以正名名也不中猶言不當也末三句言所以治之之法也蓋既不可名以正名則亦難以出其正治故但示人以隨機應變之微旨斯道之一貫斯言盡之矣程如汗後亡陽動經渴躁譫語下後虛煩結胸痞氣吐後內煩腹脹滿溫針後吐衄驚狂之類紛紜錯出者俱是既為前治所壞王逆者謂不當汗而汗不當下而下或汗下過甚皆不順於理故云逆也志太陽病至三日而已發汗則肌表之邪已去假使里證未除若吐之而治其中膈若下之而清其腸胃若溫針而理其經脈里證仍不解者此為壞病夫自敗曰壞言裡氣自虛而自敗也柯壞病者即變證也若誤汗則有遂漏不止心下悸臍下悸等證妄吐則有飢不能食朝食暮吐不欲近衣等證妄下則有結胸痞硬協熱下利脹滿清穀等證火逆則有發黃圊血亡陽奔豚等證是桂枝證已罷故不可更行桂枝湯也桂枝以五味成方減一增一便非桂枝湯非謂桂枝竟不可用錢論中凡屬誤汗吐下之變皆壞病也故治之之法即下文誤汗誤吐誤下誤燒針諸條是也案壞成氏讀為古壞切云為醫所壞病也乃似於義不穩有太陽病為醫所壞轉為少陽為陽明者則不得謂之為壞病也巢源云或已發汗吐下而病證不解邪熱留於腑臟致令病候多變故曰壞傷寒外臺祕要引文仲云傷寒八九日不瘥名為敗傷寒諸藥不能消又引古今録驗云傷寒五六日以上不解熱在胸中口噤不能言唯欲飲水為敗傷寒醫所不療千金方作壞傷寒所謂敗傷寒蓋是壞敗之義即壞病耳當互證也案溫針諸注欠詳王綸明醫雜著云問近有為溫針者乃楚人法其法針於穴以香白芷作圓餅套針上以艾蒸溫之多取效答古有針則不灸灸則不針未有針而加灸者此後人俗法也此法行於山野貧賤之人經絡受風寒致病者或有效只是溫經通氣而已仲景楚人此豈古溫針之遺法耶案不中方氏解為不當是恐不爾蕭參希通録云俚談以不可用為不中用自晉時已有此語左傳成二年卻子曰克於先大夫無能為役杜預注不中為之役使王充耘讀書管見云中土見事之當其可者謂之中其不可者謂之不中於物之好惡人之賢不肖皆以之目焉簡案不中用見始皇本紀韓延壽傳等名醫類案云一人傷寒壞證垂死手足俱冷氣息將絶口張不能言張致和以人參一兩去蘆加附子一錢於石𤕷內煎至一碗以新汲水浸之若冰冷一服而盡少頃病人汗從鼻梁上涓涓如水此其驗也蓋鼻梁上應脾若鼻端有汗者可救以土在身中周遍故也近陸同婦産後患疫證二十餘日氣虛脈弱即同壞證亦以此湯治之遂愈世謂傷寒汗吐下三法差謬名曰壞證孫真人云人參湯須得長流水煎服若用井水則不驗蓋長流水取其性之通達耳案百一選方破證奪命散治傷寒陰陽二證不明或投藥錯誤致患人困重垂死即與致和方同唯不用附子後世所謂獨參湯衛生家寶方名人參奪命散有生薑桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之也常須識此勿令誤也玉函千金翼桂枝下有湯字汗不出作無汗無之字成本亦無成脈浮發熱汗出惡風者中風也可與桂枝湯解肌脈浮緊發熱不汗出者傷寒也可與麻黃湯常須識此勿妄治也方肌膚肉也蓋風中衛而衛不固發熱汗出而惡風衛行脈外膚肉之分也桂枝救護之熱粥釋散之病之所以解也識與志同記也記其政事謂之識言當常常用心以記其事勿忘勿怠而不可使有一忽之失誤案肌説文肉也折骨分經白為肌赤為肉而肌有兩義有肌膚之肌有肌肉之肌注證發微詳辨之方氏因注云肌膚肉也蓋分肌肉之肌也案解肌解散肌表之邪氣也言桂枝雖為解肌之劑若其人脈浮緊發熱汗不出者不可與桂枝湯當以麻黃湯解散其肌表之邪也解肌二字不專屬於桂枝外臺祕要有麻黃解肌湯葛根解肌湯名醫別録麻黃主療云解肌可以見耳若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也玉函千金翼無若字病字以字成本得之作得湯成酒客內熱喜辛而惡甘桂枝湯甘酒客得之則中滿而嘔柯仲景用方慎重如此言外當知有葛根連芩以解肌之法矣案程云酒客脈浮汗自出似風傷衛金鑑云酒客病謂過飲而病也並非是喘家作桂枝湯加厚朴杏子佳玉函千金翼杏子作杏仁方云佳一本作仁汪云佳坊本作仁成太陽病為諸陽主氣風甚氣擁則生喘也與桂枝湯以散風加厚朴杏仁以降氣魏凡病人素有喘證每感外邪勢必作喘謂之喘家亦如酒客等有一定之治不同泛常人一例也錢氣逆喘急皆邪壅上焦也蓋胃為水穀之海肺乃呼吸之門其氣不利則不能流通宣布故必加入厚朴杏仁乃佳杏子即杏仁也前人有以佳字為仁字之訛者非也凡服桂枝湯吐者其後必吐膿血也玉函千金翼無凡字也字錢其後必吐膿血句乃未至而逆料之詞也言桂枝性本甘溫設太陽中風投之以桂枝湯而吐者知其人本陽邪獨盛於上因熱壅上焦以熱拒熱故吐出而不能容受也若邪久不衰熏灼肺胃必作癰膿故曰其後必吐膿血也此以不受桂枝而知之非誤用桂枝而致之也乃各注傢俱言胃家濕熱素盛更服桂枝則兩熱相搏中滿不行勢必上逆而吐熱愈淫溢蒸為敗濁必吐膿血此一大禁也案方喻並云爾不知桂枝隨已吐出何曾留著於胸中豈可云更服桂枝兩熱相搏乎前人遂以此條列為桂枝四禁豈不謬乎魏桂枝既不可用將坐以候之乎此處俱無一語救正不幾令主治者茫然耶濕熱家之中風於用桂枝之內必佐以五苓之治法或易桂枝為葛根即葛根連芩湯之義也汪此條證仲景無治法補亡論常器之云可服類要芍藥地黃湯郭白雲云見膿血而後可服安舒云酒客病不可與桂枝得湯則嘔者其後果必吐膿血乎蓋積飲素盛之人誤服表藥以耗其陽而動其飲上逆而吐亦常有之若吐膿血者從未之見也定知叔和有錯此説似有理太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之玉函脈經千金翼汗上有其字漏下有而字成太陽病因發汗遂汗漏不止而惡風者為陽氣不足因發汗陽氣益虛而皮腠不固也內經曰膀胱者州都之官津液藏焉氣化則出小便難者汗出亡津液陽氣虛弱不能施化四肢者諸陽之本也四肢微急難以屈伸者亡陽而脫液也針經曰液脫者骨屬屈伸不利與桂枝加附子湯以溫經復陽柯太陽固當汗若不取微似有汗而發之太過陽氣無所止息而汗出不止矣方惡風者太陽中風本自汗出腠理疏而惡風既漏不止則腠理愈疏而惡愈甚也徐大椿傷寒類方云此發汗太過如水流漓或藥不對證之故中風本惡風汗後當愈今仍惡風則表邪未盡也案喻氏以惡風為外風復入所致恐不然也桂枝加附子湯方桂枝三兩去皮芍藥三兩甘草三兩炙玉函作二兩生薑三兩切大棗十二枚擘附子一枚炮去皮破八片方本作三枚云三枚蓋出於增補非經之本文上六味以水七升煮取三升去滓溫服一升本云桂枝湯今加附子將息如前法玉函味下有㕮咀三物四字本云作本方成本不載本方第十卷云於桂枝湯方內加附子一枚炮去皮破八片余依前法徐此陽氣與陰津兩亡更加風氣纏綿若用四逆則不宜乾薑之剛燥用真武則不宜苓朮之滲濕故用桂枝湯加附子以固表驅風而復陽斂液也周仲景何遽用附子觀本文云遂漏不止知其漏正未有止期也人身津液有幾堪漏而無已邪故以附子入桂枝湯中即為固表回陽上劑錢此方於桂枝湯全方內加附子者故多一加字傷寒八九日風濕相搏條下之桂枝附子湯芍藥已去非桂枝全湯乃另是一方故無加字傷寒類方云四肢為諸陽之本急難屈伸乃津脫陽虛之象但不至亡陽耳若更甚而厥冷惡寒則有陽脫之慮當用四逆湯矣又云桂枝同附子服則能止汗回陽案成本第十卷此方後附朮附湯方全書乃移載本條之後蓋依太陽下篇桂枝附子湯後有朮附湯而錯出而已案千金方治産後風虛汗出不止小便難四肢微急難以屈伸者桂枝附子湯即是此方正見孫公運用之妙矣葉氏録驗方救汗湯治陽虛自汗即此方出虛勞門本事方云有一士人得太陽病因發汗汗不止惡風小便澀足攣曲而不伸豫診其脈浮而大浮為風大為虛豫曰在仲景方中有兩證大同而小異一則小便難一則小便數用藥稍差有千里之失仲景第七證云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯十六證云傷寒脈浮自汗出小便數心煩微惡寒腳攣反與桂枝欲攻其表此誤也得之便厥咽中干煩躁吐逆一則漏風小便難一則自汗小便數或惡風或惡寒病各不同也豫用第七證桂枝加附子湯三啜而汗止佐以甘芍藥湯足便得伸太陽病下之後脈促胸滿者桂枝去芍藥湯主之原注促一作縱後玉函脈經千金翼作其成太陽病下之其脈促不結胸者此為欲解一百四十一條此下後脈促而復胸滿則不得為欲解由下後陽虛表邪漸入而客於胸中也鑑太陽病表未解而下之胸實邪陷則為胸滿氣上衝咽喉不得息瓜蒂散證也胸虛邪陷則為氣上衝桂枝湯證也今下之後邪陷胸中胸滿脈促似乎胸實而無沖喉不得息之證似乎胸虛又見胸滿之證故不用瓜蒂散以治實亦不用桂枝湯以治虛惟用桂枝之甘辛以和太陽之表去芍藥之酸收以避胸中之滿張脈促雖表邪未盡然胸但滿而不結則以誤下而損其胸中之陽也錢脈促者非脈來數時一止復來之促也即急促亦可謂之促也顧憲章傷寒溯源集云促有短促之義桂枝去芍藥湯方桂枝三兩去皮甘草二兩炙生薑三兩切大棗十二枚擘上四味以水七升煮取三升去滓溫服一升本云桂枝湯今去芍藥將息如前法成本不載本方第十卷云於桂枝湯方內去芍藥余依前法玉函味下有㕮咀字云作方若微惡寒者桂枝去芍藥加附子湯主之原本無惡字今據成本玉函補成本桂枝去芍藥作去芍藥方中沈若脈促胸滿而微惡寒乃虛而局蹐陽氣欲脫又非陽實之比所以加附子固護陽氣也案張志聰張錫駒以微惡寒為脈微而惡寒之義誤桂枝去芍藥加附子湯方桂枝三兩去皮甘草二兩炙生薑三兩切大棗十二枚擘附子一枚炮去皮破八片上五味以水七升煮取三升去滓溫服一升本云桂枝湯今去芍藥加附子將息如前法成本不載本方第十卷云於桂枝湯方內去芍藥加附子一枚炮去皮破八片余依前法玉函味下有㕮咀字云作方太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯玉函千金翼發熱熱多下並有而字欲自可作自調必下有當字不可發汗篇欲自可作續自可脈經同此下有為字千金翼亦有成發熱惡寒而熱多寒少為陽氣進而邪氣少也里不和者嘔而利今不嘔清便自調者里和也寒熱日二三發者邪氣微也今日數多而脈微緩者是邪氣微緩也故云欲愈脈微而惡寒者表裡俱虛也陽表也陰里也脈微為裡虛惡寒為表虛以表裡俱虛故不可更發汗更下更吐也陰陽俱虛則面色青白反有熱色者表未解也熱色為赤色也得小汗則和不得汗則不得邪氣外散皮膚而為癢也與桂枝麻黃各半湯小發其汗以除表邪方八九日約言久也如瘧狀謂有往來寒熱而無作輟之常也更再也不可汗已過表也不可吐下未見有里也錢邪既浮淺脈又微緩微者非微細之微言較前略覺和緩也脈微惡寒之微者乃輕微細小之微非微緩之微也魏小汗出小字亦須留意意見正邪俱微大汗流漓必在所禁也張首節頗似小柴胡證故以不嘔清便自調證之次節雖脈微惡寒止宜小建中加黃耆以溫分肉司開闔原非溫經之謂後節面色反有熱色言表邪未盡故宜各半不可與面合赤色比類而觀也傷寒瑣言云趙嗣真活人釋疑曰仲景之意蓋得病之八九日如瘧狀發熱惡寒熱多寒少十六字為自初至今之證下文乃是以後擬病防變之辭當分作三截看若其人不嘔清便欲自可一日二三度發脈浮緩為欲愈此一節乃表和無病而脈微者邪氣微緩也陰陽同等脈證皆向安之兆可不待汗而欲自愈若脈微而惡寒者此陰陽俱虛不可更汗更下更吐之此一節宜溫之若面色反有赤色者未欲解也以其不能得少汗出其身必癢宜桂枝麻黃各半湯此一節必待汗而愈也案程注云作一頭下面分三腳其説蓋原於趙氏也脈經引四時經清溲痢通注云清者廁也溲從水道出而反清溲者是謂下痢至廁也劉熙釋名云圊至穢之處宜常修治使潔清也顏師古急就篇注云清言其處特異所常當加潔清也成氏辨脈篇注清者圊也案太陽中篇清穀清血其清皆與圊同案此陰陽俱虛宜用桂枝加附子湯附子湯之屬小建中加黃耆恐不能救之傷寒類方云微邪已在皮膚中欲自出不得故身癢以此湯取其小汗足矣陽明篇云身癢如蟲行皮中狀者此以久虛故也桂枝麻黃各半湯方桂枝一兩十六銖去皮芍藥生薑切甘草炙大棗四枚擘麻黃各一兩去節千金翼作去節各一兩杏仁二十四枚湯浸去皮尖及兩仁者千金翼無湯浸二字上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合本云桂枝湯三合麻黃湯三合併為六合頓服將息如上法原注臣億等謹案桂枝湯方桂枝芍藥生薑各三兩甘草二兩大棗十二枚麻黃湯方麻黃三兩桂枝二兩甘草一兩杏仁七十二個今以算法約之二湯各取三分之一即得桂枝一兩十六銖芍藥生薑甘草各一兩大棗四枚杏仁二十三個零三分枚之一收之得二十四個合方詳此方乃三分之一非各半也宜云合半湯玉函七味下有㕮咀字云作方頓服下有今裁為一方五字柯桂枝湯三合麻黃湯三合併為六合後人算其分兩合作一方大失仲景制方之意徐是風雖外薄為寒所持而不能散所以面顯怫鬱之熱色必宜總風寒兩解之故桂麻合用傷寒類方云案此方分兩甚輕計共約六兩合今之稱僅一兩三四錢分三服只服四錢零乃治邪退後至輕之劑猶勿藥也太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈先上玉函千金翼有當字脈經有法當二字柯此條治中風之變桂枝湯煮取三升初服者先服一升也卻與者盡其二升也熱鬱於心胸者謂之煩發於皮肉者謂之熱麻黃症發熱無汗熱全在表桂枝症發熱汗出便見內煩服湯反煩而外熱不解非桂枝湯不當用也以外感之風邪重內之陽氣亦重耳風邪本自項入必刺風池風府疏通來路以出其邪仍與桂枝湯以和營衛內經曰表裡刺之服之飲湯此法是矣傷寒類方云此非誤治因風邪凝結於太陽之要路則藥力不能流通故刺以解其結蓋邪氣太甚不僅在衛而在經刺之以泄經氣素問骨空論云風從外入令人振寒汗出頭痛身重惡寒治在風府大風頸項痛刺風府風府在上椎甲乙經云風池二穴在顳顬後髮際陷中足少陽陽維之會風府一穴在項髮際上一寸大筋中宛宛中督脈陽維之會案針灸資生經云岐伯對黃帝之問曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也然則風府者固傷寒所自起也北人皆以毛裹之南人怯弱者亦以帛護其項俗謂三角是也柯氏之説蓋本於斯服桂枝湯大汗出脈洪大者與桂枝湯如前法若形似瘧一日再發者汗出必解宜桂枝二麻黃一湯成本似作如玉函脈經同脈洪大者作若脈但洪大者再下脈經有三字志大汗出脈洪大者肌腠之氣而外合於膚表標陽氣盛故脈洪大而汗出也如前啜粥之法以助藥力柯服桂枝湯後而惡寒發熱如瘧者是本當用麻黃髮汗而用桂枝則汗出不徹故也凡太陽發汗太過則轉屬陽明不及則轉屬少陽此雖寒熱往來而頭項強痛未罷是太陽之表尚在因風邪泊營衛動靜無常故一日再發或三度發耳鑑服桂枝湯大汗出病不解脈洪大若煩渴者則為表邪已入陽明是白虎湯證也今脈雖洪大而不煩渴則為表邪仍在太陽也案玉函有但字可見其無他證也桂枝二麻黃一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏仁十六個去皮尖千金翼有兩仁者三字甘草一兩二銖炙大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日再服本云桂枝湯二分麻黃湯一分合為二升分再服今合為一方將息如前法原注臣億等謹案桂枝湯方桂枝芍藥生薑各三兩甘草二兩大棗十二枚麻黃湯方麻黃三兩桂枝二兩甘草一兩杏仁七十個今以算法約之桂枝湯取十二分之五即得桂枝芍藥生薑各一兩六銖甘草二十銖大棗五枚麻黃湯取九分之二即得麻黃十六銖桂枝十銖三分銖之二收之得十一銖甘草五銖三分銖之一收之得六銖杏仁十五個九分枚之四收之得十六個二湯所取相合即共得桂枝一兩十七銖麻黃十六銖生薑芍藥各一兩六銖甘草一兩二銖大棗五枚杏仁十六個合方成本無本云以下二十九字玉函云作方柯邪氣稽留於皮毛肌肉之間固非桂枝之可解已經汗過又不宜麻黃湯之峻攻故取桂枝湯三分之二麻黃湯三分之一合而服之再解其肌微開其表審發汗於不發之中又用桂枝後更用麻黃法也後人合為一方者是大背仲景比較二方之輕重偶中出奇之妙理矣張詳此方與各半藥品不殊惟銖分稍異而證治攸分可見仲景於差多差少之間分毫不苟也傷寒類方云此與桂枝麻黃各半湯意略同但此因大汗出之後故桂枝略重而麻黃略輕服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之脈上玉函脈經有若字脈經千金方作白虎湯成大汗出脈洪大而不渴邪氣猶在表也可更與桂枝湯若大汗出脈洪大而煩渴不解者表裡有熱不可更與桂枝湯可與白虎加人參湯生津止渴和表散熱錢此因大汗出後遂至胃中津液耗竭陽邪乘虛入里至大煩渴而不解上篇之大汗出脈浮而微熱消渴者及中篇之發汗後脈浮數煩渴之證皆以誤汗亡陽下焦無火膀胱之氣化不行失其蒸騰之用故氣液不得上升而渴也然脈浮則其邪仍在太陽故以五苓散主之今大煩渴而脈見洪大則邪不在太陽而已傳入陽明矣即陽明篇所謂陽明脈大者是也故以白虎湯解胃中之煩熱加人參以補其大汗之虛救其津液之枯竭也白虎加人參湯方知母六兩石膏一斤碎綿裹甘草炙二兩粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服外臺祕要作上五味切以水一斗二升煮米熟去米納諸藥煮取六升去滓溫服一升日三成本云於白虎湯內加人參三兩余依白虎湯法案外臺所載當仲景舊法活人辨疑化斑湯治赤斑口燥煩渴中暍即本方保命集人參石膏湯治膈消上焦煩渴不欲多食於本方去粳米東垣加黃芩杏仁徐同知方人參白虎湯治伏暑發渴嘔吐身熱脈虛自汗即本方如伏暑作寒熱未解宜和五苓散同煎服疹科纂要人參白虎湯治麻疹化斑發疹止渴如神於本方去粳米加桔梗竹葉醫史云呂滄洲治趙氏子病傷寒餘十日身熱而人靜兩手脈盡伏俚醫以為死也弗與藥翁診之三部舉按皆無其舌苔滑而兩顴赤如火語言不亂因告之曰此子必大發赤斑周如錦文夫脈血之波瀾也今血為邪熱所搏淖而為斑外見於皮膚呼吸之氣無形可依猶溝隧之無水雖有風不能成波讕斑消則脈出矣及揭其衾而赤斑爛然即用白虎加人參湯化其斑脈乃復常繼投承氣下之愈發斑無脈長沙所未論翁蓋以意消息耳太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯者千金翼作則發汗上玉函有復字全書作更汗柯本論無越婢證亦無越婢方不知何所取義竊謂其二字必誤也此熱多是指發熱不是內熱無陽是陽已虛而陰不虛不煩不躁何得妄用石膏觀麻黃桂枝合半桂枝二麻黃一二方皆當汗之證此言不可發汗何得妄用麻黃凡讀古人書須傳信闕疑不可文飾況為性命所關者乎且此等脈證最多無陽不可發汗便是仲景法旨柴胡桂枝湯乃是仲景佳方若不頭項強痛並不須合桂枝矣讀書無目至於病人無命愚故表而出之舒氏云熱多寒少四字是條中關鍵必其人平素熱盛津衰故方中用石膏以保其津液也但無陽二字有誤如果無陽則必寒多熱少當用附子石膏又在所禁矣案無陽方氏亦嘗疑之然猶釋為疾在陰而無在陽之義張志聰張錫駒從其説為解喻氏周氏張璐則曰無津液之謂金鑑亦云無太陽表脈皆強解也程氏云正陽虛錢氏云命門真陽之虛果然則安有用石膏之理乎其他魏氏汪氏輩皆屬傅會只成氏於此一條不下注解蓋有所見也至於柯氏斷然闕疑可謂卓越之識矣今仍不繁引數説云案發汗後病篇發汗多亡陽譫語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈柯氏以柴胡桂枝湯主此條證者以其無陽乃亡陽之義故也桂枝二越婢一湯方桂枝去皮芍藥甘草各十八銖炙成本無炙字大棗四枚擘生薑一兩二銖切玉函千金翼二作三成本作三錢蓋訛石膏二十四銖碎綿裹麻黃上七味以水五升煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升本云當裁為越婢湯桂枝湯合之飲一升今合為一方桂枝湯二分越婢湯一分原注臣億等謹案桂枝湯方桂枝芍藥生薑各三兩甘草二兩大棗十二枚越婢湯方麻黃二兩生薑三兩甘草二兩石膏半斤大棗十五枚今以算法約之桂枝湯取四分之一即得桂枝芍藥生薑各十八銖甘草十二銖大棗三枚越婢湯取八分之一即得麻黃十八銖生薑九銖甘草六銖石膏二十四銖大棗一枚八分之七棄之二湯所取相合即共得桂枝芍藥甘草麻黃各十八銖生薑一兩三銖石膏二十四銖大棗四枚合方舊云桂枝三今取四分之一即當云桂枝二也越婢湯方見仲景雜方中外臺祕要一云起脾湯煮麻黃上玉函千金翼有先字云玉函成本作方玉函煎法二婢字並作脾案一云起脾湯見外臺肉極門成胃為十二經之主婢治水穀為卑藏若婢內經曰脾主為胃行其津液是湯所以謂之越婢者以發越脾氣通行津液外臺方一名越脾湯即此義也柯此大青龍無桂枝杏仁與麻黃杏仁石膏湯同為涼解表裡之劑此不用杏仁之苦而用薑棗之辛甘可以治太陽陽明合病熱多寒少而無汗者猶白虎湯證背微惡寒之類而不可以治脈弱無陽之證也案越婢未審何義成氏引外臺為發越脾氣似穩當續醫説引趙良仁金匱衍義駁成注然其説與成同方氏喻氏以婢女之義為解亦未太允至錢氏云以此治越人之婢而得效杜撰甚矣服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之脈經千金翼無或字仍字滿下玉函有而字脈經無白字成頭項強痛翕翕發熱雖經汗下為邪氣仍在表也心下滿微痛小便利者則欲成結胸今外證未罷無汗小便不利則心下滿微痛為停飲也與桂枝湯以解外加茯苓白朮利小便行留飲也錢頭項強痛中風傷寒均有之證也翕翕發熱是熱在皮毛中風證也無汗則又傷寒之本證矣就此諸證為風寒兼有無疑矣而但服桂枝湯是治風而未治寒也故仍頭項強痛翕翕發熱無汗而不解也又或誤下之所以有心下滿微痛之證乃下後邪氣陷入而欲結也小便不利太陽之熱邪內犯膀胱氣化不行也治之以桂枝去桂加茯苓白朮湯未詳其義恐是後人傳寫之誤未可知也即或用之恐亦未能必效也仲景立法豈方不對證而能為後世訓乎余竊疑之大約是歷年久遠後人舛誤所致非仲景本來所繫原方近代名家悉遵成氏之訓俱強解以合其説謂用之而諸證悉愈吾不信也案成注不及去桂之義但云桂枝湯以解外則成所注本無去桂二字歟若不去桂而用此方於此證或有效驗王肯堂以降多為水飲所致然無的據金鑑則依桂枝去芍藥之例為去芍藥之誤其説亦難從矣桂枝去桂加茯苓白朮湯方芍藥三兩甘草二兩炙生薑切白朮茯苓各三兩大棗十二枚擘上六味以水八升煮取三升去滓溫服一升小便利則愈本云桂枝湯今去桂枝加茯苓白朮玉函六味下有㕮咀字八升作七升云作方成本不載本方第十卷云於桂枝湯內去桂枝加茯苓白朮各三兩余仿前法煎服小便利則愈傷寒類方云凡方中有加減法皆佐使之藥若去其君藥則另立方名今去桂枝而仍以桂枝為名所不可解也傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之心煩玉函作頗字云論曰心煩脈經作頗覆注仲景作心煩成本桂枝下有湯字是躁作燥誤玉函腳上有兩字脈經無調胃字成脈浮自汗出小便數而惡寒者陽氣不足也心煩腳攣急者陰氣不足也陰陽血氣俱虛則不可發汗若與桂枝湯攻表則又損陽氣故為誤也得之便厥咽中干煩躁吐逆者先作甘草乾薑湯復其陽氣得厥愈足溫乃與芍藥甘草湯益其陰血則腳脛得伸陰陽雖復其有胃燥譫語少與調胃承氣湯微溏以和其胃重發汗為亡陽加燒針則損陰內經曰榮氣微者加燒針則血不流行重發汗復燒針是陰陽之氣大虛四逆湯以復陰陽之氣鑑是當與桂枝增桂加附子湯以溫經止汗今反與桂枝湯攻發其表此大誤也汪脈浮自汗出小便數者陽虛氣不收攝也心煩者真陽虛脫其氣浮遊而上走也咽中干煩躁者誤汗損陽津液耗竭陽虛煩躁作假熱之象也吐逆者陰寒氣盛而拒膈也程脈浮自汗出雖似桂枝證而頭項不痛知陽神自歉於上部陽明內結得之自汗出小便數上蓋津液外越而下部之陰分更無陽以化氣也故陽回而結未破不妨少從胃實例一去其胃燥鑑若重發汗者謂不止誤服桂枝湯而更誤服麻黃湯也或復加燒針劫取其汗以致亡陽證具則又非甘草乾薑湯所能治故又當與四逆湯以急救其陽也甘草乾薑湯方甘草四兩炙乾薑二兩上二味以水三升煮取一升五合去滓分溫再服玉函甘草二兩成本乾薑下有炮字玉函成本味下有㕮咀二字芍藥甘草湯方白芍藥玉函無白字甘草各四兩炙上二味以水三升煮取一升五合去滓分溫再服玉函成本味下有㕮咀二字成本五合作半服下有之字柯仲景回陽每用附子此用乾薑甘草者正以見陽明之治法夫太陽少陰所謂亡陽者先天之元陽也故必用附子之下行者回之從陰引陽也陽明所謂亡陽者後天胃脘之陽也取甘草乾薑以回之從乎亡也蓋桂枝之性辛散走而不守即佐以芍藥尚能亡陽乾薑之味苦辛守而不走故君以甘草便能回陽然先天太少之陽不易回回則諸證悉解後天陽明之陽雖易回既回而前證仍在變證又起故更作芍藥甘草湯繼之蓋脾主四肢胃主津液陽盛陰虛脾不能為胃行津液以灌四旁故足攣急用甘草以生陽明之津芍藥以和太陰之液其腳即伸此亦用陰和陽法也甘草乾薑湯得理中之半取其守中不須其補中芍藥甘草湯減桂枝之半用其和里不取其攻表胡遵程方注云甘草乾薑湯即四逆湯去附子也辛甘合用專復胸中之陽氣其夾食夾陰面赤足冷發熱喘咳腹痛便滑外內合邪難於發散或寒藥傷胃合用理中不便參朮者並宜服之真胃虛挾寒之聖劑也若夫脈沉畏冷嘔吐自利雖無厥逆仍屬四逆湯芍藥甘草湯此即桂枝湯去桂枝薑棗也甘酸合用專治營中之虛熱其陰虛陽乘至夜發熱血虛筋攣頭面赤熱過汗傷陰發熱不止或誤用辛熱擾其營血不受補益者並宜用之真血虛挾熱之神方也外臺備急療吐逆水米不下乾薑甘草湯即本方直指方乾薑甘草湯治脾中冷痛嘔吐不食於本方加大棗一枚又甘草乾薑湯治男女諸虛出血胃寒不能引氣歸元無以收約其血即本方朱氏集驗方二神湯治吐血極妙治男子婦人吐紅之疾蓋是久病或作急勞損其榮衛塞滯氣上血之妄行所致若投以藕汁生地黃等涼劑治之必求其死矣每遇患者用藥甚簡即甘草乾薑湯每服二錢水一中盞煎至五七沸帶熱呷空心日午進之和其氣血榮衛自然安痊不可不知證治要訣飲酒過多而衄甚則用理中湯加乾葛川芎各半錢或止用乾薑甘草二味證治準繩曹氏必用方吐血須煎乾薑甘草作湯與服或四物理中湯亦可如此無不愈者若服生地黃竹茹藕汁去生便遠魏氏家藏方六半湯治熱濕腳氣不能行步即芍藥甘草湯入無灰酒少許再煎服朱氏集驗方去杖湯治腳弱無力行步艱難友人戴明遠用之有驗即芍藥甘草湯活人事證方神功散治消渴即芍藥甘草湯醫學心悟芍藥甘草湯止腹痛如神脈遲為寒加乾薑脈洪為熱加黃連調胃承氣湯方大黃四兩去皮清酒洗陽明篇玉函無去皮字洗成本玉函作浸甘草二兩炙外臺作三兩芒硝半升千金翼作半兩全書方本作半斤上三味以水三升煮取一升去滓納芒硝更上火微煮令沸少少溫服之陽明篇上三味切以水三升煮二物至一升去滓納芒硝更上微火一二沸溫頓服之以調胃氣成本玉函味下有㕮咀二字汪誤與桂枝湯復與甘草乾薑湯薑桂辛熱耗胃中津液因而譫語方後云少少溫服此不過暫假之以和胃氣而止譫語也徐仲景用此湯凡七見或因吐下津干或因煩滿氣熱總為胃中燥熱不和而非大實滿者比故不欲其速下而去枳朴欲其戀鬲而生津特加甘草以調和之故曰調胃柯不用氣藥而立名承氣者調胃所以承氣也經曰平人胃滿則腸虛腸滿則胃虛更虛更實故氣得上下今氣之不承由胃家之熱實必用硝黃以濡胃家之糟粕而氣得以下同甘草以生胃家之津液而氣得以上推陳之中便寓致新之義一攻一補調胃之法備矣千金方本方加枳實五枚單名承氣湯外臺集驗生地黃湯療傷寒有熱虛羸少氣心下滿胃中有宿食大便不利於本方加生地黃三斤大棗二十枚聖濟總録大黃湯灸發背後服之方於本方去甘草十形三療一小兒小溲不通號跳旋轉下則成砂石大便祕肛門脫出一二寸戴人曰此下焦塞也不吐不下則何以開不令飲水小溲何以利以調胃承氣湯一兩加牽牛子頭末三錢河水煎服又用瓜蒂末糊丸芥子許六十丸吞下上吐下瀉一時齊出有膿有血湧泄既定令飲新水二三十次每次飲一盞其病如失試效方調胃承氣湯治消中渴而飲食多衛生寶鑑治面熱以本方七錢加黃連二錢犀角一錢案張氏醫通云飲食不節則胃病胃病則氣短精神少而生大熱有時火上行而獨燎其面針經云面熱者足陽明病調胃承氣湯加犀角川連又牛黃通膈湯覺中風一二日實則急宜下之於本方加牛黃與芒硝同研末調服又破棺丹治瘡腫一切風熱即本方為末煉蜜丸醫壘元戎治大頭病本方加牛蒡子寒水石為細末煉蜜酒服又滌毒散治時氣疙瘩五發瘡瘍喉閉雷頭於本方加當歸又玉燭散本方與四物湯各半合經驗良方調胃承氣湯治熱留胃中發斑及服熱藥過多亦發斑此藥主之四逆湯方甘草二兩炙千金翼霍亂門作一兩乾薑一兩半附子一枚生用去皮破八片玉函作生去皮破上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩味下成本有㕮咀二字錢四逆湯者所以治四肢厥逆而名之也素問陽明脈解云四肢者諸陽之本也陽盛則四肢實即陰陽應象論之清陽實四肢也靈樞終始篇云陽受氣於四末陰受氣於五臟蓋以谷入於胃氣之清者為營行於脈中濁者降於下焦為命門真陽之所蒸騰其氣直達皮膚而為衛氣先充滿於四末然後還而溫肌肉密腠理行於陰陽各二十五度故四肢為諸陽之本此以真陽虛衰陰邪肆逆陽氣不充於四肢陰陽不相順接故手足厥冷而為厥逆咽中干也若重發其汗更加燒針取汗則孤陽將絶矣仲景急以溫經復陽為治故立四逆湯其以甘草為君者以甘草甘和而性緩可緩陰氣之上逆乾薑溫中可以救胃陽而溫脾土即所謂四肢皆稟氣於胃而不得至經必因於脾乃得稟焉此所以脾主四肢也附子辛熱直走下焦大補命門之真陽故能治下焦逆上之寒邪助清陽之升發而騰達於四肢則陽回氣暖而四肢無厥逆之患矣是以名之曰四逆湯也顧憲章傷寒溯源集云案言四者四肢之省文也四肢自指至肘足至膝是也其病為深凡言手足者自指至腕足至踝而已其病尚淺仲景下字不苟其輕重淺深一覽瞭然矣案四逆字見於靈素亦是四肢厥逆之義柯氏謂本方脫人參乃以四物救逆名之誤也吳遵程方注云從前附子皆野生大者極是難得重半兩者即少不若今時之種附子重一兩外也近世用二三錢一劑即與仲景時二三枚分三劑相等耳醫經會解云陰毒心硬肢冷加麝香皂莢俱用少許嘔吐涎沫或小腹痛加鹽炒吳茱萸半夏生薑嘔吐不止加半夏生薑汁瀉不止加白朮人參黃耆茯苓開麻名醫類案云郭雍治一人盛年恃健不善養因極飲冷酒食內外有所感初得疾即便身涼自利手足厥額上冷汗不止遍身痛呻吟不絶偃臥不能轉側心神俱無昏憒不恍惚請醫視之治不力言曰此證甚重而病人甚靜殊不昏憒身重不能起自汗自利四肢厥此陰證無疑也又遍身痛不知處所出則身如被杖陰毒證也當急治之醫言謬悠不可聽郭令服四逆湯灸關元及三陰交未知加服九鍊金液丹利厥汗證少止稍緩藥艾則諸證復出再急灸治如此進退者三凡三日兩夜灸千餘壯服金液丹亦千餘粒四逆湯一二斗方能住灸湯藥陽氣雖復而汗不出證復如太陽病未敢服藥以待汗二三日復大煩躁飲水次則譫語斑出熱甚無可奈何復與調胃承氣湯得利大汗而解陰陽反覆有如此者前言煩躁不可投涼藥此則可下證具非小煩躁而已故不同也問曰證象陽旦案法治之而增劇厥逆咽中干兩脛拘急而譫語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈玉函無師曰之曰此作之為字上並有即字參作於無重字成本為上並有則字病形作病證躁作燥成陽旦桂枝湯別名也程此條即上條注腳借問答以申明其義也證象陽旦句應前條傷寒脈浮自汗出小便數心煩微惡寒腳攣急一段案法治之句應前條反與桂枝湯欲攻其表一段而增劇至拘急而譫語句應前條此誤也得之便厥咽中干煩躁吐逆者一段師言夜半手足當溫兩脛當伸後如師言何以知此句應前條已用甘草湯並調胃承氣湯一段答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也數句發明以補出前證病源及用桂枝之誤見證象桂枝而實非桂枝證將成亡陽也厥逆咽中干煩躁陽明內結譫語煩亂申敘前證以著亡陽之實更飲甘草湯夜半陽氣回兩足當溫重應前條甘草乾薑湯一段脛尚微拘急重與芍藥甘草湯爾乃脛伸重應前條芍藥甘草湯一段以承氣湯微溏則止其譫語重應前條調胃承氣湯一段故知其病可愈亦非泛結見其愈也由於救之得法萬一為煩躁譫語等證所惑而大青龍之見不無交互於胸中欲其病之愈也得乎錢象桂枝湯證故仍於桂枝湯中加附子參於其間則真陽有助不患其汗泄故又增桂令汗出以解衛分之陽邪也其所以加附子溫經者以下焦無陽也此法即誤汗亡陽桂枝加附子湯乃為傷寒脈浮自汗出小便數心煩微惡寒腳拘攣之正治也若不察其微惡寒腳拘攣之亡陽虛證已經反與桂枝湯誤攻其表使陽氣愈虛陰邪上逆以致厥逆咽中乾等證也案喻氏以陽旦湯為千金方桂枝加黃芩之方魏氏汪氏錢氏輩引數證辨其非以文繁不載於斯案柯氏注本闕此一條詳其文義似後人所增柯氏刪之實有所見也
