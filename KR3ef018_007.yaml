body:
  text: 卷七辨霍亂病脈證並治問曰病有霍亂者何答曰嘔吐而利此名霍亂此名成本玉函作名曰千金翼何下有也字名作為成三焦者水穀之道路邪在上焦則吐而不利邪在下焦則利而不吐邪在中焦則既吐且利以飲食不節寒熱不調清濁相干陰陽乖隔遂成霍亂輕者止曰吐利重者揮霍撩亂名曰霍亂錫霍者忽也謂邪氣忽然而至防備不及正氣為之倉忙錯亂也胃居中土為萬物之所歸故必傷胃邪氣與水穀之氣交亂於中故上嘔吐而下利也吐利齊作正邪紛爭是名霍亂病源候論曰霍亂者人溫涼不調陰陽清濁二氣有相干亂之時其亂在於腸胃之間者因遇飲食而變發則心腹絞痛其有先心痛者先吐先腹痛者則先痢心腹並痛者則吐痢俱發霍亂言其病揮霍之間便致撩亂也千金方曰原夫霍亂之為病也皆因食飲非關鬼神飽食肫膾復餐乳酪海陸百品無所不啖眠臥冷席多飲寒漿胃中諸食結而不消陰陽二氣擁而反戾陽氣欲降陰氣欲升陰陽乖隔變成吐利頭痛如破百節如解遍體諸筋皆為迴轉論證雖小卒病之中最為可畏外臺秘要必效方云上吐下利者名為濕霍亂案文選蜀都賦翕響揮霍劉曰奄忽之間也濟曰沸亂貌文賦紛紜揮霍善曰揮霍疾貌唐惠琳藏經音義云轉霍呼郭反按霍倏急疾之貌也霍然忽霍皆是也又霍然倏忽速疾之貌也由是考之成氏云揮霍撩亂錫駒云忽也錢云大約是倏忽間吐瀉擾亂之意耳其義並同方氏云霍吐也亂雜亂也其說不通問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂霍亂自吐下又利止復更發熱也成本無下霍亂二字玉函寒下有不復二字此名作當為無自字又字千金翼寒下有而復二字鑑此承上條以詳出其證也頭痛身疼發熱惡寒在表之風寒暑熱為病也嘔吐瀉利在裡之飲食生冷為病也具此證者名曰霍亂若自嘔吐已又瀉利止仍有頭痛身疼惡寒更復發熱是里解而表不解也沈明宗曰吐利已止復更發熱乃里氣和而表邪未解當從解表之法或無表證但有腹痛吐利此為里邪未解當以和里為主方發熱頭痛身疼惡寒外感也吐利內傷也上以病名求病證此以病證實病名反覆詳明之意錫夫但曰利止而不曰吐止者省文也傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者此屬陽明也便必硬十三日愈所以然者經盡故也下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也成本玉函方氏諸本並以下利後當便硬以下別為一條玉函本上有素字欲似玉函及錢本作似欲成本屬上無此字鑑此承上條辨發熱頭痛身疼惡寒吐利等證為類傷寒之義也若有前證而脈浮緊是傷寒也今脈微澀本是霍亂也然霍亂初病即有吐利傷寒吐利卻在四五日後邪傳入陰經之時始吐利也此本是霍亂之即嘔吐即下利故不可作傷寒治之俟之自止也若止後似欲大便而去空氣仍不大便此屬陽明也然屬陽明者大便必硬雖大便硬乃傷津液之硬未可下也當俟至十三日經盡胃和津回便利自可愈矣若過十三日大便不利為之過經不解下之可也下利後腸胃空虛津液匱乏當大便硬硬則能食者是為胃氣復至十三日津回便利自當愈也今反不能食是為未復俟到十三日後過經之日若頗食亦當愈也如其不愈是為當愈不愈也當愈不愈者則可知不屬十三日過經便硬之陽明當屬吐利後胃中虛寒不食之陽明或屬吐利後胃中虛燥之陽明也此則非藥不可俟之終不能自愈也理中脾約擇而用之可矣惡寒脈微原注一作而複利利止亡血也四逆加人參湯主之成惡寒脈微而利者陽虛陰勝也利止則津液內竭故云亡血金匱玉函曰水竭則無血與四逆湯溫經助陽加人參生津液益血案金鑑曰利止亡血如何用大熱補藥利止當是利不止亡血當是亡陽錢氏亦疑亡血之為亡陽然徐大椿曰案亡陰即為亡血不必真脫血也此說似是四逆加人參湯方甘草二兩炙附子一枚生去皮破八片乾薑一兩半人參一兩上四味以水三升煮取一升二合去滓分溫再服千金外臺用人參三兩利甚者加龍骨二兩小品名四順湯魏於溫中之中佐以補虛生津之品凡病後亡血津枯者皆可用也不止霍亂也不止傷寒吐下後也徐今利雖止而惡寒脈微如故則知其非陽回而利止乃津液內竭而利止也故曰亡血又當加人參以生津益血矣霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之用字方氏作欲飲二字丸成本作員玉函作湯千金翼同魏傷寒者外感病霍亂者內傷病也傷寒之發熱頭痛身疼惡寒風寒在營衛霍亂之頭痛身疼惡寒必兼吐下風寒在胃腑也風寒外邪何以遽入於胃腑則平日中氣虛歉暴感風寒透表入里為病於內因其為風寒客邪故發熱頭痛身疼惡寒與傷寒同因其暴感胃腑故兼行吐利與傷寒異此二病分關之源頭也其所以吐利時不熱利止復熱者則亦因中氣虛弱當吐利行時邪雖在胃而氣散熱不能發利止氣收方發耳亦異於傷寒之熱發在表無作息時也既明霍亂致病之由為病與傷寒之異而治法方可就其人之寒熱施之熱多者胃雖虛自熱多虛熱者吐利行必大飲水五苓散主之導濕清熱滋干所必用也寒多者胃素虛且寒多虛寒者吐利行必不用水理中丸主之溫中燥濕補虛所必用也傷寒類方曰案霍亂之症皆由寒熱之氣不和陰陽拒格上下不通水火不濟之所致五苓所以分其清濁理中所以壯其陽氣皆中焦之治法也醫史戴良撰呂滄洲翁傳云內子王病傷寒乃陰隔陽面赤足蜷而下利躁擾不得眠論者有主寒主溫之不一余不能決翁以紫雪匱理中丸進徐以水漬甘草乾薑湯飲之愈且告之曰下利足蜷四逆證也苟用常法則上焦之熱彌甚今以紫雪折之徐引辛甘以溫里此熱因寒用也聞者皆歎服理中丸方原注下有作湯加減玉函丸作圓人參乾薑甘草炙白朮各三兩上四味搗篩蜜和為丸如雞子黃許大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被成本玉函篩下有為末二字無子許二字若臍上上有加減法三字日三四瘥後病篇玉函成本作日三服方理治也料理之謂中里也里陰之謂參朮之甘溫里也甘草甘平和中也乾薑辛熱散寒也程陽之動始於溫溫氣得而穀精運穀氣升而中氣贍故名曰理中實以燮理之功予中焦之陽也蓋謂陽虛即中氣失守膻中無發宣之用六腑無灑陳之功猶如釜薪失焰故下至清穀上失滋味五臟凌奪諸證所由來也參朮炙甘所以守中州乾薑辛以溫中必假之以燃釜薪而騰陽氣是以谷入於陰長氣於陽上輸華蓋下攝州都五臟六腑皆受氣矣此理中之旨也錢後加減方文理背謬量非仲景之法傷寒類方曰桂枝湯之飲熱粥欲其助藥力以外散此飲熱粥欲其助藥力以內溫金匱要略胸痹心中痞氣結在胸胸滿脅下逆搶心人參湯主之程林注此即理中湯也中氣強則痞氣能散胸滿能消脅氣能下人參白朮所以益脾甘草乾姜所以溫胃脾胃得其和則上焦之氣開發而胸痹亦愈千金方治中湯治霍亂吐下脹滿食不消化心腹痛即本方四味㕮咀以水八升煮取三升分三服不瘥頻服三劑遠行防霍亂依前作丸如梧子大服三十丸如作散服方寸匕酒服亦得若轉筋者加石膏三兩又四理順中丸已產訖可服此方新生臟虛此所以養臟氣也即本方外臺秘要崔氏理中丸療三焦不通嘔吐不食並霍亂吐逆下痢及不得痢即本方及延年理中丸療霍亂吐利宿食不消於本方加大麥糵又廣濟療冷熱不調霍亂吐利宿食不消理中丸於本方加良薑桂心又範汪茯苓理中湯療霍亂臍上築而悸於本方加茯苓木瓜又範汪理中加二味湯療霍亂胸滿腹痛吐下於本方加當歸芍藥又延年增損理中丸主霍亂下氣能食止泄痢於本方加厚朴茯苓直指水煎亦名理中湯又小品扶老理中散療羸老冷氣噁心食飲不化腹虛滿拘急短氣及霍亂嘔逆四肢厥冷心煩氣悶流汗於本方加麥門冬附子茯苓活人書或四肢拘急腹滿下利或轉筋者去白朮加附子一枚生用三因方病者因飲食過度傷胃或胃虛不能消化致翻嘔吐逆物與氣上衝蹙胃口決裂所傷吐出其色鮮紅心腹絞痛白汗自流名曰傷胃吐血理中湯能止傷胃吐血者以其功最理中脘分利陰陽安定血脈方證廣如局方但不出吐血證學者當自知之或只煮乾薑甘草湯飲之亦妙見養生必用又加味理中丸治飲酒過多及啖炙爆熱食動血發為鼻衄於本方中加乾葛川芎各等分濟生方不用川芎直指方於本方加木香治飲食傷胃失血諸證又附子理中湯治五臟中寒口噤四肢強直不語於本方加大附子各等分施氏續易簡方有中寒氣虛陰陽不相守血乃妄行者經所謂陽虛陰必走是也咯血吐血衄血便血皆有此證理中湯加官桂治之人皆知此藥能理中脘不知其有分利陰陽安定血脈之功也又理中湯治傷寒時氣裡寒外熱加五味子阿膠末等分名順味丸治寒邪作嗽甚妙老人吐瀉不止去甘草加白茯苓一兩名溫中湯直指方理中丸補肺止寒嗽於本方加炒阿膠五味子又加味理中湯治肺胃俱寒咳嗽於本方加半夏茯苓橘紅細辛五味子薑棗煎又婦人妊娠胎動腹脅腰痛下血水者以真料理中湯加縮砂佐之體仁彙編三建湯此必審真房勞及冬月真傷寒方可用本方加川烏鹿茸醫匯腹痛全然不思飲食其人本體素弱而腹冷痛以手按之則不痛此亦虛也本方如良薑吳茱萸陰證略例寒證不能食理中建中各半湯為二中湯醫經會解本方倍白朮人參加豬苓澤瀉茯苓肉桂名理苓湯吃忒加丁香柿蒂張氏醫通衄血六脈弦細而澀按之空虛色白不澤者脫血也此大寒證理中湯加黃耆吐利止而身痛不休者當消息和解其外宜桂枝湯小和之成吐利止里和也身痛不休表未解也與桂枝湯小和之外臺云里和表病汗之則愈方消息猶斟酌也小和言少少與服不令過度之意也傷寒直格消息謂損益多少也吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之志吐利汗出乃中焦津液外泄發熱惡寒表氣虛也四肢拘急津液竭也手足厥冷者生陽之氣不達於四肢故主四逆湯啟下焦之生陽溫中焦之土氣既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者四逆湯主之內玉函作里錢吐利則寒邪在裡小便複利無熱可知而大汗出者真陽虛衰而衛氣不密陽虛汗出也下利清穀胃寒不能殺穀也內寒外熱非表邪發熱乃寒盛於裡格陽於外也陰寒太甚陽氣寖微故脈幾欲絕也急當挽救真陽故以四逆湯主之案據少陰篇厥陰篇之例此條所主當是通脈四逆湯吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽湯主之成本玉函膽下有汁字外臺不用豬膽汁千金同錫吐已下斷者陰陽氣血俱虛水穀津液俱竭無有可吐而自已無有可下而自斷也故汗出而厥四肢拘急之亡陰證與脈微欲絕之亡陽證仍然不解更宜通脈四逆加豬膽啟下焦之生陽而助中焦之津液志霍亂之證至汗出而厥四肢拘急脈微欲絕乃惟陰無陽用四逆湯不必言矣又加膽汁人尿者津液竭而陰血並虛不當但助其陽更當滋益其陰之意案志聰錫駒注本方更加人尿然原文中無所考蓋據白通加豬膽汁湯而有此說耳錫駒云每見夏月霍亂之證四肢厥逆脈微欲絕投以理中四逆不能取效反以明礬少許和涼水服之而即愈亦即膽汁人尿之意先賢立法可謂周遍詳明矣霍亂用礬石原見於華佗危病方與膽汁人尿蓋其意迥別通脈四逆加豬膽湯方甘草二兩炙乾薑三兩強人可四兩豬膽汁半合玉函作四合肘後作一合附子大者一枚生去皮破八片上四味以水三升煮取一升二合去滓納豬膽汁分溫再服其脈即來無豬膽以羊膽代之吳汗出而厥陽微欲絕而四肢拘急全然不解又兼無血以柔其筋脈微欲絕固為陽之欲亡亦兼陰氣虧損故用通脈四逆以回陽而加豬膽汁以益陰庶幾將絕之陰不致為陽藥所劫奪也注認陽極虛陰極盛故用反佐之法以通其格拒誤矣案成氏方氏錢氏金鑑並同程云吐已下斷猶陰邪堅結陽氣難伸所以證則汗出而厥四肢拘急不解脈則微而欲絕此湯主之於回陽救急中交通其氣善後猶難為力如此敢不慎厥初哉案此亦一說故附存於此吐利發汗脈平小煩者以新虛不勝穀氣故也發汗吐下後篇汗下有後字魏吐利發汗後脈遂就平病遂瘥可此尤為素日胃氣有餘而病邪輕微之效也但余小煩乃胃氣暴為吐下所虛非素虛乃新虛也胃既新虛仍與以舊日之谷數則穀氣多於胃氣所以不勝穀氣而作小煩也仲景不言治法蓋損其谷則愈之治見於大病瘥後之條矣故不復贅此凡病可云然也辨陰陽易瘥後勞復病脈證並治傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花原注花一作眵膝脛拘急者燒褌散主之花下玉函有眼胞赤三字千金翼作痂胞赤花巢源作眯成大病新瘥血氣未復餘熱未盡強合陰陽得病者名曰易男子新病瘥未平復而婦人與之交得病名曰陽易婦人新病瘥未平復男子與之交得病名曰陰易案以上出巢源以陰陽相感動其餘毒相染著如換易也其人病身體重少氣者損動真氣也少腹裡急引陰中拘攣膝脛拘急陰氣極也熱上衝胸頭重不欲舉眼中生花者感動之毒所易之氣熏蒸於上也與燒褌散以道陰氣錢男女一交之後自然元氣空虛餘邪錯雜於精氣之中走入精隧溢入經絡乘其交後虛隙之中入而浸淫於臟腑筋骨脈絡俞穴之間則正氣因邪而益虛邪氣因虛而益盛故有此陰盛陽衰之諸證也邪入陰經身體必重真陽虧損三焦不運宗氣不行所以少氣邪從陰竅而溜入少陰厥陰故少腹裡急若裡急之甚或引陰中拘攣皆陰邪之所致也陰邪在下而虛陽上走故熱上衝胸頭重不欲舉眼中生花下焦虛冷所以膝脛拘急也此真所謂陰陽之患故以燒褌散主之肘後方兩男兩女並不自相易則易之為名陰陽交換之謂也方云傷寒包中風而言也易猶交易變易之易言大病新瘥血氣未復強合陰陽則二氣交感互相換易而為病也燒褌散方婦人中褌近隱處取燒作灰上一味水服方寸匕日三服小便即利陰頭微腫此為愈矣婦人病取男子褌燒服成本玉函作上取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子剪當燒灰錢男女之交媾易所謂二氣感應以相與也以未淨之邪隨交合之情精神魂魄無不動搖翕然而感感而遂通混入於少陰之裡故以近隱處之裩襠引出其陰中之邪所謂物從其類同氣相求之義也鑑男女裩襠濁敗之物也燒灰用者取其通散亦同氣相求之義耳服後或汗出或小便利則愈陰頭微腫者是所易之毒從陰竅而出故腫也傷寒蘊要曰陰陽易仲景治以燒裩散活人書以豭鼠屎湯栝蔞根竹茹湯竹皮湯當歸白朮散之類主之易老分寒熱而治若傷在少陰腎經有寒無熱者以附子湯調下燒裩散若傷在厥陰肝經者以當歸四逆湯加吳茱萸附子送下燒裩散主之如有熱者以鼠屎竹茹湯之類送下燒裩散主之要在審察脈症分其冷熱而治矣陰證略例曰若陰陽易果得陰脈當隨證用之若脈在厥陰當歸四逆湯送下燒裩散若脈在少陰通脈四逆湯送下燒裩散若脈在太陰四順理中丸送下燒裩散證治準繩曰嘗治傷寒病未平復犯房室命在須臾用獨參湯調燒裩散凡服參一二斤余得愈者三四人信哉用藥不可執一也大病瘥後勞復者枳實梔子湯主之錢凡大病新瘥真元大虛氣血未復精神倦怠餘熱未盡但宜安養避風節食清虛無欲則元氣日長少壯之人豈惟復舊而已哉若不知節養必犯所禁忌而有勞復女勞復食復飲酒復劇諸證矣夫勞復者如多言多慮多怒多哀則勞其神梳洗澡浴早坐早行則勞其力皆可令人重複發熱如死灰之復燃為重複之復故謂之復但勞復之熱乃虛熱之從內發者雖亦從汗解然不比外感之邪可從辛溫發散取汗也故以枳實梔子豉湯主之惟女勞復雖為勞復之一而其見證危險治法迥別多死不救所以吳綬謂前人有大病新瘥如大水浸牆水退牆蘇不可輕犯之喻也喻勞復乃起居作勞復生餘熱之病方注作女勞復大謬病源候論曰傷寒病新瘥津液未復血氣尚虛若勞動早更復成病故云復也若言語思慮則勞神梳頭澡洗則勞力勞則生熱熱氣乘虛還入經絡故復病也又大病之後脾胃尚虛穀氣未復若食豬肉腸血肥魚及久膩物必大下利醫所不能治也必至於死若食餅𥻓黍飴餔炙膾棗慄諸果脯物及牢強難消之物胃氣虛弱不能消化必更結熱適以藥下之則胃虛冷大利難禁不可下之必死下之亦危皆難救也枳實梔子湯方成本玉函子下有豉字枳實三枚炙梔子十四個擘豉一升綿裹上三味以清漿水七升空煮取四升納枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗若有宿食者納大黃如博棋子五六枚服之愈清漿水千金作酢漿千金翼同空煮取四升玉函作空煎減三升納大黃成本作加大黃子下成本有大字無服之愈三字五六枚千金外臺作一枚成勞復則熱氣浮越與枳實梔子豉湯以解之食復則胃有宿積加大黃以下之汪勞復證以勞則氣上熱氣浮越於胸中也故用枳實為君以寬中下氣梔子為臣以除虛煩香豉為佐以解勞熱煮以清漿水者以瘥後復病宜助胃氣也周如果虛勞而復當用補矣乃立此湯雖曰勞復實食復也何也新瘥未必大勞或偶不慎起居致食不能消化者有之若有宿食竟自過飽矣故枳實寬中破結梔子散熱除煩香豉解虛熱微汗合三物之苦寒主勞傷之復熱也如多食停滯因生熱者必按之痛宜加大黃去之快愈之速使不大耗胃液也設不知者以病後不可用所損多矣傷寒類方曰漿水即淘米泔水久貯味酸為佳本草蒙筌曰漿水造法炊粟米熱投冷水中浸五六日生白花色類漿者醫方祖劑曰漿水乃𬖔米和曲釀成如酢而淡字彙曰漿米汁也吳云清漿水一名酸漿水炊粟米熟投冷水中浸五六日味酢生白花色類漿故名若浸至敗者害人其性涼善走能調中宣氣通關開胃解煩渴化滯物案李時珍引嘉謨云漿水酢也誤千金方羊脂煎方後云棋子大小如方寸匕又服食門博棋子長二寸方一寸傷寒蘊要枳實梔子湯治食復勞復身熱心下痞悶如有宿食不下大便秘實脈中有力者可加大黃內外傷辨惑論食膏粱之物過多煩熱悶亂者亦宜服之傷寒瘥以後更發熱小柴胡湯主之脈浮者以汗解之脈沉實原注一作緊者以下解之成本玉函熱下有者字錢傷寒既瘥以後更發熱者若病後餘氣作虛熱固當以柴胡黃芩清解餘熱以人參補其病後之虛而以薑棗和之若復感外邪而發熱亦屬病後新虛理宜和解但察其脈證之有類於半表半里之少陽者以小柴胡湯主之若脈浮則邪盛於表必有可汗之表證仍當以汗解之但病後新虛不宜用麻黃過汗使傷衛亡陽若脈沉實者沉為在裡實則胃實仍當用下法解之但衛氣已虛不宜用承氣峻下宜消息其虛實或小承氣或調胃或如博棋子之法隨其輕重以為進止可也方脈浮有所重感也沉脈飲食失節也案喻云汗下之法即互上條汗用枳實梔豉微汗下用枳實梔豉加大黃微下也此恐非是千金方黃龍湯治傷寒瘥後更頭痛壯熱煩悶方仲景名小柴胡湯大病瘥後從腰以下有水氣者牡蠣澤瀉散主之錢大病後若氣虛則頭面皆浮脾虛則胸腹脹滿此因大病之後下焦之氣化失常濕熱壅滯膀胱不瀉水性下流故但從腰以下水氣壅積膝脛足跗皆腫重也以未犯中上二焦中氣未虛為有餘之邪脈必沉數有力故但用排決之法而以牡蠣澤瀉散主之牡蠣澤瀉散方牡蠣熬澤瀉蜀漆暖水洗去腥葶藶子熬商陸根熬海藻洗去咸栝蔞根各等分上七味異搗下篩為散更於臼中治之白飲和服方寸匕日三服小便利止後服成本葶藶下無子字於臼作入臼錢本金鑑葶藶上有苦字錢牡蠣咸而走腎同滲利則下走水道澤瀉利水入腎瀉膀胱之火為滲濕熱之要藥栝蔞根解煩渴而行津液導腫氣蜀漆能破其澼為驅痰逐水必用之藥苦葶藶泄氣導腫去十腫水氣商陸苦寒專於行水治腫滿小便不利海藻咸能潤下使邪氣自小便出也鑑此方施之於形氣實者其腫可隨愈也若病後土虛不能制水腎虛不能行水則又當別論慎不可服也大病瘥後喜唾久不了了胸上有寒當以丸藥溫之宜理中丸玉函成本胸上作胃上玉函無以丸藥三字方唾口液也寒以飲言錫大病瘥後喜唾者脾氣虛寒也脾之津為唾而開竅於口脾虛不能攝津故反喜從外竅而出也久不了了者氣不清爽也所以然者以胃上有寒故津唾上溢而不了了也錢胃上者胃之上口賁門也不用理中湯而用理中丸者非取其緩也因病後餘症不必用大劑力救但欲其常服耳周理中者理中焦利在下焦已為非治今寒在胃上何宜理中乎不知痰積膈上者總胃虛不能健運也設復以逐飲破滯之藥與之痰即出矣獨不虞今日之痰雖去而明日之痰復積乎惟溫補其胃自使陽氣得以展布而積者去去者不復積已傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之成本吐下有者字汪傷寒本是熱病熱邪所耗則精液銷鑠元氣虧損故其人必虛羸少氣氣逆欲吐者氣虛不能消飲胸中停蓄故上逆而欲作吐也與竹葉石膏湯以調胃氣散熱逆錢仲景雖未言脈若察其脈虛數而渴者當以竹葉石膏湯主之虛寒者別當消息也竹葉石膏湯方竹葉二把石膏一斤半夏半升洗麥門冬一升去心人參二兩玉函成本作三兩甘草二兩炙粳米半升上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服鑑是方也即白虎湯去知母加人參麥門冬半夏竹葉以大寒之劑易為清補之方此仲景白虎變方也錢竹葉性寒而止煩熱石膏入陽明而清胃熱半夏蠲飲而止嘔吐人參補病後之虛同麥冬而大添胃中之津液又恐寒涼損胃故用甘草和之而又以粳米助其胃氣也本草序例云凡云一把者二兩為正千金方本方用生薑四兩外臺秘要文仲療天行表裡虛煩不可攻者竹葉湯本方用石膏一升人參二兩粳米一升方後云此仲景方千金竹葉湯治產後虛渴少氣力於本方去石膏粳米加茯苓大棗小麥千金月令主風毒腳氣多睡心中悸石發攻心口乾方於本方去半夏粳米甘草加茯苓生薑外臺崔氏療骨蒸唇乾口燥欲得飲水止渴竹葉飲於本方去石膏加生薑大棗王氏易簡方既濟湯治發熱下利者於本方去石膏加熟附子和劑局方竹葉石膏湯治傷寒時氣表裡俱虛遍身發熱心胸煩悶或得汗已解內無津液虛羸少氣胸中煩滿氣逆欲吐及諸虛煩熱並宜服之諸虛煩熱與傷寒相似但不惡寒身不疼痛頭亦不痛脈不緊數即不可汗下宜服此藥即本方總病論竹葉湯治虛煩病兼治中暍渴吐逆而脈滑數者即本方直指方本方治伏暑內外熱熾煩躁大渴傷寒選錄竹葉湯陽明汗多而渴衄而渴欲水水入即瘥後渴即本方湯成去滓入生薑自然汁三匙再煎一沸服神效證治要訣熱嗽諸藥不效竹葉石膏湯去竹葉入粳米少加知母多加五味杏仁此必審是伏熱在上焦心肺間者可用張氏醫通上半日嗽多屬胃中有火竹葉石膏湯降泄之又唇青有二若唇與爪甲俱青而煩渴引飲者為熱伏厥陰竹葉石膏湯若唇青厥冷而畏寒振振欲擗地者為寒犯少陰真武湯又夏月感冒吐瀉霍亂甚則手足厥逆少氣唇面爪甲皆青六脈俱伏而吐出酸穢瀉下臭惡便溺黃赤者此火伏於厥陰也為熱極似陰之候急作地漿煎竹葉石膏湯誤作寒治必死夷堅志袁州天慶觀主首王自正病傷寒旬余四肢乍冷乍熱頭重氣塞唇寒面青累日不能食勢已甚殆醫徐生診之曰脈極虛是為陰證必服桂枝湯乃可留藥而歸未及煮若有語之曰何故不服竹葉石膏湯王回顧不見如是者三遂買見成藥兩帖付童使煎即盡其半先時頭不能舉若戴物千斤倏爾輕清唇亦漸暖咽膈通暢無所礙悉服之少頃汗出如洗徑就睡及平旦脫然如常時自正為人謹飭常茹素與人齋醮盡誠故為神所祐如此病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈病人玉函作傷寒喻脈已解者陰陽和適其無表裡之邪可知也日暮微煩者日中衛氣行陽其不煩可知也乃因脾胃氣弱不能消穀所致損谷則脾胃漸趨於旺而自愈矣注家牽扯日暮為陽明之王時故以損谷為當小下成注不知此論瘥後之證非論六經轉陽明之證也方注日暮即內經日西而陽氣已衰之意所以不能消穀也損谷當是減損穀食以休養脾胃不可引前條宿食例輕用大黃重傷脾胃也魏損其谷數每食一升者食七合食五合者食三合俟胃脾漸壯谷漸增益亦節飲食防病復之一道也玉函經病後勞復發熱者麥門冬湯主之方與金匱要略咳嗽篇所載同此條今本遺脫當是仲景舊文
