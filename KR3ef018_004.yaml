body:
  text: 卷四辨陽明病脈證並治問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約原注一云絡是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中躁煩實大便難是也玉函二少陽字並作微陽無煩實字云脾約一作脾結千金翼同柯氏刪此條案玉函無煩實二字似甚允當鑑陽明可下之證不止於胃家實也其綱有三故又設問答以明之也太陽之邪乘胃燥熱傳入陽明謂之太陽陽明不更衣無所苦名脾約者是也太陽之邪乘胃宿食與燥熱結謂之正陽陽明不大便內實滿痛名胃家實者是也太陽之邪已到少陽法當和解而反發汗利小便傷其津液少陽之邪復乘胃燥轉屬陽明謂之少陽陽明大便澀而難出名大便難者是也錢太陽陽明者太陽證猶未罷者若發汗若下若利小便亡津液而胃中乾燥大便難者遂為脾約也脾約以胃中之津液言胃無津液脾氣無以轉輸故如窮約而不能舒展也所以有和胃潤燥之法正陽陽明乃熱邪宿垢實滿於胃而有蕩滌之劑少陽陽明以少陽證而發其汗且利其小便令胃中之津液乾燥而煩是少陽之邪並歸於胃故曰躁煩實實則大便難也其治當與太陽陽明之脾約不遠矣汪愚以大抵太陽陽明宜桂枝加大黃湯正陽陽明宜三承氣湯選用少陽陽明宜大柴胡湯此為不易之法陽明之為病胃家實原注一作寒是也玉函以此條冠本篇之首是也成本無是字柯陽明為傳化之腑當更實更虛食入胃實而腸虛食下腸實而胃虛若但實不虛斯為陽明之病根矣胃實不是陽明病而陽明之為病悉從胃實上得來故以胃家實為陽明一經之總綱也然致實之由最宜詳審有實於未病之先者有實於得病之後者有風寒外束熱不得越而實者有妄汗吐下重亡津液而實者有從本經熱盛而實者有從他經轉屬而實者此只舉其病根在實耳案陽明提綱與內經熱論不同熱論重在經絡病為在表此經里證為主里不和即是陽明病是二經所由分也方實者大便結為硬滿而不得出也作於遲早不同非日數所可拘問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也玉函也上有病字千金翼衣下有而字成本太陽病不解因汗利小便亡津液胃中乾燥太陽之邪入腑轉屬陽明古人登廁必更衣不更衣者通為不大便不更衣則胃中物不得泄故為內實胃無津液加之蓄熱大便則難為陽明裡實也汪或問太陽病若下則胃中之物已去縱亡津液胃中乾燥未必覆成內實余答云方其太陽初病時下之不當徒亡津液胃中之物依然不泄必轉屬陽明而成燥糞故成內實之證總病論曰更衣即登廁也非顏師古注漢書更衣之義集驗方痔有更衣挺出妨於更衣更衣出清血故以知之集驗方之説今見外臺五痔論問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也玉函千金翼反上有但字汪上言陽明病系胃家內實其外見證從未言及故此條又設為問答夫身熱與發熱異以其熱在肌肉之分非若發熱之翕翕然僅在皮膚以外也汗自出者胃中實熱則津液受其蒸迫故其汗自出與太陽中風汗雖出而不能透故其出甚少亦有異此條病則汗由內熱蒸出其出必多而不能止也不惡寒者邪不在表也反惡熱者明其熱在裡也傷寒當惡寒故以惡熱為反夫惡熱雖在內之證其狀必見於外或揚手擲足迸去覆蓋勢所必至因外以徵內其為陽明胃實證無疑矣尚論篇以此條病辨陽明中風證兼太陽若以其邪猶在於經大誤之極大抵此條病乃承氣湯證柯四證是陽明外證之提綱故胃中虛冷亦得稱陽明病者因其外證如此也案方氏魏氏金鑑並以此條證為陽明病由太陽中風而傳入者非也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也發熱玉函作惡熱千金翼發上無不字周案承上言雖云反惡熱亦有得之一日而惡寒者曰此尚在太陽居多耳若至轉陽明未有不罷而惡熱者程陽明惡寒終是帶表至於腑病不唯不惡寒且惡熱表罷不罷須於此驗之故從反詰以辨出案無熱惡寒發於陰此云不發熱而惡寒恐不得為陽明內實之證玉函作惡熱似極是問曰惡寒何故自罷答曰陽明居中主土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也成本玉函千金翼無主字鑑此釋上條陽明惡寒自罷之義陽明屬胃居中土也土為萬物所歸故邪熱歸胃則無所復傳亦萬物歸土之義陽明初病一日雖仍惡寒是太陽之表未罷也至二日惡寒自止則是太陽之邪已悉歸併陽明此為陽明病也柯太陽病八九日尚有惡寒證若少陽寒熱往來三陰惡寒轉甚非發汗溫中何能自罷惟陽明惡寒未經表散即能自止與他經不同始雖惡寒二句語意在陽明居中句上夫知陽明之惡寒易止便知陽明為病之本矣胃為戊土位處中州表裡寒熱之邪無所不歸無所不化皆從燥化而為實實則無所復傳此胃家實所以為陽明之病根也本太陽初得病時發其汗汗先出不徹因轉屬陽明也方徹除也言汗發不對病不除也此言由發太陽汗不如法致病入胃之大意程汗出不透則邪未盡出而辛熱之藥性反內留而助動燥邪因轉屬陽明辨脈篇所云汗多則熱愈汗少則便難是也魏太陽初受風寒之時發其汗而汗終出不徹者則在表之邪亦可以日久變熱於外內郁之熱日久耗津於內汗難出未太過而津已坐耗為多其陽盛津亡大便因硬轉屬陽明無二也案太陽中篇第四十八條二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明云云正與此條同義傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也傷寒二字玉函千金翼作病一字成傷寒發熱無汗嘔不能食者太陽受病也若反汗出濈濈然者太陽之邪轉屬陽明也經曰陽明病法多汗錢寒邪在表則發熱無汗寒邪在胸則嘔不能食皆太陽寒傷營之表證也程反汗出濈濈然者知大便已燥結於內雖表證未罷已是轉屬陽明也濈濈連綿之意俗云汗一身不了又一身也傷寒三日陽明脈大鑑傷寒一日太陽二日陽明三日少陽乃內經言傳經之次第非必以日數拘也此云三日陽明脈大者謂不兼太陽陽明之浮大亦不兼少陽陽明之弦大而正見正陽陽明之大脈也蓋由去表傳裡邪熱入胃而成內實之診故其脈象有如此者傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也程脈浮而緩是為表脈然無頭痛發熱惡寒等外證而隻手足溫是邪不在表而在裡但入里有陰陽之分須以小便別之小便不利者濕蒸瘀熱而發黃以其人胃中原來無燥氣也小便自利者胃干便硬而成實以其人胃中本來有燥氣也病雖成於八九日而其始證卻脈浮而緩手足自溫則實是太陰病轉屬來也既已轉系陽明其脈之浮緩者轉為沉大不必言矣而手足之溫不止溫已也必濈然微汗出蓋陰證無汗汗出者必陽氣充於內而後溢於外其大便之實可知也案太陰篇云傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也當與此條互考傷寒轉系陽明者其人濈然微汗出也玉函作濈濈然千金翼轉作傳方本喻本魏本亦作濈濈然程本此條接上為一條汪此承上文而申言之上言傷寒系在太陰要之既轉而繫於陽明其人外證不但小便利當濈然微汗出蓋熱蒸於內汗潤於外汗雖微而腑實之證的矣陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也知此言陽明兼有太陽少陽表邪即不可攻也陽明中風熱邪也腹滿而喘熱入里矣然喘而微則未全入里也發熱惡寒脈浮而緊皆太陽未除之證口苦咽乾為有少陽之半表半裡若誤下之表邪乘虛內陷而腹益滿矣兼以重亡津液故小便難也案下條云陽明病能食者為中風金鑑則云陽明謂陽明裡證中風謂太陽表證非也案此條常器之云可桂枝麻黃各半湯又小柴胡湯汪氏云以葛根湯為主加黃芩等涼藥以治之金鑑云太陽陽明病多則以桂枝加大黃湯兩解之少陽陽明病多則以大柴胡湯和而下之若惟從里治而遽下之則表邪乘虛復陷故腹更滿也裡熱愈竭其液故小便難也陽明病若能食名中風不能食名中寒二名字玉函千金翼作為程本因有熱則陽邪應之陽化谷故能食就能食者名之曰中風其實乃瘀熱在裡證也本因有寒則陰邪應之陰不化谷故不能食就不能食者名之曰中寒其實乃胃中虛冷證也柯此不特以能食不能食別風寒更以能食不能食審胃家虛實也要知風寒本一體隨人胃氣而別方名猶言為也中寒即傷寒之互詞案程氏云論中總無中寒字獨此處見之猶云風與寒自內得也此解恐未允陽明病若中寒者不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也成本寒下無者字玉函千金翼無若字食下有而字固作堅周此條陽明中之變證著眼只在中寒不能食句此係胃弱素有積飲之人兼膀胱之氣不化故邪熱雖入未能實結況小便不利則水並大腸故第手足汗出不若潮熱之遍身漐漐有汗此欲作固瘕也其大便始雖硬後必溏者豈非以胃中陽氣向衰不能蒸腐水穀爾時急以理中溫胃尚恐不勝況可誤以寒下之藥乎仲景懼人於陽明證中但知有下法及有結未定俟日而下之法全不知有不可下反用溫之法故特揭此以為戒程此之手足濈然汗出者小便不利所致水溢非胃蒸也固瘕者固而成癖水氣所結其腹必有響聲特以結在胸為水結胸結在腹為固瘕陰陽冷熱攸別錢注家以前人堅固積聚為謬而大便初硬後溏因成瘕泄瘕泄即溏泄也久而不止則為固瘕案此喻注後柯氏張氏志聰金鑑並宗其説愚以固瘕二字推之其為堅凝固結之寒積可知豈可但以溏泄久而不止為解況初硬後溏乃欲作固瘕之徵非謂已作固瘕然後初硬後溏也觀欲作二字及必字之義皆逆料之詞未可竟以為然也陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈成本無初字不利玉函作不數並成本玉函作並脈緊千金翼作堅一字喻本程本有初字成陽病客熱初傳入胃胃熱則消穀而欲食陽明病熱為實者則小便當數大便當硬今小便反不利大便自調者熱氣散漫不為實也欲食則胃中谷多谷多則陽氣勝熱消津液則水少水少則陰血弱金匱要略曰陰氣不通即骨疼其人骨節疼者陰氣不足也熱甚於表者翕翕發熱熱甚於里者蒸蒸發熱此熱氣散漫不專著於表裡故翕翕如有熱狀奄忽也忽然發狂者陰不勝陽也陽明蘊熱為實者須下之愈熱氣散漫不為實者必待汗出而愈故云濈然而汗出解也水穀之等者陰陽氣平也水不勝穀氣是陰不勝陽也汗出則陽氣衰脈緊則陰氣生陰陽氣平兩無偏勝則愈故曰與汗共並脈緊則愈汪氏云脈緊則愈補亡論闕疑常器之云一本作脈去則愈郭白雲云千金作堅者則愈無脈字是誤以脈緊為去為堅者或漏脈字或漏者字當云脈緊者則愈愚今校正當云脈緊去則愈喻氏云脈緊則愈言不遲也脈緊疾則胃氣強盛周氏柯氏並同程氏云脈緊則愈者言脈緊者得此則愈也張氏宗印云此直中之寒邪不能勝穀精之正氣與汗共並而出故其脈亦如蛇之紆回而欲出也魏氏云緊者緩之對言脈緊者言不若病脈之緩而已非必如傷寒之緊也錢氏云緊則浮去而裡氣充實也案以上數説未審孰是姑從成注陽明病欲解時從申至戌上成四月為陽土旺於申酉戌向旺時是為欲解柯申酉為陽明主時即日晡也陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛攻其熱必噦魏陽明病不能食即使有手足濈然汗出等證之假熱見於膚表面目之間一考驗之於不能食自不可妄言攻下若以為胃實之熱而攻之則胃陽愈陷而脫寒邪愈盛而沖必作噦證穀氣將絶矣再明其所以然確為胃中虛冷之故以其人本屬胃冷而虛並非胃熱之實誤加攻下下陷上逆則醫不辨寒熱虛實而概為陽明病必當下之之過也志高子曰遍閲諸經止有噦而無厄則噦之為厄也確乎不易詩云鑾聲噦噦謂厄之發聲有序如車鑾聲之有節奏也凡經論之言噦者俱作厄解無疑錢胃陽敗絶而成厄逆難治之證也汪愚謂宜用附子理中湯陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也疸成本作疸微玉函作發柯本脈遲下補腹滿二字金匱遲食間有者字微作發必小便難作小便必難程脈遲為寒寒則不能宣行胃氣故非不能飽特難用飽耳飢時氣尚流通飽則填滯以故上焦不行而有微煩頭眩證下脘不通而有小便難證小便難中包有腹滿證在內欲作谷疸者中焦升降失職則水穀之氣不行郁黷而成黃也曰谷疸者明非邪熱也下之兼前後部言茵陳蒿湯五苓散之類也曰腹滿如故則小便仍難而疸不得除可知再出脈遲欲人從脈上悟出胃中冷來熱蓄成黃之腹滿下之可去此則穀氣不得宣泄屬胃氣虛寒使然下之益虛其虛矣故腹滿如故印案金匱谷疸有二證此則虛寒而冷黰者也錢謂之欲作蓋將作未作之時也陰陽應象論云寒氣生濁熱氣生清又云濁氣在上則生䐜脹若不溫中散寒徒下無益也案汪氏云補亡論常器之云宜豬苓湯五苓散愚以上二方未成谷疸時加減出入可隨證選用郭白雲云已發黃者茵陳蒿湯此為不可易之劑張氏云脈遲胃虛下之無益則發汗利小便之法用之無益惟當用和法如甘草乾薑湯先溫其中然後少與調胃微和胃氣是也以上二説似未妥帖當考陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也玉函千金翼作陽明病久久而堅者陽明當多汗而反無汗云云成胃為津液之本氣虛津液少病則反無汗胃候身之肌肉其身如蟲行皮中者知胃氣久虛也程陽明病陽氣充盛之候也故法多汗今反無汗胃陽不足其人不能食可知蓋汗生於穀精陽氣所宣發也胃陽既虛不能透出肌表故怫鬱皮中如蟲行狀虛字指胃言兼有寒久字指未病時言柯此又當益津液和營衛使陰陽自和而汗出也案汪氏云常器之云可桂枝加黃耆湯郭白雲云桂枝麻黃各半湯愚以還當用葛根湯主之金鑑云宜葛根湯小劑微汗和其肌表自可愈也魏氏云補虛清熱人參白虎湯之類並似與經旨相畔矣陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛原注一云冬陽明玉函作各陽明病千金翼作冬陽明病成陽明病法多汗反無汗而小便利者陽明傷寒而寒氣內攻也至二三日嘔咳而支厥者寒邪發於外也必苦頭痛若不咳不嘔手足不厥者是寒邪但攻裡而不外發其頭亦不痛也案此條難解録數説於下方氏云此亦寒勝故小便利嘔手足厥喻氏云得之寒因而邪熱深也然小便利則邪熱不在內而在外不在下而在上故苦頭痛也程氏云胃中獨治之寒厥逆上攻故頭痛者標咳嘔手足厥者本張璐注與喻同云仍宜小青龍主之汪氏云此陽明經傷寒熱氣上攻必苦頭痛當用葛根湯類要用小建中湯常氏用小柴胡湯並非也錢氏云其所以無汗者寒在陽明之經而小便不利者里無熱邪也柯氏云此胃陽不敷布於四肢故厥不上升於額顱故痛緣邪中於膺結在胸中致嘔咳而傷陽也當用瓜蒂散吐之嘔咳止厥痛自除矣兩者字作時看更醒陽明病但頭眩不惡寒故能食而咳其人咽必痛若不咳者咽不痛原注一云冬陽明玉函作各陽明病千金翼作冬陽明病錢但頭眩者熱在上也不惡寒即陽明篇首所謂不惡寒反惡熱之義也能食陽明中風也咳者熱在上焦而肺氣受傷也中風之陽邪壅於上焦故咽門必痛也若不咳者上焦之邪熱不甚故咽亦不痛此條純是熱邪當與前條之不咳不嘔手足不厥頭不痛一條兩相對待示人以風寒之辨也程夫咽痛惟少陰有之今此以咳傷致痛若不咳則咽不痛況更有頭眩不惡寒以證之不難辨其為陽明之鬱熱也案此條證常器之張璐並云茯苓桂枝白朮甘草湯常氏又云咽痛者桔梗湯柯氏云此邪結胸中而胃家未實也當從小柴胡加減法陽明病無汗小便不利心中懊憹者身必發黃成陽明病無汗而小便不利者熱蘊於內而不得越心中懊憹者熱氣鬱蒸欲發於外而為黃也志陽明之氣不行於表裡上下則內逆於心中而為懊憹陽熱之氣留中入胃之飲不布則濕熱窨黰而身必發黃柯口不渴腹不滿非茵陳湯所宜與梔子柏皮湯黃自解矣案金鑑云心中懊憹濕瘀熱鬱於裡也宜麻黃連軺赤小豆湯若經汗吐下後或小便利而心中懊憹者熱鬱也便硬者宜調胃承氣湯便軟者宜梔子豉湯視之柯注卻似於經旨不切矣陽明病被火額上微汗出而小便不利者必發黃成本無而字玉函同喻陽明病濕停熱鬱而煩渴有加勢必發黃然汗出熱從外越則黃可免小便多熱從下泄則黃可免若誤攻之其熱邪愈陷清液愈傷而汗與小便愈不可得矣誤火之則熱邪愈熾津液上奔額雖微汗而周身之汗與小便愈不可得矣發黃之變安能免乎柯非梔子柏皮湯何以挽津液於涸竭之餘耶案常氏云可與茵陳蒿湯汪氏云五苓散去桂枝加葛根白朮當改用蒼朮金鑑云若小便利則從燥化必煩渴宜白虎湯小便不利則從濕化必發黃茵陳蒿湯並於經旨未妥陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出玉函千金翼作其熱必潮錢邪在太陽以浮緊為寒浮緩為風在陽明則緊為在裡浮為在表脈浮而緊者言浮而且緊也謂邪雖在經太半已入於裡也邪入於裡必發潮熱其發作有時者陽明氣旺於申酉故日晡時潮熱也潮熱則已成可下之證矣若但脈浮者風邪全未入里其在經之邪未解必盜汗出猶未可下也陽明本多汗多眠故有盜汗然不必陽明始有盜汗如太陽上篇脈浮而動數因自汗出之中風即有盜汗蓋由目瞑則衛氣內入皮膚不闔則盜汗出矣此示人當以脈證辨認表裡未可因潮熱而輕用下法也錫睡中汗出如盜賊乘人之不覺而竊去也案補亡論與柴胡桂枝湯汪氏及金鑑云桂枝加葛根湯補亡論為是案程氏云脈浮而緊者緣里伏陰寒系陽於外故也陰盛陽不敢爭僅乘旺時而一爭故潮熱發作有時也但浮者胃陽虛而中氣失守也睡則陰氣盛陽益不能入而盜汗出也夫潮熱汗出皆陽明裡實證而今屬之虛寒則於其脈辨之更可互參及能食不能食之內法也此亦一説故表而出又集注金氏曰無病之人則日有潮而不覺病則隨潮外現矣此説太奇故附於此金鑑曰自汗是陽明證盜汗是少陽證盜汗當是自汗文義始屬案此説太誤陽明病口燥但欲漱水不欲咽者此必衄咽千金翼作咽喻口中乾燥與渴異漱水不欲咽知不渴也陽明氣血俱多以漱水不欲咽知邪入血分陽明之脈起於鼻故知血得熱而妄行必由鼻而出也魏氏云漱水非渴也口中黏也周氏云使此時以葛根湯汗之不亦可以奪汗而無血乎此必衄者仲景正欲人之早為治不致衄後更問成流與否也汪氏云常器之曰可黃芩芍藥地黃湯一云當作黃芩芍藥甘草湯愚以此二湯乃衄後之藥於未衄時還宜用葛根等湯加減主之柯氏云宜桃仁承氣犀角地黃輩案本條下一必字宜衄前防衄犀角地黃之類蓋為的對矣陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此必大便硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也此必大便硬成本作此大便必硬津液玉函作精液汪氏云當還二字作還當其義乃順非也案據柯注數如字柯胃者津液之本也汗與溲皆本於津液本自出汗本小便利其人胃家之津液本多仲景揭出亡津液句為世之不惜津液者告也病瘥指身熱汗出言煩即惡熱之謂煩而微知惡熱將自罷以尚不了故大便硬耳數少即再行之謂大便硬小便少皆因胃亡津液所致不是陽盛於裡也因胃中乾燥則飲入於胃不能上輸於肺通調水道下輸膀胱故小便反少而遊溢之氣尚能輸精於脾津液相成還歸於胃胃氣因和則大便自出更無用導法矣以此見津液素盛者雖亡津液而津液終自還正以見胃家實者每躊躇顧慮示人以勿妄下與妄汗也歷舉治法脈遲不可攻心下滿不可攻嘔多不可攻小便自利與小便數少不可攻總見胃家實不是可攻證方蓋水穀入胃其清者為津液粗者成渣滓津液之滲而外出者則為汗瀦而下行者為小便故汗與小便出多皆能令人亡津液所以渣滓之為大便者乾燥結硬而難出也然二便者水穀分行之道路此通則彼塞此塞則彼通小便出少則津液還停胃中胃中津液足則大便軟滑此其所以必出可知也汪病家如欲用藥宜少與麻仁丸傷寒嘔多雖有陽明證不可攻之沈嘔多則氣已上逆邪氣偏侵上脘或帶少陽故雖有陽明證慎不可攻也方雖字當玩味柯嘔多是水氣在上焦雖有胃實證只宜小柴胡以通液攻之恐有利遂不止之禍要知陽明病津液未亡者慎不可攻蓋腹滿嘔吐是太陰陽明相關證胃實胃虛是陽明太陰分別處胃家實雖變證百出不失為生陽下利不止參附不能挽回便是死陰矣常氏云宜小柴胡湯汪氏云兼有陽明證宜用葛根加半夏湯案汪以葛根為陽明藥不可從喻氏云嘔多諸病不可攻下不特傷寒也陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈玉函千金翼作遂利成陽明病腹滿者為邪氣入腑可下之心下硬滿則邪氣尚淺未全入腑不可便下之得利止者為邪氣去正氣安正氣安則愈若因下利不止者為正氣脫而死魏言陽明病則發熱汗出之證具若胃實者硬滿在中焦今陽明病而見心下硬滿非胃實可知矣雖陽明亦可以痞論也主治者仍當察其虛實寒熱於瀉心諸方中求治法汪結胸證心下硬滿而痛此為胃中實故可下此證不痛當是虛硬虛滿故云不可攻也常器之云未攻者可與生薑瀉心湯利不止者四逆湯愚以須理中湯救之程氏云心下硬滿者邪聚陽明之膈膈實者腹必虛氣從虛閉亦見陽明假實證攻之是為重虛錫駒云心下硬滿者胃中水穀空虛胃無所仰虛氣上逆反硬滿也故太陽篇曰此非結熱但以胃中空虛客氣上逆故使硬也案以上二説以心下硬滿為虛滿假證此證世多有之然今考經文唯云心下硬滿並不拈出虛候故難信據焉陽明病面合色赤不可攻之必發熱色黃者小便不利也玉函成本色赤作赤色黃下無者字玉函必上更有攻之二字案無者字為是成合通也陽明病面色通赤者熱在經也不可下之下之虛其胃氣耗其津液經中之熱乘虛入胃必發熱色黃小便不利也柯面色正赤者陽氣怫鬱在表當以汗解而反下之熱不得越故復發熱而赤轉為黃也總因津液枯涸不能通調水道而然須梔子柏皮滋化源而致津液非滲泄之劑所宜矣汪氏云郭白雲曰既不可攻但茵陳蒿湯調五苓散服之太謬之極此與二陽並病面色緣緣正赤相同可小發汗宜桂枝加葛根湯以微汗之案張璐云下虛之人才感外邪則挾虛火而面色通紅總由真陽素虛無根之火隨表藥之性上升云云世素有此證然與本條之義不相干焉陽明病不吐不下心煩者可與調胃承氣湯玉函千金翼作不吐下而煩脈經同無調胃二字柯言陽明病則身熱汗出不惡寒反惡熱矣若吐下後而煩為虛邪宜梔子豉湯汪不吐不下者熱邪上不得越下不得泄郁胃腑之中其氣必上熏於膈則心煩煩悶而熱也錢但心煩不若潮熱便硬之胃實所以不必攻下而可與調胃承氣湯也張可與者欲人臨病裁酌不可竟行攻擊也舒案心煩一證陰陽互關宜加細察而後用藥調胃承氣不可輕試陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也原注一法與桂枝湯其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令至大泄下攻裡間玉函脈經有其字濈然下成本有而字汗多間玉函有出字外未解也下千金外臺有桂枝湯主之五字不通脈經千金作不大便勿令下成本無至字外臺至作致魏汗出太陽所有而不惡寒則太陽所無也身疼體痛太陽所有而身重則太陽所無也兼以短氣腹滿喘而潮熱純見里證而不見表證知此外之太陽病欲解而非解也乃轉屬陽明而陽明之胃實將成也考驗於此八者乃可攻裡無疑矣但攻裡又非一途更必於汗於熱辨之如手足濈然而汗出者胃熱盛而逼汗於四末津液知其內亡矣大便必已乾硬胃實之成確乎不易大承氣湯蕩積通幽何容緩乎若汗雖多而發熱反微且帶惡寒仍存於表可知矣再諦之於熱汗出雖多熱卻不潮則陽明之病未盡全仍當從太陽表治可也或病人患腹大滿不通者則胃家已有悶塞之徵小承氣調和胃氣下而非下勿令大泄下以傷正氣也張仲景既言脈遲尚未可攻而此證首言脈遲復言可攻者何也夫所謂脈遲尚未可攻者以腹中熱尚未甚燥結未定故尚未宜攻下攻之必脹滿不食而變結胸痞滿等證須俟脈實結定後方可攻之此條雖云脈遲而按之必實且其證一一盡顯胃實故當攻下無疑若以脈遲妨礙一切下證則大陷胸之下證最急者亦將因循縮手待斃乎程身重者經脈有所阻也表裡邪盛皆能令經脈阻邪氣在表而喘者滿或在胸而不在腹此則腹滿而喘知外欲解可攻裡也案程氏以脈遲為尚未可攻之遲脈柯氏錢氏為中寒無陽之遲脈並與經旨左矣錢氏云熱邪歸胃邪氣依附於宿食粕滓而鬱蒸煎迫致胃中之津液枯竭故發潮熱而大便硬也若不以大承氣湯下之必至熱邪敗胃譫語狂亂循衣摸床等變而至不救錫駒云四肢皆稟氣於胃手足汗出者陽明胃氣盛也舒氏云吾家有時宗者三月病熱豫與仲遠同往視之身壯熱而譫語苔刺滿口穢氣逼人少腹硬滿大便閉小便短脈實大而遲仲遠謂熱結在裡其人發狂小腹硬滿胃實而兼蓄血也法以救胃為急但此人年已六旬證兼蓄血下藥中宜重加生地黃一以保護元陰一以破瘀行血豫然其言主大承氣湯硝黃各用八錢加生地一兩搗如泥先炆數十沸乃納諸藥同煎連進五劑得大下數次人事貼然少進米飲一二口輒不食呼之不應欲言不言但見舌苔乾燥異常口內噴熱如火則知里燥尚未衰減復用犀角地黃湯加大黃三劑又下膠滯二次色如敗醬臭惡無狀於是口臭乃除里燥仍盛三四日無小便忽自取夜壺小便一回豫令其子取出視之半壺鮮血觀者駭然經言血自下下者愈亦生地之功也復診之脈轉浮矣此潰邪有向表之機合以柴胡湯迎其機而導之但此時表裡俱還熱極陰津所存無幾柴胡亦非所宜惟宜白虎湯加生地黃芩以救里倍用石膏之質重氣輕專達肌表而兼解外也如是二劑得微汗而脈靜身涼舌苔退而人事清矣再用清燥養榮湯二十劑而痊愈大承氣湯方厚朴半斤炙去皮枳實五枚炙芒硝三合大黃四兩酒洗外臺無酒洗字上四味以水一斗先煮二物取五升去滓納大黃更煮取二升去滓納芒硝更上微火一兩沸分溫再服得下余勿服成本煮上無更字微火作火微非也鑑諸積熱結於裡而成滿痞燥實者均以大承氣湯下之也滿者腹脅滿急䐜脹故用厚朴以消氣壅痞者心下痞塞硬堅故用枳實以破氣結燥者腸中燥屎乾結故用芒硝潤燥軟堅實者腹痛大便不通故用大黃攻積瀉熱然必審四證之輕重四藥之多少適其宜始可與也若邪重劑輕則邪氣不服邪輕劑重則正氣轉傷不可不慎也柯諸病皆因於氣穢物之不去由氣之不順也故攻積之劑必用氣分之藥故以承氣名湯煎法更有妙義大承氣用水一斗煮朴枳取五升去滓納大黃再煮取二升納芒硝何哉蓋生者氣鋭而先行熟者氣純而和緩仲景欲使芒硝先化燥屎大黃繼通地道而後枳朴除其痞滿若小承氣以三味同煎不分次第同一大黃而煎法不同此可見仲景微和之意也知調胃承氣大黃用酒浸大承氣大黃用酒洗皆為芒硝之鹹寒而以酒製之若小承氣不用芒硝則亦不事酒浸洗矣明理論曰承順也傷寒邪氣入胃者謂之入腑腑之為言聚也胃為水穀之海營衛之源水穀會聚於胃變化而為營衛邪氣入於胃也胃中氣鬱滯糟粕祕結壅而為實是正氣不得舒順也本草曰通可去滯泄可去邪塞而不利閉而不通以湯蕩滌使塞者利而閉者通正氣得以舒順是以承氣名之總病論凡脈沉細數為熱在裡又兼腹滿咽乾或口燥舌乾而渴者或六七日不大便小便自如或目中瞳子不明無外證者或汗後脈沉實者或下利三部脈皆平心下堅者或連發汗已不惡寒者或已經下其脈浮沉按之有力者宜大承氣湯醫壘元戎曰大承氣湯治大實大滿滿則胸腹脹滿狀若合瓦大實則不大便也痞滿燥實四證俱備則用之雜病則進退用之案王叔和傷寒例云若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也好古之説蓋原於此內臺方議曰仲景所用大承氣者二十五證雖曰各異然即下泄之法也其法雖多不出大滿大熱大實其脈沉實滑者之所當用也傷寒蘊要曰大抵下藥必切脈沉實或沉滑沉疾有力者可下也再以手按臍腹硬者或叫痛不可按者則下之無疑也凡下後不解者再按臍腹有無硬處如有手不可按下未盡也復再下之若下後腹中虛軟脈無力者此為虛也外臺崔氏承氣丸療十餘日不大便者於本方去厚朴加杏仁二兩蜜和丸如彈子以生薑湯六合研一丸服之須臾即通衛生寶鑑治發狂因觸冒寒邪失於解利因轉屬陽明證胃實譫語本方加黃連理傷續斷方大成湯一名大承氣湯治傷損瘀血不散腹肚膨脹大小便不通上攻心腹悶亂至死者急將此藥通下瘀血後方可服損藥於大承氣湯加甘草陳皮紅花當歸蘇木木通損藥乃本方小承氣湯醫經會解加味承氣湯治痢疾邪毒在裡於本方加黃連木香皂角刺本草匯言嘉祐方治傷寒熱實結胸鐵鏽磨水入承氣湯服之極驗醫學正傳治一人六月投淵取魚至深秋雨涼半夜小腹痛甚大汗脈沉弦細實重取如循刀責責然夫腹痛脈沉弦細實如循刀責責然陰邪固結之象便不當有汗今大汗出此必瘀血留結營氣不能內守而滲泄於外也且弦脈亦肝血受傷之候與大承氣加桂二服微利痛減連日於未申時復堅硬不可近與前藥加桃仁泥下紫血升余痛止脈雖稍減而責責然猶在又以前藥加川附子下大便四五行有紫黑血如破絮者二升而愈吳勉學匯聚單方余治一少年腹痛目不見人陰莖縮入喊聲徹天醫方灸臍愈痛欲得附子理中湯余偶過其門諸親友邀入余曰非陰症也主人曰晚於他處有失已審侍兒矣余曰陰症聲低少止呻吟耳今高厲有力非也脈之伏而數且弦肝為甚外腎為筋之會肝主筋肝火盛也肝脈繞陰莖肝開竅於目故目不明用承氣湯一服立止知有結糞在下故也凡痛須審察寒熱虛實諸症皆然久腹痛多有積宜消之醫方集解曰古人有治惡寒戰栗用大承氣下燥屎而愈者此陽邪入里熱結於裡表虛無陽故惡寒戰栗此陽盛格陰乃熱病非寒證誤投熱藥則死矣朱丹溪曰初下利腹痛不可用參朮然氣虛胃虛者可用初得之亦可用大承氣調胃承氣下之看其氣病血病然後加減用藥嘗治葉先生患滯下後甚逼迫正合承氣症但氣口虛形雖實而面黃白此必平昔過食傷胃寧忍二三日辛苦遂與參朮陳芍藥十餘帖至三日後胃氣稍完與承氣二帖而安苟不先補完胃氣之傷而遽行承氣寧免後患乎此先補後下例之變也傷寒直格曰活人書大承氣最緊小承氣次之調胃承氣又次之而緩下急下善開發而難鬱結可通用者大承氣湯最為妙也故今加甘草名曰三一承氣湯通治三承氣湯於效甚速而無加害也儒門事親曰大承氣湯劉河間加甘草以為三一承氣以甘和其中余嘗以大承氣改作調中湯加以薑棗煎俗見薑棗以為補脾胃而喜服衛生寶鑑曰若大承氣證反用調胃承氣治之則邪氣不散小承氣湯證反以大承氣湯下之則過傷正氣此仲景所以分而治之後之學者以此三藥合而為一且云通治三藥之證及傷寒雜病內外一切所傷與仲景之方甚相違背失軒岐緩急之旨使病人暗受其弊將誰咎哉小承氣湯方大黃四兩厚朴二兩炙去皮枳實三枚大者炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之千金翼作初服譫語即止服湯當更衣不爾盡服之外臺作若一服得利譫語止勿服之錢小承氣者即大承氣而小其制也大邪大熱之實於胃者以大承氣湯下之邪熱輕者及無大熱但胃中津液乾燥而大便難者以小承氣微利之以和其胃氣胃和則止非大攻大下之駃劑也以無大堅實故於大承氣中去芒硝又以邪氣未大結滿故減厚朴枳實也創法立方惟量其緩急輕重而增損之使無太過不及適中病情耳案錢氏云大黃四兩既名之曰小當是二兩漢之二兩即宋之五錢外分二次服耳此説無明證唯外臺崔氏承氣湯即本方用厚朴大黃各三兩枳實六片龐氏用大黃二兩而減厚朴一兩枳實一枚吳有性瘟疫論曰案三承氣湯功用倣佛熱邪傳裡但上焦痞滿者宜小承氣湯中有堅結者加芒硝軟堅而潤燥病久失下雖無結糞然多黏膩結臭惡物得芒硝則大黃有蕩滌之能設無痞滿惟存宿結而有瘀熱者調胃承氣宜之三承氣功效俱在大黃余皆治標之品也不耐藥湯者或嘔或畏當為細末蜜丸湯下醫壘元戎小承氣湯治痞實而微滿狀若飢人食飽腹中無轉失氣即大承氣只去芒硝心下痞大便或通熱甚宜此方金匱要略治腹滿痛而閉者厚朴三物湯即本方用厚朴八兩枳實五枚又治支飲胸滿厚朴大黃湯即本方用厚朴一尺大黃六兩枳實四枚直指方枳殼銼散治熱證脹滿於本方加桔梗甘草烏梅薑棗保命集順氣散治中熱在胃而能食小便赤黃微利至不欲食為效不可多利即本方又三化湯治中風邪氣作實二便不通於本方加羌活拔萃方順氣散消中者熱在胃而能飲食小便赤黃以此下之不可多利微微利至不欲食而愈即本方陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也不可與之成本脫可字玉函作勿與之此有燥屎也成本無也字轉失氣玉函並作轉矢氣其後發熱玉函作其後發潮熱周本錢本失作矢千金下二轉矢氣作轉氣成潮熱者實得大便微硬者便可攻之若不硬者則熱未成實雖有潮熱亦未可攻若不大便六七日恐有燥屎當先與小承氣賾正脈全書作漬汪校作探之如有燥屎小承氣湯藥勢緩不能宣泄必轉氣下失若不轉失氣是胃中無燥屎但腸間少硬爾止初頭硬後必溏攻之則虛其胃氣致腹脹滿不能食也胃中乾燥則欲飲水水入胃中虛寒相搏氣逆則噦其後卻發熱者則熱氣乘虛還復聚於胃中胃燥得熱必大便復硬而少與小承氣湯微利與全書作以和之故以重云不轉失氣不可攻內慎之至也知上條曰外欲解可攻裡曰外未解未可與承氣曰可與小承氣微和胃氣勿令大泄下此條曰可與曰不可與曰乃可攻之不可攻之曰少與小承氣曰以小承氣和之慎不可攻多少商量慎重之意故惟手足濈然汗出大便燥硬者始主之以大承氣若小承氣猶是微和胃氣之法也汪轉失氣則知其人大便已硬腸胃中燥熱亢甚故其氣不外宣時轉而下不轉失氣則腸胃中雖有熱而滲孔未至於燥此但初頭硬後必溏也黃仲理曰作五段看之錢氏云其後發熱句當從不轉矢氣句落下為是觀末句復云不轉矢氣者慎不可攻則前後照應顯然矣而注家謂攻後重復發熱胃熱至此方熾此必無之事下筆詳慎智慮周密者當不應若是魏氏曰欲飲水者以下細玩原文明系另起一頭腦而注家含混故文離愈甚案虛變為實寒轉為熱豈是必無之事發熱即言潮熱玉函可證成氏順文注釋卻覺允當舒氏云案此條原文止在攻之必脹滿不能食也文意已畢其下數句平空插入亦後人之誤案轉失氣傷寒直格謂動轉失泄之氣也為是條辨曰黃氏曰矢漢書作屎古屎矢通失傳寫誤續醫説醫學全書曰是下焦泄氣俗云去屁也考之篇韻屎矢通用竊恐傳寫之誤矢為失耳宜從轉矢氣為是且文理頗順若以失字則於義為難訓矣舒氏云案矢氣二字從前書中皆云失氣此誤也緣矢字誤寫出頭耳蓋矢與屎同矢氣者屁乃矢之氣也且失字之上無轉字之理轉乃轉運也以其氣由轉運而出若果失下夫何轉之有確為矢字無疑然考內經有失氣語咳而失氣氣與咳俱失之類是也乃改作矢者卻釜矣張兼善曰或問傷寒論中所言轉失氣者未審其氣何如若非腹中雷鳴滾動轉失氣也豫曰不然凡泄瀉之人不能瀉氣惟腹中雷鳴波動而已然滾動者水勢奔流則聲響泄氣者失氣下趨而為鼓瀉空虛則聲響充實則氣泄故腹滾與泄氣為不同耳其轉失氣先硬後溏者而氣猶不能轉也況大便不實者乎夫實則譫語虛則鄭聲鄭聲者重語也直視譫語喘滿者死下利者亦死也上玉函有是字外臺以鄭聲者重語也為細注直視以下成氏以降分為別條只志聰錫駒為一條錫此章統論譫語有虛實之不同生死之各異也實則譫語者陽明燥熱甚而神昏氣亂故不避親疏妄言罵詈也虛則鄭聲者神氣虛而不能自主故聲音不正而語言重復即素問所謂言而微終日乃復言者是也直視者精不灌目目系急而不轉也夫譫語當無死證若喘滿者脾肺不交而氣脫於上故死下利者脾液不收而氣陷於下亦死鄭聲者即譫語之聲聆其聲有不正之聲輕微重復之語即是鄭聲非譫語之中別有一種鄭聲也故止首提鄭聲而後無鄭聲之證張喘滿者邪乘陽位而上爭氣從上脫故主死下利者邪聚陰位而下奪氣從下脫亦死也設譫語內結下旁流清水者又不可誤認死證也錢喘則膻中迫促而氣不接滿則傳化不通而胃氣絶故死證治要訣曰譫語者顛倒錯亂言出無倫常對空獨語如見鬼狀鄭聲者鄭重頻繁語雖謬而諄諄重復不自已年老之人遇事則誶語不休以陽氣虛也二者本不難辨須以他證別之大便祕小便赤身熱煩渴而妄言者乃里實之譫語也小便如常大便洞下或發躁或反發熱而妄言者乃陰隔陽之譫語也此譫語鄭聲虛實所以不同也醫學綱目曰譫語者謂亂語無次第數數更端也鄭聲者謂鄭重頻煩也只將一句舊言重疊頻言之終日殷勤不換他聲也蓋神有餘則能機變而亂語數數更端神不足則無機變而只守一聲也成無己謂鄭聲為鄭衛之聲非是傷寒選録曰鄭聲説過又説也舒氏云李肇夫曰重字讀平聲重語當是絮絮叨叨説了又説綱語呢喃聲低息短身重惡寒與譫語之聲雄氣粗身輕惡熱者迥別發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死玉函重發汗下無者字有若已下復發其汗七字句多下無若字汪此係太陽病轉屬陽明譫語之證本太陽經得病時發汗多轉屬陽明重發其汗汗多亡陽汗本血之液陽亡則陰亦虧津血耗竭胃中燥實而譫語譫語者脈當弦實或洪滑為自和自和者言脈與病不相背也是病雖甚不死若譫語脈短者為邪熱盛正氣衰乃陽證見陰脈也以故主死或以陽亡為脫陽脫陽者見鬼故譫語擬欲以四逆湯急回其陽大誤之極柯亡陽即津液越出之互辭案方氏以此條為太陽經錯簡喻氏辨其誤是也程氏錫駒並以此條證為脫陽亦非是傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安原注一云順衣妄撮怵惕不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利則止後服成本止上脫則字晡下所字玉函作時摸床玉函作撮空脈經作妄撮龐氏亦作妄撮注云常見有此撮空候故改之惕而玉函脈經作怵惕脈經譫語下無者字是五六日下無上字汪此條舉譫語之勢重者而言傷寒若吐若下後津液亡而邪未盡去是為不解邪熱內結不大便五六日上至十餘日此為可下之時日晡所發潮熱者腑實燥甚故當其王時發潮熱也不惡寒者表證罷也獨語者即譫語也乃陽明腑實而妄見妄聞病劇則不識人劇者甚也熱氣甚大昏冒正氣故不識人循衣摸床者陽熱偏勝而躁動於手也惕而不安者胃熱沖膈心神為之不寧也又胃熱甚而氣上逆則喘今者喘雖微而直視直視則邪干臟矣故其死生之際須於脈候決之後條辨云以上見證莫非陽亢陰絶孤陽無依而擾亂之象弦澀皆陰脈脈弦者為陰未絶猶帶長養故可生脈澀者為陰絶已成涸竭以故云死其熱邪微而未至於劇者但發潮熱譫語宜以大承氣湯下胃中實熱腸中燥結一服利止後服者蓋大承氣雖能抑陽通陰若利而再服恐下多反亡其陰必至危殆可不禁之錢傷寒法當先汗此但曰若吐若下後不解明是當汗不汗而誤吐誤下以致外邪內陷而不解也柯如見鬼狀獨語與鄭聲譫語不同潮熱不惡寒不大便是可下證目直視不識人循衣摸床等症是日晡發熱時事不發熱自安故勿竟斷為死症凡直視譫語喘滿者死此微喘而不滿也傷寒準繩趙嗣真云此段當分作三截看自傷寒云云止如見鬼狀為上一截是將潮熱譫語不惡寒不大便對為現證下文又分作一截以辨劇者微者之殊微者但發熱譫語但字為義以發熱譫語之外別無他證又云弦者陽也澀者陰也陽病見陰脈者生在仲景法中弦澀者屬陰不屬陽得無疑乎金鑑曰今觀本文內脈弦者生之弦字當是滑字若是弦字弦為陰負之脈豈有必生之理惟滑脈為陽始有生理滑者通澀者塞凡物理皆以通為生塞為死玩後條脈滑而疾者小承氣主之脈微澀者裡虛為難治益見其誤案辨脈以弦為陰脈故金鑑依趙氏之言有此説然而弦與滑字形音韻迥別決無相誤之理汪注原於成氏為允當不復容他議也弦義詳豫所著脈學輯要本事方曰有人病傷寒大便不利日晡發潮熱手循衣縫兩手撮空直視喘急更數醫矣見之皆走此誠惡候得之者十中九死仲景雖有證而無法但云脈弦者生澀者死已經吐下難以下藥謾且救之若大便得通而脈弦者庶可治也與小承氣湯一服而大便利諸疾漸退脈且微弦半月愈豫嘗觀錢仲陽小兒直訣云手尋衣領及捻物者肝熱也此證在玉函列於陽明部蓋陽明者胃也肝有熱邪淫於胃經故以承氣瀉之且得弦脈則肝平而胃不受克此所謂有生之理讀仲景論不能博通諸醫書以發明其隱奧吾未之見也張氏直解曰丁巳秋豫治一婦人傷寒九日發狂面白譫語不識人循衣摸床口目瞤動肌肉抽搐遍身手足盡冷六脈皆脫死證悉具諸醫皆辭不治豫因審視良久聞其聲重而且長句句有力乃曰此陽明內實熱鬱於內故令脈道不通非脫也若真元敗絶而脈脫必氣息奄奄不久即死安得有如許氣力大呼疾聲久而不絶乎遂用大承氣湯啓齒而下夜間解黑糞滿床脈出身熱神清舌燥而黑更服小陷胸湯二劑而愈因思此症大類四逆若誤投之立死硝黃固不可以誤投參附又豈可以輕試也哉金鑑曰循衣摸床危惡之候也大抵此證多生於汗吐下後陽氣大虛精神失守經曰四肢諸陽之本也陽虛故四肢擾亂失所倚也以獨參湯救之汗多者以參耆湯厥冷者以參附湯治之愈者不少不可概謂陽極陰竭也陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止者更莫復服成本止下無者字程陽明病法多汗其人又屬汗家則不必發其汗而津液外出自致胃燥便硬而譫語證在虛實之間故雖小承氣湯亦只一服為率譫語止更莫後服者雖燥硬未全除輒於實處防虛也柯多汗是胃燥之因便硬是譫語之根一服譫語止大便雖未利而胃濡可知矣周經云少陽不可發汗發汗則譫語者今自汗亦如是耶汪武陵陳氏亮斯云大承氣證必如前條不大便五六日或至十餘日之久漸漸搏實而後用之今則汗多燥硬而譫語其機甚速此亡津液之故而非漸漸搏實雖堅而不大滿故止當用小承氣主之且津液不足非大承氣所宜服藥後譫語雖止即未大便亦莫盡劑恐過傷元氣耳陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉氣者更服一升若不轉氣者勿更與之明日又不大便脈反微澀者裡虛也為難治不可更與承氣湯也轉氣成本並作轉失氣玉函作轉矢氣成本脫勿上者字及又字千金翼譫語下有妄言二字脈經千金翼無小承氣湯之小字成陽明病譫語發潮熱若脈沉實者內實者也則可下若脈滑疾為裡熱未實則未可下先與小承氣湯和之湯入腹中得失氣者中有燥屎可更與小承氣湯一升以除之若不轉失氣者是無燥屎不可更與小承氣湯至明日邪氣傳時脈得沉實緊牢之類是裡實也反得微澀者裡氣大虛也若大便利後脈微澀者止為裡虛而猶可此不曾大便脈反微澀是正氣內衰為邪氣所勝故云難治魏滑雖熱盛於裡之兆而疾則熱未成實之徵熱之初傳入腑脈又變沉大而兼帶遲滯之象遲乃疾之對向之滑疾今乃沉大而遲滯斯見胃以成實矣今脈見滑疾是猶帶數熱變而傳入尚未堅凝結聚小承氣湯主之消熟調津足以已病矣柯虛甚者與四逆湯陰得陽則解矣汪氏云案後條辨云譫語潮熱脈反微澀為裡氣大虛並前此之脈滑疾亦屬虛陽泛上之假象其言似是而非愚以譫語潮熱脈滑疾者乃陽證見陽脈其人邪氣盛而正氣未衰也故云可與承氣湯脈反微澀者是陽證見陰脈其人邪氣盛正氣衰故云不可更與承氣湯也不轉失氣並不大便非腸中空虛而無物乃胃家正氣既衰雖得湯藥內助其惡濁之物仍然不能下泄故云難治後之人議用補虛回陽之法是與仲景初時用承氣之意相反補亡論常器之云可用黃耆人參建中湯亦與論不合大抵此條病但云難治其非不治之證明矣如欲用藥還宜補瀉兼施之劑案白虎證脈滑方氏以降多以宿食解之蓋原於脈訣不可從也陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若不能食者但硬耳宜大承氣湯下之耳成本作爾反上玉函脈經有而字玉函無宜字脈經無大承氣之大宜大承氣湯主之七字柯本移在若能食者上張本同周氏義同金鑑以為錯誤非也張此以能食不能食辨燥結之微甚也詳仲景言病人潮熱譫語皆胃中熱盛所致胃熱則能消穀今反不能食此必熱傷胃中津液氣化不能下行燥屎逆攻於胃之故宜大承氣湯急祛亢極之陽以救垂絶之陰若能食者胃中氣化自行熱邪原不為盛津液不致大傷大便雖硬而不久自行不必用藥反傷其氣也若以能食便硬而用承氣殊失仲景平昔顧慮津液之旨汪補亡論宜大承氣湯下之句在若能食者之前蓋能食既異治法必不相同仲景法宜另以調胃承氣湯主之也周案大承氣湯宜單承燥屎五六枚來何者至於不能食為患已深故宜大下若能食但硬未必燥屎五六枚口氣原是帶説只宜小承氣湯可耳此事難知曰胃實者非有物也地道塞而不通也難經云胃上口為賁門胃下口為幽門幽門接小腸上口小腸下口即大腸上口也大小二腸相會為闌門水滲泄入於膀胱粗滓入於大腸結廣腸廣腸者地道也地道不通土壅塞也則火逆上行至胃名曰胃實所以言陽明當下者言上下陽明經不通也言胃中有燥屎五六枚者非在胃中也言胃是連及大腸也案魏氏云胃中必有燥屎五六枚阻塞於胃底腸間此言得之徐靈胎云案燥屎當在腸中今云胃中何也蓋邪氣結成糟粕未下則在胃中欲下則在腸中已續者即謂之燥屎言胃則腸已該矣又云不能食者客熱不能消穀能食非真欲食不過粥飲猶入口耳不能食則穀氣全不近腸胃實極故也案陽明病譫語潮熱燥結甚者皆不能食而今下一反字為可疑矣注家消穀之説乃是熱中消疸證邪熱不殺穀傷寒家之常何言之反順文解釋往往有如是者又案程氏錢氏志聰錫駒不論不能食與能食並以大承氣湯為主非也陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而寫之濈然汗出則愈寫成本作瀉玉函千金翼刺上有當字則上有者字脈經同金匱要略婦人雜病篇有此條刺上有當字則作者汪案此條當亦是婦人病邪熱鬱於陽明之經迫血從下而行血下則經脈空虛熱得乘虛而入其室亦作譫語後條辨云血室雖衝脈所屬而心君實血室之主室被熱擾其主必昏故也但頭汗出者血下奪則無汗熱上擾則汗蒸也刺期門以瀉經中之實則邪熱得除而津液回覆遂濈然汗出而解矣或問此條病仲景不言是婦人所以尚論諸家直指為男子今子偏以婦人論之何也余答云仲景於太陽篇中一則曰婦人中風云云經水適來此為熱入血室再則曰婦人中風云云經水適斷此為熱入血室三則曰婦人傷寒云云經水適來此為熱入血室則是熱入血室明系婦人之證至此實不待言而可知矣且也此條言下血當是經水及期而交錯妄行以故血室有虧而邪熱得以乘之故成熱入血室之證考之靈樞海論云衝脈為十二經之海注云此即血海也衝脈起於胞中又考素問天真論云女子二七而天癸至任脈通太衝脈盛月事以時下夫任也沖也其經脈皆行於腹故其血必由前陰而下斯血室有虧邪熱方得而入則是仲景云下血乃經水交錯妄行又不問而自明矣金鑑曰血已止其熱不去蓄於陽明不得外越而上蒸故但頭汗出也錢氏云肝為藏血之臟邪既入血則熱邪實滿於經脈故刺之以泄其實邪然不以桃仁承氣及抵當等湯治之者仲景原云毋犯胃氣及上二焦蓋以此也案此條證喻氏斷為男子病方氏三陽志聰錫駒柯氏周氏皆為男女俱有之證金鑑則與喻同特汪氏以婦人論之可謂超卓之見矣然不知血室即是胞殊可惜耳程氏魏氏錢氏並無男女之説疑是疑而不決歟汗出原注汗一作臥譫語者以有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛里實故也下之愈宜大承氣湯原注一云大柴胡湯成本玉函下者作下之愈上有則字成胃中有燥屎則譫語以汗出為表未罷故云風也燥屎在胃則當下以表未和則未可下須過太陽經無表證乃可下之三陽明多汗況有譫語故又當下但風家有汗恐汗出則表未罷故頭過經可下若早燥屎雖除表邪乘虛復陷又將為表虛里實矣下之則愈二句又申明乃可下之一句耳錢氏云若下早則胃氣一虛外邪內陷必至熱盛神昏語言必亂蓋以表間之邪氣皆陷入於裡表空無邪邪皆在裡故謂之表虛里實也汪氏云補亡論以末二句移之過經乃可下之句下誤矣案補亡論移原文者固誤矣然而經旨必當如此耳又案魏氏以此條證為內經所謂胃風腸風汪氏則為風燥症並非也傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語張傷寒四五日正熱邪傳裡之時況見脈沉喘滿里證已具而反汗之必致燥結譫語矣蓋燥結譫語頗似大承氣證此以過汗傷津而不致大實大滿腹痛止宜小承氣為允當耳舒脈沉而喘滿則知為陽明宿燥阻滯濁氣上干而然也故曰沉為在裡明非表也而反發其汗則津越便難而成實矣至久則譫語者自宜大承氣湯此因奪液而成燥者原非大熱入胃者比故仲景不出方尚有微甚之斟酌耳方越出謂枉道而出也三陽合病腹滿身重難以轉側口不仁面垢原注又作枯一云向經譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之口下脈經有中字成本玉函面上有而字面垢二字千金翼作言語向經四字則譫語玉函作則譫語甚逆冷作厥冷千金翼同鑑三陽合病者必太陽之頭痛發熱陽明之惡熱不眠少陽之耳聾寒熱等證皆具也太陽主背陽明主腹少陽主側今一身盡為三陽熱邪所困故身重難以轉側也胃之竅出於口熱邪上攻故口不仁也陽明主面熱邪蒸越故面垢也熱結於裡則腹滿熱盛於胃故譫語也熱迫膀胱則遺尿熱蒸肌腠故自汗也證雖屬於三陽而熱皆聚胃中故當從陽明熱證主治也若從太陽之表發汗則津液愈竭而胃熱愈深必更增譫語若從陽明之裡下之則陰益傷而陽無依則散故額汗肢冷也要當審其未經汗下而身熱自汗出者始為陽明的證宜主以白虎湯大清胃熱急救津液以存其陰可也柯裡熱而非裡實故當用白虎而不當用承氣若妄汗則津竭而譫語誤下則亡陽而額汗出手足厥也此自汗出為內熱甚者言耳接遺尿句來若自汗而無大煩大渴證無洪大浮滑脈當從虛治不得妄用白虎若額上汗出手足冷者見煩渴譫語等證與洪滑之脈亦可用白虎湯方口不仁謂不正而飲食不利便無口之知覺也錢云靈樞曰胃和則口能知五味矣此所云口不仁是亦陽明胃家之病也方云生汗生不流也案手足逆冷成氏程氏魏氏汪氏宗印皆為熱厥誤矣周氏以此條移於溫病熱病篇亦非也又案玉函則譫語下有甚字文意尤明矣三陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯成本太陽病並於陽明名曰並病太陽證罷是無表證但發潮熱是熱並陽明一身汗出為熱越今手足漐漐汗出是熱聚於胃也必大便難而譫語經曰手足漐然而汗出者必大便已硬也與大承氣湯以下胃中實熱柯太陽症罷是全屬陽明矣先揭二陽並病者見未罷時便有可下之症今太陽一罷則種種皆下症陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之反惡熱脈經千金翼作反偏惡熱心下千金翼有中字溫針成本作燒針舌上胎總病論作苔生舌上玉函千金翼無加人參三字鑑此條表裡混淆脈證錯雜不但不可誤下亦不可誤汗也若以脈浮而緊誤發其汗則奪液傷陰或加燒針必益助陽邪故譫語煩躁怵惕憒亂不眠也或以證之腹滿惡熱而誤下之則胃中空虛客氣邪熱擾動胸膈心中懊憹舌上生苔是皆誤下之過宜以梔子豉湯一湧而可安也若脈浮不緊證無懊憹惟發熱渴欲飲水口乾舌燥者為太陽表邪已衰陽明燥熱正甚宜白虎加人參湯滋液以生津若發熱渴欲飲水小便不利者是陽明飲熱並盛宜豬苓湯利水以滋干成舌上苔黃者熱氣客於胃中舌上苔白知熱氣客於胸中與梔子豉湯以吐胸中之邪柯連用五若字見仲景設法御病之詳梔豉湯所不及者白虎湯繼之白虎湯不及者豬苓湯繼之此陽明起手之三法所以然者總為胃家惜津液既不肯令胃燥亦不肯令水漬入胃耳程熱在上焦故用梔子豉湯熱在中焦故用白虎加人參湯熱在下焦故用豬苓湯汪陳亮斯云案本文汗下燒針獨詳言誤下治法者以陽明一篇所重在下故辨之獨深悉焉喻云汗出不惡寒反惡熱身重四端則皆陽明之見症錢云舌上苔當是邪初入里胃邪未實其色猶未至於黃黑焦紫必是白中微黃耳案若脈浮之浮其義未詳魏氏錢氏錫駒並云表邪未盡果然則與五苓散證何別汪氏云非風邪在表之脈浮乃熱邪傷氣之脈浮也此亦未見經中有其説張氏乃以此條編入溫熱病篇云傷寒小便不利以脈浮者屬氣分五苓散脈沉者屬血分豬苓湯而溫熱病之小便不利脈浮者屬表證豬苓湯脈沉者屬裡證承氣湯此説亦是臆造經無明文不可從也特活人書若傷寒引飲下焦有熱小便不通脈浮者五苓散脈沉者豬苓湯王氏則云此條浮字誤也若脈字下脫一不字矣成氏直以脈浮釋之而朱氏卻以脈沉言之胥失之矣若曰脈浮者五苓散不浮者豬苓湯則得仲景之意矣蓋其作沉作不浮未知本經舊文果然否然推之於處方之理極覺明確故姑從其説焉汪昂云改脈浮為不浮方書中無此文法案喻氏云四段總頂首段醫學綱目引本條云陽明病脈浮緊咽燥口苦腹滿發熱汗出不惡寒若下後脈浮發熱渴欲飲水小便不利者豬苓湯主之正與喻意符矣汪氏云白虎湯證即或有小便不利者但病人汗出多水氣得以外泄今觀下條云汗出多不可與豬苓湯乃知此證其汗亦少汗與溺俱無則所飲之水安得不停故用豬苓湯上以潤燥渴下以利濕熱也又云今人病熱大渴引飲飲愈多則渴愈甚所飲之水既多一時小便豈能盡去況人既病熱則氣必偏勝水自趨下火自炎上此即是水濕停而燥渴之徵故豬苓湯潤燥渴而利濕熱也豬苓湯方豬苓去皮滑石碎各一兩外臺有綿裹二字茯苓阿膠外臺有炙字澤瀉上五味以水四升先煮四味取二升去滓納阿膠煬消溫服七合日三服成本納下有下字煬消玉函作消盡鑑趙羽皇曰仲景制豬苓湯以行陽明少陰二經水熱然其旨全在益陰不專利水蓋傷寒表虛最忌亡陽而裡虛又患亡陰亡陰者亡腎中之陰與胃家之津液也故陰虛之人不但大便不可輕動即小水亦忌下通倘陰虛過於滲利則津液反致竭方中阿膠質膏養陰而滋燥滑石性滑去熱而利水佐以二苓之滲瀉既疏濁熱而不留其壅瘀亦潤真陰而不苦其枯燥是利水而不傷陰之善劑也故利水之法於太陽用五苓加桂者溫之以行水也於陽明少陰用豬苓加阿膠滑石者潤之以滋養無形以行有形也利水雖同寒溫迥別惟明者知之醫方考曰四物皆滲利則又有下多亡陰之懼故用阿膠佐之以存津液於決瀆爾陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也成針經曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺天熱衣厚則為汗是汗溺一液也汗多為津液外泄胃中乾燥故不可與豬苓湯利小便也案針經文出五癃津液別論柯汗多而渴當白虎湯胃中燥當承氣湯具在言外案魏氏云若見虛則炙甘草之證實則調胃承氣之證炙甘草蓋為不對矣脈浮而遲表熱裡寒下利清穀者四逆湯主之錢此與少陰厥陰裡寒外熱同義若風脈浮而表熱則浮脈必數今表雖熱而脈遲則知陰寒在裡陰盛格陽於外而表熱也虛陽在外故脈浮陰寒在裡故脈遲所以下利清穀此為真寒假熱故以四逆湯祛除寒氣恢復真陽也若以為表邪而汗之則殆矣魏此雖有表證且不治表而治里則雖有陽明假熱之證寧容不治真寒而治假熱乎是皆學者所宜明辨而慎出之者也案此其實少陰病而假現汗出惡熱等陽明外證者故特揭出斯篇方氏云此疑三陰篇錯簡恐不然也若胃中虛冷不能食者飲水則噦玉函冷下有其人二字千金翼無若字脈經若上有陽明病三字冷下有其人二字是錫此論陽明中焦虛冷也若者承上文而言也言不特下焦生陽不啓而為虛寒即中焦火土衰微而亦虛冷也夫胃氣壯則谷消而水化若胃中虛冷則谷不消而不能食夫既不能食則水必不化兩寒相得是以發噦汪武陵陳氏云法當大溫上節已用四逆故不更言治法愚案常器之云宜溫中湯然不若用茯苓四逆湯即四逆湯中加人參以補虛茯苓以利水也鑑宜理中湯加丁香吳茱萸溫而降之可也脈浮發熱口乾鼻燥能食者則衄王肯堂校千金翼鼻作舌魏脈浮發熱太陽病尚有存者而口乾鼻燥能食雖陽明裡證未全成陽明內熱已太盛熱盛則上逆上逆則引血血上則衄此又氣足陽亢之故熱邪亦隨之而泄錫能食者則衄言病不在胃非因能食而致衄也汪常器之云可與黃芩湯愚云宜犀角地黃湯案舒氏云熱病得衄則解能食者胃氣強邪當自解故曰能食者則衄俗謂紅衣傷寒不治之證何其陋也太陽發衄者曰衄乃解曰自衄者愈以火劫致變者亦云邪從衄解即以陰邪激動營血者尚有四逆湯可救安見衄證皆為不可治乎大抵俗醫見衄概以寒涼冰凝生變釀成不治故創此名色以欺世而逃其責耳陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之脈經千金翼飢上有若字汪此亦陽明病誤下之變證陽明誤下邪熱雖應內陷不比太陽病誤下之深故其身外猶有餘熱手足溫不結胸手足溫者徵其表和而無大邪不結胸者徵其里和而無大邪表裡已無大邪其邪但在胸膈之間以故心中懊憹飢不能食者言懊憹之甚則似飢非飢嘈雜不能食也但頭汗出者成注云熱自胸中熏蒸於上故但頭汗出而身無汗也志梔豉湯解心中之虛熱以下交則上下調和而在外之熱亦清矣陽明病發潮熱大便溏小便自可胸脅滿不去者與小柴胡湯成本無與字湯下有主之二字玉函同胸上有而字千金翼同王陽明為病胃實是也今便溏而言陽明病者謂陽明外證身熱汗出不惡寒反惡熱之病也成陽明病潮熱為胃實大便硬而小便數今大便溏小便自可則胃熱未實而水穀不別也大便溏者應氣降而胸脅滿去今反不去者邪氣猶在半表半裡之間與小柴胡湯以去表裡之邪錢蓋陽明雖屬主病而仲景已云傷寒中風有柴胡證但見一證便是不必悉具故凡見少陽一證便不可汗下惟宜以小柴胡湯和解之也陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解成本解下有也字成陽明病腹滿不大便舌上苔黃者為邪熱入腑可下若脅下硬滿雖不大便而嘔舌上白苔者為邪未入腑在表裡之間與小柴胡湯以和解之上焦得通則嘔止津液得下則胃氣因和汗出而解錢不大便為陽明裡熱然嘔則又少陽證也若熱邪實於胃則舌苔非黃即黑或乾硬或芒刺矣舌上白苔為舌苔之初現若夫邪初在表舌尚無苔既有白苔邪雖未必全在於表然猶未盡入於裡故仍為半表半裡之證方津液下大便行也程脅下硬痛不大便而嘔自是大柴胡湯證其用小柴胡湯者以舌上白苔猶帶表寒故也若苔不滑而澀則所謂舌上乾燥而煩欲飲水數升之謂熱已耗及津液此湯不可主矣錫不大便者下焦不通津液不得下也嘔者中焦不治胃氣不和也舌上白苔者上焦不通火鬱於上也可與小柴胡湯調和三焦之氣上焦得通而白苔去津液得下而大便利胃氣因和而嘔止三焦通暢氣機旋轉身濈然汗出而解也陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治成本玉函目上有面字脈經注云按之氣不通一作按之不痛正脈腹都作腹部方弦少陽浮太陽大陽明脅下痛少陽也小便難太陽之膀胱不利也腹滿鼻乾嗜臥一身及面目悉黃潮熱陽明也時時噦三陽具見而氣逆甚也耳前後腫陽明之脈出大迎循頰車上耳前太陽之脈其支者從巔至耳少陽之脈下耳後其支者從耳後入耳中出走耳前也然則三陽俱見證而曰陽明者以陽明居多而任重也錢久按之氣不通者言不按已自短氣若久按之則氣愈不通蓋言其邪氣充斥也嗜臥陽明裡邪也小便難者邪熱閉塞三焦氣化不行也若小便利則不能發黃矣程此條證以不得汗三字為主蓋風熱兩壅陽氣重矣怫鬱不得越欲出不得出欲入不得入經纏被擾無所不至究竟無宣泄處故見證如此刺法從經脈中泄其熱耳其風邪被纏者固未去也故紆而緩之乃酌量於柴胡麻黃二湯間以通其久閉總是要得汗耳不尿腹滿加噦胃氣已竭而三焦不復流通邪永無出路矣柯本條不言發熱看中風二字便藏表熱在內外不解即指表熱而言即暗伏內已解句病過十日是內已解之互文也當作外不解句上無餘證句接外不解句來刺之是刺足陽明隨其實而瀉之少瘥句言內能俱減但外證未解耳非刺耳前後其腫少瘥之謂也脈弦浮者向之浮大減小而弦尚存是陽明之證已罷惟少陽之表邪尚存故可用小柴胡以解外若脈但浮而不弦大則非陽明少陽脈無餘證則上文諸證悉罷是無陽明少陽證惟太陽之表邪未散故可與麻黃湯以解外若不尿腹滿加噦是接耳前後腫來此是內不解故小便難者竟不尿腹部滿者竟不減時時噦者更加噦矣非刺後所致亦非用柴胡麻黃後變證也志耳前後腫即傷寒中風之發頤證但發頤之證有死有生陰陽並逆者死氣機旋轉者生朱氏曰此與太陽篇中十日以去胸滿胸痛者與小柴胡湯脈但浮者與麻黃湯同一義也案出第三十七條中篇金鑑云此等陰陽錯雜表裡混淆之證但教人俟其病勢所向乘機而施治也故用刺法待其小瘥案金鑑云續浮之浮字當是弦字始與文義相屬則可與小柴胡湯若俱是浮字則上之浮既宜用小柴胡湯下之浮又如何用麻黃湯耶此説近是陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導成本及下有與字玉函脈經豬上無大字成津液內竭腸胃乾燥大便因硬此非結熱故不可攻宜以藥外治而導引之鑑陽明病自汗出或發汗小便自利者此為津液內竭雖大便硬而無滿痛之苦不可攻之當待津液還胃自欲大便燥屎已至直腸難出肛門之時則用蜜煎潤竅滋燥導而利之或土瓜根宣氣通燥或豬膽汁清熱潤燥皆可為引導法擇而用之可也柯連用三自字見胃實而無變證者當任其自然而不可妄治更當探苦欲之情於欲大便時因其勢而利導之不欲便者宜靜以俟之矣案方氏云雖上或下當有大便二字可謂拘矣汪氏云或問小便自利大便硬何以不用麻仁丸余答云麻仁丸治胃熱尿結於回腸以內茲者胃無熱證屎已近肛門之上直腸之中故云因其勢而導之也蜜煎方成本作蜜煎導食蜜七合成本玉函千金翼無食字上一味於銅器內微火煎當須凝如飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以納穀道中以手急抱欲大便時乃去之疑非仲景意已試甚良又大豬膽一枚瀉汁和少許法醋以灌穀道內如一食頃當大便出宿食惡物甚效成本玉函於銅器內作納銅器中當須作之稍如作似無疑以下九字和少許法醋作和醋少許穀道內作穀道中無宿以下六字正脈攪作擾玉函欲可丸作俟可丸成本大豬膽上無又字方本挺下有子字王本並手作以手抱字作捺住二字汪內臺方用蜜五合煎凝時加皂角末五錢蘸捻作挺以豬膽汁或油潤穀道納之豬膽汁方不用醋以小竹管插入膽口留一頭用油潤納入穀道中以手將膽捻之其汁自入內此法用之甚便土瓜根方缺肘後方治大便不通土瓜根採根搗汁筒吹入肛門內取通此與上豬膽方同義內臺方用土瓜根削如挺納入穀道中誤矣蓋蜜挺入穀道能煬化而潤大便土瓜根不能煬化如削挺用之恐失仲景制方之義志聰本蜜煎後有或用土瓜根搗汁竹管灌入穀道十三字蓋據肘後補添者錢本蜜煎及豬膽汁法與原文異今録下蜜煎導法白蜜七合一味入銅銚中微火煎老試其冷則硬勿令焦入豬牙皂角末少許熱時手捻作挺令頭鋭根凹長寸半者三枚待冷硬蘸油少許納穀道中其次以鋭頭頂凹而入三枚盡以布著手指抵定若即欲大便勿輕去俟先入者已化大便急甚有旁流者出方去手隨大便出豬膽導法極大豬膽一枚用蘆管長三寸余通之磨光一頭以便插入穀道用尖鋒刀刺開膽口以管插入膽中用線扎定管口抹油捻入穀道插盡蘆管外以布襯手用力捻之則膽汁盡入方去之少頃大便即出傷寒準繩曰凡多汗傷津或屢汗不解或尺中脈遲弱元氣素虛人便欲下而不能出者並宜導法但須分津液枯者用蜜導邪熱盛者用膽導濕熱痰飲固結薑汁麻油浸栝蔞根導惟下旁流水者導之無益非諸承氣湯攻之不效以實結在內而不在下也至於陰結便閉者宜於蜜煎中加薑汁生附子末或削陳醬薑導之凡此皆善於推廣仲景之法者也外臺祕要崔氏胃中有燥糞令人錯語正熱盛令人錯語宜服承氣湯亦應外用生薑兌讀作鋭下同使必去燥糞薑兌法削生薑如小指長二寸鹽塗之納下部中立通三因方蜜兌法蜜三合鹽少許煎如餳出冷水中捏如指大長三寸許納下部立通得效方蜜兌法蜜三合入豬膽汁兩枚在內煎如飴以井水出冷候凝捻如指大長三寸許納下部立通活人書單用蜜一法入皂角末在人斟酌用一法入薄荷末代皂角用尤好又或偶無蜜只嚼薄荷以津液調作挺用之亦妙丹溪心法凡諸祕服藥不通或兼他證又或老弱虛極不可用藥者用蜜熬入皂角末少許作兌以導之冷祕生薑兌亦可丹溪纂要蜜導方以紙捻為骨便醫學入門白蜜半盞於銅杓內微火熬令滴水不散入皂角末二錢攪勻捻成小棗大長寸兩頭鋭蘸香油推入穀道中大便即急而去如不通再易一條外以布掩肛門須忍住蜜待糞至方放開布吳儀洛方論海藏法用蜜煎鹽相合或草烏頭末相合亦可蓋鹽能軟堅潤燥草烏能化寒消結可隨證陰陽所宜而用之陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯玉函千金翼脈上有其字多下有而字汪此條言陽明病非胃家實之證乃太陽病初傳陽明經中有風邪也脈遲者太陽中風緩脈之所變傳至陽明邪將入里故脈變遲汗出多者陽明熱而肌腠疏也微惡寒者太陽在表之風邪未盡解也治宜桂枝湯以解肌發汗以其病從太陽經來故仍從太陽經例治之金鑑曰汗出多之下當有發熱二字若無此二字脈遲汗出多微惡寒乃是表陽虛桂枝附子湯證也豈有用桂枝湯發汗之理乎必是傳寫之遺案揭以陽明病三字其發熱可不須言而知也金鑑之説卻非是也陽明病脈浮無汗而喘者發汗則愈宜麻黃湯而字玉函千金翼作其人必三字無者字鑑是太陽之邪未悉入陽明猶在表也當仍從太陽傷寒治之發汗則愈錢此條脈證治法皆寒傷營也若無陽明病三字不幾列之太陽篇中而仲景何故以陽明病冠之邪蓋以太陽篇曰惡寒體痛脈陰陽俱緊者名曰傷寒其次條又曰惡風無汗而喘者麻黃湯主之此條雖亦無汗而喘然無惡風惡寒之證即陽明所謂不惡寒反惡熱之意是以謂之陽明病也陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之汗出上玉函有而字無汗出者之者字成本同身無汗之汗千金翼外臺作有劑玉函千金翼作齊玉函成本千金翼無蒿字程本劑作躋金鑑同方本引作飲喻程諸本並同成但頭汗出身無汗劑頸而還者熱不得越也小便不利渴飲水漿者熱甚於胃津液內竭也胃為土而色黃胃為熱蒸則色奪於外必發黃也與茵陳湯逐熱退黃程無汗而小便利者屬寒無汗而小便不利者屬濕熱兩邪交郁不能宣泄故盦而發黃解熱除郁何黃之不散也柯身無汗小便不利不得用白虎瘀熱發黃內無津液不得用五苓故制茵陳湯以佐梔子承氣之所不及也汪昂云熱外越而表不郁濕下滲而里不停今小便既不利身又無汗故鬱而為黃茵陳蒿湯方茵陳蒿六兩大黃二兩去皮梔子十四枚擘千金作四十枚上三味以水一斗二升先煮茵陳減六升納二味煮取三升去滓分三服小便當利尿如皂莢汁狀色正赤一宿腹減黃從小便去也一斗二升金匱及玉函成本作一斗六升下肘後千金外臺有去滓二字分下金匱及玉函成本有溫字汁千金並翼作沫一宿二字千金作當一字千金翼無腹減二字錢茵陳性雖微寒而能治濕熱黃疸及傷寒滯熱通身發黃小便不利梔子苦寒瀉三焦火除胃熱時疾黃病通小便解消渴心煩懊憹鬱熱結氣更入血分大黃苦寒下泄逐邪熱通腸胃三者皆能蠲濕熱去鬱滯故為陽明發黃之首劑云金匱要略谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之千金方注範汪療谷疸小品方用石膏一斤陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑者宜抵當湯下之喜忘外臺作善忘成本黑下無者字玉函下作主錢喜忘者語言動靜隨過隨忘也言所以喜忘者以平日本有積久之瘀血在裡故也前太陽證中因鬱熱之表邪不解故隨經之瘀熱內結膀胱所以有如狂發狂之證此無瘀熱故但喜忘耳素問調經論云血氣未並五臟安定血並於下氣並於上亂而喜忘者是也錫喜忘猶善忘也程血蓄於下則心竅易塞而識智昏故應酬問答必失常也病屬陽明故屎硬血與糞並故易而黑傷寒準繩曰案邪熱燥結色未嘗不黑但瘀血則溏而黑黏如漆燥結則硬而黑晦如煤此為明辨也又海藏云初便褐色者重再硬深褐色者愈重三便黑色者為尤重色變者以其火燥也如羊血在日色中須臾變褐色久則漸變而為黑色即此意也陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯玉函脈經千金翼腹上有其人二字初頭硬後必溏作頭堅後溏成下後心中懊憹而煩者虛煩也當與梔子豉湯若胃中有燥屎者非虛煩也可與大承氣湯下之其腹微滿初硬後溏是無燥屎此熱不在胃而在上也故不可攻鑑陽明病下之後心中懊憹而煩者若腹大滿不大便小便數知胃中未盡之燥屎復硬也乃可攻之程末句乃申可攻句以決治法柯腹微滿猶是梔子厚朴湯證病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也錢不大便五六日而繞臍痛者燥屎在腸胃也煩躁實熱鬱悶之所致也發作有時者日晡潮熱之類也陽明胃實之裡證悉備是以知其有燥屎故使不大便也程繞臍痛則知腸胃干屎無去路故滯澀在一處而作痛志不言大承氣湯者省文也上文云若有燥屎者宜大承氣湯此接上文而言此有燥屎則亦宜大承氣湯明矣汪仲景用大承氣湯證必辨其有燥屎則是前言潮熱譫語手足汗出轉失氣其法可謂備矣此條復云繞臍痛可見證候多端醫者所當通變而診治之也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯玉函又作復上二宜字並作當字與作宜鑑病人謂病太陽經中風傷寒之人也錢言病人煩熱至汗出而後解者又或如瘧狀必至日晡時發熱者即潮熱也如此則邪氣已屬陽明矣然表裡之分當以脈辨之若按其脈而實大有力者為邪在陽明之裡而胃實宜攻下之若脈浮虛者即浮緩之義為風邪猶在太陽之表而未解宜汗解之謂之浮虛者言浮脈按之本空非虛弱之虛也若虛弱則不宜於發汗矣宜詳審之脈實者下之以其胃熱故宜與大承氣湯浮虛者汗之以其風邪未解故宜與桂枝湯印此章與太陽並病章傷寒不大便六七日頭痛有熱者與承氣湯太陽中篇五十六條大意相同大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯程煩不解指大下後之證腹滿痛指六七日不大便後之證從前宿食經大下而棲泊於回腸曲折之處胃中尚有此故煩不解久則宿食結成燥屎擋住去路新食之濁穢總蓄於腹故滿痛下後亡津液亦能令不大便然煩有解時腹滿不痛可驗錫此證著眼全在六七日上以六七日不大便則六七日內所食之物又為宿食所以用得大承氣然今人本虛質弱大下後得此者亦什不得一耳舒氏云此證雖經大下而宿燥隱匿未去是以大便復閉熱邪復集則煩不解而腹為滿為痛也所言有宿食者即胃家實之互辭乃正陽陽明之根因也若其人本有宿食下後隱匿不去者固有此證且三陰寒證胃中隱匿宿燥溫散之後而傳實者乃為轉屬陽明也豫內弟以採者患腹痛作泄逾月不愈薑附藥服過無數其人稟素盛善啖肉因自恃強壯病中不節飲食而釀胃實之變則大便轉閉自汗出昏憒不省人事譫語狂亂心腹脹滿舌苔焦黃乾燥開裂反通身冰冷脈微如絲寸脈更微殊為可疑豫細察之見其聲音烈烈揚手擲足渴欲飲冷而且夜不寐參諸腹滿舌苔等證則胃實確無疑矣於是更察其通身冰冷者厥熱亢極隔陰於外也脈微者結熱阻截中焦營氣不達於四末也正所謂陽極似陰之候宜急下之作大承氣湯一劑投之無效再投一劑又無效服至四劑竟無效矣豫因忖道此證原從三陰而來想有陰邪未盡觀其寸脈其事著矣竟於大承氣湯中加附子三錢以破其陰使各行其用而共成其功服一劑得大下寸脈即出狂反大發豫知其陰已去矣附子可以不用乃單投承氣一劑病勢略殺復連進四劑其前計十劑矣硝黃各服過半斤諸證以漸而愈可見三陰寒證因有宿食轉屬陽明而反結燥者有如是之可畏也病人小便不利大便乍難乍易時有微熱喘冒原注一作息不能臥者有燥屎也宜大承氣湯錢凡小便不利皆由三焦不運氣化不行所致惟此條小便不利則又不然因腸胃壅塞大氣不行熱邪內瘀津液枯燥故清道皆涸也乍難大便燥結也乍易旁流時出也時有微熱潮熱之餘也喘者中滿而氣急也冒者熱邪不得下泄氣蒸而鬱冒也胃邪實滿喘冒不寧故不得臥經所謂胃不和則臥不安也若驗其舌苔黃黑按之痛而脈實大者有燥屎在內故也宜大承氣湯程易者新屎得潤而流利難者燥屎不動而阻留王此證不宜妄動必以手按之大便有硬塊喘冒不能臥方可下之何也乍難乍易故也食谷欲嘔屬陽明也吳茱萸湯主之得湯反劇者屬上焦也玉函成本嘔下有者字程食谷欲嘔者納不能納之象屬胃氣虛寒不能消穀使下行也曰屬陽明者別其少陽喜嘔之兼半表太陽乾嘔不嘔食之屬表者不同溫中降逆為主汪得湯反劇者成注云以治上焦法治之而無其方準繩云葛根半夏湯誤矣尚論篇云仍屬太陽熱邪而非胃寒條辨云上焦以膈言戒下之意此又泥於傷寒嘔多雖有陽明證不可攻之皆大謬之極窮思先賢用藥豈如今醫之魯莽誤以胃家虛寒為實熱證但虛寒在膈以上不與胃腑之中溷同一治上條證治以吳茱萸湯寒熱虛實原無誤也其有得湯反劇者補亡論常器之云宜橘皮湯注云類要方用橘皮二兩甘草一兩生薑四兩人參三兩水煎服斯言庶得之矣魏氏云何以得湯反劇耶不知者以為胃熱而非胃寒矣仲師示之曰此固有熱也而熱不在胃脘之中焦乃在胸膈之上焦惟其中焦有寒所以上焦有熱吳茱萸人參之辛溫本宜於中焦之寒者先乖於上焦之熱此吳茱萸之所以宜用而未全宜耳主治者見茲上熱下寒之證則固有黃連炒吳茱萸生薑易乾薑一法似為溫中而不僭上一得之愚不知當否喻謂得湯轉劇屬太陽謬矣程謂仍與吳茱萸亦膠柱之見也熱因寒用以豬膽為引如用於理中湯之法或亦有當乎案柯氏云服湯反劇者以痰飲在上焦為患嘔儘自愈非謂不宜服也錢氏云得湯反劇者邪猶在胸當以梔子豉湯湧之庶幾近似二氏並失經旨矣吳茱萸湯方人參三兩肘後方作一兩生薑六兩切吳茱萸一升洗肘後作半斤外臺洗作炒大棗十二枚擘上四味以水七升煮取二升去滓溫服七合日三服金匱七升作五升二升作三升外臺亦作五升汪嘔為氣逆氣逆者必散之吳茱萸辛苦味重下泄治嘔為最兼以生薑又治嘔聖藥非若四逆中之乾薑守而不走也武陵陳氏云其所以致嘔之故因胃中虛生寒使溫而不補嘔終不愈故用人參補中合大棗以為和脾之劑焉錢氏云吳茱萸一升當是一合即今之二勺半人參三兩當是一兩即宋之二錢七分生薑六兩當是二兩即宋之五錢余大棗當是四五枚水七升亦當是三升觀小承氣湯止用水四升調胃承氣只用水三升此方以辛熱補劑而用之於表裡疑似之間豈反過之大約出之後人之手非仲景本來升合分兩學者當因時酌用案此説未知然否姑舉於此金匱要略嘔而胸滿者茱萸湯主之肘後方治人食畢噫醋及醋心即本方醫方集解曰服湯反劇者宜葛根加半夏湯小柴胡湯梔子豉湯黃芩湯又云吳茱萸為厥陰本藥故又治肝氣上逆嘔涎頭痛本方加附子名吳茱萸加附子湯治寒疝腰痛牽引睪丸尺脈沉遲太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散玉函關下有小字如其以下十三字作若不下其人復不惡寒而渴十二字成太陽病脈陽浮陰弱為邪在表今寸緩關浮尺弱邪氣漸傳裡則發熱汗出復惡寒者表未解也傳經之邪入里里不和者必嘔此不嘔但心下痞者醫下之早邪氣留於心下也如其不下者必漸不惡寒而渴太陽之邪轉屬陽明也若吐若下若發汗後小便數大便硬者當與小承氣湯和之此不因吐下發汗後小便數大便硬若是無滿實雖不更衣十日無所苦也候津液還入胃中小便數少大便必自出也渴欲飲水者少少與之以潤胃氣但審邪氣所在以法攻之如渴不止與五苓散是也吳寸緩風傷衛也關浮邪猶在經未入腑也尺弱其人陰精素虧也王三陽云此處五苓散難用不然經文渴字上當有缺文也金鑑云但以法救之五字當是若小便不利方與上文小便數下文渴者之義相合此條病勢不急救之之文殊覺無謂必有遺誤汪氏云渴欲飲水至救之十三字當在小便數者之前不惡寒而渴者者字可刪吳儀洛刪渴欲以下十九字注云舊本多衍文今刪之案此條難解以上四家各有所見未知何是姑存而舉於此脈陽微而汗出少者為自和原注一作如也汗出多者為太過陽脈實因發其汗出多者亦為太過太過者為陽絶於里亡津液大便因硬也成本太過下無者字陽脈實以下為別條方本周本錢本汪本魏本並同鑑脈陽微謂脈浮無力而微也陽脈實謂脈浮有力而盛也凡中風傷寒脈陽微則熱微微熱蒸表作汗若汗出少者為自和欲解汗出多者為太過不解也陽脈實則熱盛因熱盛而發其汗出多者亦為太過則陽極於裡亡津液大便因硬而成內實之證矣汪陽明病陽脈不微而實實者按之搏指而有力也魏經文陽絶之義似是阻絶蓋謂陽盛阻陰也非斷絶之絶內經言絶多如此程陽絶於里者燥從中起陽氣閉絶於內而不下通也下條其陽則絶同此汪氏云總於後條用麻仁丸以主之補亡論議用小柴胡湯又柴胡桂枝湯以通津液如大便益堅議用承氣等湯大誤之極脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶二為字下玉函有則字錢浮為陽邪盛芤為陰血虛陽邪盛則胃氣生熱陰血虛則津液內竭故其陽則絶絶者非斷絶敗絶之絶言陽邪獨治陰氣虛竭陰陽不相為用故陰陽阻絶而不相流通也即生氣通天論所謂陰陽離決精氣乃絶之義也注傢俱謂陽絶乃無陽之互詞恐失之矣沈此辨陽明津竭之脈也若見此脈當養津液不可便攻也趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻子仁丸主之成本無子字仁作人柯本無此條及麻仁丸方成趺陽者脾胃之脈診浮為陽知胃氣強澀為陰知脾為約約者儉約之約又約束之約內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸於膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難與脾約丸通腸潤燥汪趺傷者胃脈也在足趺上五寸骨間去陷谷三寸即足陽明經衝陽二穴按之其脈應手而起按成注以胃強脾弱為脾約作解推其意以胃中之邪熱盛為陽強故見脈浮脾家之津液少為陰弱故見脈澀程脾約者脾陰外滲無液以滋脾家先自乾稿了何能以余陰蔭及腸胃所以胃火盛而腸枯大便堅而糞粒小也麻仁丸寬腸潤燥以軟其堅欲使脾陰從內轉耳案喻氏譏成氏脾弱之説云脾弱即當補矣何為麻仁丸中反用大黃枳實厚朴乎汪氏則暗為成注解紛大是又案胃強脾弱究竟是中焦陽盛而陰弱之義不必拘拘脾與胃也傷寒選録曰愚案趺陽脈一名會元又名衝陽在足背上去陷谷三寸脈動處是也此陽明胃脈之用由出夫胃者水穀之海五臟六腑之長也若胃氣以憊水穀不進穀神以去臟腑無所稟受其脈不動而死也故診趺陽脈以察胃氣之有無仲景又謂趺陽脈不惟傷寒雖雜病危急亦當診此以察其吉凶麻子仁丸方麻子仁二升芍藥半斤枳實半斤炙千金翼芍藥枳實各八兩大黃一斤去皮厚朴一尺去皮玉函作一斤杏仁一升去皮尖熬別作脂玉函作一斤上六味蜜和丸如梧桐子大飲服十丸日三服漸加以知為度六味下成本玉函有為末煉三字和作為成本無梧字證類本草飲服十丸作以漿水飲下十丸徐即小承氣加芍藥二仁也方麻子杏仁能潤乾燥之堅枳實厚朴能導固結之滯芍藥斂液以輔潤大黃推陳以致新脾雖為約此之疏矣吳儀洛方論曰此治素慣脾約之人復感外邪預防燥結之法方中用麻杏二仁以潤腸燥芍藥以養陰血枳實大黃以泄實熱厚朴以破滯氣也然必因客邪加熱者用之為合轍後世以此概治老人津枯血燥之閉結但取一時之通利不顧愈傷其真氣得不速其咎耶案明理論即名脾約丸張氏纘論曰云丸者如理中陷胸抵當皆大彈丸煮化而和滓服之也云丸者和麻仁烏梅皆用小丸取達下焦也蓋丸圓後世互用今據張説考論中其言不誣然論中丸字千金外臺多作圓不知其義如何拈而存疑案本草序例厚朴一尺無考醫心方引小品方云厚朴一尺及數寸者厚三分廣一寸半為準太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之外臺作發其汗病不解玉函作蒸蒸然脈經無調胃二字程何以發汗不解便屬胃蓋以胃燥素盛故他表證雖罷而汗與熱不解也第徵其熱如炊籠蒸蒸而盛則知其汗必連綿濈濈而來此即大便已硬之徵故曰屬胃也熱雖聚於胃而未見潮熱譫語等證主以調胃承氣湯者於下法內從乎中治以其為日未深故也表熱未除而裡熱已待病勢久蘊於前矣只從發汗後一交替耳凡本篇中雲太陽病云傷寒而無陽明病字者皆同此病機也要之脈已不浮而大可必錢蒸蒸發熱猶釜甑之蒸物熱氣蒸騰從內達外氣蒸濕潤之狀非若翕翕發熱之在皮膚也傷寒吐後腹脹滿者與調胃承氣湯程吐法為膈邪而設吐後無虛煩等證必吐其所當吐者只因胃家素實吐亡津液燥氣不能下達遂成土鬱是以腹脹其實無大穢濁之在腸也調胃承氣湯一奪其鬱可耳太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之愈成本玉函無後字鑑太陽病若吐若下若發汗後不解入里微煩者乃梔子豉湯證也今小便數大便因硬是津液下奪也當與小承氣湯和之以其結熱未甚入里未深也得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不受食原注一云不大便但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯受成本玉函作能千金翼不受食作不大便無大承氣湯之大字汪得病二三日不言傷寒與中風者乃風寒之邪皆有不須分辨之病也脈弱者謂無浮緊等在表之脈也無太陽柴胡證謂無惡寒發熱或往來寒熱在表及半表半裡之證也煩躁心下硬者全是陽明腑熱邪實經云腸實則胃虛故能食能食者其人不痞不滿結在腸間而胃火自盛止須以小承氣湯少少與微和之因其人煩躁必不大便令其小安也至六日仍煩躁不安而不大便者前用小承氣湯可加至一升使得大便而止此言小承氣湯不可多用之意若不大便句承上文煩躁心下硬而言至六七日不大便為可下之時但小便少乃小水不利此係胃中之水穀不分清故不能食非譫語潮熱有燥屎之不能食也故云雖不能食但初頭硬後必溏未定成硬而攻之並硬者必化而為溏矣須待小便利屎定成硬乃可用大承氣湯攻之此言大承氣亦不可驟用之意方太陽不言藥以有桂枝麻黃之不同也柴胡不言證以專少陽也凡似此為文者皆互發也以無大小故知諸證屬陽明以脈弱故宜微和至六日已下歷敘可攻不可攻之節度喻此段之雖能食雖不能食全與辨風寒無涉另有二義見雖能食者不可以為胃強而輕下也雖不能食者不可以為胃中有燥屎而輕下也前條云譫語有潮熱反不能食者胃中必有燥屎五六枚與此互發案脈弱非微弱虛弱之弱蓋謂不浮盛實大也錢氏云虛寒之候柯氏云無陽之徵並誤矣傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯錢六七日邪氣在裡之時也外既無發熱惡寒之表證內又無譫語腹滿等里邪且非不大便而曰大便難又非發大熱而身僅微熱勢非甚亟也然目中不了了是邪熱伏於裡而耗竭其津液也經云五臟六腑之精皆上注於目熱邪內爍津液枯燥則精神不得上注於目故目中不了了睛不和也汪不了了者病人之目視物不明瞭也睛不和者乃醫者視病人之睛光或昏暗或散亂是為不和鑑目中不了了而睛和者陰證也睛不和者陽證也此結熱神昏之漸危惡之候急以大承氣湯下之瀉陽救陰以全未竭之水可也睛不和者謂睛不活動也方了了猶瞭瞭也活人指掌曰目中不了了了了謂明瞭也或謂之病瘥案汪氏云無表裡證里字當是傳寫錯誤宜從刪此説大誤傷寒選録刪里字云無表裡證則無病何以用承氣湯下之裡實者病可見矣案此説卻非是陽明病發熱汗多者急下之宜大承氣湯原注一云大柴胡湯成本脫病字張本汗下補出字錢潮熱自汗陽明胃實之本證也此曰汗多非復陽明自汗可比矣裡熱熾盛之極津液泄盡故當急下然必以脈症參之若邪氣在經而發熱汗多胃邪未實舌苔未乾厚而黃黑者未可下也程發熱而復汗多陽氣大蒸於外慮陰液暴亡於中雖無內實之兼證宜急下之以大承氣湯矣此等之下皆為救陰而設不在奪實奪實之下可緩救陰之下不可緩不急下防成五實經曰五實者死發汗不解腹滿痛者急下之宜大承氣湯成發汗不解邪熱傳入腑而成腹滿痛者傳之迅也是須急下之程發汗不解津液已經外奪腹滿痛者胃熱遂爾迅攻邪陽盛實而瀰漫不急下之熱毒熏蒸糜爛速及腸胃矣陰虛不任陽填也柯氏云表雖不解邪甚於里急當救里里和而表自解矣案太陽中篇八十九條云本先下之而反汗之為逆若先下之治不為逆柯氏蓋據此條為解然而考經文不解邪氣不解也非謂表不解也故其説難憑腹滿不減減不足言當下之宜大承氣湯成腹滿不減邪氣實也經曰大滿大實自可除下之大承氣湯下其滿實若腹滿時減非內實也則不可下金匱要略曰腹滿時減復如故此為寒當與溫藥是減不足言也喻減不足言四字形容腹滿如繪見滿至十分即減去一二分不足殺其勢也錢然有下之而脈症不為少減者死症也舒氏云案以上二條俱未言其病之來由又未明其所以當急之理令人不無餘憾案玉函經此下有一條云傷寒腹滿按之不痛者為虛痛者為實當下之舌黃未下者下之黃自去宜大承氣湯金匱要略亦載此條恐此經遺脫之陽明少陽合病必下利其脈不負者為順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯成本順上無為字負也之也玉函作若脈經當下之以下作屬大柴胡承氣湯證柯本刪此條成陽明土少陽木二經合病氣不相和則必下利少陽脈不勝陽明不負是不相剋為順也若少陽脈勝陽明脈負者是鬼賊相剋為正氣失也脈經曰脈滑者為病食也又曰滑數則胃氣實下利者脈當微厥冷脈滑數知胃有宿食與大承氣湯以下之程見滑數之脈為不負為順見弦直之脈為負為失案金匱要略曰脈數而滑者實也此有宿食也當下之宜大承氣湯乃知脈滑以下正是別條與陽明少陽合病不相干病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀喜飢至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱便膿血也玉函雖脈作脈雖協作挾若脈以下原本為別條今依玉函千金翼合而為一條喻本魏本周本柯本程本並同玉函鑑病人無表裡證是無太陽表陽明裡證也但發熱而無惡寒七八日雖脈浮數不可汗也若屎硬可下之假令已下脈不浮而數不解是表熱去裡熱未去也至六七日又不大便若不能消穀善飢是胃實熱也以大承氣湯下之今既能消穀善飢是胃和合熱非胃邪合熱故屎雖硬色必黑乃有瘀血熱結之不大便也宜用抵當湯下之若脈數不解不大便硬而下利不止必有久瘀協熱腐化而便膿血也則不宜用抵當湯下之矣周傷寒一書凡太陽表證未盡者仲景戒不可攻今發熱七八日太陽表證也脈浮數太陽表證也此仲景自言者也七八日中未嘗更衣陽明腑證也此仲景言外者也何云病人無表裡證乃至自為矛盾耶必始先發熱至七八日則熱勢已殺且熱不潮七八日雖不更衣未嘗實滿則里不為急故曰無表裡證然脈尚浮數仲景以為可下者正以浮雖在外而數且屬腑不一兩解恐內外之邪相持而不去也爾時以大柴胡議下不亦可乎柯七八日下當有不大便句故脈雖浮數有可下之理熱利不止必太陽瘀血宜黃連阿膠湯汪成注云可下之與大承氣湯以為清滌陽明裡熱也尚論編云可下之如大柴胡湯之類誤矣便膿血者仲景無治法補亡論常器之云可白頭翁湯程氏云今之醫者不論病人表罷不罷里全未全但見發熱七八日雖脈浮數者以為可下之不知發熱脈浮邪渾在表豈可計日妄下故一下而變證各出案依程説下則為誤治然觀文脈殊不爾第此條亦是不明核姑舉數説俟後考傷寒發汗已身目為黃所以然者以寒濕原注一作溫在裡不解故也以為不可下也於寒濕中求之玉函寒濕下有相搏二字以為下有非瘀熱而四字也於間有當字汪傷寒發汗已熱氣外越何由發黃今者發汗已身目為黃所以然者以其人在裡素有寒濕在表又中寒邪發汗已在表之寒邪雖去在裡之寒濕未除故云不解也且汗為陽液乃中焦陽氣所化汗後中氣愈虛寒濕愈滯脾胃受寒濕所傷而色見於外此與濕熱發黃不同故云不可下或問云濕挾熱則鬱蒸故發黃今挾寒何以發黃余答云寒濕發黃譬之秋冬陰雨草木不應黃者亦黃此冷黃也王海藏云陰黃其證身冷汗出脈沉身如熏黃色黯終不如陽黃之明如橘子色治法小便利者朮附湯小便不利大便反快者五苓散傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之玉函腹上有少字千金方身上有內實瘀結五字微下有脹字錢此言陽明發黃之色狀與陰黃如煙燻之不同也傷寒至七八日邪氣入里已深身黃如橘子色者濕熱之邪在胃獨傷陽分故發陽黃也小便不利則水濕內蓄邪食壅滯而腹微滿也以濕熱實於胃故以茵陳蒿湯主之傷寒身黃髮熱梔子柏皮湯主之熱下成本有者字成傷寒身黃胃有瘀熱須當下去之此以發熱為熱未實與梔子柏皮湯解之汪武林陳氏曰發熱身黃者乃黃證中之發熱而非麻黃桂枝證之發熱也熱既鬱而為黃雖表而非純乎表證但當清其鬱以退其黃則發熱自愈鑑傷寒身黃髮熱者設有無汗之表宜用麻黃連軺赤小豆汗之可也若有成實之裡宜用茵陳蒿湯下之亦可也今外無可汗之表證內無可下之裡證故惟宜以梔子柏皮湯清之也梔子柏皮湯方肥梔子十五個擘成本無肥字玉函同作十四枚甘草一兩炙黃柏二兩上三味以水四升煮取一升半去滓分溫再服一升半千金翼作二升錢梔子苦寒瀉三焦火除胃熱時疾黃病通小便治心煩懊憹鬱熱結氣柏皮苦寒治五臟腸胃中結熱黃疸故用之以瀉熱邪又恐苦寒傷胃故以甘草和胃保脾而為調劑之妙也案金鑑云此方之甘草當是茵陳蒿必傳寫之誤也此説太謬不可從焉傷寒瘀熱在裡身必黃麻黃連軺赤小豆湯主之必下成本有發字千金並翼軺作翹錢瘀留蓄壅滯也言傷寒鬱熱與胃中之濕氣互結濕蒸如淖澤中之淤泥水土黏濘而不分也經云濕熱相交民多病疸蓋以濕熱膠固壅積於胃故曰瘀熱在裡身必發黃也麻黃連軺赤小豆湯治表利小便解鬱熱故以此主之瀾此證雖曰在裡必因邪氣在表之時有失解散今雖發黃猶宜兼汗解以治之麻黃連軺赤小豆湯方麻黃二兩去節連軺二兩連翹根是千金並翼軺作翹程柯同杏仁四十個去皮尖赤小豆一升大棗十二枚擘生薑二兩切甘草二兩炙成本作一兩生梓白皮一升切上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升去滓分溫三服半日服盡上字成本作已上二字再沸玉函作一二沸成本脫去滓二字潦千金作勞蓋此潦字之訛錢麻黃湯麻黃桂枝杏仁甘草也皆開鬼門而泄汗汗泄則肌肉腠理之鬱熱濕邪皆去減桂枝而不用者恐助瘀熱也赤小豆除濕散熱下水腫而利小便梓白皮性苦寒能散溫熱之邪其治黃無所考據連翹根陶弘景雲方藥不用人無識者王好古云能下熱氣故仲景治傷寒瘀熱用之李時珍云潦水乃雨水所積韓退之詩云潢潦無根源朝灌夕已除蓋謂其無根而易涸故成氏謂其味薄不助濕氣而利熱也方軺本草作翹翹本鳥尾以草子拆開其間片片相比如翹得名軺本使者小車乘馬者無義疑誤以上四條疑太陽中篇錯簡當移傷寒類方曰連軺即連翹根氣味相近今人不採即以連翹代可也案內臺方議曰潦水又曰甘瀾水誤也醫學正傳曰潦水又名無根水山谷中無人迹去處新上科臼中之水也取其性不動搖而有土氣內存乃與時珍有少異當考辨少陽病脈證並治少陽之為病口苦咽乾目眩也成本無為字成足少陽膽經也內經曰有病口苦者名曰膽疸甲乙經曰膽者中精之腑五臟取決於膽咽為之使少陽之脈起於目鋭眥少陽受邪故口苦咽乾目眩鑑口苦者熱蒸膽氣上溢也咽乾者熱耗其津液也目眩者熱熏眼發黑也此揭中風傷寒邪傳少陽之總綱凡篇中稱少陽中風傷寒者即具此證之謂也柯太陽主表頭項強痛為提綱陽明主裡胃家實為提綱少陽居半表半裡之位仲景特揭口苦咽乾目眩為提綱蓋口咽目三者不可謂之表又不可謂之裡是表之入里里之出表處所謂半表半裡也苦幹眩者人所不知惟病人獨知診家所以不可無問法程少陽在六經中典開闔之樞機出則陽入則陰凡客邪侵到其界裡氣輒從而中起故云半表半裡之邪半表者指經中所到之風寒而言所云往來寒熱胸脅苦滿等是也半里者指膽腑而言所云口苦咽乾目眩是也表為寒里為熱寒熱互拒所以有和解一法觀其首條所揭口苦咽乾目眩之證終篇總不一露要知終篇無一條不具有此條之證也有此條之證而兼一二表證小柴胡湯方可用無此條之證而只據往來寒熱等及或有之證用及小柴胡腑熱未具而裡氣預被寒侵是為開門揖盜矣余目擊世人之以小柴胡湯殺人者不少非其認證不真蓋亦得半而止耳入里不解則成骨蒸癆瘧入陰漸深則為厥逆亡陽少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚鑑少陽即首條口苦咽乾目眩之謂也中風謂此少陽病是從中風之邪傳來也少陽之脈起目鋭眥從耳後入耳中其支者會缺盆下胸中循脅表邪傳其經故耳聾目赤胸中滿而煩也然此少陽半表半裡之胸滿而煩非太陽證具之邪陷胸滿而煩者比故不可吐下若吐下則虛其中神志虛怯則悸而驚也汪補亡論龐安時云可小柴胡湯吐下悸而驚者郭白雲云當服柴胡加龍骨牡蠣湯傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和煩而悸原注一云躁煩上成本玉函有則字鑑脈弦細少陽之脈也上條不言脈此言脈者補言之也頭痛發熱無汗傷寒之證也又兼見口苦咽乾目眩少陽之證故曰屬少陽也蓋少陽之病已屬半里故不可發汗若發汗則益傷其津而助其熱必發譫語既發譫語則是轉屬胃矣若其人津液素充胃能自和則或可愈否則津乾熱結胃不能和不但譫語且更煩而悸矣王凡頭痛發熱俱為在表惟此頭痛發熱為少陽者何也以其脈弦細故知邪入少陽之界也錢以小承氣和胃令大便微溏胃和則愈也胃不和者以陽氣虛損之胃邪熱陷入而胃虛邪實所以煩悶而築築然悸動此少陽誤汗之變證也可不慎哉案不可發汗蓋此屬柴胡桂枝湯證程氏云煩而悸當是小建中湯汪氏云和胃之藥成注云與調胃承氣湯愚以須用大柴胡湯未知的當否傷寒選録曰少陽小柴胡加薑桂陽明調胃承氣湯本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之若已吐下以下原本別為二條今據玉函及千金翼合為一條喻本張本柯本錢本魏本並以兩條合為一條玉函千金翼無本字食下有飲字巢源無譫語二字鑑脈沉緊當是脈沉弦若是沉緊是寒實在胸當吐之診也惟脈沉弦始與上文之義相屬故可與小柴胡湯沈太陽不解而傳少陽當與小柴胡和解乃為定法反以吐下發汗溫針以犯少陽之戒而邪熱陷入陽明故發譫語已為壞證要知譫語乃陽明受病即當知犯陽明之逆而治之若無譫語而見他經壞證須憑證憑脈另以活法治之也程此條云知犯何逆以法治之桂枝壞病條亦云觀其脈證知犯何逆隨證治之只此一觀字一知字已是仲景見病知源地位三陽合病脈浮大上關上但欲眠睡目合則汗眠睡玉函千金翼作寐一字吳本與陽明篇第四十一條三陽合病腹滿身重云云白虎湯條合為一條錢關上者指關脈而言也仲景辨脈篇中稱尺脈曰尺中關脈曰關上寸脈曰寸口程大為陽明主脈太陽以其脈合故浮大上關上從關部連上寸口也少陽以其證合故但欲眠睡目合則汗但欲眠為膽熱盜汗為半表裡也當是有汗則主白虎湯無汗則主小柴胡湯也吳上關上熱勢瀰漫之象也鑑但欲眠睡非少陰也乃陽盛神昏之睡也汪氏云常器之云可柴胡桂枝湯龐安時云脈不言弦者隱於浮大也案此説未知是否姑附存於斯傷寒六七日無大熱其人躁煩者此為陽去入陰故也玉函無故字成表為陽里為陰邪在表則外有熱六七日邪氣入里之時外無大熱內有躁煩者表邪傳裡也故曰陽去入陰印無大熱者邪不在表矣其人躁煩者邪入於裡陰矣此為去表之陽而入於裡之陰也張邪氣傳裡則躁煩不傳裡則安靜也方氏云去往也言表邪往而入於裡案此説未穩又案汪氏金鑑以陽去入陰為三陽傳經之熱邪入於三陰之義恐不然也表邪入於裡陰而躁煩者蓋此陽明胃家實而已錢氏注與汪氏同傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也汪傷寒三日者即素問相傳日數上條言六七日此止言三日可見日數不可拘也邪在少陽原嘔而不能食今反能食而不嘔可徵裡氣之和而少陽之邪自解也既里和而少陽邪解則其不傳三陰斷斷可必故云三陰不受邪也此注本武陵陳亮斯語印以上二章與太陽篇之第三章同義傷寒三日少陽脈小者欲已也玉函此條無成內經曰大則邪至小則平傷寒三日邪傳少陽脈當弦緊今脈小者邪氣微而欲已也案此語內經中無所考脈要精微云大則病進少陽病欲解時從寅至辰上成內經曰陽中之少陽通於春氣寅卯辰少陽木王之時柯辰上者卯之盡辰之始也
