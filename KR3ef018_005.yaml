body:
  text: 卷五辨太陰病脈證並治太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬結硬玉函作痞堅脈經千金翼不下下有下之二字無自利二字及若下之必四字程腹滿而吐食不下則滿為寒脹吐與食不下總為寒格也陽邪亦有下利然乍微乍甚而痛隨利減今下利益甚時腹自痛則腸虛而寒益留中也雖曰邪之在臟實由胃中陽乏以致陰邪用事升降失職故有此下之則胸中結硬不頂上文吐利來直接上太陰之為病句如後條設當行大黃芍藥者亦是也曰胸下陰邪結於陰分異於結胸之在胸而且按痛矣曰結硬無陽以化氣則為堅陰異於痞之濡而軟矣彼皆陽從上陷而阻留此獨陰從下逆而不歸寒熱大別鑑吳人駒曰自利益甚四字當在必胸下結硬句之下其説甚是若在吐食不下句之下則是已吐食不下而自利益甚矣仲景復曰若下之無所謂也黃仲理曰宜理中湯陰經少有用桂枝者如此證若脈浮即用桂枝湯微汗之若惡寒甚不已者非理中四逆不可黃自利益甚四字不允當故姑從吳人駒之説且脈經千金翼文有異同可知此條固有差錯也傷寒蘊要曰凡自利者不因攻下而自瀉利俗言漏底傷寒者也大抵瀉利小便清白不澀完穀不化其色不變有如鶩溏或吐利腥穢小便澄徹清冷口無燥渴其脈多沉或細或遲或微而無力或身雖發熱手足逆冷或惡寒蜷臥此皆屬寒也凡熱症則口中燥渴小便或赤或黃或澀而不利且所下之物皆如垢膩之狀或黃或赤所去皆熱臭氣其脈多數或浮或滑或弦或大或洪也亦有邪熱不殺穀其物不消化者但脈數而熱口燥渴小便赤黃以此別之矣太陰中風四肢煩疼陽微陰澀而長者為欲愈錫太陰中風者風邪直中於太陰也魏太陰病而類於太陽之中風四肢煩疼陽脈微而熱發陰脈澀而汗出純乎太陽中風矣然腹自滿有時痛下利益甚吐而不能食是非太陽之中風宜表散也錢四肢煩疼者言四肢痠疼而煩擾無措也蓋脾為太陰之臟而主四肢故也脾病四肢不得稟水穀氣見素問陽明脈解陽微陰澀者言輕取之而微重取之而澀也脈者氣血伏流之動處也因邪入太陰脾氣不能散精肺氣不得流經營陰不利於流行故陰脈澀也陽微陰澀正四肢煩疼之病脈也長脈者陽脈也以微澀兩陰脈之中而其脈來云皆長為陰中見陽長則陽將回故為陰病欲愈也太陰病欲解時從亥至醜上成脾為陰主王於醜亥子向王故為解時柯經曰夜半後而陰隆為重陰又曰合夜至雞鳴天之陰陰中之陰也脾為陰中之至陰故主亥子丑時太陰病脈浮者可發汗宜桂枝湯汪夫曰太陰病當見腹滿等候診其脈不沉細而浮則知太陽經風邪猶未解也故宜桂枝湯以汗解之鑑即有吐利不食腹滿時痛一二證其脈不沉而浮便可以桂枝發汗先解其外俟外解已再調其內可也於此又可知論中身痛腹滿下利急先救里者脈必不浮矣程條中有桂枝湯而無麻黃湯桂枝胎建中之體無礙於溫也案舒氏云此言太陽病是必腹滿而吐腹痛自利矣證屬裡陰脈雖浮亦不可發汗即令外兼太陽表證當以理中為主內加桂枝兩經合治此一定之法也今但言太陰病未見太陽外證其據脈浮即用桂枝專治太陽不顧太陰大不合法恐亦後人有錯此説有理自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩玉函千金翼無服字輩脈經作湯鑑凡自利而渴者里有熱屬陽也若自利不渴則為里有寒屬陰也今自利不渴知為太陰本臟有寒也故當溫之四逆輩者指四逆理中附子等湯而言也魏以其人脾臟之陽平素不足寒濕凝滯則斡運之令不行所以胃腸水穀不分而下泄益甚自利二字乃未經誤下誤汗吐而成者故知其臟本有寒也舒口渴一證有為實熱亦有虛寒若為熱邪傷津而作渴者必小便短大便硬若自利而渴者乃為火衰不能熏騰津液故口渴法主附子助陽溫經正所謂釜底加薪津液上騰而渴自止若寒在太陰於腎陽無干故不作渴傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也以一字玉函作所以然者四字暴煩下利千金翼作煩暴利錢緩為脾之本脈也手足溫者脾主四肢也以手足而言自溫則知不發熱矣邪在太陰所以手足自溫不至如少陰厥陰之四肢厥冷故曰系在太陰然太陰濕土之邪鬱蒸當發身黃若小便自利者其濕熱之氣已從下泄故不能發黃也如此而至七八日雖發暴煩乃陽氣流動腸胃通行之徵也下利雖一日十餘行必下盡而自止脾家之正氣實故腸胃中有形之穢腐去穢腐去則脾家無形之濕熱亦去故也此條當與陽明篇中傷寒脈浮而緩云云至八九日大便硬者此為轉屬陽明條互看喻暴煩下利日十餘行其證又與少陰無別而利盡穢腐當自止則不似少陰之煩躁有加下利漫無止期也汪成注云下利煩躁者死此為先利而後煩是正氣脫而邪氣擾也茲則先煩後利是脾家之正氣實故不受邪而與之爭因暴發煩熱也下利日十餘行者邪氣隨腐穢而去利必自止而病亦愈本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之玉函無本字爾全書程本作而脈經千金翼無爾字千金翼作加大黃湯主之無桂枝二字大實痛以下成氏及諸本為別條非也錢本太陽中風醫不汗解而反下之致裡虛邪陷遂入太陰因爾腹滿時痛故曰屬太陰也然終是太陽之邪未解故仍以桂枝湯解之加芍藥者因誤下傷脾故多用之以收斂陰氣也汪如腹滿痛甚者其人胃家本實雖因太陽病誤下熱邪傳入太陰然太陰之邪已歸陽明而入於腑此非裡虛痛乃里實痛也成注云大實大滿自可下除之故加大黃以下里實其仍用桂枝湯者以太陽之邪猶未盡故也程因而二字宜玩太陰為太陽纍及耳非傳邪也內臺方議曰表邪未罷若便下之則虛其中邪氣反入里若脈虛弱因而腹滿時痛者乃脾虛也不可再下與桂枝加芍藥湯以止其痛若脈沉實大實滿痛以手按之不止者乃胃實也宜再下與桂枝湯以和表加芍藥大黃以攻其里桂枝加芍藥湯方玉函加上有倍字桂枝三兩去皮芍藥六兩甘草二兩炙大棗十二枚擘生薑二兩切上五味以水七升煮取三升去滓溫分三服本云桂枝湯今加芍藥溫分千金翼作分溫桂枝加大黃湯方桂枝三兩去皮大黃二兩玉函作三兩成本作一兩芍藥六兩生薑三兩切甘草二兩炙大棗十二枚擘上六味以水七升煮取三升去滓溫服一升日三服柯腹滿為太陰陽明俱有之證然位同而職異太陰主出太陰病則腐穢氣凝不利故滿而時痛陽明主內陽明病則腐穢燥結不行故大實而痛是知大實痛是陽明病而非太陰病矣仲景因表證未解陽邪已陷入太陰故倍芍藥以益脾調中而除腹滿之時痛此用陰和陽法也若表邪未解而陽邪陷入陽明則加大黃以潤胃通結而除其大實之痛此雙解表裡也凡妄下必傷胃之氣液胃氣虛則陽邪襲陰故轉屬太陰胃液涸則兩陽相搏故轉屬陽明屬太陰則腹滿時痛而不實陰道虛也屬陽明則腹滿大實而痛陽道實也滿而時痛是下利之兆大實而痛是燥屎之徵故倍加芍藥小變建中之劑少加大黃微示調胃之方也汪案桂枝加大黃湯仲景雖入太陰例實則治太陽陽明之藥也與大柴胡湯治少陽陽明證義同錢考漢之一兩即宋之二錢七分也以水七升而煮至三升分作三次服之止溫服一升案李時珍云古之一升今之二合半約即今之一飯甌也大黃不滿一錢亦可謂用之緩而下之微矣案方氏云曰桂枝加則以本方加也而用芍藥六兩水七升不合數皆後人之苟用者此説非也總病論曰小建中湯不用飴糖芍藥為君止痛復利邪故也聖濟總録芍藥湯治産後血氣攻心腹痛即桂枝加芍藥湯無生薑大棗聖惠方赤芍藥散治小兒初生及一年內兒多驚啼不休或不得眠臥時時肚脹有似鬼神所為即桂枝加大黃湯去薑棗加白朮五味太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也原注下利者先煎芍藥三沸成本無下利云云九字注文程前條之行大黃芍藥者以其病為太陽誤下之病自有浮脈驗之非太陰為病也若太陰自家為病則脈不浮而弱矣縱有腹滿大實痛等證其來路自是不同中氣虛寒必無陽結之慮目前雖不便利續自便利只好靜以俟之大黃芍藥之宜行者減之況其不宜行者乎誠恐胃陽傷動則洞泄不止而心下痞硬之證成雖復從事於溫所失良多矣胃氣弱對脈弱言易動對續自便利言太陰者至陰也全憑胃氣鼓動為之生化胃陽不衰脾陰自無邪入故從太陰為病指出胃氣弱來錫曰便利其非大實痛可知也曰設當行其不當行可知也總之傷寒無分六經一切皆以胃氣為本印案本經凡下後皆去芍藥蓋以芍藥為苦泄也案錫駒云續者大便陸續而利出也汪氏云大便必接續自利而通蓋續者謂雖今不便利而續必便利之義非自利陸續頻並之謂程注為得辨少陰病脈證並治少陰之為病脈微細但欲寐也鑑少陰腎經陰盛之臟也少陰受邪則陽氣微故脈微細也衛氣行陽則寤行陰則寐少陰受邪則陰盛而行陰者多故但欲寐也此少陰病之提綱後凡稱少陰病者皆指此脈證而言也程前太陰後厥陰俱不出脈象以少陰一經可以該之也少陰病六七日前多與人以不覺但起病喜厚衣近火善瞌睡凡後面亡陽發躁諸劇證便伏於此處矣最要堤防案太陽中篇三十七條云太陽病十日以去脈浮細而嗜臥者外已解也此當以脈浮沉而別陰陽也少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也具下小便白玉函作所以然三字水玉函作溲程人身陰陽中分下半身屬陰上半身屬陽陰盛於下則陽擾於上欲吐不吐心煩證尚模糊以但欲寐徵之則知下焦寒而胸中之陽被壅治之不急延至五六日下寒甚而閉藏徹矣故下利上熱甚而津液亡矣故渴虛故引水自救非徒釋渴字指出一虛字來明其別於三陽證之實邪作渴也然則此證也自利為本病溺白正以徵其寒故不但煩與渴以寒斷即從煩渴而悉及少陰之熱證非戴陽即格陽無不可以寒斷而從溫治腎水欠溫則不能納氣氣不歸元逆於膈上故欲吐不吐腎氣動膈故心煩也汪此與熱邪之但欲寐不同其寐必不昏濁其呼吸必促而細也常器之云可四逆湯又甘草乾薑湯愚以五六日之前宜四逆湯加生薑二兩五六日後宜茯苓四逆湯魏引水自救以理論之雖渴未必能多飲水或多飲多尿尿色淡白則少陰腎臟為真寒附子湯主之少陰腎臟為病內素虛寒者十之六七外寒乘入者十之三四無內寒則不能召外寒君子平日寧可不以命門之火為寶而用嗇道乎舒經絡考云舌下有二隱竅名曰廉泉運動開張津液湧出然必藉腎中真陽為之熏騰乃是以上供若寒邪侵到少陰則真陽受困津液不得上潮故口渴與三陽經之邪熱爍干津液者大相反也病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利亡脈經作無方陰陽俱緊傷寒也傷寒不當有汗故謂汗為反出周案脈至陰陽俱緊陰寒極矣寒邪入里豈能有汗乃反汗出者則是真陽素虧無陽以固其外遂致腠理疏泄不發熱而汗自出也此屬少陰正用四逆急溫之時庶幾真陽驟回里證不作否則陰邪上逆則為咽痛為吐陰寒下泄而復為利種種危候不一而足也魏利者少陰本證吐而咽痛則孤陽飛越欲自上脫也可不急回其陽鎮奠其腎臟陰寒以救欲亡之陽乎真武四逆附子等湯斟酌用之可也案亡陽之亡程氏魏氏為出亡之亡以譏無陽之解然太陽上篇桂枝二越婢一湯條有無陽字此條亡字脈經作無字則必不出亡之義也柯氏云上焦從火化而咽痛嘔吐下焦從陰虛而下利不止也宜八味腎氣丸主之案柯氏所論於雜病往往有如此者此條證決非腎氣丸所主也少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也以玉函作為錫此三節俱論少陰不可發汗平脈篇云腎氣微少精血奔氣促迫上入胸膈是咳者少陰精血少奔氣上逆也下利者少陰腎氣微津液下注也復以火劫其汗則少陰精氣妄泄神氣浮越水不勝火則發譫語故曰譫語者被火氣劫故也然不特譫語小便必難以強責少陰腎臟之精而為汗竭其津液之源故也蔣賓侯曰少陰下利極多何曾皆是被火且被火未必下利惟譫語乃是被火經云被火者必譫語故咳而下利譫語者當分看為是程少陰病咳而下利真武中有此證方強責謂過求也案汪引補亡論云常器之用救逆湯豬苓湯五苓散以通小便金鑑曰白虎豬苓二湯擇而用之可耳並誤也蓋因喻氏熱邪挾火力之解而襲其弊耳當是茯苓四逆證矣少陰病脈細沉數病為在裡不可發汗程何謂之裡少陰病脈沉是也毋論沉細沉數俱是臟陰受邪與表陽是無相干法當固密腎根為主其不可發汗從脈上斷非從證上斷麻黃附子細辛湯不可恃為常法也薛慎庵曰人知數為熱不知沉細中見數為寒甚真陰寒證脈常有一息七八至者盡概此一數字中但按之無力而散耳宜深察也案此條方喻諸家以熱邪入里為解乃與經旨乖矣少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之亡脈經千金翼作無錢云亡音無錢微者細小軟弱似有若無之稱也脈微則陽氣大虛衛陽衰弱故不可發汗以更竭其陽以汗雖陰液為陽氣所蒸而為汗汗泄而陽氣亦泄矣今陽氣已虛故曰亡陽故也若陽已虛而其尺脈又弱澀者如命門之真火衰微腎家之津液不足不惟不可發汗復不可下之又竭其陰精陽氣也此條本為少陰禁汗禁下而設故不言治然溫經補陽之附子湯之類即其治也程拈出尺脈弱澀字則少陰之有大承氣湯證其尺脈必強而滑已伏見於此處矣汪云補亡論並宜附子湯以補陽氣散陰邪助營血也周云不可汗用四逆加人參湯不可下者用蜜煎導少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈錢脈緊見於太陽則惡熱惡寒而為寒邪在表見於少陰則無熱惡寒而為寒邪在裡至七八日則陰陽相持已久而始下利則陽氣耐久足以自守矣雖至下利而以絞索之緊忽變而為輕細軟弱之微脈微則恐又為上文不可發汗之亡陽脈矣為之如何不知少陰病其脈自微方可謂之無陽若以寒邪極盛之緊脈忽見暴微則緊峭化而為寬緩矣乃寒邪弛解之兆也曰手足反溫則知脈緊下利之時手足已寒若寒邪不解則手足不當溫脈緊不當去因脈本不微而忽見暴微故手足得溫脈緊得去是以謂之反也反溫反去寒氣已弛故為欲解也雖其人心煩然煩屬陽而為暖氣已回故陰寒之利必自愈也少陰病下利若利自止惡寒而蜷臥手足溫者可治柯本刪下利二字蜷方本作倦程少陰病下利而利自止則陰寒亦得下祛而又不致於脫雖有惡寒蜷臥不善之證但使手足溫者陽氣有挽回之機雖前此失之於溫今可尚溫而救失也錢大凡熱者偃臥而手足弛散寒則蜷臥而手足斂縮下文惡寒蜷臥而手足逆冷者即為真陽敗絶而成不治矣若手足溫則知陽氣未敗尚能溫暖四肢故曰可治汪溫經散寒宜四逆湯主之活人書釋音曰蜷具員切蜷局不伸也少陰病惡寒而蜷時自煩欲去衣被者可治千金翼作不可治錢但惡寒而不發熱為寒邪所中也蜷臥者蜷曲而臥諸寒收引惡寒之甚也程少陰病不必盡下利也只惡寒而蜷已知入藏深矣煩而去衣被陽勢尚肯力爭也而得之時與欲又非虛陽暴脫者比雖前此失之於溫今尚可溫而救失也喻後條云不煩而躁者死對看便知案總病論活人書並云宜大柴胡湯可疑少陰中風脈陽微陰浮者為欲愈錢太陽中風陽浮而陰弱蓋以浮候沉候分陰陽也此所謂陽微陰浮者是以寸口尺中分陰陽也若以浮沉二候分陰陽則沉候豈有浮脈邪此不辨自明也夫少陰中風者風邪中少陰之經也脈法浮則為風風為陽邪中則傷衛衛受風邪則寸口陽脈當浮今陽脈已微則知風邪欲解邪入少陰唯恐尺部脈沉沉則邪氣入里今陰脈反浮則邪不入里故為欲愈也少陰病欲解時從子至寅上至玉函作盡無上字成陽生於子子為一陽醜為二陽寅為三陽少陰解於此者陰得陽則解也喻各經皆解於所王之時而少陰獨解於陽生之時陽進則陰退陽長則陰消正所謂陰得陽則解也即是推之而少陰所重在真陽不可識乎少陰病吐利手足不逆冷反發熱者不死脈不至者原注至一作足灸少陰七壯脈經千金翼吐上有其人二字千金翼至作足程少陰病吐而且利里陰勝矣以胃陽不衰故手足不逆冷夫手足逆冷之發熱為腎陽外脫手足不逆冷之發熱為衛陽外持前不發熱今反發熱自非死候人多以其脈之不至而委棄之失仁人之心與術矣不知脈之不至由吐利而陰陽不相接續非脈絶之比灸少陰七壯治從急也嗣是而用藥自當從事於溫魏灸其少陰本穴七壯者就其經行之道路扶其陽氣使宣通則吐利不止自止脈不至亦必至矣七壯必非一穴凡少陰之經起止循行之處皆可灸也仍須溫中扶陽又不待言汪云常器之云是少陰太溪二穴在內踝後跟骨動脈陷中龐安常云發熱謂其身發熱也經曰腎之原出於太溪藥力尚緩惟急灸其原以溫其臟猶可挽其危也案活人書亦云太溪穴少陰病八九日一身手足盡熱者以熱在膀胱必便血也錢大凡寒邪入少陰必惡寒逆冷故以反發熱者為陽回陰解而不死此因邪氣入少陰至八九日之久一身手足盡熱者蓋以足少陰腎邪傳歸足太陽膀胱也腎與膀胱一表一里乃臟邪傳腑為自陰還陽以太陽主表故一身手足盡熱也熱邪在膀胱迫血妄行故必便血也必便血三字前注家俱為必出一陰之竅方喻並同恐熱邪雖在膀胱而血未必從小便出也案汪引常器之云可桃仁承氣湯芍藥地黃湯愚以還宜芍藥地黃湯柯氏云輕則豬苓湯重則黃連阿膠湯蓋柯説為的對矣少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭為難治成本無者字錫此論少陰生陽衰於下而真陰竭於上也少陰病但厥無汗者陽氣微也夫汗雖血液皆由陽氣之熏蒸宣發而出也今少陰生陽衰微不能蒸發故無汗強發之不能作汗反動其經隧之血從空竅而出也然未知從何道之竅而出少陰之脈循喉嚨挾舌本系目系故或從口鼻或從目出陽氣厥於下而陰血竭於上少陰陰陽氣血俱傷矣故為難治程難治者下厥非溫不可而上竭則不能用溫故為逆中之逆耳案汪氏云案此條仲景但云難治其非必死之證明矣補亡論常器之云可芍藥地黃湯成氏方氏喻氏魏氏金鑑並以此條證為熱厥蓋襲常氏之謬耳案喻氏云後人隨文讀去總置不講不知下厥者陰氣逆於下也上竭者陰血竭於上也蓋氣與血兩相維附氣不得血則散而無統血不得氣則凝而不流故陰火動而陰氣不得不上奔陰氣上奔而陰血不得不從之上溢而竭矣血既上溢其隨血之氣散於胸中不得復反於本位則下厥矣陰既逆於下勢必龍雷之火應之血不盡竭不止也仲景所以斷為難治者非直不治也吾為大辟其扃則以健脾中之陽氣為第一義健脾之陽一舉有三善一者脾中之陽氣旺而龍雷之火潛伏也一者脾中之陽氣旺而胸中窒塞如太空不留纖翳也一者脾中之陽氣旺而飲食運化精微復生其竭之血也出醫門法律以此推之下厥上竭唯景嶽六味回陽飲滋陰回陽兩全以為合劑矣少陰病惡寒身蜷而利手足逆冷者不治錢前惡寒而蜷因有煩而欲去衣被之證為陽氣猶在故為可治又下利自止惡寒而蜷以手足溫者亦為陽氣未敗而亦曰可治此條惡寒身蜷而利且手足逆冷則四肢之陽氣已敗故不溫又無煩與欲去衣被之陽氣尚存況下利又不能止是為陽氣已竭故為不治雖有附子湯及四逆白通等法恐亦不能挽回既絶之陽矣舒案此證尚未至汗出息高猶可為治急投四逆湯加人參或者不死少陰病吐利躁煩四逆者死喻上吐下利因至煩躁則陰陽擾亂而竭絶可虞更加四肢逆冷是中州之土先敗上下交徵中氣立斷故主死也使蚤用溫中之法寧至此乎張此條與吳茱萸湯一條不殊何彼可治而此不可治耶必是已用溫中諸湯不愈轉加躁煩故主死耳總病論曰與吳茱萸湯宜細審其死生也舒氏云案此條與後吳茱萸湯證無異彼證未言死此證胡為乎不主吳茱萸湯而斷之曰死是何理也於中疑有缺文少陰病下利止而頭眩時時自冒者死錢前條利自止而手足溫則為可治此則下利止而頭眩頭眩者頭目眩暈也且時時自冒冒者蒙冒昏暈也虛陽上冒於巔頂則陽已離根而上脫下利無因而自止則陰寒凝閉而下竭於此可見陽回之利止則可治陽脫之利止則必死矣正所謂有陽氣則生無陽氣則死也然既曰死證則頭眩自冒之外或更有惡寒四逆等證及可死之脈未可知也但未備言之耳少陰病四逆惡寒而身蜷脈不至不煩而躁者死原注一作吐利而躁逆者苑錢惡寒身蜷而利手足逆冷者固為不治此條但不利耳上文吐利煩躁四逆者死此雖不吐利而已不見陽煩但見陰躁則有陰無陽矣其為死證無疑況又脈不至乎前已有脈不至者因反發熱故云不死又有脈不出者雖裡寒而猶有外熱身反不惡寒而面赤其陽氣未絶故有通脈四逆湯之治此則皆現陰極無陽之證且不煩而躁並虛陽上逆之煩亦不可得矣寧有不死者乎少陰病六七日息高者死程夫肺主氣而腎為生氣之源蓋呼吸之門也關係人之生死者最巨息高者生氣已絶於下而不復納故遊息僅呼於上而無所吸也死雖成於六七日之後而機自兆於六七日之前既值少陰受病何不預為固護預為堤防逮今真陽渙散走而莫追誰任殺人之咎少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死程今時論治者不至於惡寒蜷臥四肢逆冷等證疊見則不敢溫不知證已到此溫之何及況諸證有至死不一見者則盍於本論中之要旨一一申詳之少陰病脈必沉而微細論中首揭此蓋已示人以可溫之脈矣少陰病但欲臥論中又已示人以可溫之證矣汗出在陽經不可溫在少陰宜急溫論中又切示人以亡陽之故矣況復有不煩自欲吐陰邪上逆之證乎則真武四逆誠不啻三年之艾矣乃不知預綢繆延緩至五六日前欲吐今且利矣前不煩今煩且躁矣前欲臥今不得臥矣陽虛擾亂陰盛轉加焉有不死者乎原文煩冗今採金鑑所改柯六經中獨少陰曆言死證他經無死證甚者但曰難治耳知少陰病是生死關案他經亦有死證但不如此經之多端也少陰病始得之反發熱脈沉者麻黃細辛附子湯主之千金翼脈下更有反字成本玉函作麻黃附子細辛湯錢此言少陰之表證也曰始得之者言少陰初感之邪也始得之而即稱少陰病則知非陽經傳邪亦非直入中臟乃本經之自感也始得之而發熱在陽經則常事耳然脈沉則已屬陰寒篇首云無熱而惡寒者發於陰也發於陰而又發熱是不當發之熱故云反也察其發熱則寒邪在表診其脈沉則陰寒在裡表者足太陽膀胱也里者足少陰腎也腎與膀胱一表一里而為一合表裡兼治程脈沉者由其人腎經素寒雖表中陽邪而里陽不能協應故沉而不能浮也周少陰與太陽相為表裡故言少陰表證即太陽也麻黃細辛附子湯方麻黃二兩去節細辛二兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升日三服千金翼一斗作二斗二升作一升成本脫諸字錢麻黃發太陽之汗以解其在表之寒邪以附子溫少陰之裡以補其命門之真陽又以細辛之氣溫味辛專走少陰者以助其辛溫發散三者合用補散兼施雖發微汗無損於陽氣矣故為溫經散寒之神劑云傷寒瑣言曰趙嗣真曰仲景太陽篇云病發熱頭痛脈反沉身體疼痛當救其里宜四逆湯少陰篇云少陰病始得之反發熱脈沉者麻黃附子細辛湯均是發熱脈沉以其頭痛故屬太陽陽證脈當浮而反不能浮者以里久虛寒正氣衰微又身體疼痛故宜救里使正氣內強逼邪外出而乾薑附子亦能出汗而散假令里不虛寒而脈浮則正屬太陽麻黃症矣均是脈沉發熱以無頭痛故名少陰病陰病當無熱今反熱寒邪在表未全傳裡但皮膚鬱閉為熱故用麻黃細辛以發表熱附子以溫少陰之經假使寒邪入里外必無熱當見吐利厥逆等症而正屬少陰四逆湯症矣由此觀之表邪浮淺發熱之反猶輕正氣衰微脈沉之反為重此四逆湯不為不重於麻黃附子細辛矣又可見熟附配麻黃發中有補生附配乾薑補中有發仲景之旨微矣十便良方指迷方附子細辛湯頭痛者謂痛連腦戶或但額閣與眉相引如風所吹如水所濕遇風寒則極常欲得熱物尉此由風寒客於足太陽之經隨經入腦搏於正氣其脈微弦而緊謂之風冷頭痛於本方加川芎生薑醫貫曰有頭痛連腦者此係少陰傷寒宜本方不可不知醫經會解曰若少陰證脈沉欲寐始得之發熱肢厥無汗為表病里和當用正方緩以汗之若見二便閉澀或瀉赤水謂之有表復有里宜去麻黃名附子細辛湯仍隨各臟見證加藥房欲後傷寒者多患前證張氏醫通曰暴啞聲不出咽痛異常卒然而起或欲咳而不能咳或無痰或清痰上溢脈多弦緊或數疾無倫此大寒犯腎也麻黃附子細辛湯溫之並以蜜製附子噙之慎不可輕用寒涼之劑又云腳氣冷痹惡風者非朮附麻黃並用必不能開麻黃附子細辛湯加桂枝白朮少陰病得之二三日麻黃附子甘草湯微發汗以二三日無證故微發汗也玉函全書證上有里字方本以下並同蓋原文繫於遺脫當補入焉周案此條當與前條合看補出無里證三字知前條原無吐利躁渴里證也前條已有反發熱三字而此條專言無里證知此條亦有發熱表證也少陰證見當用附子太陽熱見可用麻黃已為定法但易細辛以甘草其義安在只因得之二三日津液漸耗比始得者不同故去細辛之辛散益以甘草之甘和相機施治分毫不爽耳程既云微發汗矣仍用以字故字推原之足見鄭重之意柯要知此條是微惡寒微發熱故微發汗也鑑此二證皆未曰無汗非仲景略之也以陰不得有汗不須言也麻黃附子甘草湯方麻黃二兩去節甘草二兩炙附子一枚炮去皮破八片上三味以水七升先煮麻黃一兩沸去上沫納諸藥煮取三升去滓溫服一升日三服玉函千金翼三升作二升半一升作八合周但言無里證則有反發熱之表在可知矣易細辛以甘草者因二三日其勢緩故甘草亦取其緩也設兼見嘔利一二里證專主救里在太陽已然況少陰乎少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之千金翼臥下有者字外臺同成脈經曰風傷陽寒傷陰少陰受病則得之於寒二三日以上寒極變熱之時熱煩於內心中煩不得臥也與黃連阿膠湯扶陰散熱知二三日邪在少陰四五日已轉屬陽明故無嘔利厥逆諸證而心煩不得臥者是陽明之熱內擾少陰故不欲寐也當以解熱滋陰為主治也周氣並於陰則寐故少陰多寐今反不得臥明是熱邪入里劫陰故使心煩遂不臥也二三日以上該以後之日而言之也舒外邪挾火而動者心煩不眠肌膚熯燥神氣衰減小便短而咽中干法主黃連阿膠湯分解其熱潤澤其枯此條挈證未全疑有缺文黃連阿膠湯方黃連四兩黃芩二兩成本玉函千金翼外臺作一兩芍藥二兩雞子黃三枚阿膠三兩一云三挺千金翼作三挺外臺作三片上五味以水六升先煮三物取二升去滓納膠煬盡小冷納雞子黃攪令相得溫服七合日三服水六升成本玉函作五升柯此少陰之瀉心湯也凡瀉心必藉連芩而導引有陰陽之別病在三陽胃中不和而心下痞硬者虛則加參甘補之實則加大黃下之病在少陰而心中煩不得臥者既不得用參甘以助陽亦不得用大黃以傷胃也故用芩連以直折心火用阿膠以補腎陰雞子黃佐芩連於瀉心中補心血芍藥佐阿膠於補陰中斂陰氣斯則心腎交合水升火降是以扶陰瀉陽之方而變為滋陰和陽之劑也吳此湯本治少陰溫熱之證以其陽邪暴虐傷犯真陰故二三日以上便見心煩不得臥所以始病之際即用芩連大寒之藥兼芍藥阿膠雞子黃以滋養陰血也然傷寒六七日後熱傳少陰傷其陰血者亦可取用與陽明腑實用承氣湯法雖虛實補瀉懸殊而祛熱救陰之意則一耳肘後方時氣瘥後虛煩不得眠眼中悁疼懊憹黃連四兩芍藥二兩黃芩一兩阿膠三小挺水六升煮取三升分三服亦可納雞子黃二枚少陰病得之一二日口中和其背惡寒者當灸之附子湯主之脈經無附子湯主之五字魏少陰病三字中該脈沉細而微之診見但欲寐之證卻不發熱而單背惡寒此少陰里證之確據也成少陰客熱則口燥舌乾而渴口中和者不苦不燥是無熱也背為陽背惡寒者陽氣弱陰氣勝也經曰無熱惡寒者發於陰也灸之助陽消陰與附子湯溫經散寒王背惡寒者陰寒氣盛此條是也又或陽氣內陷有背惡寒者經所謂傷寒無大熱口燥渴心煩背微惡寒白虎加人參湯主之是也一為陰寒氣盛一為陽氣內陷當於口中潤燥辨之汪氏云補亡論常器之云當灸膈俞關元穴背俞第三行案第三行者當是膈關非膈俞也圖經云膈關二穴在第七椎下兩旁相去各三寸陷中正坐取之足太陽氣脈所發專治背惡寒脊強俯仰難可灸五壯蓋少陰中寒必由太陽而入故宜灸其穴也又關元一穴在腹部中行臍下三寸足三陰任脈之會灸之者是溫其里以助其元氣也錢氏云灸之謂灸少陰之脈穴如湧泉然谷太溪復溜陰谷等井榮輸經合即三部九候論之所謂下部地足少陰也王注云謂腎脈在足內踝後跟骨上陷中太溪之分動脈應手者是也灸之者所以溫少陰之經也附子湯方附子二枚炮去皮破八片成本方本諸本脫炮字只志聰錫駒本有炮字茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服柯此大溫大補之方乃正治傷寒之藥為少陰固本御邪第一之劑也與真武湯似同而實異倍朮附去薑加參是溫補以壯元陽真武湯還是溫散而利胃水也汪武陵陳氏曰四逆諸方皆有附子於此獨名附子湯其義重在附子他方皆附子一枚此方兩枚可見也附子之用不多則其力豈能兼散表裡之寒哉邪之所湊其氣必虛參朮茯苓皆甘溫益氣以補衛氣之虛辛熱與溫補相合則氣可益而邪可散矣既用附子之辛烈而又用芍藥者以斂陰氣使衛中之邪不遽全進於陰耳千金方附子湯治濕痹緩風身體疼痛如欲折肉如錐刺刀割於本方加桂心甘草案此據下條證轉用者少陰病身體痛手足寒骨節痛脈沉者附子湯主之玉函注沉一作微錢身體骨節痛乃太陽寒傷營之表證也然在太陽則脈緊而無手足寒之證故有麻黃湯發汗之治此以脈沉而手足寒則知寒邪過盛陽氣不流營陰滯澀故身體骨節皆痛耳且四肢為諸陽之本陽虛不能充實於四肢所以手足寒此皆沉脈之見證也故以附子湯主之以溫補其虛寒也即此推之太陽篇之發汗病不解虛故也以芍藥甘草附子湯及發汗後身疼痛脈沉遲者桂枝加芍藥生薑人參新加湯主之者皆汗多亡陽陰盛陽虛之證即此義也少陰病下利便膿血者桃花湯主之方本利作痢注云古利無疒疒後人所加成陽病下利便膿血者協熱也少陰病下利便膿血者下焦不約而裡寒也與桃花湯固下散寒汪此條乃少陰中寒即成下利之證下利便膿血協熱者多今言少陰病下利必脈微細但欲寐而復下利也下利日久至便膿血乃里寒而滑脫也錢見少陰證而下利為陰寒之邪在裡濕滯下焦大腸受傷故皮拆血滯變為膿血滑利下脫故以溫中固脫之桃花湯主之案此條證喻氏柯氏魏氏周氏金鑑併為傳經熱邪之所致大乖經旨錢氏辨之詳矣見下條注柯氏以症治疏略刪去桃花湯方赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈余勿服金匱千金翼溫下無服字千金翼去上有湯成二字成澀可去脫赤石脂之澀以固腸胃辛以散之乾薑之辛以散裡寒粳米之甘以補正氣印石脂色如桃花故名桃花湯或曰即桃花石吳服時又必加末方寸匕留滯以沾腸胃也案柯氏云名桃花者春和之義非徒以色言耳王子接云桃花湯非名其色也腎臟陽虛用之一若寒谷有陽和之致故名二説並鑿矣金匱要略下利便膿血者桃花湯主之醫方集解昂案此症成氏以為寒而吳鶴皋王肯堂皆以為熱竊謂便膿血者固多屬熱然豈無下焦虛寒腸胃不固而亦便膿血者乎若以此為傳經熱邪仲景當用寒劑以徹其熱而反用石脂固澀之藥使熱閉於內而不得泄豈非關門養盜自貽伊戚也耶觀仲景之治協熱利如甘草瀉心生薑瀉心白頭翁等湯皆用芩連黃柏而治下焦虛寒下利者用赤石脂禹餘糧湯比類以觀斯可見矣此症乃因虛以見寒非大寒者故不必用熱藥惟用甘辛溫之劑以鎮固之耳本草言石脂性溫能益氣調中固下未聞寒能損胃也肘後方療傷寒若下膿血者赤石脂湯方赤石脂二兩碎乾薑二兩切附子一兩炮破上三味以水五升煮取三升去滓溫分三服臍下痛者加當歸一兩芍藥二兩用水六升千金方桃花丸治下冷臍下攪痛乾薑赤石脂各十兩上二味蜜丸如豌豆服十丸日三服加至二十丸和劑局方桃花丸治腸胃虛弱冷氣乘之臍腹攪痛下利純白或冷熱相搏赤白相雜腸滑不禁日夜無度方同上只面和為丸為異千金翼乾薑丸主胃中冷不能食或食已不消方乾薑十兩赤石脂六兩上搗篩為末煉蜜和丸如梧子服十丸日三外臺祕要崔氏療傷寒後赤白滯下無數阮氏桃華湯方赤石脂八兩冷多白滯者加四兩粳米一升乾薑四兩冷多白滯者加四兩切上三味以水一斗煮米熟湯成去滓服一升不瘥復作熱多則帶赤冷多則帶白少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之全書痛作滿止下玉函有而字成二三日以至四五日寒邪入里深也腹痛者裡寒也小便不利者水穀不別也下利不止便膿血者腸胃虛弱下焦不固也與桃花湯固腸止利也錢二三日至四五日陰邪在裡氣滯腸間故腹痛也下焦無火氣化不行故小便不利且下利不止則小便隨大便而頻去不得瀦蓄於膀胱而小便不得分利也下利不止氣虛不固而大腸滑脫也便膿血者邪在下焦氣滯不流而大腸傷損也此屬陰寒虛利故以澀滑固脫溫中補虛之桃花湯主之汪少陰裡寒便膿血所下之物其色必黯而不鮮乃腎受寒濕之邪水穀之津液為其凝泣醞釀於腸胃之中而為膿血非若火性急速而色鮮明蓋冰伏已久其色黯黑其氣不臭其人必脈微細神氣靜而腹不甚痛喜就溫暖欲得手按之腹痛即止斯為少陰寒利之徵案錢氏云腹痛小便不利下利不止便膿血者痢疾也自成氏以來凡注皆為裡寒惟尚論為少陰熱邪若果熱邪填塞胃中如何可用乾薑之辛熱以散之似屬背理恐指為寒邪者未為大誤指為熱邪者反貽誤後人不少矣若以乾薑為誤其誤當責之立法之仲景矣但觀痢證有用大黃黃連而愈者有用乾薑肉果人參附子而愈者皆非明證邪此論可謂能得經旨矣千金諸書所用亦皆不過治寒以熱之意爾況名醫別録赤石脂酸辛大溫無毒治腸澼下利赤白亦復一證矣少陰病下利便膿血者可刺錢邪入少陰而下利則下焦壅滯而不流行氣血腐化而為膿血故可刺之以泄其邪通行其脈絡則其病可已不曰刺何經穴者蓋刺少陰之井榮輸經合也其所以不言者以良工必知之熟矣故不必贅也張先下利日久而後便膿血則用桃花湯若不先下利而下利便膿血則可刺經穴若刺經穴不愈則當從事白頭翁湯設更咽乾心煩不得眠則又須黃連阿膠湯為合法也汪補亡論常器之云可刺幽門交信案此條證與少陰病八九日一身手足盡熱者以熱在膀胱必便血也正相同乃是熱迫血分而便膿血者錢注為是方氏則為裡寒滑脫證汪氏則亦改刺字作灸字並誤矣少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之利下玉函有而字逆成本作厥諸本同惟志聰金鑑作逆錢吐利陰證之本證也或但吐或但利者猶可若寒邪傷胃上逆而吐下攻而利乃至手足厥冷蓋四肢皆稟氣於胃而為諸陽之本陰邪縱肆胃陽衰敗而不守陰陽不相順接而厥逆陽受陰迫而煩陰盛格陽而躁且煩躁甚而至於欲死故用吳茱萸之辛苦溫熱以泄其厥氣之逆而溫中散寒蓋茱萸氣辛味辣性熱而臭臊氣味皆厚為厥陰之專藥然溫中解寒又為三陰並用之藥更以甘和補氣之人參以補吐利虛損之胃氣又宣之以辛散止嘔之生薑和之以甘緩益脾之大棗為陰經急救之方也喻吐利厥冷而至於煩躁欲死腎中之陰氣上逆將成危候故用吳茱萸以下其逆氣而用人參薑棗以厚土則陰氣不復上干矣案吳茱萸湯之用有三陽明食谷欲嘔用之少陰吐利用之厥陰乾嘔吐涎沫者亦用之要皆以嘔吐逆氣為主與四逆湯之吐利厥逆自異少陰病下利咽痛胸滿心煩豬膚湯主之煩下成本有者字程下利雖是陰邪咽痛實為急候況兼胸滿心煩誰不曰急則治標哉然究其由來實是陰中陽乏液從下溜而不能上蒸故有此只宜豬膚湯潤以滋其土而苦寒在所禁也雖是潤劑卻加白粉少陰經所重者趺陽也案此條證成氏以降諸家並以為陽經傳入之熱邪特柯氏與程氏同義若果為熱邪則宜用苦寒清熱之品明是不過陰證治標之藥耳豬膚湯方豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服成本玉函脫令字周豬膚王以為豬皮吳以為燖豬時刮下黑膚二説不同考禮運疏云革膚內厚皮也膚革外厚皮也由斯以言則吳説為是洵是淺膚之義案此説出於本草綱目引汪機會編錢豬膚一味方中向未注明如吳綬謂燖豬時刮下黑膚也方有執謂既謂膚當以燖豬時所起之皮外毛根之薄膚為是王好古以為豬皮尚論云若以為燖豬皮外毛根薄膚則蘞劣無力且與熬香之説不符但以外皮去其內層之肥白為是若果以燖豬時毛根薄膚則薄過於紙且與垢膩同下熬之有何香味以意度之必是毛根深入之皮尚可稱膚試觀刮去毛根薄膚毛斷處毛根尚存皮內所謂皮之去內層極為允當蓋以豬為北方之水畜膚近毛根取其色黑而走腎滋腎吳豬膚但當取厚皮湯泡去肥白油刮取皮上一層白膩者為是徐白粉白米粉舒云取豬皮一斤內去油外去毛刮淨白者案豬膚諸説紛紛未知孰是活人指掌豬膚諸家所論不同龐安時云去膜如此論之即豬膊膏也膚上安得有膜或有用豬皮者兼本草中不載豬膚但云燖豬湯解諸毒疑可用彘豬皮上黑膚也所以言膚者肌膚之義禮內則麋膚魚醢注膚切肉也賈疏不太明亦他書無所考外臺深師貼喉膏集驗烏扇膏並用豬膏脂治喉痛則姑用皮上白膩者於理為是當博考活人指掌英粉白粉即米粉也案錢氏以白粉為粟米粉非也張氏醫通徐君育素稟陰虛多火且有脾約便血證十月間患冬溫發熱咽痛俚醫用麻仁杏仁半夏枳橘之屬遂喘逆倚息不得臥聲颯如啞頭面赤熱手足逆冷右手寸關虛大微數此熱傷手太陰氣分也與葳蕤甘草等藥不應為制豬膚湯一甌令隔湯頓熱不時挑服三日聲清終劑而痛如失本經逢原豬膚者皮上白膏是也取其鹹寒入腎用以調陰散熱故仲景治少陰病下利咽痛胸滿心煩有豬膚湯豫嘗用之其效最捷少陰病二三日咽痛者可與甘草湯不瘥與桔梗湯成本玉函瘥下有者字程若咽痛而不兼下利則自無胸滿心煩之證雖不由於腎寒上逆然只熱客少陰之標而無關臟本若寒則犯本不可用也只宜甘草緩之不瘥者經氣阻而不通也加苦梗以開之喻嘉言曰此在二三日他證未具故用之若五六日則少陰之下利嘔逆諸證蜂起此法並未可用矣甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服二服外臺作三服桔梗湯方桔梗一兩甘草二兩外臺作三兩上二味以水三升煮取一升去滓溫分再服溫分成本玉函千金翼作分溫汪經中客熱故咽痛用甘草湯者甘以發其熱緩其痛也服湯後不瘥者與桔梗湯即於甘草湯內加桔梗以開提其邪邪散則少陰之氣自和矣錢桔梗乃苦桔梗非甜桔梗也徐甘草一味單行最能和陰而清衝任之熱每見生便癰者驟煎四兩頓服立愈則其能清少陰客熱可知所以為咽痛專方也錫聶干庵曰後人以甘桔通治咽喉諸病本諸於此志聰云案本論湯方甘草俱炙炙則助脾土而守中惟此生用生則和經脈而流通學者不可以其近而忽之也案單味甘草湯功用頗多玉函經治小兒撮口發噤用生甘草二錢半水一盞煎六分溫服令吐痰涎後以乳汁點兒口中千金方甘草湯治肺痿涎唾多心中溫溫液液者又凡服湯嘔逆不入腹者先以甘草三兩水三升煮取二升服之得吐但服之不吐益佳消息定然後服余湯即流利更不吐也此類不遑枚舉也金匱要略咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之即本方肘後方喉痹傳用神效方桔梗甘草炙各一兩上二味切以水一升煮取服即消有膿即出聖惠方治喉痹腫痛飲食不下宜服此方桔梗一兩去蘆頭甘草一兩生用上件藥都銼以水二大盞煎至一大盞去滓分為二服服後有膿出即消和劑局方如聖湯治風熱毒氣上攻咽喉咽痛喉痹腫塞妨悶及肺壅咳嗽咯唾膿血胸滿振寒咽乾不渴時出濁沫氣息腥臭久久吐膿狀如米粥又治傷寒咽痛即本方聖濟總録散毒湯治喉痹腫塞用桔梗甘草各二兩又桔梗湯治咽喉生瘡疼痛於本方加惡實微炒各一兩竹葉十斤小兒方訣甘桔散治涎熱咽喉不利甘草炒二兩桔梗一兩米泔浸一宿焙乾用上為末每服大二錢水一盞入阿膠半片炮過煎至五分食後溫服三因方荊芥湯治風熱肺壅咽喉腫痛語聲不出喉中如有物哽咽之則痛甚於桔梗湯內加荊芥穗濟生名三神湯直指保安炙甘草方癰疽漏瘡通用神妙粉草以山泉溪澗長流水一小碗徐蘸水漫火炙水盡為度稱一兩上銼粗末用醇酒三碗煎二碗空心隨意溫服最活血消毒又諸癰疽大便祕方甘草生一兩上銼碎井水濃煎入酒調服能疏導惡物又乳癰初腫方甘草生二錢炙二錢粗末分兩次新水煎服即令人吮乳又生薑甘桔湯治癰疽諸發毒氣上衝咽喉胸膈窒塞不利於本方內加生薑御藥院方甘桔湯治胸中結氣咽喉不利下一切氣於本方加杏仁二兩經驗祕方治喉咽鬱結聲音不聞大名安提舉神效方於桔梗湯內加訶子各等分生熟亦各半為細末食後沸湯調服又名鐵叫子如聖湯施圓端效方橘甘湯治咽喉噎塞堵閉咳咯膿或血於桔梗湯內加橘皮半夏生薑水煎服備預百要方喉閉飲食不通欲死方即桔梗湯兼治馬喉痹馬項長故凡痹在項內不見處深腫連脥壯熱吐氣數者是也醫壘元戎仲景甘桔湯例仁宗御名如聖湯治少陰咽痛炙甘草一兩桔梗三兩上粗末水煎加生薑煎亦可一法加訶子皮二錢煎去渣飲清名訶子散治失音無聲如咳逆上氣者加陳皮如涎嗽者加知母貝母如酒毒者加葛根如少氣者加人參麥門冬如唾膿血者加紫菀如疫毒腫者加黍黏子大黃如咳渴者加五味子如嘔者加生薑半夏如目赤者加梔子大黃如胸膈不利者加枳殼如不得眠者加梔子如心胸痞者加枳實如膚痛者加黃耆如面目腫者加茯苓如咽痛者加黍黏子竹茹如肺痿者加阿膠能續氣如發狂者加防風荊芥如聲不出者加半夏薛氏醫案武選汪用之飲食起居失宜咳嗽吐痰用化痰發散之藥時仲夏脈洪數而無力胸滿面赤吐痰腥臭汗出不止余曰水泛為痰之證而用前劑是謂重亡津液得非肺癰乎不信仍服前藥翌日果吐膿脈數左寸右寸為甚始信用桔梗湯一劑膿數頓止再劑全止面色頓白仍以憂惶余曰此證面白脈澀不治自愈又用前藥一劑佐以六味丸治之而愈少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之錢前人以一咽瘡而有治法三等之不同遂至議論紛出不知其一條咽痛少陰之邪氣輕微故但以甘桔和之而已其一條因經邪未解痛在咽中痰熱鎖閉故以半夏開豁桂枝解散此條則咽已生瘡語言不能聲音不出邪已深入陰火已熾咽以損傷不必治表和之無益故用苦酒湯以半夏豁其咽之不利雞子白以潤咽滑竅且能清氣除伏熱皆用開豁潤利收斂下降而已因終是陰經伏熱雖陰火上逆決不敢以寒涼用事也汪或問仲景言咽痛咽以咽物於喉何與而云語聲不出邪余答云喉與咽相附仲景言少陰病熱咽痛而喉嚨即在其中苦酒湯方半夏洗破如棗核十四枚玉函成本核下有大字神巧萬全方七個洗切破作十四片雞子一枚去黃納上苦酒著雞子殼中玉函無上字著作於千金翼上下有好字上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑玉函無著字成本玉函環作鐶少少玉函作細一字玉函無三劑二字千金翼劑下有愈字全書劑下有服之二字置刀環中聖濟總録作放剪刀環中錢半夏開上焦痰熱之結邪卵白清氣治伏熱苦酒味酸使陰中熱淫之氣斂降今之優人每遇聲啞即以生雞子白啖之聲音即出亦此方之遺意也鑑半夏滌涎蛋清斂瘡苦酒消腫則咽清而聲出也案活人書苦酒米醋是也蓋原於本草陶注王氏云案苦酒本草注曰醯而成氏復云苦酒之酸余則以為名義俱乖安知酒之味苦者不可以已咽痛邪考本草醋也醯也苦酒也併為一物陶云以有苦味俗呼苦酒不知王氏何據有此説又案王氏云上苦酒上字無著落矣宜較正之不知上是上好之謂千金翼作上好苦酒可見耳外臺祕要古今録驗雞子湯療喉痹方半夏末方寸匕上一味開雞子頭去中黃白盛淳苦酒令小滿納半夏末著中攪令和雞子著刀子環令穩炭上令沸藥成置杯中及暖稍咽之但腫即減肘後文仲同此與仲景苦酒湯同半夏不可作末剖之可也聖惠方治咽喉中如有物咽唾不得宜服此方半夏一七枚破如棋子大湯洗七遍去滑上以雞子一枚打破其頭出黃白納半夏併入醋於殼中令滿微火煎去半夏候冷飲之即愈聖濟總録治狗咽雞子法半夏一錢末薑汁搜為餅子焙乾研細雞子一枚上二味先開雞子頭去黃又盛苦酒一半入半夏末殼中攪令勻安雞子坐於煻灰火中慢煎沸熟取出後稍冷就殼分溫三服少陰病咽中痛半夏散及湯主之外臺咽中作咽喉鑑少陰病咽痛者謂或左或右一處痛也咽中痛者謂咽中皆痛也較之咽痛而有甚焉甚則涎纏於咽中故主以半夏散散風邪以逐涎也半夏散及湯方半夏洗桂枝去皮甘草炙上三味等分各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸納散兩方寸匕更煮三沸下火令小冷少少咽之半夏有毒不當散服上成本作已上兩字玉函作一二二字全書作一兩二字更煮玉函成本作更煎玉函成本無半夏有毒不當散服八字錢咽中痛則陽邪較重故以半夏之辛滑以利咽喉而開其黏飲仍用桂枝以解衛分之風邪又以甘草和之活人書曰半夏桂枝甘草湯治伏氣之病謂非時有暴寒中人伏氣於少陰經始不覺病旬月乃發脈便微弱法先咽痛似傷寒非咽痹之病次必下利始用半夏桂枝甘草湯主之次四逆散主之此病只二日便瘥古方謂之腎傷寒也即本方作湯入生薑四片煎服少陰病下利白通湯主之錢下利已多皆屬實在少陰下焦清陽不升胃中陽氣不守之病而未有用白通湯者此條但云下利而用白通湯者以上有少陰病三字則知有脈微細但欲寐手足厥之少陰證觀下文下利脈微方與白通湯則知之矣利不止而厥逆無脈又加豬膽人尿則尤知非平常下利矣蓋白通湯即四逆湯而以蔥易甘草甘草所以緩陰氣之逆和薑附而調護中州蔥則辛滑行氣可以通行陽氣而解散寒邪二者相較一緩一速故其治亦頗有緩急之殊也案柯氏以此條症治疏略刪去白通湯方蔥白四莖乾薑一兩附子一枚生去皮破八片成本玉函生下有用字上三味以水三升煮取一升去滓分溫再服方用蔥白而曰白通者通其陽則陰自消也肘後方白通湯療傷寒泄利不已口渴不得下食虛而煩方即本方用蔥白十四莖乾薑半兩更有甘草半兩炙方後云渴微嘔心下停水者一方加犀角半兩大良少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生印少陰病下利陰寒在下也脈微邪在下而生陽氣微也故當用白通湯接在表在上之陽以下濟如利不止陰氣泄而欲下脫矣乾嘔而煩陽無所附而欲上脫矣厥逆無脈陰陽之氣不相交接矣是當用白通湯以通陽加水畜之膽引陰中之陽氣以上升取人尿之能行故道導陽氣以下接陰陽和而陽氣復矣方暴出燭欲燼而焰烈也微續真陽回而漸復也傷寒類方曰暴出乃藥力所迫藥力盡則氣仍絶微續乃正氣自復故可生也前云其脈即出者愈此云暴出者死蓋暴出與即出不同暴出一時出盡即出言服藥後少頃即徐徐微續也須善會之白通加豬膽汁湯方蔥白四莖乾薑一兩人尿五合豬膽汁一合附子一枚生去皮破八片生下宗印及錫駒本有用字是上五味以水三升煮取一升去滓納膽汁人尿和令相得分溫再服若無膽亦可用成本上作已上二字五味作三味並非也志始焉下利繼則利不止始焉脈微繼則厥逆無脈更兼乾嘔心煩者乃陰陽水火併竭不相交濟故以白通加豬膽汁湯夫豬乃水畜膽具精汁可以滋少陰而濟其煩嘔人尿乃入胃之飲水精四布五經並行可以資中土而和其厥逆中土相濟則煩嘔自除汪案方後云若無膽亦可用則知所重在人尿方當名白通加人尿湯始妥少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之自下利玉函作而利利下無者字小便利作小便自利千金及翼真武湯作玄武湯鑑論中心下有水氣發熱有汗煩渴引飲小便不利者屬太陽中風五苓散證也發熱無汗乾嘔不渴小便不利者屬太陽傷寒小青龍湯證也今少陰病二三日不已至四五日腹痛下利陰寒深矣設小便利是純寒而無水乃附子湯證也今小便不利或咳或嘔此為陰寒兼有水氣之證故水寒之氣外攻於表則四肢沉重疼痛內盛於裡則腹痛自利也水氣停於上焦胸肺則咳喘而不能臥停於中焦胃腑則嘔而或下利停於下焦膀胱則小便不利而或少腹滿種種諸證總不外乎陰寒之水而不用五苓者以非表熱之飲也不用小青龍者以非表寒之飲也故惟主以真武湯溫寒以制水也汪或下利者謂前自下利系二三日之證此必是前未嘗下利指四五日後始下利者而言真武湯方茯苓三兩芍藥三兩白朮二兩外臺作三兩生薑三兩切附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合日三服若咳者加五味子半升細辛一兩乾薑一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前為半斤外臺五味下有切字成本細辛下無一兩二字乾薑下有各字千金翼半斤下有利不止便膿血者宜桃花湯十一字張此方本治少陰病水飲內結所以首推朮附兼茯苓生薑之運脾滲水為務此人所易明也至用芍藥之微旨非聖人不能蓋此證雖曰少陰本病而實緣水飲內結所以腹痛自利四肢疼重而小便反不利也若極虛極寒則小便必清白無禁矣安有反不利之理哉則知其人不但真陽不足真陰亦已素虧若不用芍藥固護其陰豈能勝附子之雄烈乎即如附子湯桂枝加附子湯芍藥甘草附子湯皆芍藥與附子並用其溫經護營之法與保陰回陽不殊後世用藥獲仲景心法者幾人哉知白通通脈真武皆為少陰下利而設白通四逆附子皆生用惟真武一證熟用者蓋附子生用則溫經散寒炮熟則溫中去飲白通諸湯以通陽為重真武湯以益陽為先故用藥有輕重之殊乾薑能佐生附以溫經生薑能資熟附以散飲也錢加減法為後世俗醫所增察其文理紕繆惡其紫之亂朱故逐一指摘其誤使學者有所別識云今以文不録於斯汪氏引武陵陳氏亦云加減法系後人所附而非仲景原文矣王氏易簡方此藥不惟陰證傷寒可服若虛勞人憎寒壯熱咳嗽下利皆宜服之因易名固陽湯增損一如前法今人每見寒熱多用地黃當歸鹿茸輩補益精血殊不知此等藥味多甘卻欲戀膈若脾胃大段充實服之方能滋養然猶恐因時致傷胃氣胃為倉廩之官受納水穀之所五臟皆取氣於胃所謂精氣血氣皆由穀氣而生若用地黃等藥未見其生血穀氣已先有所損矣孫兆謂補腎不如補脾正謂是也故莫若以固陽湯調其寒熱不致傷脾飲食不減則氣血自生矣直指方治少陰腎證水飲與裡寒合而作嗽腹痛下利於本方加乾薑細辛五味子凡年高氣弱久嗽通用仍間服養正丹醫史朱右撰攖寧生傳云宋可與妾暑月身冷自汗口乾煩躁欲臥泥水中伯仁診其脈浮而數沉之豁然虛散曰素問云脈至而從按之不鼓諸陽皆然此為陰盛隔陽得之飲食生冷坐臥風露煎真武湯冷飲之一進汗止再進煩躁去三進平復如初餘子元病惡寒戰栗持捉不定兩手皆冷汗浸淫雖厚衣熾火不能解伯仁即與真武湯凡用附子六枚一日病者忽出人怪之病者曰吾不惡寒即無事矣或以問伯仁伯仁曰其脈兩手皆沉微余無表裡證此體虛受寒亡陽之極也初皮表氣隧為寒邪壅遏陽不得伸而然也是故血隧熱壅須用硝黃氣隧寒壅須用桂附陰陽之用不同者無形有形之異也少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之成本玉函色赤作赤色止下玉函有而字成下利清穀手足厥逆脈微欲絶為裡寒身熱不惡寒面色赤為外熱此陰甚於內格陽於外不相通也與通脈四逆湯散陰通陽汪武陵陳氏云裡寒外熱者寒甚於里有陰無陽而無根失守之火浮越於外也與通脈四逆湯以溫里散寒瀾格拒格也亦曰隔陽陰陽隔離也又曰戴陽浮於上如戴也夫真寒入里陰氣未有不盛者然其劇不過陽愈微陰愈盛耳通脈四逆湯方甘草二兩炙全書作三兩乾薑三兩強人可四兩附子大者一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩病皆與方相應者乃服之千金翼蔥下有白字玉函作桔梗二兩全書作人參一兩成本玉函無病皆以下十字玉函無去蔥去芍藥去桔梗八字千金翼乃服間有加減二字汪氏云去蔥去芍藥去桔梗此係衍文汪武陵陳氏云通脈四逆即四逆湯也其異於四逆者附子云大甘草乾薑之分兩加重然有何大異而加通脈以別之曰四逆湯者治四肢逆也論曰陰陽之氣不相順接便為厥厥者陽氣虛也故以四逆益真陽使其氣相順接而厥逆愈矣至於裡寒之甚者不獨氣不相順接並脈亦不相順接其證更劇故用四逆湯而制大其劑如是則能通脈矣同一藥耳加重則其治不同命名亦別方亦靈怪矣哉錢加減法揣其詞義淺陋料非仲景本意何也原文中已先具諸或有之證然後出方立治則一通脈四逆湯其證皆可該矣豈庸續用加減邪況其立意庸惡陋劣要皆出於鄙俗之輩未敢竟削姑存之以備識者之鑑云汪氏云據條辨云通脈者加蔥之謂其言甚合制方之意況上證云脈微欲絶云云其人面赤色其文一直貫上則蔥宜加入方中不當附於方後雖通脈之力不全在蔥實賴蔥為引而效始神方中無蔥者乃傳寫之漏不得名通脈也錢氏云以四逆湯而倍加乾薑其助陽之力或較勝然既增通脈二字當自不同恐是已加蔥白以通陽氣有白通之義故有是名疑是久遠差訛或編次之失致原方中脫落未可知也案二氏之説未知果是否姑附存於斯少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之錫凡少陰病四逆俱屬陽氣虛寒然亦有陽氣內郁不得外達而四逆者又宜四逆散主之枳實胃家之宣品所以宣通胃絡芍藥疏泄經絡之血脈甘草調中柴胡啓達陽氣於外行陽氣通而四肢溫矣魏士千曰泄利下重者裡急後重也其非下利清穀明矣鑑四逆雖陰盛不能外溫然亦有陽為陰鬱不得宣達而令四肢逆冷者但四逆而無諸寒熱證是既無可溫之寒又無可下之熱惟宜疏暢其陽故用四逆散主之錢少陰病者即前所謂脈微細但欲寐之少陰病也成氏云四逆四肢不溫也其説似與厥冷有異然論中或云厥或云厥逆或云四逆或云厥冷或云手足寒或云手足厥寒皆指手足厥冷而言也案成氏周氏魏氏並以此條證為傳經邪氣之熱厥錢氏指摘其非是矣四逆散方甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令拆泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕納湯中煮取一升半分溫再服注案此方雖云治少陰實陽明少陽藥也柯加味俱用五分而附子一枚薤白三升何多寡不同若是不能不疑於叔和編集之誤耳錢詳推後加減法凡原文中每具諸或有之證者皆有之如小柴胡湯小青龍湯真武湯通脈四逆湯四逆散皆是也愚竊揆之以理恐未必皆出於仲景程云四逆散一證寒熱未經詳定姑依小柴胡例從事和解然黃芩已經革去而使人知少陰之有火誠人身之至寶而不可須臾失也醫學入門祝仲寧號橘泉四明人治周身百節痛及胸腹脹滿目閉肢厥爪甲青黑醫以傷寒治之七日昏沉弗效公曰此得之怒火與痰相搏與四逆散加芩連瀉三焦火而愈案此案本出程篁墩文集橘泉翁傳但不著四逆散之名云與柴胡枳殼芍藥芩連瀉三焦火明日而省久之愈少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之千金翼下利作不利錫少陰病下利六七日陰盡出陽之期也鑑凡少陰下利清穀咳嘔不渴屬寒飲也今少陰病六七日下利黏穢咳而嘔渴煩不得眠是少陰熱飲為病也飲熱相搏上攻則咳中攻則嘔下攻則利熱耗津液故渴熱擾於心故煩不得眠宜豬苓湯利水滋燥飲熱之證皆可愈矣汪此方乃治陽明病熱渴引飲小便不利之劑此條病亦借用之何也蓋陽明病發熱渴欲飲水小便不利者乃水熱相結而不行茲者少陰病下利咳而嘔渴心煩不得眠者亦水熱搏結而不行也病名雖異而病源則同故仲景同用豬苓湯主之不過是清熱利水兼潤燥滋陰之義案此條視之黃連阿膠湯證乃有咳嘔渴及小便不利而大便下利之諸證所以不同也又案前條云少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也可知此條下利嘔渴心煩同證而有不得眠及不白之異乃是寒熱分別處少陰病得之二三日口燥咽乾者急下之宜大承氣湯錢此條得病才二三日即口燥咽乾而成急下之證者乃少陰之變非少陰之常也然但口燥咽乾未必即是急下之證亦必有胃實之證實熱之脈其見證雖少陰而有邪氣復歸陽明即所謂陽明中土萬物所歸無所復傳為胃家實之證據方可急下而用大承氣湯也其所以急下之者恐入陰之證陽氣漸亡胃腑敗損必至厥躁厄逆變證蜂起則無及矣故不得不急也舒少陰挾火之證復轉陽明而口燥咽乾之外必更有陽明胃實諸證兼見否則大承氣湯不可用也少陰病自利清水色純青心下必痛口乾燥者可下之宜大承氣湯原注一法用大柴胡自利玉函脈經作下利可字成本玉函作急是也宜下脈經有大柴胡湯四字宜作屬大承氣湯下有證字錢此亦少陰之變例也自利寒邪在裡也自利清水即所謂清水完穀此則並無完穀而止利清水其色且純青矣清水固屬寒邪而青則又寒色也故屬少陰成氏及方注皆以為肝色誤矣若證止如此其為四逆湯證無疑不謂胃中清水雖自利而去其穀食之渣滓熱邪尚留於胃所以心下按之必痛且口中乾燥則知邪氣雖入少陰而陽明實熱尚在非但少陰證也其熱邪熾盛迫脅胃中之津液下奔下焦寒甚故皆清水而色純青也陽邪暴迫上則胃中之津液下則腎家之真陰皆可立盡故當急下之也名醫類案曰孫兆治東華門竇太郎患傷寒經十餘日口燥舌乾而渴心中疼自利清水衆醫皆相守但調理耳汗下皆所不敢竇氏親故相謂曰傷寒邪氣害人性命甚速安可以不次之疾投不明之醫乎召孫至曰明日即已不可下今日正當下遂投小承氣湯大便通得睡明日平復衆人皆曰此證因何下之而愈孫曰讀書不精徒有書爾口燥舌乾而渴豈非少陰證耶少陰證固不可下豈不聞少陰一證自利清水心下痛下之而愈仲景之書明有此説也衆皆欽服少陰病六七日腹脹不大便者急下之宜大承氣湯脹字玉函脈經千金及翼並作滿錢少陰病而至六七日邪入已深然少陰每多自利而反腹脹不大便者此少陰之邪復還陽明也所謂陽明中土萬物所歸無所復傳之地故當急下與陽明篇腹滿痛者急下之無異也以陰經之邪而能復歸陽明之腑者即靈樞邪氣臟腑病形篇所謂邪入於陰經其臟氣實邪氣入而不能容故還之於腑中陽則溜於經中陰則溜於腑之義也然必驗其舌聚其脈有不得不下之勢方以大承氣下之耳舒少陰復轉陽明之證腹脹不大便者然必兼見舌苔乾燥惡熱飲冷方為實證少陰病脈沉者急溫之宜四逆湯汪少陰病本脈微細但欲寐今者輕取之微脈不見重取之細脈幾亡伏匿而至於沉此寒邪深中於里殆將入臟溫之不容以不急也少遲則惡寒身蜷吐利躁煩不得臥寐手足逆冷脈不至等死證立至矣四逆湯之用其可緩乎成既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者不云急溫此少陰病脈沉而云急溫者彼雖寒甚然而證已形見於外治之則有成法此初頭脈沉未有形證不知邪氣所之將發何病是急與四逆湯溫之少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜四逆湯心中溫溫玉函作心下嗢嗢千金作心中慍慍當玉函成本作急非也鑑飲食入口即吐且心中嗢嗢欲吐復不能吐噁心不已非少陰寒虛吐也乃胸中寒實吐也故始得之脈弦遲弦者飲也遲者寒也而手足寒者乃胸中陽氣為寒飲所阻不能通於四肢也寒實在胸當因而越之故不可下也若膈上有寒飲但乾嘔有聲而無物出此為少陰寒虛之飲非胸中寒實之飲也故不可吐惟急溫之宜四逆湯或理中湯加丁香吳茱萸亦可也程溫溫字與下文寒飲字對欲吐復不能吐與下文乾嘔字對干空也飲食入口即吐業已吐訖矣仍復溫溫欲吐復不能吐此非關後入之飲食吐之未盡而胸中另有物為之格拒也胸中實者寒物窒塞於胸中則陽氣不得宣越所以脈弦遲而非微細者比手足寒而非四逆者比但從吐治一吐而陽氣得通若膈上有寒飲乾嘔者虛寒從下上而阻留其飲於胸中究非胸中之病也直從四逆湯急溫其下矣柯當吐之宜瓜蒂散少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之原注脈經云灸厥陰可五十壯錢陽氣衰少則脈微寒邪在經則脈澀陰邪下走則利上逆則嘔也腎臟之真陽衰微不能升越而為衛氣衛氣不密故汗出也必數更衣反少者即裡急後重之謂也乃下焦陽虛清陽不能升舉少陰寒甚陰氣內迫而下攻也陽氣陷入陰中陰陽兩相牽制致陰邪欲下走而不得故數更衣陽氣雖不得上行猶能提吸而使之反少也當溫其上前注皆謂灸頂上之百會穴以升其陽或曰仲景無明文未可強解以意測之非必巔頂然後謂之上也蓋胃在腎之上當以補暖升陽之藥溫其胃且灸之則清陽升而濁陰降水穀分消而下利自止矣灸之者灸少陰之脈穴或更灸胃之三脘也即前所謂當灸之附子湯主之之法舒此證陽虛氣墜陰弱津衰故數更衣而出弓反少也更衣者古人如廁大便必更衣出弓者矢去也曾醫一婦人腹中急痛惡寒厥逆嘔而下利脈見微澀豫以四逆湯投之無效其夫告曰昨夜依然作泄無度然多空坐醡脹異常尤可奇者前陰醡出一物大如柚子想是尿脬老婦尚可生乎豫即商之仲遠仲遠躊蹰曰是證不可溫其下以逼迫其陰當用灸法溫其上以升其陽而病自愈豫然其言而依其法用生薑一片貼頭頂百會穴上灸艾火三壯其脬即收仍服四逆湯加耆朮一劑而愈案溫其上灸之義未詳方氏云上謂頂百會是也汪氏云百會治小兒脫肛久不瘥此證亦灸之者升舉其陽也喻氏程氏柯氏金鑑皆從方説為解特志聰錫駒並云溫其上助上焦之陽與錢所援或曰之説略同汪氏又引常器之云灸太衝郭白雲云灸太溪脈經云灸厥陰俞俱誤也
