body:
  text: 卷三辨太陽病脈證並治下問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治玉函作其脈寸口浮關上自沉時時下利云云作時小便不利陽脈浮關上細沉而緊張錫駒本胎作苔汪此言結胸病狀與臟結雖相似而各別夫結胸臟結何以云太陽病以二者皆太陽病誤下所致也蓋結胸病始因誤下而傷其上焦之陽陽氣既傷則風寒之邪乘虛而入上結於胸按之則痛者胸中實也寸浮關沉者邪氣相結而為實之診也若臟結病則不然其始亦因誤下而傷其中焦之陰陰血既傷則風寒之邪亦乘虛而入內結於臟狀如結胸者以臟氣不平逆於心下故也飲食如故者胸無邪阻而胃中空也時時下利者臟虛邪結不能運化胃中之水穀不泌別不分清因偏滲於大腸而作利也寸浮關沉者結胸脈也今診關脈兼得小細緊者則是臟虛而風寒之邪內結可知舌上白苔者經云丹田有熱胸中有寒今者苔滑則是舌濕潤而冷也此係誤下太過而變成臟寒之證故難治也按結胸證其人本胃中挾食下之太早則食不能去外邪反入結於胸中以故按之則痛不能飲食臟結證其人胃中本無食下之太過則臟虛邪入冷積於腸所以狀如結胸按之不痛能飲食時下利舌上苔滑此非真寒證乃過下之誤也魏人知仲景辨結胸非臟結為論不知仲景正謂臟結與痞有相類而與結胸實不同耳蓋結胸者陽邪也痞與臟結陰邪也痞則尚有陽浮於上臟結則上下俱無陽獨陰矣陰氣內滿四逆湯證之對也金鑑曰案此條舌上白苔滑者難治句前人舊注皆單指臟結而言未見明晰誤人不少蓋舌苔白滑即結胸證具亦是假實舌苔干黃雖臟結證具每伏真熱臟結陰邪白滑為順尚可溫散結胸陽邪見此為逆不堪攻下故為難治由此可知著書立論必須躬親體驗真知灼見方有濟於用若徒就紙上陳言牽強附會又何異案圖索驥耶案金鑑此說未知於經旨如何然繫於實驗故附於此案汪注結胸傷上焦之陽氣臟結傷中焦之陰氣於理未允案胎錫駒作苔原於龐氏總病論知是胎本苔字從肉作胎與胚胎之胎義自別又聖惠方載本經文亦並作苔臟結無陽證不往來寒熱原注一云寒而不熱其人反靜舌上苔滑者不可攻也不往來寒熱脈經作寒而不熱苔滑巢源作不胎龐氏胎作苔錫駒同柯結胸是陽邪之陷尚有陽症見於外故脈雖沉緊有可下之理臟結是積漸凝結而為陰五臟之陽已竭也外無煩躁潮熱之陽舌無黃黑芒刺之苔雖有硬滿之症慎不可攻理中四逆輩溫之尚有可生之義案臟結補亡論王朝奉刺關元穴非也汪氏云宜用艾灸之蘊要曰灸氣海關元穴宜人參三白湯加乾薑寒甚者加附子全生集曰灸關元與茱萸四逆加附子湯以上宜撰用準繩曰王朝奉服小柴胡湯其已云不往來寒熱何用小柴胡湯是甚謬矣金鑑程知云經於臟結白苔滑者只言難治未嘗言不可治也只言臟結無熱舌苔滑者不可攻未嘗言臟結有熱舌苔不滑者亦不可攻也意者丹田有熱胸中有寒之證必有和解其熱溫散其寒之法俾內邪潛消外邪漸解者斯則良工之苦心乎汪氏云臟結本無可下之證成注云於法當下者誤集註潘氏曰案文義若臟結有陽證亦屬可攻此說亦恐不必矣案反字對結胸煩躁而言病發於陽而反下之熱入因作結胸病發於陰而反下之原注一作汗出因作痞也所以成結胸者以下之太早故也成本痞下無也字玉函同病上冠夫字下而反下之千金翼作而反汗之痞巢源作否成云發熱惡寒者發於陽也而反下之則表中陽邪入里結於胸中為結胸無熱惡寒者發於陰也而反下之表中之陰入里結於心下為痞錢發於陽者邪在陽經之謂也發於陰者邪在陰經之謂也反下之者不當下而下也兩反下之其義迥別一則以表邪未解而曰反下一則以始終不可下而曰反下也因者因誤下之虛也結胸則言熱入者以發熱惡寒表邪未解誤下則熱邪乘虛陷入而為結胸以熱邪實於裡故以大小陷胸攻之痞不言熱入者蓋陰病本屬無陽一誤下之則陽氣愈虛陰邪愈盛客氣上逆即因之而為痞硬如甘草半夏生薑三瀉心湯證是也末句但言下早為結胸之故而不及痞者以邪在陽經而未解邪猶在表若早下之則裡虛而邪熱陷入致成結胸若表邪已解而下之自無變逆之患故以下早為嫌至於邪入陰經之證本無可下之理陰經雖有急下之條亦皆由熱邪傳裡非陰經本病也除此以外其可反下之乎程發於陽者從發熱惡寒而來否則熱多寒少者下則表熱陷入為膻中之陽所格兩陽相搏是為結胸結胸為實邪發於陰者從無熱惡寒而來否亦寒多熱少者下則虛邪上逆亦為膻中之陽所拒陰陽互結是為痞痞為虛邪張病發於陽者太陽表證誤下邪結於胸也病發於陰者皆是內挾痰飲外感風寒中氣先傷所以汗下不解而心下痞也或言中風為陽邪傷寒為陰邪方喻金鑑皆然安有風傷衛氣氣受傷而反變為結胸寒傷營血血受傷而反成痞之理復有誤認直中陰寒之陰下早變成痞者則陰寒本無實熱何得有下早之變設陰結陰躁而誤下之立變危逆恐不至於成痞停日待變而死也案發於陽發於陰成氏程氏錢氏皆原於太陽上篇第八條之義然所謂陰非少陰直中之謂但是寒邪有餘後世所謂挾陰之證若果直中純陰則下之有不立斃者乎張氏所論雖似於經旨未明切而驗之病者往往有如此者故並採而錄之張兼善駁成氏以陰陽為表裡柯氏亦以為外內周氏則云發於陰者洵是陰證但是陽經傳入之邪皆不可從也總病論曰發熱惡寒為發於陽誤下則為結胸無熱惡寒為發於陰誤下則為痞氣案成注原於此病源候論結胸者謂熱毒結聚於心胸也否則心下滿也按之自軟但氣痞耳不可復下也又痞者塞也言腑臟痞塞不宣通也釋名曰脴痞也氣痞結也說文徐曰痞病結也直指方曰乾上坤下其卦為否陽隔陰而不降陰為陽而不升此否之所以痞而不通也傷寒百問經絡圖曰但滿而不痛者為痞任人揉按手不佔護按之且快意結胸者項亦強如柔痓狀下之則和宜大陷胸丸玉函千金翼項上有其字痓玉函脈經作痙是成結胸病項強者為邪結胸中胸膈結滿心下緊實但能仰而不能俯是項強也程夫從胸上結硬而勢連甚於下者大陷胸湯不容移易矣若從胸上結硬而勢連甚於上者緩急之形既殊則湯丸之制稍異結胸而至項亦強如柔痙狀如邪液布滿胸中升而上阻更不容一毫正液和養其筋脈矣胸邪至此緊逼較甚下之則和去邪液即所以和正液也改大陷胸湯為大陷胸丸峻治而行以緩得建瓴之勢而復與邪相當是其法也柯頭不痛而項猶強不惡寒而頭汗出故如柔痙狀大陷胸丸方大黃半斤葶藶子半升熬芒硝半升杏仁半升去皮尖熬黑上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法白蜜二合玉函千金並翼外臺作一兩錢大黃芒硝甘遂即大陷胸湯白蜜一合亦即十棗湯中之大棗十枚也增入葶藶杏仁者蓋以胸為肺之所處膻中為氣之海上通於肺而為呼吸邪結胸膈硬滿而痛氣道阻塞則有少氣躁煩水結胸脅之害故用葶藶甘遂以逐水瀉肺杏仁以利肺下氣也所用不過一彈丸劑雖大而用實小也和之以白蜜藥雖峻而佐則緩也豈如承氣陷胸湯之人行十里二十里之迅速哉吳氏曰凡云丸者皆大彈丸煮化而和滓服之也後抵當丸理中丸同凡云彈丸及雞子黃者以四十梧桐子准之案出本草序例千金方秘澀門本方不用甘遂蜜丸如梧子大服七丸名練中丸主宿食不消大便難肘後方名承氣丸龐氏總病論曰虛弱家不耐大陷胸湯即以大陷胸丸下之結胸證其脈浮大者不可下下之則死喻胸既結矣本當下以開其結然脈浮大則表邪未盡下之是令其結而又結也所以主死此見一誤不堪再誤也張兼善曰脈浮大心下雖結其表邪尚多未全結也若輒下之重虛其里外邪復聚而必死矣柴胡加桂枝幹薑湯以和解之案汪氏引補亡論常器之云可與增損理中丸如未效用黃連巴豆搗如泥封臍上灼艾灸熱漸效此蓋臟結治法恐與此條證不相涉也汪氏以為不可用是矣案方氏錢氏程氏以大為虛脈恐非是也結胸證悉具煩躁者亦死玉函煩作而喻亦字承上成結胸證悉具邪結已深也煩躁者正氣散亂也邪氣勝正病者必死程此時下之則死不下亦死唯從前失下至於如此須玩一悉字太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛原注一云頭痛即眩胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃膈內拒痛玉函脈經千金翼作頭痛即眩客氣外臺作客熱余處玉函脈經作其餘全書脫處字劑脈經千金翼作齊黃下成本有也字袁表沈際飛本脈經有屬柴胡梔子湯六字金鑑云數則為虛句疑是衍文是也心下因硬程本作心中因硬非也成動數皆陽脈也當責邪在表睡而汗出者謂之盜汗為邪氣在半表半裡則不惡寒此頭痛發熱微盜汗出反惡寒者表未解也當發其汗醫反下之虛其胃氣表邪乘虛則陷邪在表則見陽脈邪在裡則見陰脈邪氣內陷動數之脈所以變遲而浮脈獨不變者以邪結胸中上焦陽結脈不得而沉也客氣者外邪乘胃中空虛入里結於胸膈膈中拒痛者客氣動膈也金匱要略曰短氣不足以息者實也短氣躁煩心中懊憹皆邪熱為實陽氣內陷氣不得通於膈壅於心下為硬滿而痛成結胸也與大陷胸湯以下結熱若胃中空虛陽氣內陷不結於胸膈下入於胃中者遍身汗出則為熱越不能發黃若但頭汗出身無汗劑頸而還小便不利者熱不得越必發黃也方太陽之脈本浮動數者欲傳也浮則為風四句承上文以釋其義頭痛至表未解也言前證然太陽本自汗而言微盜汗本惡寒而言反惡寒者稽久而然也醫反下之至大陷胸湯主之言誤治之變與救變之治膈心胸之間也拒格拒也言邪氣入膈膈氣與邪氣相格拒而為痛也空虛言真氣與食氣皆因下而致虧損也客氣邪氣也陽氣客氣之別名也以本外邪故曰客氣以邪本風故曰陽氣裡虛而陷入故曰內陷汪夫曰膈內曰心中曰心下皆胸之分也名曰結胸其邪實陷於胃胃中真氣虛斯陽邪從而陷入於胸作結硬之形也補亡論常器之云發黃者與茵陳蒿湯煎茵陳濃汁調五苓散亦可錢氏云表未解乃桂枝湯證也竊疑當是柴胡桂枝湯證又云動數之脈變遲之後陽邪已陷豈尚有浮脈乎必無浮脈再見之理矣明理論曰傷寒盜汗非若雜病者之責其陽虛而已是由邪在半表半裡使然也何者若邪氣一切在表於衛則自汗出此則邪氣侵行於里外連於表邪及睡則衛氣行於里乘表中陽氣不致津液得泄而為盜汗亦非若自汗有為之虛者有為之實者其於盜汗悉當和表而已案客氣外臺作客熱知是陽氣乃陽熱之邪氣也案證治準繩載朱震亨說云胃中空虛短氣煩躁虛之甚矣豈可迅攻之乎以梔子豉湯吐胸中之邪而可也錢氏則稱朱氏不善讀書者因歷舉七條以辨其誤可謂至當矣文繁今省之大陷胸湯方大黃六兩去皮千金及翼無去皮二字芒硝一升甘遂一錢匕千金及翼外臺一上有末字成本脫匕字上三味以水六升先煮大黃取二升去滓納芒硝煮一兩沸納甘遂末溫服一升得快利止後服成大黃謂之將軍以苦盪滌芒硝一名硝石以其咸能軟硬夫間有遂以通水也甘遂若夫間之遂其氣可以直達透結陷胸三物為允汪案甘遂若夫間之遂考周禮凡治野夫間有遂注云自一夫至千夫之田為遂溝洫澮所以通水於川遂者通水之道也廣深各三尺曰遂則是甘遂乃通水之要藥陷胸湯中以之為君乃知結胸證非但實熱此係水邪結於心下故也案周禮遂人上地夫一廛夫間有遂遂上有徑十夫有溝鄭玄注云遂溝皆所以通水於川也遂深二尺溝倍之錢大黃六兩漢之六兩即宋之一兩六錢二分李時珍云古之一升今之二合半約即今之一甌也每服一甌約大黃五錢外結胸惡症理亦宜然未為太過況快利止後服乎明理論曰胸為高邪陷下以平之故治結胸曰陷胸湯利藥中此為駃劑傷寒錯惡結胸為甚非此湯則不能通利大而數少取其迅疾分解結邪也柯琴方論曰以上二方比大承氣更峻治水腫痢疾之初起者甚捷然必視其人之壯實者施之如平素虛弱或病後不任攻伐者當念虛虛之禍玉函又大陷胸湯方桂枝四兩甘遂四兩大棗十二枚栝蔞實一枚去皮人參四兩上五味以水七升煮取三升去滓溫服一升胸中無堅勿服之古方選注曰栝蔞陷胸中之痰甘遂陷經隧之水以桂枝迴護經氣以人參奠安裡氣仍以大棗泄營徐徐縱熱下行得成陷下清化之功案此方大陷胸湯證而兼裡虛者宜用也故附載於此又案亦見活人書分兩少異千金翼陷胸湯主胸中心下結堅食飲不消方甘遂大黃各一兩栝蔞甘草各一兩黃連六兩上以水五升煮取二升五合分三服千金無甘遂傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之脈沉而緊玉函作其脈浮緊石硬者玉函脈經千金翼作如石堅程結胸一證雖曰陽邪陷入然陰陽二字從虛實寒熱上區別非從中風傷寒上區別表熱盛實轉入胃腑則為陽明證表熱盛實不轉入胃腑而陷入膈則為結胸證故不必誤下始成傷寒六七日有竟成結胸者以熱已成實而填塞在胸也脈沉緊心下痛按之石硬知邪熱聚於此一處矣不因下而成結胸者必其人胸有燥邪以失汗而表邪合之遂成裡實此處之緊脈從痛得之不作寒斷魏六七日之久表寒不解而內熱大盛於是寒邪能變熱於裡在胃則為傳陽明在胸則為結胸矣入胃則為胃實入胸則為胸實實者邪熱已盛而實也兼下早結胸事之常熱實結胸事之變所入之因不同其證治則一理而已傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之玉函無也但二字喻治結胸之證取用陷胸之法者以外邪挾內飲摶結胸間未全入於裡也若十餘日熱結在裡則是無形之邪熱蘊結必不定在胸上加以往來寒熱仍兼半表當用大柴胡湯以兩解表裡之熱邪於陷胸之義無取矣無大熱與上文熱實互意內陷之邪但結胸間表裡之熱反不熾盛是為水飲結在胸脅其人頭有微汗乃邪結在高而陽氣不能下達之明徵此則主用大陷胸湯允為的對也後人反謂結胸之外復有水結胸一證案活人書另用小半夏加茯苓湯可笑極矣程熱盡入里表無大熱矣無大熱更無往來之寒可知錢若是水飲必不與熱邪並結則大陷胸方中何必有逐水利痰之甘遂乎可謂一言破惑太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱原注一云日晡所發心胸大煩從心下至少腹硬滿而痛不可近者大陷胸湯主之所玉函無千金翼作如千金作日晡有小潮熱心胸大煩從心下云云蓋原於小品文內臺方議所下補發字總病所作則喻不大便燥渴日晡潮熱少腹硬滿證與陽明頗同但小有潮熱則不似陽明大熱從心上至少腹手不可近則陽明又不似此大痛因是辨其為太陽結胸兼陽明內實也緣誤汗復誤下重傷津液不大便而燥渴潮熱雖太陽陽明亦屬下證但痰飲內結必用陷胸湯由胸脅以及胃腸盪滌始無餘若但下腸胃結熱反遺胸上痰飲則非法矣錢日晡未申之時也所者即書云多歷年所之所也邪從太陽誤入陽明故從心上至少腹無少空隙皆硬滿而痛至手不可近也案證治準繩朱震亨云汗下之後表裡俱虛矣不大便五六日可見津液之耗今雖有硬痛而可以迅攻之乎調胃承氣緩取之乎此乃與前用梔子豉湯之見同矣皆坐不熟經旨而已案舌上燥干而渴與臟結之舌上滑白大分別處小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之玉函病作者滑下無者字成心下硬痛手不可近者結胸也正在心下按之則痛是熱氣猶淺謂之小結胸結胸脈沉緊或寸浮關沉今脈浮滑知熱未深結與小陷胸湯以除胸膈上結熱也王上文云硬滿而痛不可近者是不待按而亦痛也此云按之則痛是手按之然後作痛爾上文云至少腹是通一腹而言之此云正在心下則少腹不硬痛可知矣熱微於前故云小結胸也喻其人外邪陷入原微但痰飲素盛挾熱邪而內結所以脈見浮滑也小陷胸湯方黃連一兩玉函作二兩半夏半升洗栝蔞實大者一枚成本作一個上三味以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服三服下總病論有微解下黃涎即愈七字活人書準繩並同錢夫邪結雖小同是熱結故以黃連之苦寒以解熱開結非比大黃之苦寒盪滌也邪結胸中則胃氣不行痰飲留聚故以半夏之辛溫滑利化痰蠲飲而散其滯結也栝蔞實之甘寒能降上焦之火使痰氣下降也此方之制病小則制方亦小即內經所云有毒無毒所治為主適大小為制也內臺方議曰又治心下結痛氣喘而悶者汪昂醫方集解劉心山曰結胸多挾痰飲凝結心胸故陷胸瀉心用甘遂半夏栝蔞枳實旋覆之類皆為痰飲而設也汪氏云大抵此湯病人痰熱內結者正宜用之錫駒云案湯有大小之別症有輕重之殊今人多以小陷胸湯治大結胸症皆致不救遂諉結胸為不可治之證不知結胸之不可治者止一二節余皆可治者也苟不體認經旨以致臨時推諉誤人性命深可嘆也傷寒直格曰栝蔞實惟銼其殼子則不銼或但用其中子者非也醫學綱目曰工部郎中鄭忠厚因患傷寒胸腹滿面黃如金色諸翰林醫官商議略不定推讓曰胸滿可下恐脈浮虛召孫兆至曰諸公雖疑不用下藥鄭之福也下之必死某有一二服藥服之必瘥遂下小陷胸湯尋利其病遂良愈明日面色改白京城人稱服又曰孫主簿述之母患胸中痞急不得喘息按之則痛脈數且澀此胸痹也因與仲景三物小陷胸湯一劑而和二劑而愈醫壘元戎小陷胸湯去半夏加大黃赤水玄珠徐文學三泉先生令郎每下午發熱直至天明夜發更甚右脅脹痛咳嗽吊疼坐臥俱疼醫以瘧治罔效逆予診之左弦大右滑大搏指予曰內經云左右者陰陽之道路據脈肝膽之火為痰所凝必勉強作文過思不決鬱而為疼夜甚者肝邪實也乃以仲景小陷胸湯為主栝蔞一兩黃連三錢半夏二錢前胡青皮各一錢水煎飲之夜服當歸龍薈丸微下之夜半痛止熱退兩帖全安醫林集要加味陷胸湯治壅熱痞滿胸膈痛或兩脅痛於本方加桔梗黃芩黃連麥門冬姜水煎飢時服利下黃涎即安凡瘧痢病後餘熱留滯胸膈及有飲酒過度胸結痛亦宜服此神效一法只用小陷胸湯加桔梗枳殼甚效醫學入門小調中湯治一切痰火及百般怪病善調脾胃神效於本方加甘草生薑證治大還加味小陷胸湯秘方治火動其痰嘈雜於本方加枳實梔子張氏醫通凡咳嗽面赤胸腹脅常熱惟手足有涼時其脈洪者熱痰在膈上也小陷胸湯即本方太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也玉函脈經千金翼起下有者字作此本寒也反上有而字四下有五字復下有重字協作挾脈經不上有終字外臺寒分作久寒神巧萬全方分作故王本刪分字金鑑云復下之之字當是利字上文利未止豈有復下之理乎細玩自知是必傳寫之誤方云末句此下疑有脫誤是不必矣錢二三日表邪未解將入里而未入里之時也不能臥但欲起者邪勢攪擾坐臥不寧之狀也若此則知邪已在胸次之陽位矣以尚未入胃故知心下必結必者決詞也本文雖不言治法以理推之即梔子豉湯之類症也若此症而脈見微弱者其中氣本屬虛寒尤為不可下之證而反下之若利隨下止則陷入之邪不得乘勢下走必硬結於胸中矣若三日下之而利未止者第四日復下之則已誤再誤有不至中氣不守胃氣下陷以虛協熱而下利者乎此所以重以為戒也桂枝人參湯症誤下而利下不止故因虛寒而成痞硬此條誤下利止亦因虛寒而成結胸均屬太陽未解之證一痞一結似有虛實之殊然脈微弱而本有寒分者其可竟以實熱待之耶協熱二字當與桂枝人參湯條不甚相遠也案寒分汪氏云痰飲也以痰飲本寒故曰寒分然分字不成義當從外臺而作久寒或依玉函等刪之亦得協熱之協成本作協並挾同成注作挾熱利程氏云裡寒夾表熱而下利是曰協熱是也況玉函等作挾可為確證矣方氏云協互相和同之謂後世注家多宗其說不可從矣案此條結胸證乃屬虛寒常器之云可增損理中丸方出外臺天行病即理中丸加栝蔞根枳實茯苓牡蠣云治下後虛逆而氣已不理而毒復上攻結於胸中乃於此條症為切當矣協熱利成氏而降皆云邪熱下攻腸胃為熱利常氏主以白頭翁湯而此條曰脈微弱曰有寒分豈是熱利耶錢氏注似於經旨不相戾也太陽病下之其脈促原注一作縱不結胸者此為欲解也脈浮者必結胸脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血玉函脈經脈上並有其字協作挾錢此條詳言誤下之脈證以盡其變誤下之後脈促即不能盛於上而為喘汗亦不至陷於內而為結胸脈雖促而陽分之邪已自不能為患是邪勢將衰故為欲解此誤下之僥倖者也若脈仍浮者可見表邪甚盛不為下衰將必乘誤下之裡虛陷入上焦清陽之分而為結胸矣若脈見緊者則下後下焦之虛陽為少陰之陰寒所逼循經上衝必作咽痛也脈弦者邪傳少陽經云尺寸俱弦者少陽受病少陽之脈循脅故云必兩脅拘急也脈細數者細則為虛數則為熱下後虛陽上奔故頭痛未止若脈見沉緊則為下後陽虛致下焦陰邪上逆而嘔也沉為在裡沉主下焦滑為陽動滑主裡實誤下之後沉滑熱在裡而仍挾表水穀下趨隨其誤下之勢必為脅熱下利也若脈浮滑陽邪止在陽分而邪熱下走擾動其血故必下血也鑑咽痛少陰寒熱俱有之證也咽乾腫痛者為熱不幹不腫而痛者為寒故少陰論中有甘橘湯通脈四逆湯二治法也錫不曰必頭痛而曰頭痛未止者以見太陽原有之頭痛因脈細數而未止也程據脈見證各著一必字見勢所必然考其源頭總在太陽病下之而來故雖有已成壞病未成壞病之分但宜以活法治之不得據脈治脈據證治證也脈浮者必結胸王日休云桂枝去芍藥湯脈緊者必咽痛者王日休云甘草湯汪氏云桔梗湯更妙脈弦者兩脅拘急者王日休云小柴胡加桂枝脈細數者頭痛未止王日休云當歸四逆湯常器之云可蔥須湯脈沉緊者必欲嘔王日休云甘草乾薑湯常器之云七物黃連湯脈沉滑者協熱利王日休云白頭翁湯脈浮滑者必下血芍藥甘草湯加秦皮常氏云可與類要柏皮湯汪氏云愚以臨證用藥亦當活變古方不宜執也金鑑曰脈促當是脈浮始與不結胸為欲解之文義相屬脈浮當是脈促始與論中結胸胸滿同義脈緊當是脈細數脈細數當是脈緊始合論中二經本脈脈浮滑當是脈數滑浮滑是論中白虎湯證之脈數滑是論中下膿血之脈細玩諸篇自知案金鑑所改未知舊文果如是否然此條以脈斷證文勢略與辨平二脈相似疑非仲景原文柯氏刪之可謂有所見矣病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲得水反不渴者服文蛤散若不瘥者與五苓散潠全書脈經千金翼作噀程錢亦同玉函脈經無冷字脈經外臺無被字劫作卻玉函脈經外臺無彌更二字肉作皮此條舊與小陷胸白散合為一條今從張氏周氏柯氏及金鑑分為二條喻氏魏氏並缺此條及白散條可疑汪病在陽者為邪熱在表也法當以汗解之醫反以冷水潠之潠者口含水噴也若灌之灌澆也灌則更甚於潠矣表熱被水止劫則不得去陽邪無出路其煩熱必更甚於未用水之前矣彌更益者猶言甚之極也水寒之氣客於皮膚則汗孔閉故肉上起粒如粟也意欲飲水不渴者邪熱雖甚反為水寒所制也先與文蛤散以解煩導水若不瘥者水寒與熱相搏下傳太陽之腑與五苓散內以消之外以散之乃表裡兩解之法也傷寒類方曰此熱結在皮膚肌肉之中不在胃口故欲飲而不渴文蛤取其軟堅逐水文蛤散方文蛤五兩上一味為散以沸湯和一方寸匕服湯用五合一方寸匕成本作一錢匕玉函和下有服字無服以下五字方文蛤即海蛤之有文理者王文蛤即海蛤粉也河間丹溪多用之大能治痰錢文蛤似蛤而背有紫斑即今吳中所食花蛤俗誤呼為蒼蠃或昌蛾者是也案沈括夢溪筆談曰文蛤即今吳人所食花蛤也其形一頭小一頭大殼有花斑的便是王氏以海蛤粉為文蛤恐不然也李時珍本草附方收此方於文蛤條而不載於海蛤條其意可見也又案文蛤海蛤其實無大分別神農本經海蛤主治咳逆上氣喘息煩滿唐本云主十二水滿急痛利膀胱大小腸甄權云治水氣浮腫下小便本方所用皆取於此義古方選注曰文蛤取用紫斑紋者得陰陽之氣若黯色無紋者餌之令人狂走赴水金鑑曰文蛤即五倍子也案三因方云文蛤即五倍子最能回津本草在海蛤文甚失其性識者當知之金鑑乃襲其誤耳案柯氏云文蛤一味為散以沸湯和方寸匕服滿五合此等輕劑恐難散濕熱之重邪彌更益煩者金匱要略云渴欲得水而貪飲者文蛤湯主之兼治微風脈緊頭痛審症用方則移彼方而補入於此而可也其方麻黃湯去桂枝加文蛤石膏薑棗此亦大青龍之變局也此說頗有理故附載此文蛤湯出嘔吐噦下利篇又消渴篇渴欲飲水不止者文蛤散主之即與本方同寒實結胸無熱證者與三物小陷胸湯白散亦可服原注一云與三物小白散玉函千金翼無陷胸湯及亦可服三字作與三物小白散金鑑云無熱證之下與三物小陷胸湯當是三物白散小陷胸湯四字必是傳寫之誤桔梗貝母巴豆三物其色皆白有三物白散之義溫而能攻與寒實之理相屬小陷胸湯乃性寒之品豈可以治寒實結胸之證乎亦可服三字亦衍文也柯氏改作三白小陷胸湯為散亦可服案金鑑改訂為是鑑結胸證身無大熱口不燥渴則為無熱實證乃寒實也與三物白散然此證脈必當沉緊若脈沉遲或證見三陰則又非寒實結胸可比當以枳實理中丸治之矣鄭水寒結實在胸則心陽被據自非細故用三物白散下寒而破結皆不得已之兵也總病論曰寒實結胸無熱症者與三物白散注云小陷胸者非也傷寒類方曰結胸皆系熱陷之症此云寒實乃水氣寒冷所結之痰飲也活人書云與三物白散無小陷胸湯亦可用七字蓋小陷胸寒劑非無熱之所宜也醫方考曰此證或由表解裡熱之時過食冷物故令寒實結胸然必無熱證者為是白散方桔梗三分巴豆一分去皮心熬黑研如脂玉函作六銖無如脂字貝母三分玉函桔梗貝母各十八銖上三味為散納巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆若以水潠之洗之益令熱劫不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法冷粥一杯千金翼注一云冷水一杯身熱皮粟以下四十九字玉函外臺並無錢本柯本亦刪之為是錫駒亦同志聰刪病在膈上以下七十六字錢寒實結於胸中水寒傷肺必有喘咳氣逆故以苦梗開之貝母入肺解結又以巴豆之辛熱有毒斬關奪門之將以破胸中之堅結蓋非熱不足以開其水寒非峻不足以破其實結耳柯白飲和服者甘以緩之取其留戀於胸不使速下耳散者散其結塞比湯以蕩之更精也身熱皮粟一段使人難解今從刪汪不利進熱粥利不止進冷粥者以熱能助藥力冷能解藥力也錫巴豆性大熱進熱粥者助其熱性以行之也進冷粥者制其熱勢以止之也俱用粥者助胃氣也案本草徐子才云中巴豆毒者用冷水外臺秘要仲景桔梗白散治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰即本方分兩同方後云若利不止者飲冷水一杯則定傷寒類方曰古法二錢五分為一分案此宋以降事今以一兩為一錢則一分為二分五釐類方又云半錢匕今秤約重三分太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五日譫語不止當刺期門五下成本玉函有六字鑑太陽與少陽並病故見頭項強痛或眩冒時如結胸心下痞硬之證而曰或曰時如者謂兩陽歸併未定之病狀也病狀未定不可以藥當刺肺俞以瀉太陽以太陽與肺通也當刺肝俞以瀉少陽以肝與膽合也故刺而俟之以待其機也苟不如此而發其汗兩陽之邪乘燥入胃則發譫語設脈長大則猶為順可以下之今脈不大而弦五六日譫語不止是土病而見木脈也慎不可下當刺期門以直瀉其肝可也汪當刺大椎第一間者謂當刺大椎一穴在第一椎之間為背部中行之穴乃手足三陽督脈之會先刺之以瀉太少並病之邪案金鑑以大椎第一間為肺俞其說原於成氏果然則當曰第三間又金鑑載林瀾說云第一間疑即商陽在手食指內側此乃依有二間三間穴而云爾者尤屬牽強又案後條云太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之正與此條同義本事方曰記一婦人患熱入血室證醫者不識用補血調氣藥涵養數日遂成血結胸或勸用小柴胡湯予曰小柴胡用已遲不可行也無已則有一焉刺期門穴斯可矣予不能針請善針者治之如言而愈或者問云熱入血室何為而成結胸也予曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乘虛而入血室為邪迫上入肝經肝受邪則譫言而見鬼復入膻中則血結於胸也何以言之婦人平居水當養於木血當養於肝也方未受孕則下行之以為月事既妊娠則中蓄之以養胎及已產則上壅之以為乳皆血也今邪逐血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故當刺期門也活人書海蛤散治血結胸海蛤滑石甘草炙各一兩芒硝半兩上為末每服二錢雞子清調下小腸通利則胸膈血散膻中血聚則小腸壅小腸壅膻中血不流行宜此方小便血數行更宜桂枝紅花湯發其汗則愈婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之其實間玉函脈經有虛字取成本作寫脈經取之下有平病云熱入血室無犯胃氣及上三焦與此相反豈謂藥不謂針耶二十六字程婦人中風發熱惡寒自是表證無關於里乃經水適來且七八日之久於是血室空虛陽熱之表邪乘虛而內據之陽入里是以熱除而脈遲身涼經停邪是以胸脅滿如結胸狀陰被陽擾是以如見鬼狀而譫語凡此熱入血室故也邪熱入而居之實非其所實矣刺期門以瀉之實者去而虛者回即瀉法為補法耳汪熱入血室而瘀積必歸於肝故隨其經之實而用刺法以瀉之也成注反云審看何經氣實更隨其實而瀉之殊出不解邪傳少陽熱入血室故作譫語等證仲景恐人誤認為陽明腑實證輕用三承氣以伐胃氣故特出一刺期門法療之案血室方氏云為營血停留之所經血集會之處即衝脈所謂血海是也諸家皆從其說只柯氏云血室者肝也肝為藏血之臟故稱血室以上並未見明據陳自明婦人良方云巢氏病源併產寶方並謂之胞門子戶張仲景謂之血室衛生寶鑑云血室者素問所謂女子胞即產腸也程式醫彀云子宮即血室也張介賓類經附翼云子戶者即子宮也俗名子腸醫家以衝任之脈盛於此則月事以時下故名之曰血室又案方注原於明理論婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之程前條之熱入血室由中風在血來之前邪肎容血空盡其室而入之室中略無血而渾是邪故可用刺法盡瀉其實此條之熱入血室由中風在血來之後邪乘血半離其室而入之血與熱搏所以結正邪爭所以如瘧狀而休作有時邪半實而血半虛故只可用小柴胡為和解法方適來者因熱入室迫使血來血出而熱遂遺也適斷者熱乘血來而遂入之與後血相搏俱留而不出故曰其血必結也志案經水適斷四字當在七八日之下錢小柴胡湯中應量加血藥如牛膝桃仁丹皮之類其脈遲身涼者或少加薑桂及酒製大黃少許取效尤速所謂隨其實而瀉之也若不應用補者人參亦當去取尤未可執方以為治也案熱入血室許叔微小柴胡湯加地黃張璧加牡丹皮楊士瀛云小柴胡湯力不及者於內加五靈脂婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈明瞭脈經作了了必下玉函脈經有當字脈經注云二字疑成傷寒發熱者寒已成熱也經水適來則血室虛空邪熱乘虛入於血室若晝日譫語為邪客於腑而陽爭也此晝日明瞭暮則譫語如見鬼狀是邪不入腑入於血室而陰爭也陽盛譫語則宜下此熱入血室不可與下藥犯其胃氣熱入血室血結寒熱者與小柴胡湯散邪發汗此雖熱入血室而無血結寒熱不可與小柴胡湯發汗以犯上焦熱入血室胸脅滿如結胸狀者可刺期門此雖熱入血室而無滿結不可刺期門犯其中焦必自愈者以經行則熱隨血去而下也已則邪熱悉除而愈矣所為發汗為犯上焦者發汗則動衛氣衛氣出上焦故也刺期門為犯中焦者刺期門則動營氣營氣出中焦故也方無禁止之辭犯胃氣言下也必自愈者言伺其經行血下則邪熱得以隨血而俱出猶之鼻衄紅汗故自愈也蓋警人勿妄攻以致變亂之意案胃氣及上二焦方氏程氏汪氏並云言汗吐也柯氏改作上下焦蓋僭妄耳脈經疑之似是成氏以汗為小柴胡且以刺期門為犯中焦於義未妥然亦他無明注故姑揭成注爾程林金匱直解曰上章以往來寒熱如瘧故用小柴胡以解其邪下章以胸脅下滿如結胸狀故刺期門以瀉其實此章則無上下二證似待其經行血去邪熱得以隨血出而解也傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之支節玉函作肢節成本柴胡下有加字柯傷寒至六七日正寒熱當退之時反見發熱惡寒證此表證而兼心下支結之裡證表裡未解也然惡寒微則發熱亦微但肢節煩疼則一身骨節不煩疼可知表證微故取桂枝之半內證微故取柴胡之半此因內外俱虛故以此輕劑和解之也王支節猶云枝節古字通也支結猶云支撐而結南陽云外證未解心下妨悶者非痞也謂之支結案方氏云支節者四肢百節也若言百節則似周身百節煩疼此恐不然當是四肢之關節煩疼柯注為得明理論曰煩疼即熱疼錢氏云成氏曰支散也王肯堂云支結支撐而結也若訓作散則不能結矣方注云支結言支飲搏聚而結也喻氏云心下支結邪結於心下偏旁不中正也若謂支飲結於心下夢語喃喃吾不識支飲為何物也諸說紛紛略無定論當以支撐之解為近是案金鑑云支側也小也支結者即心下側之小結也此解尤非傷寒百問經絡圖曰心下妨悶者非痞也謂之支結王冰曰支拄妨也按心下滿𩊅若柔人者皆治之案王說見六元正紀支痛注為是柴胡桂枝湯方黃芩一兩半人參一兩半甘草一兩炙半夏二合半洗芍藥一兩半大棗六枚擘生薑一兩半切柴胡四兩桂枝去皮成本玉函一兩半上九味以水七升煮取三升去滓溫服一升本云人參湯作如桂枝法加半夏柴胡黃芩復如柴胡法今用人參作半劑成本不見此方載在第十卷無本云二十九字玉函同鑑不名桂枝柴胡湯者以太陽外證雖未去而病機已見於少陽里也故以柴胡冠桂枝之上意在解少陽為主而散太陽為兼也外臺秘要療寒疝腹中痛者柴胡桂枝湯即本方傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之成傷寒五六日已經汗下之後則邪當解今胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者即邪氣猶在半表半裡之間為未解也胸脅滿微結寒熱心煩者邪在半表半裡之間也小便不利而渴者汗下後亡津夜內燥也若熱消津液令小便不利而渴者其人必嘔今渴而不嘔知非裡熱也傷寒汗出則和今但頭汗出而余處無汗者津液不足而陽虛於上也與柴胡桂枝幹薑湯以解表裡之邪復津液而助陽也汪微結者言其邪不甚未入於腑正當表裡之間也小便不利者此因汗下之後而津液少也惟津液少而非停飲以故渴而不嘔但頭汗出者此熱鬱於經不得外越故但升於頭而汗出也柴胡桂枝幹薑湯方外臺名小柴胡湯而主療系中篇第六十八條柴胡半斤桂枝三兩去皮栝蔞根四兩乾薑二兩全書外臺作三兩黃芩三兩甘草二兩炙牡蠣二兩熬全書外臺作三兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩複服汗出便愈汪即小柴胡湯加減方也據原方加減法云胸中煩而不嘔者去半夏人參加栝蔞實若渴者去半夏茲者心煩渴而不嘔故去人參半夏加栝蔞根四兩若脅下痞硬去大棗加牡蠣茲者胸脅滿微結即痞硬也故去大棗加牡蠣二兩若心悸小便不利者去黃芩加茯苓茲者小便不利心不悸而但煩是為津液少而躁熱非水蓄也故留黃芩不加茯苓又云若咳者去人參大棗生薑加五味子乾薑茲不因咳而以乾薑易生薑者何也蓋乾薑味辛而氣熱其用有二一以辛散胸脅之微結一以熱濟黃芩栝蔞根之苦寒使陰陽和而寒熱已焉金匱要略附方外臺柴胡桂薑湯治瘧寒多微有熱或但寒不熱服一劑如神案今外臺無所考活人書乾薑柴胡湯婦人傷寒經脈方來初斷寒熱如瘧狂言見鬼即本方無黃芩傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解玉函在裡也作為病在裡知此言少陽病有似少陰者當細辨其脈證也成傷寒五六日邪當傳裡之時頭汗出微惡寒者表仍未解也手足冷心下滿口不欲食大便硬脈細者邪結於裡也大便硬為陽結此邪熱雖傳於裡然以外帶表邪則熱結猶淺故曰陽微結脈沉雖為在裡若純陰結則更無頭汗惡寒之表證諸陰脈皆至頸胸中而還不上循頭今頭汗出知非少陰也與小柴胡湯以除半表半裡之邪服湯已外證罷而不了了者為裡熱未除與湯取其微利則愈故云得屎而解程半里之熱以怫鬱不能外達故頭汗出半表之寒以持久不能解散故微惡寒兩邪互拒知陽氣鬱滯而成結矣唯其陽氣鬱而滯也所以手足冷心下滿口不欲食大便硬既有結滯之證便成結滯之脈所以脈亦細所云陽證似陰者此其類也凡脈細脈沉脈緊皆陽熱鬱結之診無關少陰也可見陽氣一經鬱結不但陽證似陰並陽脈似陰矣只據頭汗出一證其人陽氣鬱結必夾苦口咽乾目眩而成其餘半在表證但一審之微惡寒而凡往來寒熱等證不必一具即可作少陽病處治與以小柴胡湯矣得屎自解即大柴胡與柴胡加芒硝湯皆所當斟酌者耳案汗出為陽微錫駒云汗出為太陽表氣虛微與陽微結之微不同錢氏以為陽微而結與汗出為陽微同為陽氣衰微之義汪氏則並下陽微為陽微結之義俱失之金鑑云脈細當是脈沉細觀本條下文脈沉亦在裡也之亦字自知脈雖沉緊之緊字當是細字本條上文並無緊字如何說雖沉緊雖字何所謂耶必是傳寫之誤此說亦不必矣案汪氏云補亡論郭白雲云實者大柴胡湯虛者蜜煎導之其說甚是而今推成氏之意當是調胃承氣湯本事方曰有人患傷寒五六日頭汗出自頸以下無汗手足冷心下痞悶大便秘結或者見四肢冷又汗出滿悶以為陰證予診其脈沉而緊予曰此證誠可疑然大便結非虛結也安得為陰脈雖沉緊為少陰多是自利未有秘結者予謂此正半在裡半在表投以小柴胡得愈仲景稱傷寒五六日頭汗出云云此疾證候同故得屎而解也傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯外臺此條作太陽病下之其脈促不結胸者此為欲解也若心下滿硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之也宜半夏瀉心湯主之玉函發熱下無者字已作以但作若不中與之作不中復與之也志此節分三段上段言柴胡證具雖下不為逆復可與柴胡湯中段言下之而成結胸大陷胸湯下段言痞證但滿不痛不可與柴胡而宜半夏瀉心湯柯嘔而發熱者小柴胡症也嘔多雖有陽明症不可攻之若有下症亦宜大柴胡而以他藥下之誤矣誤下後有二症者少陽為半表半裡之經不全發陽不全發陰故誤下之變亦因偏於半表者成結胸偏於半里者心下痞耳此條本為半夏瀉心而發故只以痛不痛分結胸與痞未及他症錢他藥者即承氣之類非有別藥也蒸蒸身熱汗欲出之狀也振者振振然動搖之貌即寒戰也以下後正氣已虛難於勝邪故必戰而後汗也魏結胸不言柴胡湯不中與痞證乃言柴胡湯不中與者何也結胸證顯而易認痞證甚微難認且大類於前條所言支結故明示之意詳哉半夏瀉心湯方黃芩乾薑人參甘草炙各三兩半夏半升洗外臺注一方五兩黃連一兩大棗十二枚擘玉函作十六枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服須大陷胸湯者方用前第二法再煎成本玉函作再煮須以下十二字成本無程瀉心雖同而證中且嘔則切專滌飲故以半夏名湯耳曰瀉心者言滿在心下清陽之位熱邪夾飲尚未成實故清熱滌飲使心下之氣得過上下自無阻留陰陽自然交互矣然樞機全在於胃故復補胃家之虛以為之斡旋與實熱入胃而瀉其蓄滿者大相逕庭矣痞雖虛邪乃表氣入里寒成熱矣寒雖成熱而熱非實故用苦寒以瀉其熱兼佐辛甘以補其虛不必攻痞而痞自散所以一方之中寒熱互用也柯即小柴胡去柴胡加黃連乾薑湯也不往來寒熱是無半表症故不用柴胡痞因寒熱之氣互結而成用黃連乾薑之大寒大熱者為之兩解也吳去滓復煎者要使藥性合而為一漫無異同並停胃中少頃隨胃氣以敷布而里之未知者遂無不和醫方考曰傷寒下之早以既傷之中氣而邪乘之則不能升清降濁痞塞於中如天地不交而成否故曰痞瀉心者瀉心下之邪也姜夏之辛所以散痞氣芩連之苦所以瀉痞熱已下之後脾氣必虛人參甘草大棗所以補脾之虛傷寒選錄曰凡言瀉心者少陽邪將入太陰邪在胸中之下非心經受邪也傷寒蘊要曰瀉心非瀉心火之熱乃瀉心下痞之滿也千金心虛實門瀉心湯治老少下利水穀不消腸中雷鳴心下痞滿乾嘔不安即本方煮法後云並治霍亂若寒加附子一枚渴加栝蔞根二兩嘔加橘皮一兩痛加當歸一兩客熱以生薑代乾薑又冷痢門瀉心湯治卒大下利熱唇乾口燥嘔逆引飲於本方去大棗加栝蔞根橘皮注引胡洽文與心虛實門同唯云仲景用大棗十二枚三因心實熱門瀉心湯治心實熱心下痞滿身重發熱乾嘔不安腹中雷鳴涇溲不利水穀不消欲吐不吐煩悶喘急於本方去大棗太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩玉函脈經利下有復字不下間有肯字其人下有必字汪太陽病在經者不可下少陽病下之亦所當禁故以下之為反也下之則陽邪乘虛上結於胸則心下硬下入於腸則利不止中傷其胃則水漿不入其人心煩者正氣已虛邪熱躁極也條辨云心煩下疑有脫簡大抵其候為不治之證仲景云結胸證悉具煩躁者亦死況兼下利水漿不下者邪其為不治之證宜也錫凡遇此病宜重用溫補即小陷胸亦不可與也案此條證喻氏以降皆以為死證特錢氏云愚恐未必盡皆死證或有治法未可知也當於仲景諸煩證中約略尋討其活法可也脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳玉函復作反方濡與軟同古字通用復亦反也緊反入里言寒邪轉內伏也濡言不硬不痛而柔軟也痞言氣隔不通而痞塞也錢脈浮而緊浮為在表緊則為寒乃頭痛發熱身疼腰痛惡風無汗寒邪在表之脈麻黃湯證也而復下之者言不以汗解而反誤下之也緊反入里者言前所見緊脈之寒邪因誤下之虛陷入於裡而作心下痞滿之症也此不過因表邪未解誤下里虛無形之邪氣陷入於裡而成痞耳其脈證不同治法各異者又於下條分出以為臨症施治之用案此條症常器之主小陷胸湯生薑瀉心湯郭白雲主半夏瀉心湯枳實理中丸喻氏程氏魏氏主大黃黃連瀉心湯金鑑主甘草瀉心湯未如錢氏不主一方也太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之乾嘔短氣玉函作嘔即短氣玉函無汗出不惡寒者六字玉函脈經千金翼此下有為字柯中風下利嘔逆本葛根加半夏症若表既解而水氣淫溢不用十棗攻之胃氣大虛後難為力矣然下利嘔逆固為里症而本於中風不可不細審其表也若其人漐漐汗出似乎表證然發作有時則病不在表矣頭痛是表證然既不惡寒又不發熱但心下痞硬而滿脅下牽引而痛是心下水氣泛溢上攻於腦而頭痛也與傷寒不大便六七日而頭痛與承氣湯同乾嘔汗出為在表然而汗出而有時更不惡寒乾嘔而短氣為里症也明矣此可以見表之風邪已解而里之水氣不和也然諸水氣為患或喘或渴或噎或悸或煩或利而不吐或吐而不利或吐利而無汗此則外走皮毛而汗出上走咽喉而嘔逆下走腸胃而下利浩浩莫御非得利水之峻劑以直折之中氣不支矣此十棗之劑與五苓青龍瀉心等法懸殊矣案金鑑云下利之下當是不字發作之作字當是熱字汪氏云頭痛二字當在發作有時之上二說並非也十棗湯方芫花熬甘遂大戟上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓納藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養柯頭痛短氣心腹脅下皆痞硬滿痛是水邪尚留結於中三焦升降之氣拒隔而難通也表邪已罷非汗散所宜里邪充斥又非滲泄之品所能治非選利水之至銳者以直折之中氣不支亡可立待矣甘遂芫花大戟皆辛苦氣寒而秉性最毒並舉而任之氣同味合相須相濟決瀆而大下一舉而水患可平矣然邪之所湊其氣已虛而毒藥攻邪脾胃必弱使無健脾調胃之品主宰其間邪氣盡而元氣亦隨之盡故選棗之大肥者為君預培脾土之虛且制水勢之橫又和諸藥之毒既不使邪氣之盛而不制又不使元氣之虛而不支此仲景立方之盡善也張子和制浚川禹功神祐等方治水腫痰飲而不知君補劑以護本但知用毒藥以攻邪所以善全者鮮方羸瘦劣也糜粥取糜瀾過熟易化而有能補之意吳云一錢匕者匕者匙也謂錢大之匙也千金云錢匕者以大錢上全抄之若云半錢匕者則是一錢抄取一邊爾並用五銖錢也金匱要略病懸飲者此湯主之又咳家其脈弦為有水此湯主之又有支飲家咳煩胸中痛者不卒死至一百日或一歲宜此湯外臺秘要深師朱雀湯療久病癖飲停痰不消在胸膈上液液時頭眩痛苦攣眼暗身體手足十指甲盡黃亦療脅下支滿飲輒引脅下痛即本方用甘遂芫花各一分大戟三分大棗十二枚聖濟總錄三聖散治久病飲癖停痰及脅滿支飲輒引胸下痛即本方汪氏云陳無擇三因方以十棗湯藥為末用棗肉和丸以治水氣四肢浮腫上氣喘急大小便不通蓋善變通者也醫學綱目昔杜壬問孫兆曰十棗湯畢竟治甚病孫曰治太陽中風表解里未和杜曰何以知里未和孫曰頭痛心下痞滿脅下痛乾嘔汗出此知里未和也杜曰公但言病症而所以里未和之故要緊總未言也孫曰某嘗於此未決願聞開諭杜曰里未和者蓋痰與燥氣壅於中焦故頭痛乾嘔短氣汗出是痰膈也非十棗湯不治但此湯不得輕用恐損人於倏忽用藥者慎之宣明論此湯兼下水腫腹脹並酒食積腸垢積滯痃癖堅積蓄熱暴痛瘧氣久不已或表之正氣與邪熱並甚於里熱極似陰反寒戰表氣入里陽厥極深脈微而絕並風熱燥甚結於下焦大小便不通實熱腰痛及小兒熱結乳癖積熱作發風潮搐斑疹熱毒不能了絕者又云芫花慢火炒變色仲景鄉語云炒作熬下凡言熬者皆乾炒也案楊雄方言云凡以火而干五穀之類自山而東齊楚以往謂之熬即其義也嘉定縣誌唐杲字德明善醫太倉武指揮妻起立如常臥則氣絕欲死杲言是為懸飲飲在喉間坐之則墜故無害臥則壅塞諸竅不得出入而欲死也投以十棗湯而平醫學六要一人飲茶過度且多憤懣腹中常轆轆有聲秋來發熱寒似瘧以十棗湯料黑豆煮曬乾研末棗肉和丸芥子大而以棗湯下之初服五分不動又治五分無何腹痛甚以大棗湯飲大便五六行皆溏糞無水時蓋晡時也夜半乃大下數斗積水而疾平當其下時瞑眩特甚手足厥冷絕而復甦舉家號泣咸咎藥峻嗟乎藥可輕哉方脈正宗治五種飲證芫花醋煮大戟醋煮甘遂童便煮三處煮過各等分焙乾為末每服二錢大棗十枚煎湯調下出本草匯言直指方治小瘤方先用甘草煎膏筆蘸妝瘤四圍干而復妝凡三次後以大戟芫花甘遂上等為細末米醋調別筆妝敷其中不得近著甘草處次日縮小又以甘草膏妝小暈三次中間仍用大戟芫花甘遂如前自然焦縮活人書用此湯合下不下令人脹滿通身浮腫而死太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈心上玉函脈經有則字瞤下有如此二字燒脈經作火成太陽病因發汗遂發熱惡寒者外虛陽氣邪復不除也因復下之又虛其里表中虛邪內陷傳於心下為痞發汗表虛為竭陽下之裡虛為竭陰表證罷為無陽里有痞為陰獨又加燒針虛不勝火火氣內攻致胸煩也傷寒之病以陽為主其人面色青膚肉瞤動者陽氣大虛故云難治若面色微黃手足溫者陽氣得復故云易愈案既云陰陽氣並竭而又云無陽則陰獨義不明切方氏云無陽以俱虛言也陰獨謂痞也喻氏云雖曰陰陽氣並竭實繇心下無陽故陰獨痞塞也程氏云陰陽氣並竭則並陷入之陽邪亦不成其為陽而兼併於陰矣無陽則陰獨恐發熱者不發熱而單惡寒矣志聰云無太陽之表陽有陰邪之獨陷也錫駒云言無陽氣於外則陰血獨守於內也錢氏云並竭之陰陽者乃人身之真氣也此所謂無陽者指胃中之陽氣空虛也陰獨者謂唯有陰邪痞塞於中也魏氏云陰陽之正氣雖俱竭而陰藥之性痞塞於心下之陰分者獨不散故曰無陽則陰獨金鑑云陰陽並竭已成壞證矣況無陽則陰不生陰獨則陽不化而復加燒針火氣內攻陰陽皆病汪氏云痞證為天氣不降地氣不升氣屬陽二氣不能交通故曰無陽中州之土閉塞猶之孟冬之月則純陰用事故曰陰獨以上數說糊塗不通特柯氏於此二句不敢解釋豈其遵闕如之聖訓耶郭白雲云此為難治之證須臨時更詳輕重痞甚先瀉心湯發熱惡寒甚則先小柴胡火逆甚則先救逆湯從所重治之汪氏云小柴胡不宜用發熱惡寒甚乃太陽表證在也仲景法宜更用桂枝湯以解肌案醫壘元戎此條證治以大黃黃連瀉心湯恐不允矣錢氏云手足溫則知陽氣猶未敗亡溫經復陽之治尚可施也錫駒云予親遇此證不啻十百皆從溫補而愈二家之言當切當矣宗印曰本經多有立論而無方者有借醫之汗下而為說辭者多意在言外讀論者當活潑潑看去若留著於眼便為糟粕如補立方劑何異懸瘤心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之千金翼濡上有自字玉函浮上有自字汪關上浮者諸陽之脈皆浮也以手按其痞處雖濡純是邪熱壅聚故用此湯以導其熱而下其邪也成注云虛熱者誤夫中氣雖虛邪熱則聚故仲景以實熱治之若系虛熱則不用大黃黃連矣錢心下者心之下中脘之上胃之上脘也胃居心之下故曰心下也其脈關上浮者浮為陽邪浮主在上關為中焦寸為上焦因邪在中焦故關上浮也按之濡乃無形之邪熱也熱雖無形然非苦寒以泄之不能去也故以此湯主之柯氏改濡作硬柯氏方論又以濡為汗出濕濡之義徐靈胎亦為心下濡濕金鑑濡上補不字並非也大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服原注臣億等看詳大黃黃連瀉心湯諸本皆二味又後附子瀉心湯用大黃黃連芩附子恐是前方中亦有黃芩後但加附子也故後云附子瀉心湯本云加附子也汪麻沸湯者熟湯也湯將熟時其面沸泡如麻以故云麻痞病者邪熱聚於心下不比結胸之大實大堅故用沸湯漬絞大黃黃連之汁溫服取其氣味皆薄則性緩戀膈能泄心下痞熱之氣此為邪熱稍輕之證大抵非虛熱也錢麻沸湯者言湯沸時泛沫之多其亂如麻也全生集作麻黃沸湯謬甚千金翼注此方必有黃芩醫壘元戎本方加黃芩為伊尹三黃湯金匱要略心氣不足吐血衄血瀉心湯主之於本方加黃芩一兩以水三升煮取一升頓服之千金方巴郡太守奏三黃丸治男子五勞七傷消渴不生肌肉婦人帶下手足寒熱加減隨四時又三黃湯治下焦結熱不得大便於本方去黃連加梔子甘草若大便秘加芒硝二兩外臺秘要集驗療黃疸身體面目皆黃大黃散三味各等分搗篩為散先食服方寸匕日三服亦可為九服又出千金聖惠方治熱蒸在內不得宣散先心腹脹滿氣急然後身面悉黃名為內黃即本方和劑局方三黃丸治丈夫婦人三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩躁不美飲食下焦有熱小便赤澀大便秘結五臟俱熱即生疒背癤瘡痍及治五般痔疾糞門腫痛或下鮮血三味各等分為細末煉蜜為丸如梧桐子大每服三十丸熟水吞下小兒積熱亦宜服之案本出聖惠方熱病門活人書瀉心三黃湯婦人傷寒六七日胃中有燥屎大便難煩躁譫語目赤毒氣閉塞不得通即本方如目赤睛疼宜加白茯苓嫩竹葉瀉肝余之氣拔萃方犀角地黃湯治主脈浮客脈芤浮芤相合血積胸中熱之甚血在上焦此藥主之於本方加地黃張氏醫通噤口痢有積穢太多惡氣熏蒸者大黃黃連瀉心湯加木香心下痞而復惡寒汗出者附子瀉心湯主之玉函心上有若字錢傷寒鬱熱之邪誤入而為痞原非大實而復見惡寒汗出者其命門真陽已虛以致衛氣不密故玄府不得緊閉而汗出陽虛不任外氣而惡寒也程傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯與此條宜參看彼條何以主桂枝解表此條何以主附子回陽緣彼條發汗汗未出而原來之惡寒不罷故屬之表此條汗已出惡寒已罷而復惡寒汗出故屬之虛凡看論中文字須於異同處細細參考互勘方得立法處方之意耳附子瀉心湯方大黃二兩黃連一兩附子二枚炮去皮破別煮取汁成本玉函千金翼作一枚黃芩一兩上四味切三味以麻沸湯二升漬之須臾絞去滓納附子汁分溫再服切玉函作㕮咀二字錢以熱邪痞於心下則仍以大黃黃連瀉之加附子以扶真陽助其蒸騰之衛氣則外衛固密矣因既有附子之加併入黃芩以為徹熱之助而寒熱並施各司其治而陰陽之患息傾痞之功又立矣程二證俱用大黃以條中無自利證則知從前下後腸中反成滯澀閉住陰邪勢不得不破其結使陰邪有出路也此雖曰瀉心而瀉熱之中即具回陽之力故以附子名湯耳鑑其妙尤在以麻沸湯漬三黃須臾絞去滓納附子別煮汁義在瀉痞之意輕扶陽之意重也舒案此湯治上熱下寒之證確乎有理三黃略浸即絞去滓但取輕清之氣以去上焦之熱附子煮取濃汁以治下焦之寒是上用涼而下用溫上行瀉而下行補瀉取輕而補取重制度之妙全在神明運用之中是必陽熱結於上陰寒結於下用之乃為的對若陰氣上逆之痞證不可用也本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之一方云忍之一日乃愈脈經無煩字成本無一方以下九字而注中釋其義則繫於遺脫成本因下後成痞當與瀉心湯除之若服之痞不解其人渴而口燥煩小便不利者為水飲內蓄津液不行非熱痞也與五苓散發汗散水則愈一方忍之一日乃愈者不飲者外水不入所停之水得行而痞亦愈也案口燥煩之煩諸家不解特魏氏及金鑑云渴而口燥心煩然則煩字當是一字句傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之柯本噫作嘔非玉函下利作而利方解謂大邪退散也胃為中土溫潤則和不和者汗後亡津液邪乍退散正未全復而尚弱也痞硬伏飲搏膈也噫飽食息也食臭毈氣也平人過飽傷食則噫食臭病人初瘥脾胃尚弱化輸未強雖無過飽猶之過飽而然也水氣亦謂飲也雷鳴者脾胃不和薄動之聲也下利者水穀不分清所以雜迸而走注也成乾噫食臭者胃虛而不殺穀也脅下有水氣腹中雷鳴土弱不能勝水也錢傷寒汗出解之後言表邪俱從汗出而悉解也胃中不和以下皆言里症未除也案乾噫之干諸家無注義程氏解乾嘔云干空也此原鄭玄注禮記正與此同義噫有吐出酸苦水者今無之故曰乾噫柯氏改作乾嘔大失經旨矣生薑瀉心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服附子瀉心湯本云加附子半夏瀉心湯甘草瀉心湯同體別名耳生薑瀉心湯本云理中人參黃芩湯去桂枝術加黃連並瀉肝法附子瀉心湯以下玉函成本無鑑名生薑瀉心湯者其義重在散水氣之痞也生薑半夏散脅下之水氣人參大棗補中州之虛乾薑甘草以溫裡寒黃芩黃連以瀉痞熱備乎虛水寒熱之治胃中不和下利之痞焉有不愈者乎施氏續易簡方生薑瀉心湯治大病新瘥脾胃尚弱穀氣未復強食過多停積不化心下痞硬乾噫食臭脅下有水腹中雷鳴下利發熱名曰食復最宜服之傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心中痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非熱結但以胃中虛客氣上逆故使硬也甘草瀉心湯主之谷上外臺有水字心煩玉函脈經作而煩不得間外臺有能字脈經千金翼謂作為復下有重字使硬作使之堅外臺並同玉函亦有之字鑑毋論傷寒中風表未解總不當下醫反下之或成痞或作利今其人以誤下之故下利日數十行水穀不化腹中雷鳴是邪乘裡虛而利也心下痞硬而滿乾嘔心煩不得安是邪陷胸虛而上逆也似此痞利表裡兼病法當用桂枝加人參湯兩解之醫惟以心下痞謂病不盡復下之其痞益甚可見此痞非熱結亦非寒結乃乘誤下中虛而邪氣上逆陽陷陰凝之痞也故以甘草瀉心湯以緩其急而和其中也志挾邪納入有乖蒸變故穀不化而腹中雷鳴案穀不化喻氏錢氏張氏柯氏以完穀不化為解非也謂胃弱不能轉運故水穀不得化留滯於腹中作響而雷鳴也甘草瀉心湯方甘草四兩炙黃芩三兩乾薑三兩外臺作二兩大棗十二枚擘半夏半升洗外臺有去滑二字黃連一兩上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服原注臣億等謹案上生薑瀉心湯法本云理中人參黃芩湯今詳瀉心以療痞痞氣因發陰而主是半夏生薑甘草瀉心三方皆本於理中也其方必各有人參今甘草瀉心中無者脫落之也又案千金並外臺秘要治傷寒䘌食用此方皆有人參知脫落無疑外臺云一方有人參三兩鑑方以甘草命名者取和緩之意也用甘草大棗之甘補中之虛緩中之急半夏之辛降逆止嘔芩連之寒瀉陽陷之痞熱乾薑之熱散陰凝之痞寒緩中降逆瀉痞除煩寒熱並用也案總病論本方有人參注云胃虛故加甘味醫壘元戎伊尹甘草瀉心湯即本方有人參云伊尹湯液此湯也七味今監本無人參脫落之也又案元戎文醫方類聚引南陽活人書今所傳無求子活人書無此文金匱要略曰狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲喝甘草瀉心湯主之即本方亦用人參三兩張氏醫通曰痢不納食俗名噤口如因邪留胃中胃氣伏而不宣脾氣因而滯澀者香連枳樸橘紅茯苓之屬熱毒衝心頭疼心煩嘔而不食手足溫暖者甘草瀉心湯去大棗易生薑此證胃口有熱不可用溫藥傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復不止者當利其小便湯藥下脈經千金有而字復不止玉函脈經作若不止復下成本有利字已千金作竟龐氏末句改作複利不止當以五苓散利小便成傷寒服湯藥下後利不止而心下痞硬者氣虛而客氣上逆也與瀉心湯攻之則痞也醫復以他藥下之又虛其里致利不止也理中丸脾胃虛寒下利者服之愈此以下焦虛故與之其利益甚聖濟經曰滑則氣脫欲其收也如開腸洞泄便溺遺失澀劑所以收之此利由下焦不約與赤石脂禹餘糧湯以澀洞泄下焦主分清濁下利者水穀不分也若服澀劑而利不止當利小便以分其氣汪利其小便仲景無方補亡論常器之云可五苓散赤石脂禹餘糧湯方赤石脂一斤碎太一禹餘糧一斤碎玉函成本無太一二字上二味以水六升煮取二升去滓分溫三服成本上字作已上二字誤脫分溫二字成本草云澀可去脫石脂之澀以收斂之重可去怯餘糧之重以鎮固之柯甘姜參朮可以補中宮火氣之虛而不足以固下焦脂膏之脫此利在下焦未可以理中之劑收功也然大腸之不固仍責在胃關門之不緊仍責在脾此二味皆土之精氣所結能實胃而澀腸蓋急以治下焦之標者實以培中宮之本也要之此證是土虛而非火虛故不宜於姜附若水不利而濕甚複利不止者則又當利其小便矣凡下焦虛脫者以二物為本參湯調服最效案志聰云按神農本經太乙餘糧禹餘糧各為一種既云太乙禹餘糧此方宜於三味或相傳有誤此說大誤證類本草圖經云本草有太乙餘糧禹餘糧兩種治體猶同傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿脈經發上無後字成傷寒吐下後發汗則表裡之氣俱虛虛煩脈甚微為正氣內虛邪氣獨在至七八日正氣當復邪氣當罷而心下痞脅下痛氣上衝咽喉眩冒者正氣內虛而不復邪氣留結而不去經脈動惕者經絡之氣虛極久則熱氣還經必成痿弱錫痿者肢體委廢而不為我用也久而成痿者經血不外行於四末也錢如此陰盛陽虛之證雖或僥倖而不至危殆若經久不愈必至陽虛不治筋弛骨痿而成廢疾矣魏此條證仍用茯苓桂枝白朮甘草湯或加附子倍加桂枝為對也案成注熱氣還經於義未允汪氏引作表氣虛不能充養於身似是金鑑云八九日心下痞硬脅下痛氣上衝咽喉三句與上下文義不屬必是錯簡注家因此三句皆蔓衍支離牽強註釋不知此證總因汗出過多大傷津液而成當用補氣補血益筋壯骨之藥經年始可愈也未知此說果是否姑存俟考汪氏引補亡論云可茯苓甘草白朮生薑湯郭白雲云當作茯苓桂枝白朮甘草湯成痿者振痿湯傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭湯主之玉函脈經發汗作汗出復作覆成本玉函赭下有石字方解謂大邪已散也心下痞硬噫氣不除者正氣未復胃氣尚弱而伏飲為逆也汪此噫氣比前生薑瀉心湯之乾噫不同是雖噫而不至食臭故知其為中氣虛也與旋覆代赭石湯以補虛散痞下逆氣旋覆代赭湯方旋覆花三兩人參二兩生薑五兩成本有切字大棗十二枚擘甘草三兩炙半夏半升洗代赭一兩玉函成本代赭石上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服成本上下有件字周旋覆花能消痰結軟痞治噫氣代赭石止反胃除五臟血脈中熱建脾乃痞而噫氣者用之誰曰不宜於是佐以生薑之辛可以開結也半夏逐飲也人參補正也甘草大棗益胃也予每借之以治反胃噎食氣逆不降者靡不神效傷寒類方曰靈樞口問篇云寒氣客於胃厥逆從下上散復出於胃故為噫俗名噯氣皆陰陽不和於中之故此乃病已向愈中有留邪在於心胃之間與前諸瀉心法大約相近本草云旋覆治結氣脅下滿代赭治腹中邪毒氣如此二物以治噫氣余則散痞補虛之法也吳儀洛方論曰去滓復煎亦取共行其事之義與生薑瀉心湯等同義活人書曰有旋覆代赭石證其人或咳逆氣虛者先服四逆湯胃寒者先服理中丸次服旋覆代赭湯為良喻氏寓意草曰治一人膈氣粒食不入始吐清水次吐綠水次吐黑水次吐臭水呼吸將絕一晝夜先服理中湯六劑不令其絕來早轉方一劑而安金匱有云噫氣不除者旋覆代赭石湯主之吾於此病分別用之者有二道一者以黑水為胃底之水此水且出則胃中之津久已不存不敢用半夏以燥其胃也一者以將絕之氣止存一系以代赭墜之恐其立斷必先以理中分理陰陽使氣易於降下然後代赭得以建奇奏勣乃用旋覆花一味煎湯調代赭石末二匙與之才入口即覺其轉入丹田矣但困倦之極服補藥二十劑將息二月而愈下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯玉函作大下以後杏子作杏仁成前第三卷十六證云發汗後不可更行桂枝湯汗出而喘無大熱者為與此證治法同汗下雖殊既不當損正氣則一邪氣所傳既同遂用一法治之經所謂若發汗若下若吐後者是矣程下在用桂枝後是從更字上看出案志聰錫駒並云此節重出下字疑本汗字非也太陽病外證未除而數下之遂𭜴熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之𭜴成本作協玉函脈經千金翼作挾程太陽病外證未除而數下之表熱不去而裡虛作利是曰協熱利下不止心下痞硬者裡氣虛而土來心下也表裡不解者陽因痞而被格於外也桂枝行陽於外以解表理中助陽於內以止利陰陽兩治總是補正令邪自卻緣此痞無客氣上逆動膈之陽邪輒防陽欲入陰故不但瀉心中芩連不可用並桂枝中芍藥不可用也協熱而利向來俱作陽邪陷入下焦果爾安得用理中耶利有寒熱二證但表熱不罷者皆為協熱利也案此條方氏諸家併為熱邪陷入證至汪氏則云此係邪熱未解乃實熱之證非虛寒也桂枝人參湯大都是叔和撰次時傳寫之誤此蓋以協熱之協為合同之義而不知與挾同皆坐不博考之弊也程氏辨晰之極是矣錫駒以挾熱為解然而未能免陷入之說殊可惜也案此心下痞硬與金匱胸痹心中痞與人參湯之證略同桂枝人參湯方桂枝四兩別切別切二字玉函成本作去皮甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升納桂更煮取三升去滓溫服一升日再夜一服五升下玉函有去滓二字成本三升下脫去滓二字方氏圈白朮之白吳本刪喻此方即理中加桂枝而易其名亦治虛痞下利之聖法也吳桂枝辛香經火久煎則氣散而力有不及矣故須遲入凡用桂枝諸方俱當依此為例用肉桂亦當臨用去粗皮切碎俟群藥煎好方入煎二三沸即服傷寒類方曰桂獨後煮欲其於治里症藥中越出於表以散其邪也傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯玉函脈經發下有其字柯心下痞是誤下后里症惡寒是汗後未解症裡實表虛內外俱病皆因汗下倒施所致表裡交持仍當遵先表后里先汗後下正法蓋惡寒之表甚於身疼心下之痞輕於清穀與救急之法不同錢心下已痞而仍惡寒者猶有表邪未解也前條同是痞證而惡寒以附子瀉心者因惡寒汗出所以知其為陽虛之惡寒也此則惡寒而不汗出是以知其為表未解也方傷寒病初之表當發故用麻黃湯此以汗後之表當解故曰宜桂枝湯活人書曰大抵結胸痞皆應下然表未解者不可攻也總病論曰前加附子是汗出多而惡寒表汗解而里結未除故也此症是發後無汗惡寒故也先須解表也傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之中玉函正脈作下方本汪本同程心中痞硬嘔吐而下利較之心腹濡軟嘔吐而下利為裡虛者不同發熱汗出不解較之嘔吐下利表解者乃可攻之竟用十棗湯者又不同況其痞不因下後而成並非陽邪陷入之痞而裡氣內拒之痞痞氣填入心中以致上下不交故嘔吐而下利也大柴胡湯雖屬攻劑然實管領表里上中之邪總從下焦為出路則攻中自寓和解之義主之是為合法案金鑑云下利之下字當是不字若是下字豈有上吐下利而以大柴胡湯下之之理乎此說似是而實非也所謂下利乃是熱利若改作不利則與小便何別可謂失考矣病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝喉咽不得息者此為胸有寒也當吐之宜瓜蒂散頭上項上脈經有其字千金翼作頭項不強痛喉咽玉函成本作咽喉此為胸有寒千金作此以內有久痰成病如桂枝證為發熱汗出惡風也方頭不痛項不強言太陽經中無外入之風邪以明非中風也寸候身半以上微浮邪自內出也胸中痞硬痰涎塞膈也氣上衝咽喉者痰湧上逆或謂喉中聲如曳鋸是也寒以痰言喻寒者痰也痰飲內動身必有汗加以發熱惡寒全似中風但頭不痛項不強此非外入之風乃內蘊之痰窒塞胸間宜用瓜蒂散以湧出其痰也周寒飲停蓄阻遏胸中之陽使衛氣不能外固故發熱惡寒汗出也程邪氣蘊蓄於膈間此為胸有寒也痞硬一證因吐下者為虛不因吐下者為實實邪填塞心胸中下二焦為之阻絕自不得不從上焦為出路所謂在上者因而越之是也案方氏諸家以寒為痰蓋瓜蒂能吐膈間之頑痰故有此說而不可以寒直斥為痰程氏則為邪字看極穩當矣如錢氏單為風寒之寒亦恐不爾厥陰篇瓜蒂散條云邪結在胸中又云病在胸中程說有所據瓜蒂散方瓜蒂一分熬黃赤小豆一分玉函作各六銖上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散一錢匕千金翼作半錢匕鑑胸中者清陽之府諸邪入胸府阻遏陽氣不得宣達以致胸滿痞硬熱氣上衝燥渴心煩嗢嗢欲吐脈數促者此熱鬱結也胸滿痞硬氣上衝咽喉不得息手足寒冷欲吐不能吐脈遲緊者此寒鬱結也凡胸中寒熱與氣與飲鬱結為病諒非汗下之法所能治必得酸苦湧泄之品因而越之上焦得通陽氣得復痞硬可消胸中可和也瓜蒂極苦赤豆味酸相須相益能疏胸中實邪為吐劑中第一品也而佐香豉汁合服者藉穀氣以保胃氣也服之不吐少少加服得快吐即止者恐傷胸中元氣也此方奏功之捷勝於汗下所謂汗吐下三大法也今人不知仲景子和之精義置之不用可勝惜哉然諸亡血虛家胸中氣液已虧不可輕與特為申禁汪傷寒一病吐法不可不講華元化云傷寒至四日在胸宜吐之巢元方云傷寒病三日以上氣浮在上部胸心填塞滿悶當吐之則愈仲景以此條論特出之太陽下篇者以吐不宜遲與太陽汗證相等當於兩三日間審其證而用其法也條辨以胸有寒為痰亦通蓋胸有風寒則其人平素飲食之積必鬱而成熱變而為痰所以瓜蒂散亦湧痰熱之藥也尚論篇以此條證竟列入痰病中誤矣煮作稀糜言以湯七合煮香豉如糜粥之爛也方氏以稀糜為另是稀粥大謬之極古方選注曰瓜蒂散乃酸苦湧泄重劑以吐胸寒者邪結於胸不涉太陽表實只以三物為散煮作稀糜留戀中焦以吐之能事畢矣瓜蒂性升味苦而湧豆性酸斂味苦而泄恐其未必即能宣越故復以香豉湯陳腐之性開發實邪定當越上而吐矣外臺秘要張文仲瓜蒂散主傷寒胸中痞塞瓜蒂赤小豆各一兩上二味搗散白湯服一錢匕又範汪療傷寒及天行瓜蒂散方同上二味搗作散溫湯二合服一錢匕藥下便臥若吐便且急忍也候食頃不吐者取錢五七散二合湯和服之便吐矣不吐復稍增以吐為度吐出青黃如菜汁者五升以上為佳若吐少病不除者明日如前法復服之可至再三不令人虛也藥力過時不吐服湯一升助藥力也吐出便可食無復餘毒若服藥過多者益飲冷水解之和服之下活人書有以手指擿之五字東垣試效方曰若有宿食而煩者仲景以梔子大黃湯主之氣口三盛則食傷太陰填塞悶亂極則心胃大疼兀兀欲吐得吐則已俗呼食迷風是也經云上部有脈下部無脈其人當吐不吐者死宜瓜蒂散之類吐之經云高者因而越之此之謂也醫方集解曰治卒中痰迷涎潮壅盛癲狂煩亂人事昏沉五癇痰壅上膈及火氣上衝喉不得息食填中脘欲吐不出量人虛實服之吐時須令閉目緊束肚皮吐不止者蔥白湯解之良久不出者含砂糖一塊即吐案張子和不用豆豉加人參甘草齏汁調下吐不止者用煎麝香湯瓜苗聞麝香即死所以立解活人指掌辨疑曰瓜蒂即絲瓜蒂俗名藤羅案此說本草所不載錄以俟試驗舒氏亦云如無甜瓜絲瓜蒂可代病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死玉函脈經病下有者若二字入陰筋作入陰挾陰筋程其人脅下素有痞積陰邪之伏里者根柢深且固也今因新得傷寒未察其陰經之痞誤行攻下致邪氣入里與宿積相互使臟之真氣結而不通因連在臍旁痛引少腹入陰筋故名臟結蓋痞為陰邪而臍旁陰分也在臟為陰以陰邪結於陰經之臟陽氣難開至此而結勢已成於法為死錢其痛下引少腹入厥陰而控引睪丸之陰筋者此等臟結以陰氣過極陽氣竭絕故曰死錫上文論臟結曰難治曰不可攻此復論臟結之死症以見臟結可生而亦可死也傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之白虎加人參湯脈經千金千金翼作白虎湯傷寒下成本有病字成若吐若下後七八日則當解復不解而熱結在裡表熱者身熱也裡熱者內熱也本因吐下後邪氣乘虛內陷為結熱若無表熱而純為裡熱則邪熱結而為實此以表熱未罷時時惡風若邪氣純在表則惡風無時若邪氣純在裡則更不惡風以時時惡風知表裡俱有熱也邪熱結而為實者則無大渴邪熱散漫則渴今雖熱結在裡表裡俱熱未為結實邪氣散漫熏蒸焦膈故大渴舌上乾燥而煩欲飲水數升與白虎加人參湯散熱生津錢大渴舌上乾燥而煩欲飲水數升則裡熱甚於表熱矣謂之表熱者乃熱邪已結於裡非尚有表邪也因裡熱太甚其氣騰達於外故表間亦熱即陽明篇所謂蒸蒸發熱自內達外之熱也汪時時惡風者乃熱極汗多不能收攝腠理疏以故時時惡風也裡熱則胃腑中燥熱以故大渴舌上乾燥而煩欲飲水數升此因吐下之後胃氣虛內亡津液以故燥渴甚極也周口至干舌至燥無津液極矣能生津液而神速者莫若人參故加之案金鑑云傷寒二字之下當有若汗二字蓋發汗較吐下更傷津液為多也時時惡風當是時汗惡風若非汗字則時時惡風是表不解白虎湯在所禁也論中謂發熱無汗表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之讀者細玩經文自知此說難從柯氏云當汗不汗反行吐下是治之逆也吐則津液亡於上下得津液亡於下是也傷寒類方曰胃液已盡不在經不在腑亦非若承氣症之有實邪因胃口津液枯竭內火如焚欲引水自救故其證如此與熱邪在腑者迥別外臺秘要仲景傷寒論療傷寒汗出惡寒身熱大渴不止欲飲水一二斗者白虎加人參湯主之此條本經不載姑附存於此白虎加人參湯方知母六兩石膏一斤碎人參二兩上篇玉函作三兩甘草二兩炙粳米六兩上五味以水一斗煮米熟湯成去滓溫服一升日三服此方立夏後立秋前乃可服立秋後不可服正月二月三月尚凜冷亦不可與服之與之則嘔利而腹痛諸亡血虛家亦不可與得之則腹痛利者但可溫之當愈玉函作春三月病常苦裡冷案此方已見太陽上篇而無此方立夏以下六十二字故再舉於斯此六十二字疑是後人所添而玉函千金及翼方外臺秘要並有之故不可妄刪姑存其舊耳內臺方議問曰活人書云白虎湯惟夏至發可用何耶答曰非也古人一方對一證若嚴冬之時果有白虎湯證安得不用石膏盛夏之時果有真武湯證安得不用附子若老人可下豈得不用硝黃壯人可溫豈得不用姜附此乃合用者必需之若是不合用者強而用之不問四時皆能為害也汪氏引徐春沂云立夏後云云疑是後人所加張氏傷寒百問經絡圖曰白虎加人參名化斑湯出異書傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之玉函心作而千金及翼外臺作白虎湯鑑傷寒身無大熱不煩不渴口中和背惡寒附子湯主之者屬少陰病也今傷寒身無大熱知熱漸去表入里也口燥渴心煩知熱已入陽明也雖有背微惡寒一證似乎少陰但少陰證口中和今口燥渴是口中不和也背惡寒非陽虛惡寒乃陽明內熱熏蒸於背汗出肌疏故微惡之也主白虎湯以直走陽明大清其熱加人參者蓋有意以顧肌疏也錢此條之背惡寒口燥渴而心煩者乃內熱生外寒也非口中和之背惡寒可比擬而論也汪內蒸熱而表必多汗以故惡寒與上條惡風之義相同案背惡寒成氏以為表邪未盡程氏以為陽虛並非也傷寒類方曰此亦虛燥之症微惡寒謂雖惡寒而甚微又周身不寒寒獨在背知外邪已解若大惡寒則不得用此湯矣傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證者白虎加人參湯主之解下成本玉函外臺有者字千金及翼外臺作白虎湯魏脈浮而不至於滑則熱未變而深入正發熱無汗表證顯然如此不可與白虎湯徒傷胃氣言當於麻黃湯大青龍桂枝二越婢一之間求治法也如其人渴欲飲水與之水果能飲者是表邪變熱已深入矣再診脈無浮緩浮緊之表脈審證無頭身疼痛發熱無汗之表證即用白虎加人參補中益氣止其燥渴錢若渴欲飲水則知邪熱已入陽明之裡胃中之津液枯燥矣然猶必審其無表證者方以白虎湯解其煩熱又加人參以救其津液也太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之玉函太陽下有與字硬作痞堅二字大椎下有一間二字成本無肝俞二字考註文系脫文成心下痞硬而眩者少陽也頸項強者太陽也刺大椎肺俞以瀉太陽之邪而以太陽脈下項挾脊故爾肝俞以瀉少陽之邪以膽為肝之腑故爾太陽為在表少陽為在裡明是半表半裡證前第八證云不可發汗發汗則譫語是發汗攻太陽之邪少陽之邪益甚於胃以發譫語此云慎勿下之攻少陽之邪太陽之邪乘虛入里必作結胸經曰太陽少陽並病而反下之成結胸方頸項亦頭項之互詞前條言眩冒此有眩無冒差互詳略耳汪大椎一穴實合太少而齊瀉諸家注皆不明用針之理竟置大椎而不論大誤之極太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之成太陽陽明合病自下利為在表當與葛根湯發汗陽明少陽合病自下利為在裡可與承氣湯下之此太陽少陽合病自下利為在半表半裡非汗下所宜故與黃芩湯以和解半表半裡之邪嘔者胃氣逆也故加半夏生薑以散逆氣錢太少兩陽經之證並見而為合病太陽雖在表而少陽逼處於里已為半表半裡以兩經之熱邪內攻令胃中之水穀下奔故自下利汪太少合病而至自利則在表之寒邪悉鬱而為裡熱矣裡熱不實故與黃芩湯以清熱益陰使裡熱清而陰氣得復斯在表之陽熱自解所以此條病不但太陽桂枝在所當禁並少陽柴胡亦不須用也鑑太陽與少陽合病謂太陽發熱頭痛或口苦咽乾目眩或胸滿脈或大而弦也若表邪盛肢節煩疼則宜與柴胡桂枝湯兩解其表矣今裡熱盛而自下利則當與黃芩湯清之以和其里也案此條證張璐周禹載以為溫病魏氏駁之是也醫方集解曰合病者謂有太陽症之身熱頭痛脊強又有少陽症之耳聾脅痛嘔而口苦寒熱往來也自利者不因攻下而泄瀉也自利固多可溫然腸胃有積結與下焦客熱又非溫劑所能止或分利之或攻泄之可也黃芩湯方黃芩三兩玉函作二兩芍藥二兩甘草二兩炙大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服成本一服下有若嘔者加半夏半升生薑三兩十二字而無黃芩加半夏生薑湯方成本第十卷生薑一兩半黃芩加半夏生薑湯方黃芩三兩芍藥二兩甘草二兩炙大棗十二枚擘半夏半升洗生薑一兩半一方三兩切上六味以水一斗煮取三升去滓溫服一升日再夜一服汪此小柴胡加減方也熱不在半表已入半里故以黃芩主之雖非胃實亦非胃虛故不須人參補中也錢黃芩撤其熱而以芍藥斂其陰甘草大棗和中而緩其津液之下奔也若嘔者是邪不下走而上逆邪在胃口胸中氣逆而為嘔也故加半夏之辛滑生薑之辛散為蠲飲治嘔之專劑也徐因此而推廣之凡雜證因里未和而下利者黃芩湯可為萬世之主方矣玉函經黃芩人參湯方黃芩人參桂枝乾薑各二兩半夏半升大棗十二枚上六味以水七升煮取二升去滓分溫再服此方無治證蓋與黃連湯略同此方外臺名黃芩湯治乾嘔下利醫方集解曰昂案二經合病何以不用二經之藥益合病而兼下利是陽邪入里則所重者在裡故用黃芩以徹其熱而以甘芍大棗和其太陰使裡氣和則外證自解和解之法非一端也仲景之書一字不苟此證單言下利故此方亦單治下利機要用之治熱痢腹痛更名黃芩芍藥湯又加木香檳榔大黃黃連當歸官桂更名芍藥湯治下痢仲景此方遂為萬世治痢之祖矣本方除大棗名黃芩芍藥湯治火升鼻衄及熱痢出活人書黃芩加半夏生薑湯亦治膽腑發咳嘔苦水如膽汁傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之成此傷寒邪氣傳裡而為下寒上熱也胃中有邪氣使陰陽不交陰不得升而獨治於下為下寒腹中痛陽不得降而獨治於上為胸中熱欲嘔吐與黃連湯升降陰陽之氣程此等證皆本氣所生之寒熱無關於表故著二有字鑑傷寒未解欲嘔吐者胸中有熱邪上逆也腹中痛者胃中有寒邪內攻也此熱邪在胸寒邪在胃陰陽之氣不和失其升降之常故用黃連湯寒溫互用甘苦並施以調理陰陽而和解之也傷寒邪氣入里因人臟氣素有之寒熱而化此則隨胃中有寒胸中有熱而化腹中痛欲嘔吐故以是方主之汪條辨尚論篇皆以風寒二邪分陰陽寒熱殊不知風之初來未必非寒寒之既入亦能成熱不可拘也病源候論冷熱不調候曰夫人營衛不調致令陰陽痞塞陽並於上則上熱陰並於下則下冷上焦有熱或喉口生瘡胸膈煩滿下焦有冷則腹脹腸鳴絞痛泄利宣明論曰腹痛欲嘔吐者上熱下寒也以陽不得降而胸熱欲嘔陰不得升而下寒腹痛是升降失常也黃連湯方黃連三兩玉函作二兩甘草三兩炙玉函作一兩乾薑三兩玉函作一兩桂枝三兩去皮玉函作二兩人參二兩千金翼作三兩大棗十二枚擘半夏半升洗玉函作五合上七味以水一斗煮取六升去滓溫服晝三夜二疑非仲景方成本作溫服一升日三服夜二服無疑非仲景方五字玉函亦無鑑君黃連以清胸中之熱臣乾薑以溫胃中之寒半夏降逆佐黃連嘔吐可止人參補中佐乾薑腹痛可除桂枝所以安外大棗所以培中也然此湯寒溫不一甘苦並投故必加甘草協和諸藥此為陰陽相格寒熱並施之治法也柯此與瀉心湯大同而不名瀉心者以胸中素有之熱而非寒熱相結於心下也看其君臣更換處大有分寸傷寒類方曰即半夏瀉心湯去黃芩加桂枝諸瀉心之法皆治心胃之間寒熱不調全屬裡症此方以黃芩易桂枝去瀉心之名而曰黃連湯乃表邪尚有一分未盡胃中邪氣尚當外達故加桂枝一味以和表裡則意無不到矣傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬原注一云臍下心下硬小便自利者去桂加白朮湯主之疼煩成本作煩疼脈經作疼痛不渴下外臺有下之二字千金翼有下已二字去桂加白朮湯玉函脈經千金翼作朮附子湯成本桂下有枝字鑑傷寒八九日不嘔不渴是無傷寒里病之證也脈浮虛澀是無傷寒表病之脈也脈浮虛主在表虛風也澀者主在經寒濕也身體疼煩屬風也不能轉側屬濕也乃風濕相搏之證非傷寒也與桂子附子湯溫散其風濕使從表而解也若脈浮實者則又當以麻黃加朮湯大發其風濕也如其人有是證雖大便硬小便自利而不議下者以其非邪熱入里之硬乃風燥濕去之硬故仍以桂枝附子湯去桂枝以大便硬小便自利不欲其發汗再奪津液也加白朮以身重著濕在肉分用以佐附子逐濕氣於肌也程林金匱直解曰風淫所勝則身煩疼濕淫所勝則身體難轉側風濕相搏於營衛之間不幹於裡故不嘔不渴也脈浮為風澀為濕以其脈近於虛故用桂枝附子湯溫經以散風濕小便利者大便必硬桂枝近於解肌恐大汗故去之白朮去肌濕不妨乎內故加之內臺方議曰問曰此書皆是傷寒之法又兼此風濕之證雜之何耶答曰此人先有濕氣因傷中風寒合而成此證以此添入傷寒法中昔自祖師張仲景開化以來此風濕暍風溫濕溫等證皆在金鏡外臺法中因三國混亂書多亡失外臺之書流蕩不全因王叔和得傷寒足六經之法集成傷寒論間得風濕數篇雜入此中故曰痓濕暍三種宜應別論惟得正傳者方知之案相搏之搏方氏改作摶注云摶掜聚也言風與濕掜合團聚共為一家之病也此說非也蓋搏薄同王冰平人氣象論注引辨脈陰陽相搏名曰動作相薄可以證也桂枝附子湯方桂枝四兩去皮附子三枚炮去皮破成本破八片錢本作二枚生薑三兩切大棗十二枚擘甘草二兩炙上五味以水六升煮取二升去滓分溫三服去桂加白朮湯方金匱白朮附子湯即是玉函名朮附湯金鑑作桂枝附子去桂枝加白朮湯附子三枚炮去皮破白朮四兩生薑三兩切玉函作二兩甘草二兩炙玉函作三兩大棗十二枚擘玉函作十五枚上五味以水六升煮取二升去滓分溫三服初一服其人身如痹半日許復服之三服都盡其人如冒狀勿怪此以附子術並走皮內逐水氣未得除故使之耳法當加桂四兩此本一方二法以大便硬小便自利去桂也以大便不硬小便不利當加桂附子三枚恐多也虛弱家及產婦宜減服之去桂加白朮湯金匱用附子一枚白朮二兩生薑甘草各一兩大棗六枚水六升作三升二升作一升外臺引仲景傷寒論本云附子一枚今加之二枚名附子湯又云此二方但治風濕非治傷寒也徐是風濕相搏以不頭疼不嘔渴知風濕之邪不在表不在裡而在軀殼然其原因於寒幾於風寒濕合而為痹矣桂枝湯本屬陽劑而芍藥非寒濕證所宜故易以附子之辛熱多至三枚從桂枝之後為純陽剛劑以開凝結之陰邪然脈不單澀而浮虛先見是濕少而風多也故藉一附子而迅掃有餘否則又宜去桂枝加朮湯驅濕為主矣吳儀洛方論曰此即桂枝去芍藥加附子湯又加附子二枚又即後條之甘草附子湯以薑棗易術之變制也汪氏云若其人大便硬小便自利者後條辨云此濕雖盛而津液自虛也於上湯中去桂以其能走津液加朮以其能生津液或問云小便利則濕去矣何以猶言濕盛余答云濕熱鬱於裡則小便不利寒濕搏於經則小便自利又有昧理者云大便溏宜加白朮殊不知白朮為脾家主藥後條辨云燥濕以之滋液亦以之直指方帶下論云經曰衛氣者所以溫分肉充皮膚肥腠理司開闔衛氣若虛則分肉不溫皮膚不充腠理不肥而開闔失其司耳況胃為血海水液會焉胃者中央之土又所以主肌肉而約血水也衛氣與胃氣俱虛則肌弱而膚空血之與水不能約制是以涓涓漏卮休作無時而不暫停矣然則封之止之其可不加意於固衛厚脾之劑乎此桂枝附子湯以之固衛而人參白朮茯苓草果丁香木香以之厚脾二者俱不可闕也風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之疼煩成本作煩疼是喻此條復互上條之意而辨其症之較重者痛不可近汗出短氣惡風不欲去衣小便不利或身微腫正相搏之最劇處錢掣痛者謂筋骨肢節抽掣疼痛也不得屈伸寒濕之邪流著於筋骨肢節之間故拘攣不得屈伸也近之則痛劇者即煩疼之甚也疼而煩甚人近之則聲步皆畏如動觸之而其痛愈劇也汗出即中風汗自出也短氣邪在胸膈而氣不得伸也小便不利寒濕在中清濁不得升降下焦真陽之氣化不行也惡風不欲去衣風邪在表也或微腫者濕淫肌肉經所謂濕傷肉也風邪寒濕搏聚而不散故以甘草附子湯主之方或未定之詞身微腫濕外薄也不外薄則不腫故曰或也程以上二條雖云風濕相搏其實各夾有一寒字在內即三氣合而為痹之證也邪留於筋骨之間寒多則筋攣骨痛甘草附子湯方白朮二兩玉函作三兩桂枝四兩去皮附子二枚炮去皮汪周作破八片甘草二兩炙玉函外臺作三兩上四味以水六升煮取二升去滓溫服一升日三服初服得微汗則解能食汗止復煩者將服五合恐一升多者宜服六七合為始玉函二升作三升汗止金匱成本作汗出無將字始金匱成本作妙千金翼作愈徐彬金匱論注沈明宗編注作佳徐此與桂枝附子湯證同是風濕相搏然彼以病淺寒多故肢體為風濕所困而患止軀殼之中此則風濕兩勝挾身中之陽氣而奔逸為災故骨節間風入增勁不能屈伸大傷其衛而汗出短氣惡風水亦乘風作勢而身微腫其病勢方欲擾亂於肌表與靜而困者不侔矣吳此方用附子除濕溫經桂枝祛風和營術去濕實衛甘草輔諸藥而成斂散之功也周此證較前條更重且里已受傷曷為反減去附子耶前條風濕尚在外在外者利其速去此條風濕半入里入里者妙在緩攻仲景止恐附子多則性猛且急筋節之竅未必驟開風濕之邪豈能托出徒使汗大出而邪不盡耳君甘草也欲其緩也和中之力短戀藥之用長也此仲景所以前條用附子三枚者分三服此條止二枚者初服五合恐一升為多宜服六七合全是不欲盡劑之意學者於仲景書有未解即於本文中求之自得矣錢雖名之曰甘草附子湯實用桂枝去芍藥湯以汗解風邪增入附子白朮以驅寒燥濕也汪後條辨云以上三方俱用附子者以風傷衛而表陽已虛加寒濕而里陰更勝凡所見證皆陽氣不充故經絡關節得著濕而衛陽愈虛耳愚以此言實發仲景奧義案千金方腳氣門四物附子湯即是方後云體腫者加防己四兩悸氣小便不利加茯苓三兩三因方六物附子湯即是傷寒脈浮滑此以表有熱里有寒白虎湯主之原注巨億等謹案前篇云熱結在裡表裡俱熱者白虎湯主之又云其表不解不可與白虎湯此云脈浮滑表有熱里有寒者必表裡字差矣又陽明一證云脈浮遲表熱裡寒四逆湯主之又少陰一證云裡寒外熱通脈四逆湯主之以此表裡自瘥明矣千金翼云白通湯非也玉函作傷寒脈浮滑而表熱裡寒者白通湯主之舊云白通湯一云白虎者恐非注云舊云以下出叔和今考千金翼作白虎湯疑玉函誤矣此字玉函作而成本無以字程本張本作里有熱表有寒蓋原於林億說也柯氏作表有熱里有邪蓋原於成注鑑王三陽云經文寒字當邪字解亦熱也其說甚是若是寒字非白虎湯證矣此言傷寒太陽證罷邪傳陽明表裡俱熱而未成胃實之病也脈浮滑者浮為表有熱之脈陽明表有熱當發熱汗出滑為里有熱之脈陽明裡有熱當煩渴引飲故曰表有熱里有熱也此為陽明表裡俱熱之證白虎乃解陽明表裡俱熱之藥故主之也不加人參者以其未經汗吐下不虛也錢若胃實而痛者為有形之邪當以承氣湯下之此但外邪入里為無形之熱邪故用寒涼清肅之白虎湯以解陽明胃腑之邪熱也案此條諸說不一成氏云里有寒有邪氣傳裡也以邪未入腑故止言寒如瓜蒂散證云胸上有寒者是也方氏云里有寒者里字非對表而稱以熱之裡言蓋傷寒之熱本寒因也故謂熱里有寒指熱之所以然者言也喻氏云里有寒者傷寒傳入於裡更增裡熱但因起於寒故推本而曰里有寒程氏云讀厥陰篇中脈滑而厥者里有熱也白虎湯主之則知此處表裡二字為錯簡里有熱表有寒亦是熱結在裡郁住表氣於外但較之時時惡風背微惡寒者少倏忽零星之狀張氏亦改表有寒里有熱云熱邪初乘肌表表氣不能勝邪其外反顯假寒故言表有寒而伏邪始發未盡裡熱猶盛故云里有熱志聰云此表有太陽之熱里有癸水之寒夫癸水雖寒而與陽明相搏則戊已化火為陽熱有餘故以白虎湯清兩陽之熱錫駒云太陽之標熱在表此表有熱也太陽之本寒在裡此里有寒也凡傷於寒則為病熱故宜白虎湯主之魏氏云此里尚為經絡之裡非臟腑之裡亦如衛為表營為里非指臟腑而言也錢氏云白虎湯為表邪未解之所忌用若云傷寒表有熱固非所宜而曰里有寒尤所當忌而仲景反以白虎湯主之何也以意推之恐是先受之寒邪已經入里鬱而為熱本屬寒因故曰里有寒邪既入里已入陽明發而為蒸蒸之熱其熱自內達外故曰表有熱柯氏改寒作邪云舊本作里有寒者誤此雖表裡並言而重在裡熱所謂結熱在裡表裡俱熱者也以上諸說如此特林氏程氏解似義甚切當其餘則含糊牽扭難以適從至其順文平穩則金鑑為得故姑揭其說爾湯液本草東垣云胸中有寒者瓜蒂散吐之又表熱裡寒者白虎湯主之瓜蒂知母味苦寒而治胸中寒又裡寒何也答曰成無己注云即傷寒寒邪之毒為熱病也讀者要逆識之如論語言亂臣十人書言唯以亂民其能而亂四方亂皆治也乃治亂者也故云亂臣亂四方也仲景所言寒之一字舉其初而言之熱病在其中矣若以寒為寒冷之冷無復用苦寒之劑兼言白虎訂脈尺寸俱長則熱可知矣白虎湯方知母六兩石膏一斤碎甘草二兩炙粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服外臺作水一斗二升煮取米熟去米納藥煮取六升去滓分六服柯陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗出熱爍胃中故渴欲飲水邪盛而實故脈滑然猶在經故兼浮也蓋陽明屬胃外主肌肉雖內外大熱而未實終非苦寒之味所宜也石膏辛寒辛能解肌熱寒能勝胃火寒能沉內辛能走外此味兩擅內外之能故以為君知母苦潤苦以瀉火潤以滋燥故用為臣甘草粳米調和於中宮且能土中瀉火稼穡作甘寒劑得之緩其寒苦劑得之平其苦使二味為佐庶大寒大苦之品無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大渴可除矣白虎為西方金神取以名湯者秋金得令而炎暑自解傷寒明理論曰白虎西方金神也應秋而歸肺熱甚於內者以寒下之熱甚於外者以涼解之其有中外俱熱內不得泄外不得發者非此湯則不能解也夏熱秋涼暑暍之氣得秋而止秋之令曰處暑是湯以白虎名之謂能止熱也活人書化斑湯治斑毒於本方加葳蕤用糯米云大抵發斑不可用表藥表虛里實若發汗開泄更增斑爛也當用此湯又曰問兩脛逆冷胸腹滿多汗頭目痛苦妄言此名濕溫病苦兩脛逆冷腹滿又胸多汗頭目痛苦妄言其脈陽濡而弱陰小而急治在太陰不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此死者醫殺之耳白虎加蒼朮湯於本方加蒼朮三兩此方出傷寒微旨亦仿金匱白虎加桂湯和劑局方白虎湯治傷寒大汗出後表證已解心胸大煩渴欲飲水及吐或下後七八日邪毒不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者宜服之又治夏月中暑毒汗出惡寒身熱而渴醫學綱目曰孫兆治一人自汗兩足逆冷至膝下腹滿不省人事孫診六脈小弱而急問其所服藥取視皆陰病藥也孫曰此非受病重藥能重病耳遂用五苓散白虎湯十餘帖病少蘇再服痊愈或問治法孫曰病人傷暑也始則陽微厥而脈小無力醫謂陰病遂誤藥其病厥用五苓散利小便則腹減白虎解利邪熱則病愈凡陰病脛冷則臂亦冷汝今脛冷臂不冷則非下厥上行所以知是陽微厥也又曰火喘用本方加栝蔞仁枳殼黃芩神效出初虞世醫方選要人參石膏湯治膈消上焦燥渴不飲多食於本方加黃芩杏仁人參活人大全病在半表半裡熱不退脈尚浮洪者當微表者小柴胡湯合本方和之方脈正宗治胃家實熱或嘈雜消渴善飢或齒痛於本方去粳米加竹葉芍藥出本草匯言傷寒脈結代心動悸炙甘草湯主之心動悸玉函作心中驚悸鑑心動悸者謂心下築築惕惕然動而不自安也若因汗下者多虛不因汗下者多熱欲飲水小便不利者屬飲厥而下利者屬寒今病傷寒不因汗下而心動悸又無飲熱寒虛之證但據結代不足之陰脈即主以炙甘草湯者以其人平日血氣衰微不任寒邪故脈不能續行也此時雖有傷寒之表未罷亦在所不顧總以補中生血復脈為急通行營衛為主也炙甘草湯方甘草四兩炙生薑三兩切人參二兩桂枝三兩去皮生地黃一斤金匱有酒洗字千金翼有切字大棗三十枚擘成本玉函作十二枚阿膠二兩麥門冬半升去心麻仁半升成本作麻子仁義上九味以清酒七升水八升先煮八味取三升去滓納膠烊消盡溫服一升日三服一名復脈湯柯一百十三方未有用及地黃麥冬者恐亦叔和所附然以二味已載神農本經為滋陰之上品因傷寒一書故置之不用耳此或陽亢陰竭而然復出補陰制陽之路以開後學滋陰一法生地黃麥冬阿膠滋陰人參桂枝清酒以通脈甘草薑棗以和營衛結代可和而悸動可止矣張津液枯槁之人宜預防二便秘澀之虞麥冬生地溥滋膀胱之化源麻仁阿膠專主大腸之枯約免致陰虛泉竭火燥血枯此仲景救陰退陽之妙法也柯氏方論曰仲景凡於不足之脈陰弱者用芍藥以益陰陽虛者用桂枝以通陽甚則加人參以生脈此以中虛脈結代用生地黃為君麥冬為臣峻補真陰者然地黃麥冬味雖甘而氣則寒非發陳蕃秀之品必得人參桂枝以通陽脈生薑大棗以和營衛阿膠補血甘草之緩不使速下清酒之猛捷於上行內外調和悸可寧而脈可復矣酒七升水八升只取三升者久煎之則氣不峻此虛家用酒之法且知地黃麥冬得酒則良此證當用酸棗仁肺痿用麻子仁可也如無真阿膠以龜板膠代之案名醫別錄甘草通經脈利血氣證類本草傷寒類要治傷寒心悸脈結代者甘草二兩水三升煮一半服七合日一服由是觀之心悸脈結代專主甘草乃是取乎通經脈利血氣此所以命方曰炙甘草湯也諸家厝而不釋者何千金翼復脈湯治虛勞不足汗出而悶脈結心悸行動如常不出百日危急者二十一日死越公楊素因患失脈七日服五劑而復千金方炙甘草湯治肺痿涎唾多出血心中溫溫液液者即本方外臺秘要引仲景傷寒論主療並同衛生寶鑑至元庚辰六月中許伯威五旬有四中氣本弱病傷寒八九日醫者見其熱甚以涼劑下之又食梨三四枚傷脾胃四肢冷時昏憒請予治之診其脈動而中止有時自還乃結脈也亦心動悸吃噫不絕色青黃精神減少目不欲開蜷臥惡人語予以炙甘草湯治之減生地黃恐損陽氣銼一兩服之不效再於市鋪選嘗氣味厚者再煎服之其病減半再服而愈凡藥昆蟲草木生之有地根葉花實採之有時失其地性味少異失其時氣味不全又況新陳不同精粗不等倘不擇用用之不效醫之過也張氏醫通曰酒色過度虛勞少血津液內耗心火自炎致令燥熱乘肺咯唾膿血上氣涎潮其嗽連續不已加以邪客皮毛入傷於肺而自背得之尤速當炙甘草湯徐彬金匱論注曰余妾曾病此初時涎沫成碗服過半月痰少而愈但最難吃三四日內猝無捷效耳脈按之來緩時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動者名曰代陰也得此脈者必難治成本緩下有而字無復動之者玉函無此條喻此段本為結代二脈下注腳方此承結代而推言結陰代陰以各皆詳辨其狀與辨脈第九章意同汪脈以指按之來來者滑伯仁云自骨肉之分而出於皮膚之際氣之升者是也錢結者邪結也脈來停止暫歇之名猶繩之有結也凡物之貫於繩上者遇結必礙雖流走之甚者亦必少有逗留乃得過也此因氣虛血澀邪氣間隔於經脈之間耳虛衰則氣力短淺間隔則經絡阻礙故不得快於流行而止歇也動而中止者非辨脈法中陰陽相搏之動也謂緩脈正動之時忽然中止若有所遏而不得動也更來小數者言止後更勉強作小數小數者鬱而復伸之象也小數之中有脈還而反動者名曰結陰辨脈法云陰盛則結故謂之結陰也代替代也氣血虛憊真氣衰微力不支給如欲求代也動而中止句與結脈同不能自還因而復動者前因中止之後更來小數隨即有還者反動故可言自還此則止而未即復動若有不復再動之狀故謂之不能自還又略久復動故曰因而復動本從緩脈中來為陰盛之脈故謂之代陰也上文雖云脈結代者皆以炙甘草湯主之然結為病脈代為危候故又有得此脈者必難治句以申明其義案脈來動之動周氏柯氏志聰並以為陰陽相搏之動脈非也脈經曰代脈來數中止不能自還因而復動脈結者生代者死診家正眼曰結脈之止一止即來代脈之止良久方至內經以代脈之見為臟氣衰微脾氣脫絕之診也惟傷寒心悸懷胎三月或七情太過或跌僕重傷及風家痛家俱不忌代脈未可斷其必死案方氏云本條結代下文無代而有代陰中間疑漏代一節金鑑云脈按之來緩時一止至名曰結陰也數語文義不順且前論促結之脈已明當是衍文二書所論如是要之此條實可疑爾
