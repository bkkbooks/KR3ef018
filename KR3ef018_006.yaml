body:
  text: 卷六辨厥陰病脈證並治厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止玉函食則上有甚者二字利不止作不肯止脈經千金翼並同無食則之食程厥陰者兩陰交盡陰之極也極則逆逆固厥其病多自下而上所以厥陰受寒則雷龍之火逆而上奔撞心而動心火心火受觸則上焦俱擾是以消渴而心煩疼胃虛而不能食也食則吐蛔則胃中自冷可知以此句結前證見為厥陰自病之寒非傳熱也且以見烏梅丸為厥陰之主方不但治蛔宜之蓋肝脈中行通心肺上巔故無自見之證見之中上二焦其厥利發熱則厥陰之本證胃虛臟寒下之則上熱未除下寒益甚故利不止錢邪入厥陰則陰邪自下迫陽於上故氣上撞心心中疼熱而消渴也消渴者飲水多而渴不止也陰中之陽受迫而在上故消渴而胃覺飢然終是陰邪所以不欲食客熱尚不殺穀況陰邪乎即使強食陰邪不能腐化濕熱鬱蒸頃刻化而為蛔隨陰氣之上逆故吐蛔也若不知而以苦寒誤下之則胃陽敗絶真陽下脫故利不止也舒按此條陰陽雜錯之證也消渴者膈有熱也厥陰邪氣上逆故上撞心疼熱者熱甚也心中疼熱陽熱在上也飢而不欲食者陰寒在胃也強與之食亦不能納必與飢蛔俱出故食則吐蛔也此證上熱下寒若因上熱誤下之則上熱未必即去而下寒必更加甚故利不止也張張卿子曰嘗見厥陰消渴數證舌盡紅赤厥冷脈微渴甚服白虎黃連等湯皆不救蓋厥陰消渴皆是寒熱錯雜之邪非純陽亢熱之證豈白虎黃連等藥所能治乎鑑此條總言厥陰為病之大綱也厥陰者為陰盡陽生之臟與少陽為表裡者也邪至其經從陰化寒從陽化熱故其為病陰陽錯雜寒熱混淆也楊氏活人總括云張氏有言厥陰為病消渴氣上衝心飢不欲食食即吐蛔吐蛔既出於胃冷役有消渴之證何哉蓋熱在上焦而中焦下焦虛寒無熱耳設或大便硬結是亦蘊毒使然又不可指為燥糞但用生料理中湯加大黃入蜜以利之白朮乾薑所以輔大黃也案六書加味理中飲本於此說當考厥陰中風脈微浮為欲愈不浮為未愈玉函千金翼脈上有其字鑑厥陰中風該傷寒而言也脈微厥陰脈也浮表陽脈也厥陰之病既得陽浮之脈是其邪已還於表故為欲愈也不浮則沉沉里陰脈也是其邪仍在於里故為未愈也錫王良能曰陽病得陰脈者死不浮未必即是陰脈故止未愈不曰沉而曰不浮下字極活張案仲景三陰皆有中風然但言欲愈之脈而未及於證治者以風為陽邪陰經之中得風氣流動反為欲愈之機厥陰病欲解時從醜至卯上玉函千金翼作從醜盡卯錫少陽旺於寅卯從醜至卯陰盡而陽生也厥陰病解於此時者中見少陽之化也徐旭升曰三陽解時在三陽旺時而解三陰解時亦從三陽旺時而解傷寒以生陽為主也厥陰病渴欲飲水者少少與之愈玉函千金翼愈上有即字喻本程本錢本魏本並無渴字程厥陰之見上熱由陰極於下而陽阻於上陰陽不相順接使然非少陰水來剋火亡陽於外者比寒涼不可犯下焦而不妨濟上焦欲飲水者少少與之使陽神得以下通而復不犯及中下二焦亦陰陽交接之一法也案成氏以降以渴欲飲水為陽回氣暖欲解之佳兆殊不知消渴乃厥陰中之一證特柯氏注云水能生木能制火故厥陰消渴最宜之是也蓋曰愈者非厥陰病愈之義僅是渴之一證得水而愈也汪氏引武陵陳氏辨篇首消渴與此條之消渴不同竟不免牽強耳諸四逆厥者不可下之虛家亦然錫諸病而凡四逆厥者俱屬陰寒之證故不可下然不特厥逆為不可下即凡屬虛家而不厥逆者亦不可下也張均衛曰虛家傷寒未必盡皆厥逆恐止知厥逆為不可下而不知虛家雖不厥逆亦不可下故並及之汪仲景於後條雖云熱厥者應下之然方其逆厥之時下之一法不輕試也諸字是該下文諸厥之條而言虛家亦然者言人於未病之前氣血本虛家也案玉函從此條以下至篇末別為一篇題曰辨厥利嘔噦病形證治第十傷寒先厥後發熱而利者必自止見厥復利成陰氣勝則厥逆而利陽氣復則發熱利必自止見厥則陰氣還勝而復利也張傷寒先厥後發熱而利言傷寒表證罷先見厥利而後發熱非陰證始病便見厥利也先厥後發熱而利必自止乃厥陰之常候下文見厥復利乃預為防變之辭設厥利止而熱不已反見咽痛喉痹或便膿血又為陽熱有餘之證矣傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中原注一云消中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也食以索餅千金翼作食之黍餅後日脈之成本玉函作後三日脈之玉函無所以然以下三十八字錢自始發熱至夜半愈是上半截原文所以然者至必發癰膿止乃仲景自為注腳也但厥反九日而利句下疑脫復發熱三日利止七字不然如何下文有恐暴熱來出而復去二句且所以然句下云發熱六日厥反九日復發熱三日並前六日亦為九日是明明說出其為脫落無疑矣然何以知其為復發熱利止乎上條云先厥後發熱利必自止況自食索餅後並不言利是以知其復發熱而利止也言始初邪入厥陰而發熱者六日熱後厥者九日是發熱止六日而厥反九日厥多於熱者三日矣故寒邪在裡而下利也厥後復發熱三日利必自止大凡厥冷下利者因寒邪傷胃脾不能散精以達於四肢四肢不能稟氣於胃而厥厥則中氣已寒當不能食今反能食者似乎胃氣已回但恐為下文之除中則胃陽欲絶中氣將除胃中垂絶之虛陽復焰暫開而將必復閉未可知也姑且食以索餅索餅者疑即今之條子面及饊子之類取其易化也食後不停滯而發熱則知已能消穀胃氣無損而尚在其病為必愈也何也恐其後發之暴熱暫來出而復去故也食後三日脈之而厥後之熱續在者即期之明日夜半愈所以然者以其本發熱六日厥反九日計後三日續發之熱又三日並前六日亦為九日與厥相應為陰陽相均勝復之氣當和故期之且日夜半陰極陽回之候其病當愈所謂厥陰欲解時自醜至卯上也所謂後三日脈之其熱續在為陰陽相當而愈則其熱當止矣若脈仍數而其熱不罷者此為熱氣有餘陽邪太過隨其蘊蓄之處必發癰膿也汪即來復驟去者此胃中真氣得食而盡泄於外即名除中而必死矣魏食索餅以試之若發熱者何以知其胃氣亡則此熱乃暴來出而復去之熱也即如脈暴出者知其必死之義也陰已盛極於內孤陽外走出而離陰忽得暴熱此頃刻而不救之證也凡仲景言曰皆約略之辭如此九日之說亦未可拘總以熱與厥較其均平耳如熱七八日厥七八日亦可熱五六日厥五六日俱可不過較量其陰陽盛衰非定謂必熱九日厥九日方可驗准也柯發癰腫是陽邪外溢於形身俗所云傷寒留毒者是也案金鑑云不發熱之不字當是若字若是不字即是除中何以下接恐暴熱來出而復去之文也蓋二恐字皆疑為除中而下之若是發熱則不可更言恐暴熱來出而復去也此說不可從案方云索當作素謂以素常所食之餅餌飼之一說無肉曰素志聰云索餅麥餅也此說非也劉熙釋名云餅並也溲麵使合併也蒸餅湯餅蠍餅髓餅金餅索餅之屬皆隨形而名之緗素雜記云凡以面為食具皆謂之餅清來集之倘湖樵書云今俗以麥面之線索而長者曰面其圓塊而匾者曰餅考之古人則皆謂餅也漢張仲景傷寒論云食以索餅餅而云索乃面耳此漢人以面為餅之一證也知是錢氏為條子面者確有依據也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死今與玉函作而與此名玉函千金翼作此為錢曰徹讀為撤汪脈遲為寒不待智者而後知也六七日反與黃芩湯者必其病初起便發厥而利至六七日陽氣回覆乃乍發熱而利未止之時粗工不知但見其發熱下利誤認以為太少合病因與黃芩湯徹其熱徹即除也又脈遲云云者是申明除其熱之誤也成除去也中胃氣也言邪氣太甚除去胃氣胃欲引食自救故暴能食也柯除中則中空無陽反見善食之狀俗云食祿將盡者是也程對上文看則食入必發熱可知矣必見下利厥逆發躁等證而死上條脈數此條脈遲是題中二眼目案金鑑云傷寒脈遲六七日之下當有厥而下利四字若無此四字則非除中證矣有此四字始與下文反與黃芩湯之義相屬此說頗有理然而汪氏太明備不必補厥而下利四字而義自通矣傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹汪先厥後發熱下利必自止陽回變熱熱邪太過而反汗出咽中痛者此熱傷上焦氣分也其喉為痹痹者閉也此以解咽中痛甚其喉必閉而不通以厥陰經循喉嚨之後上入頏顙故也又熱邪太過無汗而利不止便膿血者此熱傷下焦血分也熱邪泄於下則不幹於上故云其喉不痹或問中寒之邪緣何變熱余答曰元氣有餘之人寒邪不能深入才著肌表即便發熱此傷寒也元氣不足之人寒邪直中陰經不能發熱此中寒也寒中厥陰為陰之極陰極則陽生故發熱然亦當視其人之元氣何如若發熱則自愈者元氣雖不足不至太虛故得愈也元氣太虛之人不能發熱但厥而至於死者此真陽脫也有發熱而仍厥者此陽氣雖復而不及全賴熱藥以扶之也有發熱而至於喉痹便膿血如上證者此陽氣雖復而太過其力不能勝邪熱全賴涼藥以平之也余疑此條證或於發厥之時過服熱藥而至於此學者臨證宜細辨之案汪云常器之曰喉痹可桔梗湯便膿血可桃花湯然桃花湯內有乾薑過於辛熱不可用也如黃芩湯可借用之張云便膿血者白頭翁湯未知何是傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤四五日下成本玉函有而字程傷寒母論一二日至四五日而見厥者必從發熱得之熱在前厥在後此為熱厥不但此也他證發熱時不復厥發厥時不復熱蓋陰陽互為勝復也唯此證孤陽操其勝勢厥自厥熱仍熱厥深則發熱亦深厥微則發熱亦微而發熱中兼夾煩渴不下利之裡證總由陽陷於內菀其陰於外而不相接也須用破陽行陰之法下其熱而使陰氣得伸逆者順矣不知此而反發汗是徒從一二日及發熱上起見認為表寒故也不知熱得辛溫而助其升散厥與熱兩不除而早口傷爛赤矣喻前云諸四逆厥者不可下矣此云厥應下之者其辨甚微蓋先四逆而後厥與先發熱而後厥者其來迥異故彼云不可下此云應下之也以其熱深厥深當用苦寒之藥清解其在裡之熱即名為下如下利譫語但用小承氣湯止耳從未聞有峻下之法也若不用苦寒反用辛甘發汗寧不引熱勢上攻口傷爛赤與喉痹互意案喻注云先四逆而後厥則似以四逆與厥分為二證錢氏於四逆散注辨厥四逆同一義極是當參考案注云此條系陽明篇錯簡此說非也此證固是陽明胃家實然以其厥者與厥陰之厥相似故揭於此篇與下白虎湯條同意傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈鑑傷寒邪傳厥陰陰陽錯雜為病若陽交於陰是陰中有陽則不厥冷陰交於陽是陽中有陰則不發熱惟陰盛不交於陽陰自為陰則厥冷也陽亢不交於陰陽自為陽則發熱也蓋厥熱相勝則逆逆則病進厥熱相平則順順則病愈今厥與熱日相等氣自平故知陰陽和而病自愈也喻厥終不過五日以下三句即上句之注腳程云自愈者見厥熱已平其他些少之別證舉不足言矣魏厥熱各五日皆設以為驗之辭俱不可以日拘如算法設為問答以明其數使人得較量其虧盈也厥之本於肝忽發熱忽厥亦猶少陽往來寒熱之義也陽經病本於腑病淺在表陰經病本於臟病深在裡此所以為時之久暫不同也觀於瘧證之一日間日三日發之遲速不同則少陽之往來寒熱厥陰之忽熱忽厥皆肝經臟之本然也凡厥者陰陽氣不相順接便為厥厥者手足逆冷者是也成本玉函冷之者無魏凡厥者其間為寒為熱不一總由肝臟受病而筋脈隧道同受其患非陰盛而陽衰陽為寒邪所陷則陽盛而陰衰陰為熱邪所阻二氣之正必不相順接交通寒可致厥熱亦可致厥也言凡厥者見人遇厥當詳諦其熱因寒因而不可概論混施也夫厥之為病何狀手足逆冷是為厥也在陰經諸證原以手足溫冷分寒熱今凡厥俱為手足逆冷則是俱為寒而非熱矣不知大寒似熱大熱似寒在少陰已然至厥陰之厥證陰陽凡不順接皆厥也又豈可概言寒邪反混施也此仲景就厥陰病中厥之一證令人詳分寒熱便於立法以出治也傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔令病者靜而復時煩者此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利非蛔厥也成本作非為蛔厥也王肯堂校本千金翼作死字令病者玉函作今病者成本玉函時煩下無者字上入下無其字又主久利四字玉函無千金翼為細注鑑傷寒脈微而厥厥陰脈證也至七八日不回手足厥冷而更通身膚冷躁無暫安之時者此為厥陰陽虛陰盛之臟厥非陰陽錯雜之蛔厥也若蛔厥者其人當吐蛔今病者靜而復時煩不似臟厥之躁無暫安時知蛔上膈之上也故其煩須臾復止也得食而吐又煩者是蛔聞食臭而出故又煩也得食蛔動而嘔蛔因嘔吐而出故曰其人當自吐蛔也蛔厥主以烏梅丸又主久利者以此藥性味酸苦辛溫寒熱並用能解陰陽錯雜寒熱混淆之邪也喻脈微而厥則陽氣衰微可知然未定其為臟厥蛔厥也惟膚冷而躁無暫安時乃為臟厥用四逆湯及灸法其厥不回者死柯臟厥蛔厥細辨在煩躁臟寒則躁而不煩內熱則煩而不躁其人靜而時煩與躁而無暫安者迥殊矣此與氣上撞心心中疼熱飢不能食食即吐蛔者互文以意見也看厥陰諸證與本方相符下之利不止與又主久利句合則烏梅丸為厥陰主方非只為蛔厥之劑矣魏此為臟寒此髒字即指胃內經十二臟並腑以言臟也其蛔因胃底虛寒浮游於上故有易吐之勢案金鑑云此為臟寒之此字當是非字若是此字即是臟厥與辨蛔厥之義不屬此說誤矣蓋此證膈熱胃寒蛔避寒就溫故上入其膈也若果非臟寒則烏梅丸中宜不用附子乾薑桂枝蜀椒之辛熱柯氏亦誤作非臟寒抑何不思之甚也總病論臟厥宜四逆湯輩極冷服之烏梅丸方烏梅三百枚成本枚作個細辛六兩乾薑十兩當歸四兩黃連十六兩成本作一斤千金作十兩附子六兩炮去皮方周魏吳並作六枚成本此與桂枝並脫去皮字蜀椒四兩去汗桂枝去皮六兩人參六兩黃柏六兩千金云一方用麥糵上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五斗米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等成本丸字並作員漬志聰錫駒作浸千金五斗米作五升米泥作埿和藥作盤中攪三字飯熟下玉函有取字臭食作食臭吳此方主胃氣虛而寒熱錯雜之邪積於胸中所以蛔不安而時時上攻故仍用寒熱錯雜之味治之方中烏梅之酸以安胃蜀椒之辛以泄滯連柏之苦以降氣蓋蛔聞酸則定見辛則伏遇苦則下也其他參歸以補氣血之虛寒姜附以溫胃中之寒飲若無飲則不嘔逆蛔亦不上矣辛桂以祛陷內之寒邪若無寒邪雖有寒飲亦不致嘔逆若不嘔逆則胃氣縱虛亦不致蛔厥程名曰安蛔實是安胃故並主久利見陰陽不相順接厥而下利之證皆可以此方括之也內臺方議云蛔厥者乃多死也其人陽氣虛微正元衰敗則飲食之物不化精反化而為蛔蟲也蛔為陰蟲故知陽微而陰勝陰勝則四肢多厥也若病者時煩時靜得食而嘔或口常吐苦水時又吐蛔者乃蛔證也又腹痛脈反浮大者亦蛔證也有此當急治不治殺人故用烏梅為君其味酸能勝蛔以川椒細辛為臣辛以殺蟲以乾薑桂枝附子為佐以勝寒氣而溫其中以黃連黃柏之苦以安蛔以人參當歸之甘而補緩其中各為使且此蛔蟲為患為難比寸白等劇用下殺之劑故得勝制之方也千金方治冷痢久下烏梅丸即本方傷寒熱少微厥指原注一作稍頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血成本玉函微厥作厥微千金翼指頭作稍頭程熱既少厥微而僅指頭寒雖屬熱厥之輕者然熱與厥並現實與厥微熱亦微者同為熱厥之例故陰陽勝復難以揣摩但以默默不欲食煩躁定為陽勝不欲食似屬寒以煩躁知其熱小便利色白欲得食定為陰復蓋陰陽不甚在熱厥上顯出者如此證熱雖少而厥則不僅指頭寒且不但默默不欲食而加之嘔不但煩躁而加之胸脅滿則自是厥深熱亦深之證也微陰當不能自復必須下之而以破陽行陰為事矣苟不知此而議救於便血之後不已晚乎此條下半截曰小便利色白則上半截小便短色赤可知是題中二眼目默默不欲食欲得食是二眼目胸脅滿煩躁與熱除是二眼目熱字包有煩躁等證非專指發熱之熱也汪云補亡論郭白雲云熱不除而便血可犀角地黃湯柯云此少陽半表半裡症微者小柴胡和之深者大柴胡下之案以上二說恐與經旨畔矣病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也鑑病者手足厥冷言我不結胸是謂大腹不滿而惟小腹滿按之痛也論中有小腹滿按之痛小便自利者是血結膀胱證小便不利者是水結膀胱證手足熱小便赤澀者是熱結膀胱證此則手足冷小便數而白知是冷結膀胱證也程發厥雖不結胸而小腹滿實作痛結則似乎可下然下焦之結多冷不比上焦之結多熱也況手足厥上焦不結惟結膀胱關元之處故曰冷結也錢關元者任脈穴也在臍下三寸亦穴之在小腹者總指小腹滿痛而言故謂冷結在膀胱關元也柯當知結胸證有熱厥者汪補亡論龐安時云宜灸關元穴據圖經云關元一穴系腹部中行在臍下三寸足三陰任脈之會治臍下㽲痛灸之良可百壯愚以灸關元而膀胱之冷結自解矣案總病論刪言我不結胸五字似是傷寒蘊要云小腹下焦所治當膀胱上口主分別清濁或用真武湯傷寒發熱四日厥反三日復熱四日厥少熱多者其病當愈四日至七日熱不除者必便膿血玉函無兩者字便作清成本無上者字熱不除者下有其後二字鑑傷寒邪在厥陰陽邪則發熱陰邪則厥寒陰陽錯雜互相勝復故或厥或熱也傷寒發熱四日厥亦四日是相勝也今厥反三日復熱四日是熱多厥少陽勝陰退故其病當愈也當愈不愈熱仍不止則熱鬱於陰其後必便膿血也汪云補亡論常器之云可桃花湯誤矣愚以仲景黃芩湯可借用之案未知是否傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也喻本程本魏本金鑑並接前條為一條方此反上條而言進謂加重也程厥陰少陽一臟一腑少陽在三陽為盡陽盡則陰生故有寒熱之往來厥陰在三陰為盡陰盡則陽生故有厥熱之勝復凡遇此證不必論其來自三陽起自三陰只論厥與熱之多少熱多厥少知為陽勝陽勝病當愈厥多熱少知為陰勝陰勝病日進熱在後而不退則為陽過勝過勝而陰不能復遂有便血諸熱證厥在後而不退則為陰過勝過勝而陽不能復遂有亡陽諸死證所以調停二者治法須合乎陰陽進退之機陽勝宜下陰勝宜溫若不圖之於早坐令陰竭陽亡其死必矣汪補亡淪常器之云可四逆湯待其熱退寒進厥不復熱者始可用之傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死脈上玉函千金翼有其字微千金翼作數鑑此詳申厥陰臟厥之重證也傷寒六七日脈微手足厥冷煩躁者是厥陰陰邪之重病也若不圖之於早為陰消陽長之計必至於陰氣寖寖而盛厥冷日深煩躁日甚雖用茱萸附子四逆等湯恐緩不及事惟當灸厥陰以通其陽如手足厥冷過時不還是陽已亡也故死程脈微厥冷而煩躁是即前條中所引臟厥之證六七日前無是也汪煩躁者陽虛而爭乃臟中之真陽欲脫而神氣為之浮越故作煩躁常器之云可灸太衝穴以太衝二穴為足厥陰脈之所注穴在足大指下後二寸或一寸半陷中可灸三壯武陵陳氏云灸厥陰如關元氣海之類宗印云此當灸厥陰之滎穴會穴行間章門是也關元百會亦可案今驗氣海關元為得矣傷寒發熱下利厥逆躁不得臥者死喻厥證但發熱則不死以發熱則邪出於表而里證自除下利自止也若反下利厥逆煩躁有加則其發熱又為陽氣外散之候陰陽兩絶亦主死也傷寒發熱下利至甚厥不止者死玉函無此條成金匱要略曰六腑氣絶於外者手足寒五臟氣絶於內者利下不禁傷寒發熱為邪氣獨甚下利至甚厥不止為腑臟氣絶故死錢發熱則陽氣已回利當自止而反下利至甚厥冷不止者是陰氣盛極於裡逼陽外出乃虛陽浮越於外之熱非陽回之發熱故必死矣傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也玉函不利作不便利便字作忽魏傷寒六七日不下利此必見陽微之證於他端也而人不反覺遂延誤其扶陽之方其人忽而熱發利行汗出且不止則孤陽為盛陰所逼自內而出亡於外為汗為熱自上而隨陰下泄為利頃刻之間陽不守其宅陰自獨於裡有陰無陽而死倘早為圖維何致噬臍莫追乎錫王元成曰厥陰病發熱不死此三節發熱亦死者首節在躁不得臥次節在厥不止三節在汗出不止傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血下之死成本玉函亡上有為字千金翼作不可下之下之亡血死程諸四逆厥之不可下者已條而析之矣更得言夫虛家亦然之故傷寒五六日外無陽證內無胸腹證脈虛復厥則虛寒二字人人知之誰復下者誤在肝虛則燥而有閉證寒能澀血故也故曰此為亡血下之死方云亡與無通錢本改原文作無血金鑑云結胸二字當是大便二字不結胸腹濡脈虛復厥皆無可下之理而曰不可下何所謂邪案以上數說不可從程注覺允當矣發熱而厥七日下利者為難治發上玉函千金翼有傷寒二字錢厥多而寒盛於裡復至下利則腔腹之內臟腑經絡純是陰邪全無陽氣雖真武四逆白通等溫經復陽之法恐亦未能挽回陽氣故曰難治志上文五節言熱言厥言下利或病五六日或病六七日此節乃通承上文死證之意而言發熱而厥至七日而猶然下利者病雖未死亦為難治上文言死證之已見此言未死之先機傷寒脈促手足厥逆可灸之原注促一作縱成本玉函逆下有者字喻傷寒脈促則陽氣局蹐可知更加手足厥逆其陽必為陰所格拒而不能返故宜灸以通其陽也案汪引常器之云灸太衝穴未知是否傷寒脈滑而厥者里有熱白虎湯主之成本玉函熱下有也字錢滑者動數流利之象無沉細微澀之形故為陽脈乃傷寒鬱熱之邪在裡阻絶陽氣不得暢達於四肢而厥所謂厥深熱亦深也鑑傷寒脈微細身無熱小便清白而厥者是寒虛厥也當溫之脈乍緊身無熱胸滿而煩厥者是寒實厥也當吐之脈實大小便閉腹滿硬痛而厥者熱實厥也當下之今脈滑而厥滑為陽脈裡熱可知是熱厥也然內無腹滿痛不大便之證是雖有熱而里未實不可下而可清故以白虎湯主之印此章因厥故復列於厥陰篇中亦非厥陰之本病也活人書云熱厥者初中病必身熱頭痛外別有陽證至二三日乃至四五日方發厥其熱厥者厥至半日卻身熱蓋熱氣深則方能發厥須在二三日後也若微厥即發熱者熱微故也其脈雖沉伏按之而滑為里有熱其人或畏熱或飲水或揚手擲足煩躁不得眠大便祕小便赤外證多昏憒者知其熱厥白虎湯又有下證悉具而見四逆者是失下後血氣不通四肢便厥醫人不識卻疑是陰厥復進熱藥禍如反掌大抵熱厥須脈沉伏而滑頭上有汗其手雖冷時復指爪溫須便用承氣湯下之不可拘忌也手足厥寒脈細欲絶者當歸四逆湯主之玉函千金翼作脈為之細絶無者字錢四肢為諸陽之本邪入陰經致手足厥而寒冷則真陽衰弱可知其脈微細欲絶者素問脈要精微論云脈者血之府也蓋氣非血不附血非氣不行陽氣既已虛衰陰血自不能充實當以四逆湯溫復其真陽而加當歸以營養其陰血故以當歸四逆湯主之當歸四逆湯方當歸三兩桂枝三兩去皮芍藥三兩細辛三兩玉函作一兩甘草二兩炙通草二兩大棗二十五枚擘一法十二枚枚成本作個上七味以水八升煮取三升去滓溫服一升日三服錢手足厥寒即四逆也故當用四逆湯而脈細欲絶乃陽衰而血脈伏也故加當歸是以名之曰當歸四逆湯也不謂方名雖曰四逆而方中並無姜附不知何以挽回陽氣是以不能無疑也恐是歷年久遠散失遺亡訛舛於後人之手未可知也從來注傷寒家皆委曲順解曾不省察其理亦何異於成氏之隨文順釋乎柯此條證為在裡當是四逆本方加當歸如茯苓四逆之例若反用桂枝湯攻表誤矣既名四逆湯豈得無姜附若其人內有久寒者宜當歸四逆加吳茱萸生薑湯錢此承上文言手足厥寒脈細欲絶固當以當歸四逆治之矣若其人平素內有久寒者而又為客寒所中其涸陰沍寒難於解散故更加吳茱萸之性燥苦熱及生薑之辛熱以泄之而又以清酒扶助其陽氣流通其血脈也當歸四逆加吳茱萸生薑湯方當歸三兩芍藥二兩炙玉函作三兩通草二兩玉函作三兩桂枝三兩去皮細辛三兩生薑半斤切千金翼作八兩方周錢鑑作三兩大棗二十五枚擘茱萸二升玉函千金翼作吳茱萸二兩方周錢鑑作半斤上九味以水六升清酒六升和煮取五升去滓溫分五服原注一方水酒各四升玉函千金翼並用水酒各四升柯此本是四逆與吳茱萸相合而為偶方也吳茱萸配附子生薑佐乾薑久寒始去嚴氏濟生方通脈四逆湯治霍亂多寒肉冷脈絶即本方加附子大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之千金翼無內字又作若鑑通身大汗出熱當去矣熱仍不去而無他證則為邪未盡而不解也今大汗出熱不去而更見拘急肢疼且下利厥逆而惡寒是陽亡於表寒盛於裡也故主四逆湯溫經以勝寒回陽而斂汗也汪內拘急此寒氣深入於裡寒主收引當是腹以內拘急案方氏云內拘急四肢疼者亡津液而骨氣不利也乃以內拘急為手足拘急然內字不妥帖大汗若大下利而厥冷者四逆湯主之玉函千金翼汗下有出字錢上條大汗出而熱不去此條大汗出而不言熱是無熱矣或曰上文下利厥逆而惡寒且多內拘急四肢疼之證此條亦大下利厥冷而不惡寒其不言熱乃陽氣猶未飛越於外得毋較前為稍輕乎曰無熱則陽氣更微大下利則陰邪更盛故亦以四逆湯主之案玉函經此下有兩條曰表熱裡寒者脈雖沉而遲手足微厥下利清穀此裡寒也所以陰證亦有發熱者此表熱也曰表寒裡熱者脈必滑身厥舌乾也所以少陰惡寒而倦此表寒也時時自煩不欲厚衣此裡熱也病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散辨可吐篇乍緊作乍結成本玉函心下作心中印曰病人者非厥陰之為病而亦非外受之寒邪也以手足厥冷故列於厥陰篇中鑑病人手足厥冷若脈微而細是寒虛也寒虛者可溫可補今脈乍緊徑是寒實也寒實者宜溫宜吐也時煩吐蛔飢不能食乃病在胃中也今心中煩滿飢不能食是病在胸中也寒飲實邪壅塞胸中則胸中陽氣為邪所遏不能外達四肢是以手足厥冷胸滿而煩飢不能食也當吐之宜瓜蒂散湧其在上之邪則滿可消而厥可回矣傷寒厥而心下悸宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也成本玉函悸下有者字玉函作與錢金匱云水停心下甚者則悸太陽篇中有飲水多者心下必悸此二語雖皆仲景本文然此條並不言飲水蓋以傷寒見厥則陰寒在裡裡寒則胃氣不行水液不布必停蓄於心下阻絶氣道所以築築然而悸動故宜先治其水當服茯苓甘草湯以滲利之然後卻與治厥之藥不爾則水液既不流行必漸漬入胃寒厥之邪在裡胃陽不守必下走而作利也鑑傷寒太陽篇汗出表未和小便不利此條傷寒表未解厥而心下悸二證皆用茯苓甘草湯者蓋因二者見證雖不同而里無熱表未和停水則同也故一用之諧和營衛以利水一用之解表通陽以利水無不可也此證雖不曰小便不利而小便不利之意自在若小便利則水不停則厥悸屬陰寒矣豈宜發表利水耶汪郭雍云以四逆湯治厥金鑑云厥而心下悸者之下當有以飲水多四字若無此四字乃陰盛之悸非停水之悸矣何以即知是水而曰宜先治水耶案此說近是汪氏周氏以此條證為熱厥兼停水誤矣傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至喉咽不利唾膿血泄利不止者為難治麻黃升麻湯主之玉函無而字喉咽作咽喉成本同千金翼無寸字柯寸脈沉遲氣口脈平矣下部脈不至根本已絶矣六腑氣絶於外者手足寒五臟氣絶於內者利下不禁喉咽不利水穀之道絶矣汁液不化而成膿血下濡而上逆此為下厥上竭陰陽離決之候生氣將絶於內也麻黃升麻湯其方味數多而分兩輕重汗散而畏溫補乃後世粗工之伎必非仲景方也此證此脈急用參附以回陽尚恐不救以治陽實之品治亡陽之證是操戈下石矣敢望其汗出而愈哉絶汗出而死是為可必仍附其方以俟識者麻黃升麻湯方麻黃二兩半去節升麻一兩一分當歸一兩一分玉函升麻當歸各一兩六銖千金翼同知母十八銖黃芩十八銖葳蕤十八銖一作菖蒲芍藥六銖天門冬六銖去心玉函千金翼作麥門冬桂枝六銖茯苓六銖甘草六銖炙石膏六銖碎綿裹白朮六銖乾薑六銖上十四味以水一斗先煮麻黃一兩沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈案此條證方不對注家皆以為陰陽錯雜之證回護調停為之詮釋而柯氏斷然為非仲景真方可謂千古卓見矣茲不敢繁引諸說云又案外臺引小品載本方方後云此張仲景傷寒論方傷寒選録云此藥之大者若瘟毒瘴利表裡不分毒邪沉熾或咳或膿或血者宜前藥傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也此玉函作為趣正脈本作趨諸本同唯方本作趣錢傷寒四五日邪氣入里傳陰之時也腹中痛寒邪入里胃寒而太陰脾土病也轉氣下趨少腹者言寒邪盛而胃陽不守水穀不別聲響下奔故為欲作自利也周愚案腹中痛又何以知是虛寒若火痛必自下逆攻而上若熱痛必胸結煩滿而實故下氣轉趨知為寒欲利無疑也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃芩黃連人參湯主之復吐下之玉函千金翼全書作復吐之玉函無若字即吐作即出者千金翼寒格上有而字王案本自寒下恐是本自吐下玩復字可見蓋胃寒則吐下寒則利胃寒者不宜吐醫反吐之則傷胃氣遂成寒格下文文氣不貫當有闕文金鑑云經論中並無寒下之病亦無寒下之文玩本條下文寒格更逆吐下可知寒下之下字當是格字文義始屬注家皆釋胃寒下利不但文義不屬且與芩連之藥不合案柯本刪更逆吐下四字要之此條必有誤脫乾薑黃芩黃連人參湯方乾薑黃芩黃連人參各三兩上四味以水六升煮取二升去滓分溫再服柯傷寒吐下後食入口即吐此寒邪格熱於上焦也雖不痞硬而病本於心故用瀉心之半調其寒熱以至和平去生薑半夏者心下無水氣也不用甘草大棗者嘔不宜甘也鑑朝食暮吐脾寒格也食入即吐胃熱格也寒格當以理中湯溫其太陰加丁香降其寒逆可也熱格當用乾薑人參安胃黃連黃芩降胃火也案金匱食已即吐者大黃甘草湯主之金鑑注文與此條意同保幼大全四味人參湯治傷寒脈遲胃冷嘔吐即本方下利有微熱而渴脈弱者令自愈令成本作今玉函無程下利脈絶者死脈實者亦死必何如而脈與證合也緣厥陰下利為陰寒勝微熱而渴則陽熱復也脈弱知邪已退而經氣虛耳故令自愈錢脈弱者方見其裡氣本然之虛無熱氣太過作癰膿便膿血及喉痹口傷爛赤之變故可不治令其自愈也若或治之或反見偏勝耳案汪氏魏氏周氏以此條證為傳經熱利誤矣溯洄集云六經病篇必非叔和所能讚辭也但厥陰經中下利嘔噦諸條卻是叔和因其有厥逆而附遂並無厥逆而同類者亦附之耳下利脈數有微熱汗出令自愈設復緊為未解原注一云設脈浮復緊千金翼有作若令成本作今玉函千金翼作者成下利陰病也脈數陽脈也陰病見陽脈者生微熱汗出陽氣得通也利必自愈諸緊為寒設復脈緊陰氣猶勝故云未解下利手足厥冷無脈者灸之不溫若脈不還反微喘者死玉函若作而錢陰寒下利而手足厥冷至於無脈是真陽已竭已成死證故雖灸之亦不溫也若脈不還反見微喘乃陽氣已絶其未盡之虛陽隨呼吸而上脫其氣有出無入故似喘非喘而死矣汪喘非灸所致陽氣不因灸復則絶證以次第而至尚論篇云孤陽隨火氣上逆而脫誤矣此條仲景不言當灸何穴常器之云當灸關元氣海二穴少陰負趺陽者為順也原本及千金翼志聰本錫駒本接前條今據成本及玉函分為別條錢少陰負趺陽句疑有脫字不然何至詞不達義邪前注皆以少陰為水趺陽為土恐土不能制水得以泛溢而為嘔吐下利豫其權於土土強則水有制而平成可幾案此喻注蓋本成注方意亦同愚恐猶未合於至理夫少陰腎也水中有火先天之陽也趺陽胃脈也火生之土後天之陽也此承上文下利而言凡少陰證中諸陽虛陰盛之證而至於下利及下利清穀之證皆由寒邪太盛非惟少陰命門真火衰微且火不能生土中焦胃脘之陽不守故亦敗泄而為下利少陰脈雖微細欲絶而為陰寒所勝則為少陰之真陽負矣若趺陽脈尚無虧損則是先天之陽雖為寒邪之所鬱伏而後天胃脘之陽尚在為真陽猶未磨滅所謂有胃氣者生故為順也若趺陽亦負則為無胃氣而死矣案此條未妥貼錢注稍覺穩當柯氏刪之蓋有所見也下利寸脈反浮數尺中自澀者必清膿血成下利者脈當沉而遲反浮數者里有熱也澀為無血尺中自澀者腸胃血散也隨利下必便膿血清與圊通脈經曰清者廁也案脈經引四時經注汪熱利而得數脈非反也得浮脈則為反矣茲者寸反浮數此在裡之邪熱不少斂也尺中澀者陰虛也陽邪乘陰分之虛則其血必瘀而為膿血常器之云宜桃花湯誤矣愚意云宜以仲景黃芩湯代之案柯氏以此條屬白頭翁湯部似是王云黃連阿膠湯亦得下利清穀不可攻表汗出必脹滿表上玉函有其字成下利者脾胃虛也胃為津液之主發汗亡津液則胃氣愈虛必脹滿程下利清穀此為裡虛反攻其表則汗出而陽從外泄濁陰得內填脹滿所由來也汗劑所以發邪陽之在表也表若無邪必拔及里陽而外泄遂生內寒汪郭白雲云宜通脈四逆湯下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死也字玉函無千金翼作其汪此辨熱利之脈也脈沉弦者沉主裡弦主急故為裡急後重如滯下之證也脈大者邪熱甚也經云大則病進故為利未止也脈微弱數者此陽邪之熱已退真陰之氣將復故為利自止也下利一候大忌發熱茲者脈微弱而帶數所存邪氣有限故雖發熱不至死耳鑑由此可知滯下脈大身熱者必死也舒按厥陰下利法當分辨陰陽確有所據對證用藥無不立應但言脈者玄渺難憑吾不敢從下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也汪下利脈沉而遲裡寒也所下者清穀裡寒甚也面少赤身微熱下焦虛寒無根失守之火浮於上越於表也以少赤微熱之故其人陽氣雖虛猶能與陰寒相爭必作鬱冒汗出而解鬱冒者頭目之際郁然昏冒乃真陽之氣能勝寒邪里陽回而表和順故能解也病人必微厥者此指未汗出鬱冒之時而言面戴陽系下虛此申言面少赤之故下虛即下焦元氣虛按仲景雖云汗出而解然於未解之時當用何藥郭白雲云不解宜通脈四逆湯張太陽陽明並病面色緣緣正赤者為陽氣怫鬱宜解其表此下利脈沉遲而面見少赤身見微熱乃陰寒格陽於外則外微熱格陽於上則面少赤仲景以為下虛者謂下無其陽而反在外在上故云虛也虛陽至於外越上出危候已彰或其人陽尚有根或用溫藥以勝陰助陽陽得復反而與陰爭瘥可恃以無恐蓋陽返雖陰不能格然陰尚盛亦未肯降必鬱冒少頃然後陽勝而陰出為汗邪從外解自不下利矣傷寒緒論云戴陽者面赤如微酣之狀陰證冷極發躁面赤脈沉細為浮火上衝水極似火也凡下元虛憊之人陽浮於上與在表之邪相合則為戴陽陽已戴於頭面而不知者更行發散則孤陽飛越危殆立至矣大抵陽邪在表之怫鬱必面合赤色而手足自溫若陰證虛陽上泛而戴陽面雖赤足脛必冷不可但見面赤便以為熱也下利脈數而渴者今自愈設不瘥必清膿血以有熱故也玉函千金翼脈下有反字今全書作令程本魏本同周下利脈數而渴邪雖未盡而數為熱徵則亦陽氣自復之候而無利久入陰之虞亦可自愈而不愈者必熱勢向盛此不但利不止而必至圊膿血耳以此推之則其脈必數而有力者也汪此條仲景無治法補亡論常器之云可黃芩湯王黃連湯金匱直解云脈數而渴則寒邪去而利當止經曰若脈數不解而下不止必挾熱而便膿血此有熱陷於下焦使血流腐而為膿也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死玉函脈上有其字無冷字生下無脈字不還下有不溫二字千金同成晬時周時也錢寒邪下利而六脈已絶手足厥冷萬無更生之理而仲景猶云周時脈還手足溫者生何也夫利有新久若久利脈絶而至手足厥冷則陽氣以漸而虛直至水窮山盡陽氣磨滅殆盡脈氣方絶豈有復還之時惟暴注下泄忽得之驟利而厥冷脈絶者則真陽未至陟絶一時為暴寒所中致厥利脈伏真陽未至陟絶故陽氣尚有還期此條乃寒中厥陰非久利也故云晬時脈還手足溫者生若脈不見還是孤陽已絶而死也柯此不嘔不煩不須反佐而服白通外灸少陰及丹田氣海或可救於萬一傷寒下利日十餘行脈反實者死千金翼脈上有其人二字成下利者裡虛也脈當微弱反實者病勝臟也故死難經曰脈不應病病不應脈是為死病錢所謂實者乃陰寒下利真陽已敗中氣已傷胃陽絶而真臟脈現也印以上十章論下利有表裡陰陽寒熱氣血邪正虛實而為審辨之法故不立方案汪氏以此條證為熱利之死證恐不然也下利清穀裡寒外熱汗出而厥者通脈四逆湯主之錫夫谷入於胃藉中土之氣變化而黃以成糟粕猶奉心化赤而為血之義也若寒傷厥少二陰則陰寒氣甚谷雖入胃不能變化其精微蒸津液而泌糟粕清濁不分完穀而出故下利清穀也在少陰則下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒在厥陰則下利清穀裡寒外熱汗出而厥俱宜通脈四逆湯啓生陽之氣而通心主之脈也汪下利清穀為裡寒也外熱為身微熱兼之汗出此真陽之氣外走而欲脫也前條汗出為欲解此條汗出而反厥乃陽氣大虛也與通脈四逆湯以溫經固表通內外陽氣案吳人駒云有協熱下利者亦完穀不化乃邪熱不殺穀其別在脈之陰陽虛實之不同今驗之小兒此最多熱利下重者白頭翁湯主之鑑熱利下重乃火鬱濕蒸穢氣奔逼廣腸魄門重滯而難出即內經所云暴注下迫者是也金匱直解云熱利下重則熱客於腸胃非寒不足以除熱非苦不足以堅下焦故加一熱字別以上之寒利白頭翁湯方白頭翁二兩金匱全書方魏錢鑑並作三兩黃柏三兩黃連三兩秦皮三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升鑑白頭翁神農本經言其能逐血止腹痛陶弘景謂其能止毒痢故以治厥陰熱痢黃連苦寒能清濕熱厚腸胃黃柏瀉下焦之火秦皮亦屬苦寒治下痢崩帶取其收澀也下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯成本脫二宜字喻此與太陽中篇下利身疼用先里後表之法大同彼因誤下而致下利此因下利而致腹脹總以溫里為急者見晛曰消之義也身疼痛有里有表必清便已調其痛仍不減方屬於表太陽條中已悉故此不贅下利欲飲水者以有熱故也白頭翁湯主之以玉函千金翼作為無故字錢此又申上文熱利之見證以證其為果有熱者必若此治法也夫渴與不渴乃有熱無熱之大分別也里無熱邪口必不渴設或口乾乃下焦無火氣液不得蒸騰致口無津液耳然雖渴亦不能多飲若胃果熱燥自當渴欲飲水此必然之理也寧有里無熱邪而能飲水者乎仲景恐人之不能辨也故又設此條以曉之曰下利渴欲飲水者以有熱故也白頭翁湯主之下利譫語者有燥屎也宜小承氣湯千金翼利下有而字者作為無也字鑑下利裡虛譫語裡實若脈滑大證兼裡急知其中必有宿食也其下利之物又必稠黏臭穢知熱與宿食合而為之也此可決其有燥屎也宜以小承氣湯下之於此推之可知燥屎不在大便硬與不硬而在裡之急與不急便之臭與不臭也汪下利者腸胃之疾也若譫語則胃家實與厥陰無與乃腸中有燥屎不得下也治宜小承氣湯者此半利半結只須緩以攻之也或問既下利矣則熱氣得以下泄何由而致譫語有燥屎也答曰此係陽明腑實大熱之證胃中糟粕為邪所壅留著於內其未成硬者或時得下其已成硬者終不得出則燥屎為下利之根燥屎不得出則邪熱上乘於心所以譫語要之此證須以手按臍腹當必堅痛方為有燥屎之徵案少陰篇云少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯辨可下篇云下利心下硬者急下之宜大承氣湯下利脈遲而滑者內實也宜大承氣湯下利不欲食者有宿食故也當下之宜大承氣湯並與此條證同下利後更煩按之心下濡者為虛煩也宜梔子豉湯方更煩言本有煩不為利除而轉甚也柯虛煩對實熱而言是空虛之虛不是虛弱之虛鑑林瀾曰此利後餘熱之證也曰下利後而利止者必非虛寒之煩乃熱遺於胸中也按之心下濡雖熱而非實熱故用此以清其虛煩嘔家有癰膿者不可治嘔膿儘自愈鑑心煩而嘔者內熱之嘔也渴而飲水嘔者停水之嘔也今嘔而有膿者此必內有癰膿故曰不可治但俟嘔膿儘自愈也蓋癰膿腐穢欲去而嘔故不當治若治其嘔反逆其機熱邪內壅阻其出路使無所泄必致他變故不可治嘔膿盡則熱隨膿去而嘔自止矣鄭重光曰邪熱上逆結為內癰肺胃之癰是也嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之成嘔而脈弱為邪氣傳裡嘔則氣上逆而小便當不利小便復利者裡虛也身有微熱見厥者陰勝陽也為難治與四逆湯溫里助陽汪案諸條厥利證皆大便利此條以嘔為主病獨小便利而見厥前後不能關鎖用四逆湯以附子散寒下逆氣助命門之火上以除嘔下以止小便外以回厥逆也乾嘔吐涎沫頭痛者吳茱萸湯主之沫下玉函千金翼有而復二字方本喻本脫頭痛字張凡用吳茱萸湯有三證一為陽明食谷欲嘔一為少陰吐利手足厥冷煩躁欲死此則乾嘔吐涎沫頭痛經絡證候各殊而治則一者總之下焦濁陰之氣上乘於胸中清陽之界真氣反郁在下不得安其本位有時欲上不能但衝動濁氣所以乾嘔吐涎沫也頭痛者厥陰之經與督脈會於巔也食谷欲嘔者濁氣在上也吐利者清氣在下也手足厥冷者陰寒內盛也煩躁欲死者虛陽擾亂也故主吳茱萸湯以茱萸專主開豁胸中逆氣兼人參薑棗以助胃中之清陽共襄祛濁之功由是清陽得以上升而濁陰自必下降矣錫成氏云嘔者有聲者也吐者吐出其物也故有乾嘔而無干吐今乾嘔吐涎沫者涎沫隨嘔而吐出也錢涎沫者黏飲白沫也案柯氏云乾嘔吐涎是二證不是並見可謂執拘矣舒氏云此條多一干字既吐涎沫何為乾嘔當是嘔吐涎沫蓋為陰邪協肝氣上逆則嘔吐涎沫此與柯說同金匱要略嘔而胸滿者茱萸湯主之嘔而發熱者小柴胡湯主之成經曰嘔而發熱者柴胡證具錢邪在厥陰惟恐其厥逆下利若見嘔而發熱是厥陰與少陽臟腑相連乃臟邪還腑自陰出陽無陰邪變逆之患矣故當從少陽法治之而以小柴胡湯和解其半表半裡之邪也傷寒大吐大下之極虛復極汗者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也成本玉函極汗下有出字其人上有以字錢傷寒而大吐大下則胃中陽氣極虛矣復極汗出者非又汗之而極出也因大吐大下之後真陽已虛衛外之陽不能固密所以復極汗出乃陽虛而汗出也愚醫尚未達其義以其人外氣怫鬱本是虛陽外越疑是表邪未解復與之暖水以發其汗因而得噦噦者厄逆也其所以噦者蓋因吐下後陽氣極虛胃中寒冷不能運行其水耳水壅胃中中氣遏絶氣逆而作厄逆也治法當擬用五苓散理中湯甚者四逆湯可耳宗印云此章與辨脈篇之醫不知而反飲冷水令大汗出水得寒氣冷必相搏其人即䭇大意相同程云點出胃中寒冷字是亦吳茱萸湯之治也汪云理中湯亦可借用之活人書云橘皮乾薑湯羌活附子散半夏生薑湯退陰散傷寒噦而腹滿視其前後知何部不利利之即愈玉函視作問成本即作則錫傷寒至噦非中土敗絶即胃中寒冷然亦有裡實不通氣不得下泄反上逆而為噦者玉機真藏論曰脈盛皮熱腹脹前後不通悶瞀此謂五實身汗得後利則實者活今噦而腹滿前後不利五實中之二實也實者瀉之前後大小便也視其前後二部之中何部不利利之則氣得通下泄而不上逆噦即愈矣夫以至虛至寒之噦證而亦有實者存焉則凡系實熱之證而亦有虛者在矣醫者能審其寒熱虛實而為之溫涼補瀉於其間則人無夭札之患矣汪常器之云前部不利豬苓湯後部不利調胃承氣湯愚以須小承氣湯利之案常氏原於活人蓋前部不利五苓散豬苓湯後部不利宜三承氣撰而用之仲景不載主方意在於此耶
