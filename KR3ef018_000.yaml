body:
  text: 凡例一傷寒論有二本一為宋本系宋治平中高保衡等校定一為金成無己注解本而金匱玉函經亦是傷寒論之別本同體而異名者蓋從唐以前傳之大抵與千金翼所援同外臺柴胡加芒硝湯方後引玉函經方與今本符脈經外臺祕要所引互有少異同方有執以降諸家注本盡原成本案成本今收醫統正脈中而又有汪濟川王執中張遂辰等校本余家所藏獨為元版蓋系聊攝之舊本而又有小小異同者蓋各家以意所改非敢有別本而訂之方氏所謂蜀本程氏所謂古本未知何代所刊特可疑耳今行宋板明趙開美所翻雕雖非原本文字端正不失治平之舊格成氏注本又有少異唯明理論所載或有與宋本文同者又案李時珍本草綱目人參柴胡惟張仲景傷寒論作人參茈胡今世未見此本唯成注釋音載參音參茈音柴的知古本如此今原文一遵宋版而諸本異同盡注各條下以備參考一書名輯義每條必鑽研諸家注解虛心夷考衡別是非採輯其最允當於本文者或一條止一二家或一條兼衆說大抵以文義相須為先後不敢拘注家之世次刪冗語節要義不致彼此迭見眩惑心眼要使文義較著旨趣融貫而已但其中脫文誤字其義難領會者則姑舉數說不敢判其然否以俟來哲所輯入諸家一仿金壇王氏之義例成者無己也傷寒論注解趙者嗣真也宸者沈亮宸也以上二家系仲景全書中所引兼者張兼善也系準繩所引王者宇泰也傷寒準繩方者有執也傷寒條辨喻者昌也傷寒尚論篇徐者彬也傷寒原方發明程者應旄也傷寒後條辨錢者潢也傷寒溯源集柯者琴也傷寒論注周者揚俊也傷寒三注張者璐也傷寒纘論志者張志聰也傷寒論集注印者傷寒宗印也張志聰著錫者張錫駒也傷寒直解魏者荔彤也傷寒論本義三者王三陽也傷寒綱目汪者琥也傷寒辨注閔者芝慶也傷寒闡要編林者瀾也沈者明宗也鄭者重光也知者程知也駒者吳人駒也以上六家系金鑑所引鑑者乾隆御纂醫宗金鑑也吳者儀洛也傷寒分經舒者詔也再重訂傷寒論集注此余不專疏釋而別立論以闡發本經之義者作注外之注附各條後其姓氏書目以涉繁瑣今不揭示於此一注家有為新奇之說者遽見之則似可依據然其實大眩惑後人如是者則略加辨駁亦注於各條之後一古今方書用仲景方立醫案及為之加減者足以啓發運用之機故隨所見而附各方後一文字訓釋非醫家可深研然𠘧𠘧溫溫劑頸劈地之類不究其義於臨證施理之際不無疑滯故細檢查考多方引證亦附條末非敢騖博也一論中誤文脫字不敢妄加刪改並注各條後本漢儒尊經之遺意而已
