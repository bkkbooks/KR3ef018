front:
  text: 序許叔微曰讀仲景論不能博通諸醫書以發明其隱奧專守一書吾未見能也余蚤奉家庭之訓讀傷寒論間從一二耆宿有所承受然既無超卓之才何有創闢之識因循苟且粗領會崖略以為臨證處方之資忽忽二十餘年矣唯癖嗜聚書以所入之贏頗多儲蓄如傷寒一科殆至四十餘家以事務倥傯不克顓心於抽繹僅供一時披尋耳會丙辰秋為人講斯書因顧世為仲景書者或謂傷寒論只當於原文中字櫛句比參證互明以求其歸趣別開心眼後世注家迂腐之談無益方術一概抹殺而可矣是蓋性高明者宜如此也如余則謂宋元而降解釋此書者亡慮數十家深討搜窮各竭其心其間雖意見各出得失互存均之非無追溯仲景淵源者焉嗚呼余也才識不能逮今人安能望於前賢矧竭一人之心力智巧乃孰與假數百年間數十賢之所竭心力智巧而以為吾有也於是公私應酬之暇陳所儲蓄逐條歷考旁及他書廣求密搜沉思默想竊原許氏之旨而期闡發其隱奧臨證以辨疑處方得精當而已遂録以成一書亦聊便於講肄是吾志也而取誚於高明者吾不憂也凡七卷名曰傷寒論輯義昔人云易稿則技精屢𠠇利則藝進是書之成但恐決擇未精或失繁蕪輯以徯他日之刪汰云爾歲享和紀元春二月望直舍書丹波元簡廉夫傷寒卒病論集原序柯本卒作雜宜從詳見於綜概方氏以降諸本並無集字論曰程本刪論曰二字錫志柯同余每覽越人入虢之診望齊侯之色二事見史記扁鵲傳未嘗不慨然嘆其才秀也慨慨通說文慨嘆也詩王風慨其嘆又曹風愾我寤嘆愾即慨字案晉潘嶽間居賦序嶽嘗讀汲黯傳至司馬安四至九卿而良史書之以巧宦之目未嘗不慨然廢書而嘆文法略同並原於史孟軻列傳怪當今居世之士曾不留神醫藥精究方術史秦始皇紀召文學方術之士漢平帝紀方術本草上以療君親之疾下以救貧賤之厄中以保身長全以養其生但競逐榮勢企踵權豪漢蕭望之傳天下之士延頸企踵爭願自效孜孜汲汲博雅孜孜汲汲劇也惟名利是務崇飾其末忽棄其本華其外而悴其內皮之不存毛將安附焉左傳僖十四年文卒然遭邪風之氣嬰非常之疾嬰疾又見後漢李膺傳患及禍至而方震栗降志屈節論語微子不降其志不辱其身家語宰豫進於孔子曰夫子之於司寇也日少而屈節數矣不可以已乎欽望巫祝爾雅欽敬也楚語在男曰覡在女曰巫說文祝祭主讚詞者也告窮歸天束手受敗束手見後漢光武紀齎百年之壽命齎當作賫賫齎同千金方作齎齎亦持也左傳僖三十二年注上壽百二十歲中壽百歲下壽八十莊子盜跖篇人上壽百歲中壽八十下壽六十持至貴之重器委付凡醫恣其所措咄嗟嗚呼何休公羊注曰噫咄嗟也厥身已斃神明消滅變為異物賈誼鵬鳥賦化為異物兮又何足患幽潛重泉江淹述哀詩美人歸重泉李善注引潘嶽悼亡詩之子歸窮泉重壤永幽隔徒為啼泣痛夫舉世昏迷莫能覺悟不惜其命若是輕生彼何榮勢之云哉案從當今居世之士至此千金方序論引張仲景曰文與此少異而進不能愛人知人退不能愛身知己遇災值禍身居厄地厄何本作死濛濛昧昧憃若遊魂憃千金作戇柯本作蠢禮哀公問寡人憃愚冥煩易繫辭遊魂為變皇甫謐甲乙經序曰夫受先人之體有八尺之軀而不知醫事此所謂遊魂耳蓋此義也哀乎趨世之士馳競浮華不固根本忘軀徇物莊子讓王篇今世俗之君子危身棄生以徇物危若冰谷潘嶽寡婦賦若履冰而臨谷李善注毛詩曰惴惴小心如臨於谷又曰戰戰兢兢如履薄冰北史周武帝紀詔曰每一念及若臨冰谷至於是也余宗族素多向餘二百建安紀年案紀年紀元之年也漢書武帝紀元狩元年冬十月祠五畤獲一角獸以燎始以天瑞紀元以來猶未十稔左傳襄二十七年不及五稔注稔年也熟也谷一熟為一年其死亡者三分有二案此乃當今居世之士委付凡醫故如是爾傷寒十居其七感往昔之淪喪書微子篇今殷其淪喪博雅淪沒也傷橫夭之莫救乃勤求古訓書畢命不由古訓於何其訓博採衆方撰用素問九卷八十一難志云素問九卷者素問八十一篇內有遺闕故舉其卷靈樞君臣問答八十一篇毫無遺闕故舉其篇案九卷即靈樞八十一難即難經也志聰注太謬妄陰陽大論案林億等以素問運氣七篇為陰陽大論然無明據焉胎臚藥録志云胎臚藥録者如神農本經長桑陽慶禁方之類胎臚者羅列之謂案此說未有所據並平脈辨證柯云仲景言平脈辨證為傷寒雜病論是脈與證未嘗兩分也案平脈辨證亦似書名然史志未著録今無所考為傷寒雜病論合十六卷雖未能盡愈諸病庶可以見病知源若尋余所集思過半矣易下繫辭知者觀其彖辭則思過半矣王弼云過半之益不亦宜乎孔穎達云聰明知達之士觀彖辭則能思慮有益以過半矣夫天布五行以運萬類人稟五常以有五臟白虎通曰五常者何謂仁義禮知信也五臟肝仁肺義心禮腎知脾信也經絡腑腧氣腑腧穴陰陽會通易上繫辭觀其會通以行其典禮玄冥幽微變化難極自非才高識妙豈能探其理致哉案才高與首段才秀應上古有神農黃帝岐伯伯高雷公少俞少師仲文案仲文史書醫傳等無考中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫即前段所謂凡醫不念思求經旨以演其所知各承家技終始順舊省疾問病務在口給論語御人以口給何晏注佞人口辭捷給相對斯須斯須猶須臾禮樂記禮樂不可斯須去身便處湯藥按寸不及尺寸謂寸口尺謂尺膚握手不及足人迎趺陽三部不參十便良方引王貺脈訣曰說脈之法其要有三一曰人迎在結喉兩旁法天二曰三部謂寸關尺在於腕上側法人三曰趺陽在足面系鞋之所法地三者皆氣之出入要會所以能決吉凶死生凡三處大小遲速相應齊等則為無病之人故曰人迎趺陽三部不參動數發息不滿五十未知生死所以三者決死生之要也動數發息不滿五十靈樞根結篇曰脈不滿五十動而一止者一臟無氣故須候五十動短期未知陸機嘆逝賦嗟人生之短期李善注素問雷公曰請問短期決診九候見素問三部九候論曾無倣佛說文曰仿相似也佛見不審也明堂闕庭盡不見察靈樞五色篇曰明堂鼻也闕者眉間也庭者顏也所謂窺管而已莊子曰魏牟謂公孫龍曰乃規規而求之以察索之以辨是直用管窺天用錐指地不亦小乎夫欲視死別生實為難矣案齊侯猶生而視其死虢太子已死而別其生首以越人之才秀起故結以此二句夫天以下止難矣千金方載治病略例首文與此少異孔子云生而知之者上學則亞之多聞博識知之次也論語季氏篇曰孔子曰生而知之者上也學而知之者次也困而學之又其次也文異義近余宿尚方術請事斯語論語顏淵篇雍雖不敏請事斯語案生而知之者乃前段所謂其才之秀者也學與多聞博識乃前段所謂勤求古訓博採衆方之類是也蓋生而知之者天之所賦不可企而及學與多聞博識人之所能皆可勤而至矣當今居世之士不留神醫藥精究方術獨仲景宿尚之然無越人之才之秀唯欲多聞博識以精究之故誦孔子語以服膺之而已此蓋仲景之謙辭漢長沙守南陽張機著程應旄曰案古人作書大旨多從序中提出故善讀書者未讀古人書先讀古人序從序法中讀及全書則微言大義宛然在目余讀傷寒論仲景之自序竟是一篇悲天憫人文字從此處作論蓋即孔子懼作春秋之微旨也林億等校定序曰張仲景漢書無傳見名醫録云南陽人名機仲景乃其字也舉孝廉官至長沙太守始受術於同郡張伯祖時人言識用精微過其師太平御覽引仲景方序論文同按皇甫謐甲乙經序云漢有華他張仲景仲景見侍中王仲宣時年二十餘謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯勿服居三日見仲景謂曰服湯否仲宣曰已服仲景曰色候固非服湯之診君何輕命也仲宣猶不言後二十年果眉落後一百八十七日而死終如其言此事雖扁鵲倉公無以加也太平御覽引何顒別傳文同又晉書皇甫謐傳仲景垂妙於定方抱朴子仲景開胸納赤餅出初學記及素問王冰注今抱朴子無所考晉去漢未遠其見稱於當時如何仲景雖於漢書無傳其為漢末人無疑矣後漢書劉表傳建安三年長沙太守張羡率零陵桂陽三郡畔表表遣兵攻圍破羡平之注英雄記曰張羡南陽人蓋仲景羡之族豈表破羡之後使仲景代之乎
